body:
  text: 卷三五臟風寒積聚病脈證並治第十一論二首脈證十七條肺中風者口燥而喘身運而重冒而腹脹尤肺中風者津結而氣塞津結則不上潮而口燥氣壅則不下行而喘也身運而重者肺居上焦治節一身肺受風邪大氣則傷故身欲動而彌覺其重也冒者清肅失降濁氣反上為蒙冒也腫脹者輸化無權水聚而氣停也徐運者如在車船之上不能自主也重者肌中氣滯不活動故重也肺中寒吐濁涕鑑肺中寒邪胸中之陽氣不治則津液聚而不行故吐濁涎如涕也李彣曰五液入肺為涕肺合皮毛開竅於鼻寒邪從皮毛而入於肺則肺竅不利而鼻塞涕唾濁涎壅遏不通吐出於口也肺死臟浮之虛按之弱如蔥葉下無根者死程內經曰真臟脈見者死此五臟之死脈也肺臟死浮而虛肝臟死浮而弱心臟死浮而實脾臟死浮而大腎臟死浮而堅五臟俱兼浮者以真氣渙散不收無根之謂也內經曰真肺脈至如以羽毛中人膚非浮之虛乎蔥葉中空草也若按之弱如蔥葉之中空下又無根則浮毛虛弱無胃氣此真臟已見故死肝中風者頭目瞤兩脅痛行常傴令人嗜甘千金甘下有如阻婦狀四字程肝主風風勝則動故頭目瞤動也肝脈布脅肋故兩脅痛也風中於肝則筋脈急引故行常傴傴者不得伸也淮南子曰木氣多傴傴之義正背曲肩垂之狀以筋脈急引於前故也此肝正苦於急急食甘以緩之是以令人嗜甘也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也原注脈經千金云時盜汗咳食已吐汁千金舌本作舌大魏肝中寒者兩臂不舉筋骨得寒邪必拘縮不伸也舌本燥寒鬱而內熱生也喜太息胸中痛者肝為寒鬱則條達之令失而胸膈格阻氣不流暢也不得轉側者兩脅痛滿急輾轉不安也食則吐而汗出肝木侮土厥陰之寒侵胃胃不受食食已則吐如傷寒論中厥陰病所云也汗出者胃之津液為肝邪所乘侵逼外越也此俱肝臟外感之證也案金鑑云兩臂不舉舌本燥二句而汗出三字文義不屬必是錯簡不釋未知果然否姑仍魏注肝死臟浮之弱按之如索不來或曲如蛇行者死程肝臟死浮之弱失肝之職而兼肺之刑按之不如弓弦而如索如索則肝之本脈已失不來則肝之真氣已絶或有蛇行之狀蛇行者曲折逶迤此脈欲作弦而不能故曲如蛇行其死宜矣尤按內經云真肝脈至中外急如循刀刃責責然如按琴瑟弦與此稍異而其徑直則一也肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之原注臣億等校諸本旋覆花湯皆同案注十二字程作方見婦人雜病六字非也同恐缺字訛千金無旋覆花湯主之六字徐沈改蹈作搯非尤肝臟氣血鬱滯著而不行故名肝著然肝雖著而氣反注於肺所謂橫之病也故其人常欲蹈其胸上胸者肺之位蹈之欲使氣內鼓而出肝邪以肺猶橐籥抑之則氣反出也先未苦時但欲飲熱者欲著之氣得熱則行逮既著則亦無益矣鑑旋覆花湯主之六字與肝著之病不合當是衍文案旋覆花湯徐程諸家為婦人雜病中方然千金不載金鑑為衍文今從之心中風者翕翕發熱不能起心中飢食即嘔吐千金飢下有則飲二字即上有飲食二字程心主熱中於風則風熱相搏而翕翕發熱不能起心中雖飢以風擁逆於上即食亦嘔吐也徐翕翕言驟起而均齊即論語所謂始作翕如也心中寒者其人苦病心如啖蒜狀劇者心痛徹背背痛徹心譬如蠱注其脈浮者自吐乃愈蒜下千金有齏字蠱徐作蟲云注恐是蛀字非沈魏尤亦作蟲注程內經曰心惡寒寒邪干心心火被斂而不得越則如啖蒜狀而辛辣憒憒然而無奈故甚則心痛徹背背痛徹心如蠱注之狀也若其脈浮者邪在上焦得吐則寒邪越於上其病乃愈巢源云蠱注氣力羸憊骨節沉重發則心腹煩懊而痛令人所食之物亦變化為蠱急者十數日緩者延引歲月漸侵食腑臟盡而死死則病流注染著旁人故為蠱注也案諸家不知蠱注為病名便解為蟲蛀不息為蟲之往來交注抑亦妄矣心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心臟傷所致也跳下千金有手字尤其人若勞倦則頭面赤而下重蓋血虛者其陽易浮上盛者下必無氣也心中痛而自煩發熱者心虛失養而熱動於中也當臍跳者心虛於上而腎動於下也心之平脈纍纍如貫珠如循琅玕又胃多微曲曰心平今脈弦是變溫潤圓利之常而為長直徑強之形故曰此為心臟傷所致也心死臟浮之實如丸豆按之益躁疾者死丸趙徐沈尤並作麻千金豆下有擊手二字程內經曰真心脈至堅而搏如循薏苡子纍纍然即浮之實如丸豆按之益躁疾之脈案丸謂彈丸豆謂菽也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為癲陽氣衰者為狂案徐云哭恐是入字沈同金鑑云癲狂互誤皆不可從尤邪哭者悲傷哭泣如邪所憑此其標有稠痰濁火之殊而其本則皆心虛而血氣少也於是寤寐恐怖精神不守魂魄不居為癲為狂勢有必至者矣程內經言重陽者狂重陰者癲此陰氣衰者為癲陽氣衰者為狂似與彼異然經亦有上實下虛為厥癲疾陽重脫者易狂則知陰陽俱虛皆可為癲為狂也脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣目千金作肉是程風為陽邪故中風必翕翕發熱脾主肌肉四肢風行於肌肉四肢之間則身懈惰四肢不收故形如醉人腹為陰陰中之至陰脾也故腹中煩重內經曰肌肉蠕動命曰微風以風入於中搖動於外故皮目為之瞤動腹中煩重隔其息道不能達於腎肝故短氣也尤李氏曰風屬陽邪而氣疏泄形如醉人言其面赤而四肢軟也皮目上下眼胞也脾死臟浮之大堅按之如覆杯潔潔狀如搖者死原注臣億等詳五臟各有中風中寒今脾只載中風腎中風中寒俱不載者以古文簡亂極多去古既遠無文可以補綴也潔潔千金作潔潔千金標脾中寒三字不載病狀知其缺遺已久也鑑李彣曰脈弱以滑是有胃氣浮之大堅則胃氣絶真臟脈見矣覆杯則內空潔潔者空而無有之象也狀如搖者脈躁疾不寧氣將散也故死趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則堅其脾為約麻子仁丸主之千金約下有脾約者大便堅小便利而不渴也十三字鑑趺陽胃脈也若脈澀而不浮脾陰虛也則胃氣亦不強不堪下矣今脈浮而澀胃陽實也則為胃氣強脾陰亦虛也脾陰虛不能為胃上輸精氣水獨下行故小便數也胃氣強約束其脾不化津液故大便難也以麻仁丸主之養液潤燥清熱通幽不敢恣行承氣者蓋因脈澀終是虛邪也麻子仁丸方明理論名脾約丸麻子仁二升芍藥半斤枳實一斤大黃一斤厚朴一斤杏仁一升陽明篇用枳實半斤厚朴一尺上六味末之煉蜜和丸梧子大飲服十丸日三以知為度程內經曰脾為孤臟中央土以灌四旁為胃而行津液胃熱則津液枯而小便又偏滲大腸失傳送之職矣內經曰燥者濡之潤以麻子芍藥杏仁結者攻之下以大黃枳實厚朴共成潤下之劑外臺古今録驗麻子仁丸療大便難小便利而反不渴者脾約方即本方云此本仲景傷寒論方肘後療脾胃不和常患大便堅強難於本方中去杏仁産育寶慶集麻仁丸治産後大便祕澀者於本方中去芍藥厚朴杏仁加人參腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣原注一作表里冷濕久久得之腰以下冷痛腰重如帶五千錢甘薑苓朮湯主之如水狀千金作如水洗狀身字千金外臺作從作二字久久得之外臺作久之故得也腰重原本及外臺作腹重今依趙本改正千金腎臟脈論作腰腰痛門作腹徐程諸注並作腹尤腎受冷濕著而不去則為腎著身重腰中冷如坐水中腰下冷痛腹重如帶五千錢皆冷濕著腎而陽氣不化之徵也不渴上無熱也小便自利寒在下也飲食如故胃無病也故曰病屬下焦身勞汗出衣里冷濕久久得之蓋所謂清濕襲虛病起於下者也然其病不在腎之中臟而在腎之外腑故其治法不在溫腎以散寒而在燠土以勝水甘薑苓朮辛溫甘淡本非腎藥名腎著者原其病也甘草乾薑茯苓白朮湯千金名腎著湯外臺引古今録驗名甘草湯甘草二兩白朮二兩千金外臺用四兩乾薑四兩千金外臺用三兩茯苓四兩上四味以水五升煮取三升分溫三服腰中即溫千金腎著散外臺引經心録並無主療載上方後杜仲桂心各三兩甘草澤瀉牛膝乾薑各一兩白朮茯苓各四兩上八味治下篩為粗散一服三方寸匕酒一升煮五六沸去滓頓服日再千金翼溫腎湯主腰脊膝腳浮腫不隨出腳氣茯苓乾薑澤瀉各二兩桂心三兩上四味切以水六升煮取二升分為三服又治腎間有水氣腰脊疼痛腹背拘急絞痛方本方去甘草加澤瀉三因茯苓白朮湯治冒暑毒加以著濕或汗未乾即浴皆成暑濕本方加桂心各一兩又除濕湯治冒雨著濕鬱於經絡血溢作衄或脾不和濕著經絡血流入胃胃滿吐血即本方頭疼加川芎二錢最止浴室中發衄腎死臟浮之堅按之亂如轉丸益下入尺中者死益千金作溢尤腎脈本石浮之堅則不石而外鼓按之亂如轉丸是變石之體而為躁動真陽將搏躍而出矣益下入尺言按之至尺澤而脈猶大動也尺下脈宜伏今反動真氣不固而將外越反其封蟄之常故死程以上真臟與內經互有異同然得非常之脈必為非常之病若未病者必病進已病者必死總之脈無胃氣現於三部中脈象形容不一也問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故能噫耳下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈鑑三焦竭部者謂三焦因虛竭而不各歸其部不相為用也尤上焦在胃上口其治在膻中而受氣於中焦今胃未和不能消穀則上焦所受者非精微之氣而為陳滯之氣矣故為噫噫噯食氣也下焦在膀胱上口其治在臍下故其氣乏竭即遺溺失便程內經曰膀胱不約為遺尿下經曰虛則遺尿其氣不和則溲便不約故遺失而不能自禁制不須治之久則正氣復而自愈案尤云上焦氣未和不能約束禁制亦令遺溺失便所謂上虛不能制下者也云不須治者謂不須治其下焦俟上焦氣和久相自愈金鑑云不須治久則愈在善噫可也若遺溺失便未有不治能愈者恐是錯簡二説並有理然不如程之穩妥故姑仍之師曰熱在上焦者因咳為肺痿熱在中焦者為堅熱在下焦者則尿血亦令淋祕不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔尤熱在上焦者肺受之肺喜清肅而惡煩熱肺熱則咳咳久則肺傷而痿也熱在中焦者脾胃受之脾胃者所以化水穀而行陰陽者也胃熱則實而硬脾熱則燥而閟皆為堅也下焦有熱者大小腸膀胱受之小腸為心之腑熱則尿血膀胱為腎之腑熱則癃閟不通也鶩溏如鶩之後水糞雜下大腸有寒故泌別不職其有熱者則腸中之垢被迫而下也下重謂腹中重而下墜小腸有寒者能腐而不能化故下重陽不化則陰下溜故便血其有熱者則下注廣腸而為痔痔熱疾也徐直腸者大腸之頭也門為肛小腸有熱則大腸傳導其熱而氣結於肛門故痔案為堅沈及金鑑為腹脹堅滿不可從也腸垢巢源云腸垢者腸間津汁垢膩也由熱痢蘊積腸間虛滑所以因下痢而便腸垢也下重者後重也傷寒論四逆散泄利下重下利篇熱利下重白頭翁湯主之劉熙釋名云泄利下重而赤白曰䐭是也問曰病有積有聚有䅽氣何謂也師曰積者臟病也終不移聚者腑病也發作有時輾轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍六上關上積在心下微下關積在少腹尺中積在氣衝脈出左積在左脈出右積在右脈兩出積在中央各以其部處之䅽千金作谷則愈之下更有愈字寸口積之口下有結字關上下有結字尺中下同魏䅽作谷云穀之為字本如此若夫谷乃惡木也後人改為𣪊水遂並谷亦改為㯏又訛為䅽皆誤筆也案通雅云䅽即谷乃穀也山海經百𣖫生荀子五䅽蕃是也諸積大法以下徐沈尤別提為一條徐積迹也病氣之屬陰者也臟屬陰兩陰相得故不移不移者有專痛之處而無遷改也聚則如市中之物偶聚而已病之屬陽者也腑屬陽故相比陽則非如陰之凝故寒氣感則發否則已所謂有時也既無定著則痛無常處故曰輾轉痛移其根不深故比積為可治若䅽氣䅽者谷也乃食氣也案三因立䅽氣門載宿食論治當並考食傷太陰敦阜之氣抑遏肝氣故痛在脅下痛不由臟腑故按之則氣行而愈然病氣雖輕按之不能絶其病原故復發中氣強不治自愈尤諸積該氣血痰食而言脈來細而附骨謂細而沉之至諸積皆陰故也又積而不移之處其氣血榮衛不復上行而外達則其脈為之沉細而不起故歷舉其脈出之所以決其受積之處而復益之曰脈兩出積在中央以中央有積其氣不能分布左右故脈之見於兩手者俱沉細而不起也各以其部處之謂各隨其積所在之處而分治之耳五十五難曰積者陰氣也聚者陽氣也故陰沉而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚邵氏明醫指掌參補云痞塊多在皮裡膜外並不系腸胃間而醫者往往以峻劑下之安能使此塊入腸胃從大便而出哉吾見病未必去而元氣已耗經年纍月遂至不治者多矣歷代醫家皆曰在左為死血在右為食積在中為痰飲蓋以左屬肝肝藏血右屬脾脾化谷而痰飲則結聚於中焦也殊不知肝脾雖左右之分而實無界限之隔非謂肝偏於左而無與於右脾偏於右而無與於左在左為死血而在右獨無死血乎在中為痰飲而左右獨無痰飲乎但在左在右在中皆因虛之所在而入之耳不可以死血痰飲食積分之也然當診之以察其病弦滑為痰芤澀為血沉實為食三脈並見則當兼治也痰飲咳嗽病脈證並治第十二論一首脈證二十一條方十九首此篇脈經接前肺痿肺癰咳嗽上氣為一篇痰飲作淡飲下並同問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息氣短不得臥其形如腫謂之支飲瀝瀝巢源作漉漉氣短諸本作短氣程聖濟總録曰三焦者水穀之道路氣之所終始也三焦調適氣脈平勻則能宣通水液行入於經化而為血灌溉周身若三焦氣塞脈道壅閉則水飲停滯不得宣行聚成痰飲為病多端又因脾土不能宣達致水飲流溢於中布散於外甚則五臟受病也痰飲者何以平人水穀之氣入於胃變化精微以充肌肉則形盛今不能變化精微但化而為痰飲此其人所以素盛今瘦故水走腸間瀝瀝作聲也沈飲後水流在脅下者乃飲積於胃腠理不密如汗漐漐橫溢胃外流於脅下而為懸飲懸飲者猶物懸挂其處之義也脅乃陰陽之道路懸飲阻抑往來之氣咳則氣吸吊動於脅咳唾則引痛矣蓋脾肺之氣不能轉運飲水流行泛於四肢皮膚肌肉之間即當汗出而散設不汗出凝逆經隧身體疼重而為溢飲經謂溢飲者渴暴多飲而溢入肌皮腸胃之外是也若溢出於胃從下注上貯於胸膈之間壅遏肺氣上逆而內則咳逆倚息短氣不得臥外應皮毛肺氣壅而不行則如腫故為支飲也鑑痰飲懸飲溢飲支飲言飲病之情狀也四飲亦不外乎留飲伏飲之理但因其流水之處特分之為四耳由其狀而命之名故有四也李彣曰夫飲有四而此獨以痰飲名總之水積陰或為飲飲凝陽或為痰則分而言之飲有四合而言之總為痰飲而已案痰本作淡王羲之初月帖淡悶乾嘔宋黃伯思法帖刊誤云淡古淡液之淡干古乾溼之干今人以淡作痰以干作乾非也而肘後方有治痰癊諸方即痰飲也考唐惠琳一切經音義云淡陰謂胸上液也醫方多作淡飲又云痰癊上音談下陰禁反案痰癊字無定體胸膈中氣病也津液因氣凝結不散如筋膠引挽不斷名為痰癊蓋痰字始見於神農本經巴豆條云留飲痰癖而飲字則見於內經刺志論云脈小血多者飲中熱也王注溜飲也又溢飲見於脈要精微論依以上數義而考之痰飲即津液為病之總稱故本經以題篇目而又以腸間瀝瀝有聲為痰飲者猶傷寒外邪之統名而又以麻黃湯一證呼為傷寒之類本條痰飲又與稀則曰飲稠則曰痰之義亦自異程云痰飲脈經千金翼俱作淡飲當以淡飲為是若痰飲則稠黏不能走腸間瀝瀝作聲也此説似是而卻非不知痰乃淡從疒者沈千金翼淡飲五飲之一與本條所謂頗異云大五飲丸主五種飲一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰淡飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲千金同所謂流飲乃似本條之痰飲巢源云流飲者由飲水多水流走於腸胃之間漉漉有聲謂之流飲亦本條之痰飲也巢源云懸飲謂飲水過多留注脅下令脅間懸痛咳唾引脅痛故云懸飲又云支飲謂飲水過多停積於胸膈之間支乘於心故云支飲案支字徐為肺之支脈程為支散之義魏云分也尤云如水之有派木之有枝並不通今依巢源支枝同謂支撑於心膈之間支滿支結義皆同王注六元正紀支痛云支拄妨也為是水在心心下堅築短氣惡水不欲飲千金作心下堅築築尤水即飲也堅築悸動有力築築然也短氣者心屬火而畏水水氣上逼則火氣不伸也徐臟中非真能蓄有形之水不過飲氣侵之不可泥水在肺吐涎沫欲飲水程聯綿不斷者曰涎輕浮而白者曰沫涎者津液所化沫者水飲所內釀於肺經則吐吐多則津液亦干故欲飲水水在脾少氣身重徐脾主肌肉且惡濕得水氣則濡滯而重脾精不運則中氣不足而倦怠少氣水在肝脅下支滿嚏而痛程肝脈布脅肋故脅下支滿水在肝則條達之性為水鬱其氣上走頏顙至蓄門而出鼻孔因作嚏也嚏則痛引脅肌故嚏而痛水在腎心下悸程水在腎則腎氣凌心故築築然悸也夫心下有留飲其人背寒冷如手大手原本作水今依諸本改訂徐沈尤作掌尤留飲即痰飲之留而不去者也背寒冷如掌大者飲留之處陽氣所不入也程諸陽受氣於胸中而轉行於背心下有留飲則陽氣抑遏而不行故背寒冷如手大者言其不盡寒也醫學六要仲景曰心下有留飲其人背惡寒冷如冰茯苓丸茯苓一兩半夏二兩枳殼五錢風化硝二錢半共末薑汁糊丸桐子大薑湯下三十丸案此指迷茯苓丸也而引仲景者何又王隱君滾痰丸主療有脊上一條如線之寒起證亦與此同留飲者脅下痛引缺盆咳嗽則輒已原注一作轉甚案脈經千金作轉甚程金鑑從之程缺盆者五臟六腑之道故飲留於脅下而痛上引缺盆引缺盆則咳嗽咳嗽則痛引脅下而轉甚此屬懸飲轉甚一本作輒已未有咳嗽而脅下痛引缺盆輒愈也胸中有留飲其人短氣而渴四肢歷節痛脈沉者有留飲脈沉以下程為另條程胸中者屬上焦也今為留飲隔礙則氣為之短津液不能上潮則口為之渴也飲者濕類也流於關節故四肢歷節痛也經曰脈得諸沉者當責有水故脈沉者為水飲尤四肢歷節痛為風寒濕在關節若脈不浮而沉而又短氣而渴則知是留飲為病而非外入之邪矣膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤劇必有伏飲病痰脈經千金作之病脈經注云目泣自出一作目眩尤伏飲亦即痰飲之伏而不覺者發則始見也身熱背疼腰疼有似外感而兼見喘滿咳唾則是活人所謂痰之為病能令人憎寒發熱狀類傷寒者也目泣自出振振身瞤動者飲發而上逼液道外攻經隧也案金鑑云即今之或值秋寒或感春風發則必喘滿咳吐痰盛寒熱背痛腰疼咳劇則目泣自出咳甚則振振身動世俗所謂吼喘病也今驗吼喘未見振振身瞤者故欠瞤字不解蓋以其有所不妥者乎況吼喘乃前篇肺脹中之一證與此自異夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛脈偏弦者飲也千金外臺虛下有耳字脈雙弦以下程為別條金鑑同是沈徐無喜字程魏金鑑作大下后里虛程飲水多則水氣泛溢於胸膈必暴喘滿也凡人食少飲多則胃土不能遊溢精氣甚者必停於心下而為悸微者則填於胸膈而為短氣也鑑凡病人食少飲多者為消渴病小便不利者為留飲留飲者即今之停水飲病也尤水溢入肺者則為喘滿水停心下者甚則水氣凌心而悸微則氣被飲抑而短也雙弦者兩手皆弦寒氣周體也偏弦者一手獨弦飲氣偏注也案徐云有一手兩條脈亦曰雙弦此乃元氣不壯之人往往多見此脈亦屬虛適愚概溫補中氣兼化痰應手而愈此本於吳氏脈語云雙弦者脈來如引二線也然與經文雙弦義遞別肺飲不弦但苦喘短氣苦脈經千金作喜尤肺飲飲之在肺中者五臟獨有肺飲以其虛而能受也肺主氣而司呼吸苦喘短氣肺病已著脈雖不弦可以知其有飲矣支飲亦喘而不能臥加短氣其脈平也臥千金外臺作眠尤支飲上附於肺即同肺飲故亦喘而短氣其脈亦平而不必弦也按後十四條云咳家其脈弦為有水夫咳為肺病而水即是飲而其脈弦此云肺飲不弦支飲脈平未詳何謂案脈平諸注紛壇多屬附會尤為未詳可謂卓見矣病痰飲者當以溫藥和之沈此言痰飲屬陰當用溫藥也脾失健運水濕釀成痰飲其性屬濕而為陰邪故當溫藥和之即助陽而勝脾濕俾陽運化濕自除矣魏言和之則不專事溫補即有行消之品亦概其義例於溫藥之中方謂之和之而不可謂之補之益之也蓋痰飲之邪因虛而成而痰亦實物必少有開導總不出溫藥和之四字其法盡矣外臺引範汪病痰者當以溫藥和之半夏湯即千金小半夏湯附於後心下有痰飲胸脅支滿目眩苓桂朮甘湯主之脈經作甘草湯徐心下有痰飲心下非即胃也乃胃之上心之下上焦所主唯其氣挾寒濕陰邪沖胸及脅而為支滿支者撑定不去如痞狀也陰邪抑遏上升之陽而目見玄色故眩苓桂朮甘湯正所謂溫藥也桂甘之溫化氣術之溫健脾苓之平而走下以消飲氣茯苓獨多任以君也靈經脈篇云包絡是動則胸脅支滿心中憺憺大動茯苓桂枝白朮甘草湯方千金名甘草湯茯苓四兩桂枝白朮各三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利聖濟總録茯苓湯治三焦有水氣胸脅支滿目眩即本方夫短氣有微飲當從小便去之苓桂朮甘湯主之方見上腎氣丸亦主之方見婦人雜病中徐短氣有微飲即上文微者短氣也然支飲留飲水在心皆短氣總是水停心下故曰當從小便去之尤氣為飲抑則短欲引其氣必蠲其飲飲水類也治水必自小便去之苓桂術甘益土氣以行水腎氣丸養陽氣以化陰雖所主不同而利小便則一也案喻氏法律云苓桂朮甘湯主飲在陽呼氣之短腎氣丸主飲在陰吸氣之短蓋呼者出心肺吸者入腎肝此説甚鑿矣蓋苓桂術甘治腎陽不足不能行水而微飲停於心下以短氣腎氣丸治腎虛而不能收攝水水泛於心下以短氣必察其人之形體脈狀而為施治一證二方各有所主其別蓋在於斯耶嚴氏濟生方云有病喜吐痰唾服八味丸而作效者亦有意焉王叔和云腎寒多唾蓋腎為水之官腎能攝水腎氣溫和則水液運下腎氣虛寒則邪水上溢其間用山茱萸山藥輩取其補附子肉桂取其溫茯苓澤瀉取其利理亦當矣病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之脈經千金外臺反上有者字魏病者脈伏為水邪壓溷氣血不能通故脈反伏而不見也其人欲自利利反快水流濕而就下以下為暫泄其勢故暫安適也然旋利而心下續堅滿此水邪有根蒂以維繫之不可以順其下利之勢而為削滅也故曰此為留飲欲去故也蓋陰寒之氣立其基水飲之邪成其穴非開破導利之不可也案金鑑云此為留飲欲去故也句當在利反快之下必傳寫之訛蓋此一句釋上文必非傳寫之訛甘遂半夏湯方外臺引千金云此本仲景傷寒論方甘遂大者三枚半夏十二枚以水一升煮取半升去滓芍藥五枚千金作二枚外臺作一兩甘草如指大一枚炙一本作無千金作一枚如指大水一升煮取半升案一本作無四字未詳上四味以水二升煮取半升去滓以蜜半升和藥汁煎取八合頓服千金作上四味以蜜半升內二藥汁合得一升半煎取八合頓服之案千金近是程留者行之用甘遂以決水飲結者散之用半夏以散痰飲甘遂之性直達恐其過於行水緩以甘草白蜜之甘收以芍藥之酸雖甘草甘遂相反而實有以相使此酸收甘緩約之之法也靈樞經曰約方猶約囊其斯之謂與尤甘草與甘遂相反而同用之者蓋欲其一戰而留飲盡去因相激而相成也芍藥白蜜不特安中抑緩藥毒耳脈浮而細滑傷飲鑑凡飲病得脈浮而細滑者為痰飲初病水邪未深之診也李彣曰飲脈當沉今脈浮者水在肺也徐不曰有飲而曰傷飲見為外飲所驟傷而非停積之水也脈弦數有寒飲冬夏難治尤脈弦數而有寒飲則病與脈相左魏氏所謂飲自寒而挾自熱是也夫相左者必相持冬則時寒助飲欲以熱攻則脈數必甚夏則時熱助脈欲以寒治則寒飲為礙故曰難治案此條難解金鑑改數作遲肆矣脈沉而弦者懸飲內痛病懸飲者十棗湯主之鑑趙良曰脈沉病在裡也凡弦者為痛為飲為癖懸飲結積在內作痛故脈見沉弦尤脈沉而弦飲氣內聚也飲內聚而氣擊之則痛徐主十棗湯者甘遂性苦寒能瀉經隧水濕而性更迅速直達大戟性苦辛寒能瀉臟腑之水濕而為控涎之主芫花性苦溫能破水飲窠囊故曰破癖須用芫花合大棗用者大戟得棗即不損脾也蓋懸飲原為驟得之證故攻之不嫌峻而驟若稍緩而為水氣喘息浮腫三因方以十棗湯藥為末棗肉和丸以治之可謂善於變通者矣十棗湯方外臺引千金云此本仲景傷寒論方芫花熬甘遂大戟各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去滓內藥末強人服一錢匕羸人服半錢平旦溫服之不下者明日更加半錢得快下後糜粥自養搗篩太陽下篇作各別為散快下原本作快之今改千金云十棗湯治病懸飲者若下後不可與也凡上氣汗出而咳者此為飲也又云錢匕者以大錢上全抄之若云半錢匕者則是一錢抄取一邊爾並用五銖錢也外臺深師朱雀湯療久病癖飲停痰不消在胸膈上液液時頭眩痛苦攣眼睛身體手足十指甲盡黃亦療脅下支滿飲輒引脅下痛即本方用甘遂芫花各一分大戟三分大棗十二枚聖濟總録三聖散治久病飲癖停痰及脅支滿輒引脅下痛即本方又芫花湯治水腫及支滿澼飲於本方加大黃甘草五味各一兩上粗搗篩每服三錢匕水二盞棗二枚擘破同煎至九分下芒硝半錢更煎一沸去滓溫服以利為度宣明論云此湯兼下水腫腹脹並酒食積腸垢積滯痃癖堅積蓄熱暴痛瘧氣久不已或表之正氣與邪熱並甚於里熱極似陰反寒戰表氣入里陽厥極深脈微而絶並風熱燥甚結於下焦大小便不通實熱腰痛及小兒熱結乳癖積熱作發風潮搐斑疹熱毒不能了絶者宣明論三花神祐丸治壯實人風痰鬱熱肢體麻痹走注疼痛濕熱腫滿氣血壅滯不得宣通及積痰翻胃服三丸後轉加痛悶此痰涎壅塞頓攻不開再加二丸快利則止本方去大棗加大黃黑醜輕粉水丸丹溪心法小胃丹治胸膈腸胃熱痰濕痰本方加黃柏大黃粥丸嘉定縣志云唐杲字德明善醫太倉武指揮妻起立如常臥則氣絶欲死杲言是為懸飲飲在喉間坐之則墜故無害臥則壅塞諸竅不得出入而欲死也投以十棗湯而平病溢飲者當發其汗大青龍湯主之小青龍湯亦主之脈經千金無大青龍湯主之六字及亦字千金云範汪用大青龍湯程內經云溢飲者渴暴多飲而易入肌膚腸胃之外也以其病屬表故可大小青龍湯以發汗鑑溢飲者飲後水流行歸於四肢當汗出而不汗出壅塞經表身體疼重即今之風水水腫病也徐溢飲者水已流行歸四肢以不汗而致身體疼重蓋表為寒氣所侵而疼肌體著濕而重全乎是表但水寒相雜猶之風寒兩傷內有水氣故以大青龍小青龍主之然大青龍合桂麻而去芍加石膏則水氣不甚而挾熱者宜之倘咳多而寒伏則必小青龍為當蓋麻黃去杏仁桂枝去生薑而加五味乾薑半夏細辛雖表散而實欲其寒飲之下出也大青龍湯方外臺云範汪溢飲者當發其汗大青龍湯主之麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁四十個去皮尖生薑三兩大棗十二枚石膏如雞子大碎上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗多者溫粉粉之詳見於傷寒輯義下同小青龍湯方麻黃去節三兩芍藥三兩五味子半升乾薑三兩甘草三兩炙細辛三兩桂枝三兩去皮半夏半升湯洗上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升外臺云千金溢飲者當發其汗宜青龍湯直指桂術湯治氣分本方去芍藥五味子半夏加白朮枳殼出水飲門膈間支飲其人喘滿心下痞堅面色黧黑其脈緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之千金膈間下有有字復發下有發則二字去石膏上衍湯字尤支飲上為喘滿而下為痞堅則不特礙其肺抑且滯其胃矣面色黧黑者胃中成聚榮衛不行也脈浮緊者為外寒沉緊者為裡實裡實可下而飲氣之實非常法可下痰飲可吐而飲之在心下者非吐可去宜得之數十日醫吐下之而不愈也木防己桂枝一苦一辛並能行水氣而散結氣而痞堅之處必有伏陽吐下之餘定無完氣書不盡言而意可會也故又以石膏治熱人參益虛於法可謂密矣其虛者外雖痞堅而中無結聚即水去氣行而愈其實者中實有物氣暫行而復聚故三日復發也魏氏曰後方去石膏加芒硝者以其既散復聚則有堅定之物留作包囊故以堅投堅而不破者即以軟投堅而即破也加茯苓者引飲下行之用耳鑑得之數十日醫或吐之不愈者是水邪不單結在上故越之而不愈也或下之不愈者是水邪不單結在下雖竭之亦不愈也心下痞堅飲結在中可知故以木防己湯開三焦水結通上中下之氣方中用人參以吐下後傷正也故水邪虛結者服之即愈若水邪實結者雖愈亦復發也即復與前方亦不能愈當以前方減石膏之寒凝加芒硝峻開堅結加茯苓直輸水道未有不愈者也木防己湯方木防己三兩石膏十二枚雞子大千金作雞子大十二枚外臺作雞子大三枚案外臺似是桂枝二兩人參四兩上四味以水六升煮取二升分溫再服木防己加茯苓芒硝湯方木防己桂枝各二兩芒硝三合人參茯苓各四兩上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈案千金外臺用木防己三兩為是千金云一方不加茯苓外臺云此本仲景傷寒論方深師同程防己利大小便石膏主心下逆氣桂枝宣通水道人參補氣溫中正氣旺則水飲不待散而自散矣加芒硝之鹹寒可以軟痞堅茯苓之甘淡可以滲痰飲石膏辛寒近於解肌不必雜於內方故去之案防己古稱木防己分漢木而為二種者蘇敬陳藏器以後之説太平御覽載吳氏本草曰木防己一名解離一名解燕神農辛黃帝岐伯桐君苦無毒李氏大寒如葛莖蔓延如芄白根外黃似桔梗內黑文如車輻解可以證矣又案防己散飲泄水石膏清肺熱止喘滿桂枝人參通陽補氣若夫水邪結實者非石膏之所能治代以芒硝峻開堅結加茯苓利水道也心下有支飲其人苦冒眩澤瀉湯主之程內經曰清陽出上竅支飲留於心膈則上焦之氣濁而不清清陽不能走於頭目故其人苦眩冒也尤冒者昏冒而神不清如有物冒蔽之也眩者目眩轉而乍見玄黑也澤瀉湯方外臺引深師云是本仲景傷寒論方澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服程白朮之甘苦以補脾則痰不生澤瀉之甘鹹以入腎則飲不蓄小劑以治支飲之輕者外臺煮取一升下有又以水一升煮取五合此二汁十三字支飲胸滿者厚朴大黃湯主之尤胸滿疑作腹滿支飲多胸滿此何以獨用下法厚朴大黃與小承氣同設非腹中痛而閉者未可以此輕試也鑑胸字當是腹字若是胸字無用承氣湯之理是傳寫之訛支飲胸滿邪在肺也宜用木防己湯葶藶大棗湯飲滿腹滿邪在胃也故用厚朴大黃湯即小承氣湯也千金云厚朴大黃湯夫酒客咳者必致吐血此坐久飲過度所致也其脈虛者必冒胸中本有支飲支飲胸滿主之之方厚朴大黃湯方外臺引千金云此本仲景傷寒論方厚朴一尺大黃六兩枳實四枚千金作四兩外臺厚朴枳實下俱有炙字上三味以水五升煮取二升分溫再服張氏醫通云此即小承氣以大黃多遂名厚朴大黃湯若厚朴多則名厚朴三物湯此支飲胸滿者必緣其人素多濕熱濁飲上逆所致故用蕩滌中焦藥治之支飲不得息葶藶大棗瀉肺湯主之原注方見肺癰中外臺引千金云此本仲景傷寒論方徐肺因支飲滿而氣閉也一呼一吸曰息是氣既閉而肺氣之布不能如常度也葶藶苦寒體輕象陽故能泄陽分肺中之閉唯其泄閉故善逐水今氣水相擾肺為邪實以葶藶泄之故曰瀉肺大棗取其甘能補胃且以制葶藶之苦使不傷胃也鑑喘咳不能臥短氣不得息皆水在肺之急證也故以葶藶大棗湯直瀉肺水也張氏醫通云支飲留結氣塞胸中故不得息以其氣壅則液聚液聚則熱結所以與肺癰同治也嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之原注千金云小半夏加茯苓湯案千金用小半夏湯外臺引千金云加茯苓者是也此注當刪去沈此支飲上溢而嘔之方也凡外邪上逆作嘔必傷津液應當作渴故謂嘔家本渴渴則病從嘔去謂之欲解若心下有支飲停蓄胸膈制燥故嘔而不渴則當治飲尤半夏味辛性燥辛可散結燥能蠲飲生薑製半夏之悍且以散逆止嘔也小半夏湯方半夏一升生薑半斤上二味以水七升煮取一升半分溫再服外臺虛煩門小品杯水湯方後云方有半夏必須著生薑不爾戟人咽千金云生薑嘔家之聖藥千金云有人常積氣結而死其心上暖以此湯少許汁入口遂活出傷寒發黃門千金小半夏湯病心腹虛冷遊痰氣上胸脅滿不下食嘔逆者方即於本方中加橘皮一方有桂心甘草楊氏家藏方水玉湯治眉稜骨痛不可忍者此痰厥也即本方嚴氏濟生方玉液湯治七情傷感氣鬱生涎隨氣上逆頭目眩暈心嘈忪悸眉稜骨痛即本方入沉香水一呷溫服直指半夏丸治吐血下血崩中帶下喘急痰嘔中滿虛腫亦消宿瘀百病通用圓白半夏刮淨捶扁以生薑汁調和飛白麵作軟餅包掩半夏慢火炙令色黃去面取半夏為末上末米糊丸緑豆大日乾每三四十丸溫熟水下腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之程痰飲留於中則腹滿水穀入於胃但為痰飲而不為津液故口舌乾燥也上證曰水走腸間瀝瀝有聲故謂之痰飲此腸間有水氣亦與痰飲不殊故用此湯以分消水飲尤水既聚於下則無復潤於上是以腸間有水氣而口舌反乾燥也後雖有水飲之入只足以益下趨之勢口燥不除而腹滿益甚矣防己椒目葶藶大黃丸方千金名椒目丸防己椒目葶藶熬千金用二兩餘同大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩程此水氣在小腸也防己椒目導飲於前清者得從小便而出大黃葶藶推飲於後濁者得從大便而下也此前後分消則腹滿減而水飲行脾氣轉而津液生矣若渴則甚於口舌乾燥加芒硝佐諸藥以下腹滿而救脾土卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之卒千金作諸據千金外臺半夏上脫小字尤飲氣逆於胃則嘔吐滯於氣則心下痞凌於心則悸蔽於陽則眩半夏生薑止嘔降逆加茯苓去其水也鑑趙良曰經云以辛散之半夏生薑皆味辛本草半夏可治膈上痰心下堅嘔逆眩者亦上焦陽氣虛不能升發所以半夏生薑並治之悸則心受水凌非半夏可獨治必加茯苓去水下腎逆以安神神安則悸愈也小半夏加茯苓湯方半夏一升生薑半斤茯苓三兩一法四兩外臺引千金用四兩方後云仲景傷寒論茯苓三兩餘並同案今本千金用三兩上三味以水七升煮取一升五合分溫再服千金注云胡洽不用茯苓用桂心四兩三因方名大半夏湯千金茯苓湯主胸膈痰滿於本方中加桂心方後云冷極者加附子氣滿加檳榔聖濟總録半夏加茯苓湯治三焦不順心下痞滿膈間有水目眩悸動即本方和劑局方茯苓半夏湯治停痰留飲胸膈滿悶咳嗽嘔吐氣短噁心以致飲食不下即本方易簡方消暑丸治傷暑發熱頭痛半夏一斤醋五升煮乾茯苓半斤甘草半斤上為細末以生薑汁作薄糊為丸如梧桐子大每服五十粒水下又二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發為寒熱或因食生冷脾胃不和於本方加甘草陳皮烏梅直指云暑家氣虛脈虛或飲水過多或冷藥無度傷動其中嘔吐不食自利不渴此則外熱裡寒無惑乎傷暑伏熱之説非理中湯不可也又有冷藥過度胃寒停水潮熱而嘔或身熱微煩此則陽浮外而不內非小半夏加茯苓湯不可也直指大半夏湯治痰飲即本方假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之癲徐沈尤魏並作顛金鑑云癲當是巔字巔者頭也文義相屬此傳寫訛案作顛為是此乃顛倒眩暈之謂尤瘦人不應有水而臍下悸則水動於下矣吐涎沫則水逆於中矣甚而顛眩則水且犯於上矣形體雖瘦而病實為水乃病機之變也顛眩即頭眩苓朮豬澤甘淡滲泄使腸間之水從小便出用桂者下焦水氣非陽不化也曰多服暖水汗出者蓋欲使表裡分消其水非挾有表邪而欲兩解之謂鑑此條臍下有悸是水停臍下為病也若欲作奔豚則為陽虛當以茯苓桂枝甘草大棗湯主之五苓散方澤瀉一兩一分豬苓三分去皮茯苓三分白朮三分桂枝二分去皮上五味為末白飲服方寸匕日三服多飲暖水汗出愈白飲外臺作水醫壘元戎作白米飲詳見於傷寒論輯義朱氏集驗方治偏墜吊疝方即本方煎蘿蔔子煎湯調下吉州彭履仲方直指方便毒門五苓散疏利小便以泄敗精用蔥二莖煎湯調下得效方小兒門五苓散治陰核氣結腫大釣痛多因啼怒不止傷動陰氣結聚不散得之或胎婦啼泣過傷令兒生下小腸氣閉加以風冷血水相聚水氣上乘於肺故先喘而後疝痛外腎不硬臍下痛楚不可忍惟利二便則安以木通蔥白茴香食鹽煎湯調下得小便利為效經驗良方云衡陽屈朝奉治小兒上吐下瀉用五苓為末生薑自然汁為丸麻子大量兒大小米飲送下附方外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食外臺痰飲食不消及嘔逆不下食門引延年云仲景傷寒論同茯苓人參白朮各三兩枳實二兩橘皮二兩半生薑四兩上六味水六升煮取一升八合分溫三服如人行八九里進之味下外臺有切以二字合下有去滓二字沈脾虛不與胃行津液水蓄為飲貯於胸膈之間滿而上溢故自吐出水後邪去正虛虛氣上逆滿而不能食也所以參朮大健脾氣使新飲不聚薑橘枳實以驅胃家未盡之飲日消痰氣令能食耳外臺延年茯苓飲主風痰氣吐嘔水者即本方出風痰門又茯苓湯主風痰氣發即嘔吐欠呿煩悶不安或吐痰水者即本方去枳實咳家其脈弦為有水十棗湯主之方見上主之下千金有不能臥出者陰不受邪故也十一字魏咳家專為痰飲在內逆氣上衝之咳嗽言也故其脈必弦無外感家之浮無虛勞家之數但見弦者知有水飲在中為患也尤脈弦為水咳而脈弦知為水飲漬入肺也十棗湯逐水氣自大小便去水去則肺寧而咳愈按許仁則論飲氣咳者由所飲之物停澄在胸水氣上衝肺得此氣便成咳嗽經久不已漸成水病其狀不限四時晝夜遇諸動嗽物即劇乃至雙眼突出氣如欲斷汗出大小便不利吐痰飲涎沫無限上氣喘急肩息每旦眼腫不得平眠此即咳家有水之證也著有干棗三味丸亦佳大棗六十枚葶藶一升杏仁一升合搗作丸桑白皮飲下七八丸日再稍稍加之以大便通利為度案外臺更有加巴豆牽牛五味丸當參考夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯方見上趙本無或字徐夫有支飲家乃追原之詞也謂支飲本不痛蔓延至胸痹而痛氣上逆為咳火上壅為煩已有死道矣不卒死甚至一百日或經年之久其虛可知幸元氣未竭也原其病支飲為本病本不拔終無愈期逡巡不愈正醫家以虛故畏縮故因宜十棗湯以見攻病不嫌峻不得悠悠以待斃也魏不卒死仲景之意宜早治以十棗湯至一百日或一歲則難治矣宜十棗湯者宜於百日一歲之前也若謂日久飲深宜十棗湯恐非聖人履霜堅冰之意總之涵泳白文自明案千金本條之後有一條云咳而引脅下痛者亦十棗湯主之不知是本經之舊文否久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家沈久咳數載是非虛勞咳嗽乃脾肺素本不足肺氣滯而不利津化為飲上溢胸中肺葉空竅之處即支飲伏飲之類內之伏飲相招風寒襲入內外合邪而發世謂痰火屢屢舉發者是矣然久咳必是邪正兩衰其脈故弱脈證相應故為可治實大數者邪熱熾盛陰氣大虧甚者必造於亡故主死也脈虛者乃上焦膻中宗氣不布痰飲濁陰上溢胸中氣逆上衝所以苦冒冒者瞑眩黑花昏暈之類因其人本有支飲存蓄胸中則當治其支飲而咳自寧故治屬飲家咳逆倚息不得臥小青龍湯主之尤倚息倚幾而息能俯而不能仰也沈此表裡合邪之治也肺主聲變動為咳胸中素積支飲招邪內入壅逆肺氣則咳逆倚息不得臥是形容喘逆不能撑持體軀難舒呼吸之狀也故用小青龍之麻桂甘草開發腠理以驅外邪從表而出半夏細辛溫散內伏之風寒而逐痰飲下行乾薑溫肺行陽而散裡寒五味芍藥以收肺氣之逆使表風內飲一齊而解此乃寒風挾飲咳嗽之主方也青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味甘草湯治其氣衝程本作若面熱如醉程云下已當作汗已金鑑從之誤沈此下皆服小青龍湯外邪解而里飲未除擾動內陽之變也表邪雖退內飲未消拒格胸間心火不得下達反刑肺金則多唾口燥猶如肺痿之類也但飲為陰邪而內僻則陽氣衰微故寸脈沉下焦陽微故尺脈微而手足厥逆因服青龍散劑擾亂下焦虛陽即隨衝任之脈厥而上行故氣從小腹上衝胸咽至於手足痹而不用真陽以挾胃熱上衝其面翕熱如醉狀沖氣復反下流陰股不歸腎間而行決瀆故小便難沖氣往返擾動胸中留飲則時覆冒故易桂苓以逐沖氣歸源五味收斂肺氣之逆甘草安和脾胃不使虛陽上浮此乃救逆之變方也徐不堪發散動其氣衝以致肺燥如痿而多唾唾者其痰薄如唾也又口燥燥者覺口乾非渴也下流陰股謂浮於面之陽旋覆在兩股之陰作熱氣也桂苓五味甘草湯方茯苓四兩桂枝四兩去皮千金用二兩外臺用一兩甘草炙三兩千金二兩五味子半升上四味以水八升煮取三升去滓分溫三服外臺云以千金校之亦脫此方今於仲景方録附之案今千金載此方可疑沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿尤服前湯已沖氣即低而反更咳胸滿者下焦沖逆之氣既伏而肺中伏匿之寒飲續出也故去桂枝之辛而導氣加乾薑細辛之辛而入肺者合茯苓五味甘草消飲驅寒以泄滿止咳也案成無己云桂枝泄奔豚故桂枝加桂湯用五兩以主奔豚氣從小腹上至心者今沖氣即低乃桂之功著矣故去之沈氏金鑑並云枝走表故去之非苓甘五味薑辛湯方茯苓四兩甘草乾薑細辛各三兩五味子半升上五味以水八升煮取三升去滓溫服半升日三服服字依俞本補咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水沈此支飲內蓄而復發也咳滿即止肺之風寒已去而更發渴沖氣復發者飲滯外邪留於胸膈未除也即以細辛乾薑熱藥推之若無痰飲內蓄而服細辛乾薑熱藥助其燥熱應當遂渴而渴反止者是內飲上溢喉間浸潤燥熱故不作渴但阻胸中陽氣反逆上行而冒然冒家陽氣上逆飲亦隨之而上故冒者必嘔嘔者於前去桂茯苓五味甘草湯復內半夏消去其水嘔即止矣尤所以治渴而沖氣動者惜未之及也約而言之沖氣為麻黃所發者治之如桂苓五味甘草從其氣而導之矣其為薑辛所發者則宜甘淡鹹寒益其陰以引之亦自然之道也若更用桂枝必捍格不下即下亦必復沖所以然者傷其陰故也桂苓五味甘草去桂加乾薑細辛半夏湯方茯苓四兩甘草細辛乾薑各二兩千金同外臺作三兩五味子半夏各半升上六味以水八升煮取三升去滓溫服半升日三服服字依俞本補案金鑑去甘草名苓桂五味甘草去甘草去桂加乾薑細辛半夏湯未詳所據水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也徐形腫謂身腫也肺氣已虛不能遍布則滯而腫故以杏仁利之氣不滯則腫自消也其證應內麻黃者水腫篇云無水虛腫者謂之氣水發其汗則已發汗宜麻黃也以其人遂痹即前手足痹也逆而內之謂誤用麻黃則陰陽俱虛而厥然厥之意尚未明故曰所以必厥者以其人因血虛不能附氣故氣行澀而痹更以麻黃湯藥發泄其陽氣則亡血復汗溫氣去而寒氣多焉得不厥正如新産亡血復汗血虛而厥也苓甘五味加薑辛半夏杏仁湯方茯苓四兩甘草三兩五味子半升乾薑三兩細辛三兩半夏半升杏仁半升去皮尖上七味以水一斗煮取三升去滓溫服半升日三服服字依俞本補若面熱如醉此為胃熱上衝熏其面加大黃以利之外臺醉下有狀字徐面屬陽明胃氣盛則面熱如醉是胃氣之熱上熏之也既不因酒而如醉其熱勢不可當故加大黃以利之雖有薑辛之熱各自為功而無妨矣尤與沖氣上逆其面翕熱如醉者不同沖氣上行者病屬下焦陰中之陽故以酸溫止之此屬中焦陽明之陽故以苦寒下之苓甘五味加薑辛半杏大黃湯方茯苓四兩甘草三兩五味半升乾薑三兩細辛三兩半夏半升杏仁半升大黃三兩上八味以水一斗煮取三升去滓溫服半升日三服服字依俞本補千金方衍義云趙以德曰前四變隨證加減施治猶未離本來繩墨至第五變其證頗似戴陽而能獨斷陽明胃熱乃加大黃以利之按陽明病面合赤色不可攻之為其腎虛陽氣不藏故以攻為戒而此平昔陰虧血虛反用大黃利之者以其證變疊見雖有面熱如醉而脈見寸沉尺微洵非表邪怫鬱而為胃中熱蘊無疑竟行滌飲攻熱不以陰虛為慮而致扼腕也案以上敘證五變應變加減其意殆與傷寒論證象陽且之一則同示人以通變之法也先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之方見上千金外臺以此條載上文卒嘔吐心下痞云云之前似是後嘔作卻嘔尤先渴後嘔者本無嘔病因渴飲水水多不下而反上逆也故曰此屬飲家小半夏止嘔降逆加茯苓去其停水蓋始雖渴而終為飲但當治飲而不必治其渴也魏水停心下阻隔正氣不化生津液上於胸咽故渴也渴必飲水水得水而愈恣其沖逆所以先渴而後必嘔也此屬飲家當治其飲不可以為渴家治其渴也案脈經所載三條恐本經舊文繫於脫漏今備録於下脈經云咳而時發熱脈卒弦千金作在九菽者非虛也此為胸中寒實所致也當吐之又云咳家其脈弦欲行吐藥當相人強弱而無熱乃可吐之其脈沉者不可發汗又云病人一臂不隨時復轉移在一臂其脈沉細非風也必有飲在上焦其脈虛者為微勞榮衛氣不周故也久久自瘥消渴小便利淋病脈證並治第十三脈證九條方六首厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食即吐蛔下之不肯止鑑按此條是傷寒論厥陰經正病與雜病消渴之義不同必是錯簡喻氏法律云消渴之證內經有其論無其治金匱有論有治矣而集書者採傷寒論厥陰經消渴之文湊入後人不能決擇斯亦不適於用也蓋傷寒熱邪至厥陰而盡熱勢入深故渴而消水及熱解則不渴且不消矣豈雜證積漸為患之比乎寸口脈浮而遲浮即為虛遲即為勞虛則衛氣不足勞則榮氣竭諸本接下條為一條今依金鑑分出鑑按此條當在虛勞篇中錯簡在此寸口通指左右三部而言也浮而有力為風浮而無力為虛按之兼遲即為虛勞之診故主衛外營內虛竭也趺陽脈浮而數浮即為氣數即消穀而大堅一作緊氣盛則溲數溲數即堅堅數相搏即為消渴脈經堅字並作緊金鑑云而大堅句不成文大字之下當有便字必是傳寫之訛魏云大堅即大便堅也一作緊非程趺陽胃脈也內經曰三陽結謂之消胃與大腸謂之三陽以其熱結於中則脈浮而數內經又曰中熱則胃中消穀是數即消穀也氣盛熱氣盛也谷消熱盛則水偏滲於膀胱故小便數而大便硬胃無津液則成消渴矣此中消脈也外臺古今録驗論云消渴病有三一渴而飲水多小便數有脂似麩片甘者皆是消渴病也二吃食多不甚渴小便少似有油而數者此是消中病也三渴飲水不能多但腿腫腳先瘦小陰痿弱數小便者此是腎消病也又東垣試效方云高消者舌上赤裂大渴引飲逆調論云心移熱於肺傳為膈消者是也以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食飢虛疒成消中者是也以調胃承氣三黃丸治之下消者煩渴引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以八味丸治之總録所謂末傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹皆謂不治之證案據此論本節之症即是消中之謂男子消渴小便反多以飲一斗小便一斗腎氣丸主之方見婦人雜病中程小便多則消渴內經曰飲一溲二者不治出氣厥論今飲一溲一故與腎氣丸治之腎中之氣猶水中之火地中之陽蒸其精微之氣達於上焦則云升而雨降上焦得以如霧露之溉肺金滋潤得以水精四布五經並行斯無消渴之患今其人也攝養失宜腎水衰竭龍雷之火不安於下但炎於上而刑肺金肺熱葉焦則消渴引飲其飲入於胃下無火化直入膀胱則飲一斗溺亦一斗也此屬下消尤蓋水液屬陰非氣不至氣雖屬陽中實含水水之與氣未嘗相離也腎氣丸中有桂附所以斡旋腎中頽墮之氣而使上行心肺之分故名曰腎氣不然則滋陰潤燥之品同於飲水無濟但益下趨之勢而已馴至陽氣全消有降無升飲一溲二而死不治夫豈知飲入於胃非得腎中真陽焉能遊溢精氣而上輸脾肺耶沈男子二字是指房勞傷腎火旺水虧而成消渴者外臺近效祠部李郎中論云消渴者原其發動此則腎虛所致每發即小便至甜按洪範稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣氣則下入骨髓其次以為脂膏其次為血肉也其餘別為小便故小便色黃血之餘也臊氣者五臟之氣咸潤者則下味也腰腎既虛冷則不能蒸於上穀氣則盡下為小便者也故甘味不變其色清冷則肌膚枯稿也又肺為五臟之華蓋若下有暖氣蒸即肺潤若下冷極即陽氣不能升故肺干則熱譬如釜中有水以火暖之其釜若以板蓋之則暖氣上騰故板能潤也若無火力水氣則不上此板終不可得潤也火力者則為腰腎強盛也常須暖將息其水氣即為食氣食氣若得暖氣即潤上而易消下亦免乾渴也是故張仲景云宜服此八味腎氣丸又張仲景云足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛氣盛則消穀大便硬衰則為消渴也男子消渴飲一斗小便亦得一斗宜八味腎氣丸主之神方消渴人宜常服之即本方但用山茱萸五兩桂附各三兩吳氏方考云是陰無陽而不升陽無陰而不降水下火上不相既濟耳故用肉桂附子之辛熱壯其少火用六味地黃丸益其真陰真陰益則陽可降少火壯則陰自升故灶底加薪枯籠蒸溽稿禾得雨生意惟新明者知之昧者鮮不以為迂也陳氏外科精要云一士大夫病渴治療纍歲不安一名醫使服八味丸不半載而疾痊因疏其病源云今醫多用醒脾生津止渴之藥誤矣其疾本起於腎水枯竭不能止潤是以心火上炎不能既濟煎熬而生渴今服此藥降心火生其腎水則渴自止矣即本方以真北五味子代附子聖濟直指同朱氏集驗云治消渴八味丸去附子加五味子用繭空及茄空煎湯下嚴氏濟生方加減腎氣丸治勞傷腎經腎水不足心火自用口舌焦乾多渴而引飲精神恍惚面赤心煩腰痛腳弱肢體羸瘦不能起止本方去附子加五味子鹿角沉香弱甚者加附子方勺泊宅編云提點鑄錢朝奉郎黃沔久病渴極疲悴豫每見必勸服八味丸初不甚信後纍醫不痊謾服數兩遂安或問渴而以八味丸治之何也對曰漢武帝渴張仲景為處此方蓋渴多是腎之真水不足致然若其勢未至於痟但進此劑殊佳且藥性溫平無害也案漢武仲景相去數百年蓋不過一時作此杜撰之言取信於俗士耳脈浮小便不利微熱消渴者宜利小便發汗五苓散主之方見上徐脈浮微熱是表未清也消渴小便不利是里有熱也故以桂枝主表白朮苓澤主裡而多以熱水助其外出下達之勢此治消渴之淺而近也按此與上條同是消渴上條小便多知陰虛熱結此條小便不利而微熱即為客邪內入故治法迥異然客邪內入非真消渴也合論以示辨耳渴欲飲水水入則吐者名曰水逆五苓散主之方見上尤熱渴飲水熱已消而水不行則逆而成嘔乃消渴之變證曰水逆者明非消渴而為水逆也故亦宜五苓散去其停水沈此亦非真消渴也渴欲飲水不止者文蛤散主之鑑渴欲飲水水入則吐小便不利者五苓散證也渴欲飲水水入則消口乾舌燥者白虎加人參湯證也渴欲飲水而不吐水非水邪盛也不口乾舌燥非熱邪盛也惟引飲不止故以文蛤一味不寒不溫不清不利專意於生津止渴也案金鑑云五倍子亦名文蛤按法制之名百藥煎大能生津止渴故當用之屢試屢驗也此説本於三因方百藥煎於生津止渴固效矣然其藥出於後世本條所用即所謂花蛤也以上三條詳見傷寒論輯義文蛤散方文蛤五兩俞本作四兩上一味杵為散以沸湯五合和服方寸匕淋之為病小便如粟狀小腹弦急痛引臍中徐淋之為病全在下焦故前十一篇內言下焦有熱亦主淋閉不通此言小便如粟狀粟者色白而滴瀝甚則如米屑也然氣血不同故後人有五淋之名小腹氣不和失其渾厚之元則弦急矣熱邪上乘則痛引臍中矣尤按巢氏云淋之為病由腎虛而膀胱熱也腎氣通於陰陰水液下流之道也膀胱為津液之腑腎虛則小便數膀胱熱則水下澀數而且澀淋瀝不宣故謂之淋其狀小便出少起多小腹弦急痛引於臍又有石淋勞淋血淋氣淋膏淋之異詳見本論其言頗為明晰可補仲景之未備案如粟狀依巢源出少起多之語唯言滴瀝短少如米屑耳云色白殆鑿矣沈程以下諸注皆以為石淋然以理推之小便下砂石不宜言如粟狀故今從徐注三因方云淋古謂之癃名稱不同也癃者罷也淋者滴也今名雖俗於義為得趺陽脈數胃中有熱即消穀引食大便必堅小便即數程本以此條列於前趺陽脈浮而數云云即為消渴之後是魏本細書此條於上格云云義與前同故未另注尤胃中有熱消穀引飲即後世所謂消穀善飢為中消者是也胃熱則液干故大便堅便堅則水液獨走前陰故小便數亦即前條消渴胃堅之證而列於淋病之下疑錯簡也淋家不可發汗發汗則必便血程膀胱蓄熱則為淋發汗以迫其血血不循經結於下焦又為便血詳見傷寒論輯義小便不利者有水氣其人苦渴栝蔞瞿麥丸主之苦趙本作者尤此下焦陽弱氣冷而水氣不行之證故以附子益陽氣茯苓瞿麥行水氣觀方後云腹中溫為知可以推矣其人若渴則是水寒偏結於下而燥火獨聚於上故更以薯蕷栝蔞根除熱生津液也夫上浮之焰非滋不熄下積之陰非暖不消而寒潤辛溫並行不倍此方為良法矣欲求變通者須於此三復焉鑑其人必脈沉無熱始合法也沈蓋本經腫論腰以下腫者當利其小便而不見其方觀此方後云小便利腹中溫為知似乎在水腫腹冷小便不利之方想編書者誤入俟高明細詳用之栝蔞瞿麥丸方栝蔞根二兩茯苓薯蕷各三兩附子一枚炮瞿麥一兩上五味末之煉蜜丸梧子大飲服三丸日三服不知增至七八丸以小便利腹中溫為知程薯蕷栝蔞潤劑也用以止渴生津茯苓瞿麥利劑也用以滲泄水氣膀胱者州都之官津液藏焉氣化則能出焉佐附子之純陽則水氣宣行而小便自利亦腎氣丸之變制也案渴而小便不利故非消渴小便雖不利而未至溺如粟狀且無小腹急痛故非淋也即此治水病渴而小便不利之方沈氏之説似是小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之鑑無表裡他證小便不利者小便癃閉病也尤仲景不詳見證而並出三方以聽人之隨證審用殆所謂引而不發者歟蒲灰散方蒲灰七分滑石三分上二味杵為散飲服方寸匕日三服徐蒲灰即蒲席燒灰也能去濕熱利小便滑石能通九竅去濕熱故主之案蒲灰證類本草甄權云破惡血敗蒲席灰也魏氏家藏方用箬灰樓氏綱目云蒲灰恐即蒲黃粉樓説難從然千金有一方附左備考千金小便不利莖中疼痛小腹急痛蒲黃滑石各等分上二味治下篩酒服方寸匕日三醫壘元戎治産後小便不通金鑰匙散是滑石白魚散方滑石二分亂髮二分燒白魚二分上三味杵為散飲服半錢匕日三服半錢匕俞本作方寸匕尤別録云白魚開胃下氣去水氣血餘療轉胞小便不通合滑石為滋陰益氣以利其小便者也案亂髮本經主五淋白魚恐非魚中之白魚爾雅蟫白魚本經云衣魚一名白魚主婦人疝瘕小便不利又南齊書明帝寢疾甚久敕臺省府署文簿求白魚以為治是也沈云白魚鯗諸注並仍之不可從茯苓戎鹽湯方茯苓半斤白朮二兩戎鹽彈丸大一枚上三味先將茯苓白朮煎成入戎鹽再煎分溫三服先將以下十七字原本缺今據宋本及徐沈尤本補之程本金鑑作以水五升煮取三升分溫三服盧本五升作六升尤綱目戎鹽即青鹽鹹寒入腎以潤下之性而就滲利之職為驅除陰分水濕之法也渴欲飲水口乾舌燥者白虎加人參湯主之方見中暍中尤此肺胃熱盛傷津故以白虎清熱人參生津止渴蓋即所謂上消膈消之證疑亦錯簡於此也喻氏法律云按此治火熱傷其肺胃清熱救渴之良劑也故消渴病之在上焦者必取用之東垣以治膈消潔古以治能食而渴者脈浮發熱渴欲飲水小便不利者豬苓湯主之沈此亦非真消渴也傷寒太陽陽明熱邪未清故脈浮發熱渴欲飲水胃熱下流則小便不利故以豬苓湯導熱滋干而驅胃邪下出也文蛤散豬苓散五苓散凡四條編書者誤入尤按渴欲飲水本文共有五條而脈浮發熱小便不利者一用五苓為其水與熱結故也一用豬苓為其水與熱結而陰氣復傷也其水入則吐者亦用五苓為其熱消而水停也渴不止者則用文蛤為其水消而熱在也其口乾燥者則用白虎加人參為其熱甚而津傷也此為同源而異流者治法亦因之各異如此學者所當細審也水氣病脈證並治第十四論七首脈證五條方九首師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰腫胕千金作浮如鼓不渴巢源作如故而不滿又不渴身下脈經千金有體字程風水與皮水相類屬表正水與石水相類屬裡但風水惡風皮水不惡風正水自喘石水不喘為異耳自唐以來復有五水十水之説皆由腎不主五液脾不能行水致津液充郭上下溢於皮膚則水病生矣鑑風水得之內有水氣外感風邪風則從上腫故面浮腫骨節疼痛惡風風在經表也皮水得之內有水氣皮受濕邪濕則從下腫故胕腫其腹如鼓按之沒指水在皮里也非風邪故不惡風因水濕故不渴也其邪俱在外故均脈浮皆當從汗從散而解也正水水之在上病也石水水之在下病也故在上則胸滿自喘在下則腹滿不喘也其邪俱在內故均脈沉遲皆當從下從溫解也尤正水腎臟之水自盛也石水水之聚而不行者也正水乘陽之虛而侵及上焦故脈沉遲而喘石水因陰之盛而結於少腹故脈沉腹滿而不喘也魏黃汗者其脈亦沉遲與正水石水水邪在內無異也然所感之濕客於皮毛者獨盛於他證故身發熱熱必上炎故胸滿頭面腫濕熱肆行故四肢亦腫久久不愈瘀窿蘊釀致成瘡癰潰爛成膿必至之勢也熱逼於內汗出於外濕瘀乎熱汗出必黃此又就汗出之色以明濕熱之理名之曰黃汗案胕程讀為跗本於喻氏蓋誤矣徐云胕者浮也近是素水熱穴論云上下溢於皮膚故為胕腫胕腫者聚水而生病也知是胕腫即水病之稱耳巢源石水候云腎主水腎虛則水氣妄行不依經絡停聚結在臍間小腹腫大𩊅如石故云石水其候引脅下脹痛而不喘是也脈沉者名曰石水尺脈微大亦為石水腫起臍下至少腹垂垂然上至胃脘則死不治張氏醫通云風水者腎本屬水因風而水積也經云並浮為風水傳為胕腫又曰腎風者面胕龐然壅害於言不能正偃正偃則咳名曰風水其本在腎其末在肺皆積水也上下溢於皮膚故為胕腫今止言外證骨節疼痛惡風不言胕腫脫文也皮水者皮膚胕腫是也蓋肺主氣以行營衛外合皮毛皮毛病甚則肺氣膹郁當發其汗散皮毛之邪外氣通而鬱解矣正水者腎經之水自病也經曰腎者胃之關也關門不利故聚水成病上下溢於皮膚胕腫腹大上為喘呼不得臥標本俱病也石水者乃水積小腹胞內堅滿如石經曰陰陽結邪陰多陽少名石水又曰腎肝並沉為石水水積胞內下從足少陰故不發喘脈浮而洪浮則為風洪則為氣風氣相搏風強則為隱疹身體為癢癢為泄風久為痂癩氣強則為水難以俯仰風氣相擊身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗鑑此為黃汗四字當是衍文六脈俱浮而洪浮則為風洪則為氣風氣相搏之病若風強於氣相搏為病則偏於營故為隱疹身體為癢癢者肌虛為風邪外薄故也名曰泄風即今之風燥瘡是也故日久不愈則成痂癩痂癩疥癬癘癩之類是也若氣強於風相搏為病則偏於衛故為水氣難以俯仰即今之支飲喘滿不得臥也若風氣兩相強擊為病則為風水故通身浮腫也以上諸證皆屬肌表故當發汗汗出乃愈也風水無汗當以越婢湯發汗若汗出惡風則為表陽虛故加附子也若不惡風小便通利非表陽有寒乃上焦有寒也上焦有寒惟兼病水者不能約束津液故其口多涎也何氏醫碥云惡風則虛一句不惡風者小便通利上焦有寒其口多涎此為黃汗五句當是錯簡刪之案此説未知是否金鑑改洪腫作浮腫巢源有身面卒洪腫候謂腫之盛大金鑑誤耳寸口脈沉滑者中有水氣面目腫大有熱名曰風水視人之目裹上擁如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水脈經千金外臺並無蠶字據靈論疾診尺及水脹篇無蠶字為是蓋因下文目下有臥蠶之語而錯誤也裹靈樞作窠潘氏續焰云窠者窩也聚精成窩搏結之義尤風水其脈自浮此云沉滑者乃水脈非風脈也至面目腫大有熱則水得風而外浮其脈亦必變而為浮矣仲景不言者以風水該之也目窠上微腫如蠶新臥起狀者內經所謂水為陰而目下亦陰聚水者必微腫先見於目下是也頸脈動者頸間人迎脈動甚風水上湊故也時時咳者水漬入肺也按其手足上陷而不起與內經以手按其腹隨手而起如裹水之狀者不同然腹中氣大而肢間氣細氣大則按之隨手而起氣細則按之窅而不起而其浮腫則一也案水脹篇以手按其腹隨手而起如裹水之狀者水也其身盡腫皮厚按其腹窅而不起者膚脹也膚脹者寒氣客於皮膚之間所致寒氣在於皮膚之間按而散之則不能猝聚故窅而不起也當知隨手而起為有水無氣窅而不起為有氣有水也巢源燥水謂水氣溢於皮膚因令腫滿以指畫肉上則隱隱成文字者名曰燥水以指畫肉上隨畫隨散不成文字者名曰濕水蓋濕水即靈樞所謂水也燥水即所謂膚脹也上條云皮水其脈亦浮外證胕腫按之沒指而此條云陷而不起者風水則知皮水風水即巢源所謂燥水而亦膚脹之屬也尤注似疏故詳及之太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其狀如腫發汗即愈然諸病此者渴而下利小便數者皆不可發汗酸徐沈尤作痠脾脹諸注作肺脹為解似是唯程魏仍舊文本條凡五節依徐注而分之尤太陽有寒則脈緊骨疼有濕則脈濡身重有風則脈浮體痠此明辨也今得傷寒脈而骨節不疼身體反重而痠即非傷寒乃風水外勝也風水在表而非里故不渴風固當汗水在表者亦宜汗故曰汗出即愈然必氣盛而實者汗之乃愈不然則其表益虛風水雖解而惡寒轉增矣故曰惡寒者此為極虛發汗得之若其渴而不惡寒者則非病風而獨病水不在皮外而在皮中視風水為較深矣其證身腫而冷狀如周痹周痹為寒濕痹其陽皮水為水氣淫於膚也胸中窒不能食者寒襲於外而氣窒於中也反聚痛暮躁不得眠者熱為寒鬱而寒甚於暮也寒濕外淫必流關節故曰此為黃汗痛在骨節也其咳而喘不渴者水寒傷肺氣攻於表有如腫病而實同皮水故曰發汗則愈然此諸病若其人渴而下利小便數者則不可以水氣當汗而概發之也仲景丁寧之意豈非慮人之津氣先亡耶或問前二條云風水外證骨節疼此云骨節反不疼身體反重而痠前條云皮水不渴此云渴何也曰風與水合而成病其流注關節者則為骨節疼痛其侵淫肌體者則骨節不疼而身體痠重由所傷之處不同故也前所云皮水不渴者非言皮水本不渴也謂腹如鼓而不渴者病方外盛而未入里猶可發其汗也此所謂渴而不惡寒者所以別於風水之不渴而惡風也程氏曰水氣外留於皮內薄於肺故令人渴是也靈周痹篇云風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹案此即歷節痛風之謂今云狀如周痹者豈謂其為走痛耶抑與靈樞周痹異義而謂唯其為頑痹耶諸注無明解者何又案金鑑以下條越婢加朮湯主之六字移本條發汗即愈之下云以上四證皆初病皮毛狀類傷寒故均以越婢加朮湯主之發汗即愈也此説不可從詳於下條里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴也越婢加朮湯主之原注方見中風案黃脈經作洪是脈經注一云皮水其脈沉頭面浮腫小便不利故令病水假令小便自利亡津液故令渴也程里有水則脈沉小便不利溢於表則一身面目黃腫故與越婢加朮湯以散其水若小便自利此亡津液而渴非里水之證不用越婢湯也越婢加朮湯當在故令病水之下案此條諸家並以自一身面目黃腫至故令渴也悉屬越婢湯證殊不知此與腸癰大黃牡丹湯條同為倒裝法程注義獨長矣第據脈經黃腫乃洪腫之訛又據外臺引古今録驗皮水越婢加朮湯主之及脈經注文里水亦皮水之訛義尤明顯金鑑則不考之於古書輒以越婢加朮湯主之七字移於前條抑亦肆矣或疑脈沉用麻黃之義考本草麻黃為肺家之專藥李氏詳辨之皮水水氣壅遏於皮膚之間用麻黃而發之則氣行水利而脈道開沉乃為浮此等之義身試親驗然後知經文之不我欺也趺陽脈當伏今反緊本自有寒疝瘕腹中痛醫反下之下之胸滿短氣趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水鑑趙良曰趺陽當伏者非趺陽胃氣之本脈也為水蓄於下其氣伏故脈亦伏脈法曰伏者為水魏趺陽有水邪則當伏以胃陽為水濕陰寒所固閉故陽明之脈不出也今反緊不惟水盛於裡而且寒盛於中矣蓋其人不止有水氣之邪而更兼平日有積寒疝瘕腹中常常作痛水邪中又兼寒邪也醫者不識其為陰寒乃以為水邪可下雖水下沉而寒邪上逆故胸滿短氣矣此病趺陽脈當伏今反數為本自有熱然本自有熱則當消穀小便數大便堅如傷寒胃實之證也今小便反不利則知為欲作水與濕熱之邪無疑寸口脈浮而遲浮脈則熱遲脈則潛熱潛相搏名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相搏名曰伏沉伏相搏名曰水沉則絡脈虛伏則小便難虛難相搏水走皮膚即為水矣鑑案此條文義不屬不釋寸口脈弦而緊弦則衛氣不行即惡寒水不沾流走於腸間脈經衛氣不行下更有衛氣不行四字程寸口以候表弦緊為寒寒則表氣不行不能以衛肌膚故惡寒氣既不行則水飲亦不宣但走入腸間而為水案金鑑云此條必有脫簡不釋考脈經寒疝篇云寸口脈弦而緊弦則衛氣不行衛氣不行則惡寒緊則不欲食弦緊相搏則為寒疝知此條亦宜有緊則云云語金鑑為是少陰脈緊而沉緊則為痛沉則為水小便即難沈少陰腎脈緊則寒邪凝滯正氣於內曰緊則為痛沉則衛氣鬱而不宣三焦壅閉水即泛濫曰沉則為水決瀆無權小便即難鑑四句文義不屬並有脫簡不釋脈得諸沉當責有水身體腫重水病脈出者死脈經脈得上有師曰二字尤水為陰陰盛故令脈沉又水行皮膚榮衛被遏亦令脈沉若水病而脈出則真氣反出邪水之上根本脫離而病氣獨勝故死出與浮迥異浮者盛於上而弱於下出則上有而下絶無也魏附録傷寒論一條以證之少陰篇云少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生夫水病人目下有臥蠶面目鮮澤脈伏其人消渴鑑趙良曰內經色澤者病溢飲溢飲者渴而多飲溢於腸胃之外又曰水陰也目下亦陰也腹者至陰之所居也故水在腹便目下腫也靈樞曰水始起也目下微腫如蠶如新臥起之狀其人初由水穀不化津液以成消渴必多飲多飲則水積水積則氣道不宣故脈伏矣沈胃中津液水飲外溢皮膚肌肉不溉喉舌故作消渴誠非真消渴也千金云凡水病之初先兩目下腫起如老蠶色挾頸脈動股里冷脛中滿按之沒指腹內轉側有聲此其候也病水腹大小便不利其脈沉絶者有水可下之案此條原本接上條今據程本金鑑另分為一條鑑腹者至陰脾也故病水必腹大也水蓄於內故小便不利也其脈沉絶即伏脈也脈伏腹大小便不利里水已成故可下之十棗神祐之類酌而用之可也尤其脈沉絶水氣瘀壅而不行脈道被遏而不出其勢亦太甚矣故必下其水以通其脈徐水病可下惟此一條沉絶二字妙何氏醫碥云內水腹大小便不利脈沉甚可下之十棗湯浚川散神祐丸禹攻散舟車丸之類蓋亦可從小便利亦可從大便泄也問曰病下利後渴飲水小便不利腹滿因腫者何也答曰此法當病水若小便自利及汗出者自當愈因脈經程本金鑑作陰自當愈千金注云一作滿月當愈案因腫據答語云當病水作陰腫為是鑑病下利則虛其土傷其津也土虛則水易妄行津傷則必欲飲水若小便自利及汗出者則水精輸布何水病之有惟小便不利則水無所從出故必病水病水者脾必虛不能制水故腹滿也腎必虛不能主水故陰腫也於此推之凡病後傷津渴欲飲水小便不利者皆當防病水也心水者其身重而少氣不得臥煩而躁其人陰腫身重千金注云一作身腫陰下脈經有大字魏又為明水氣附於五臟而另成一五水之證蓋水邪亦積聚之類也切近於其處則伏留於是藏即可以藏而名證程內經曰心主身之血脈上經曰水在心心下堅築短氣是以身重少氣也內經曰諸水病者不得臥夫心屬火水在心則蒸郁燔爍是以不得臥而煩躁也心水不應陰腫以腎脈出肺絡心主五液而司閉藏水之不行皆本之於腎是以其陰亦腫也案金鑑云其人陰腫四字當在腎水條內錯簡在此此説有理然程注義亦通姑從之肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通魏肝經有水必存兩脅故腹大而脅下痛少陽陰陽往來之道路有邪窒礙故不能自轉側肝有水邪必上衝胸咽故時時津液微生口中有淡水之症也及上升而下降小便不利者又續通此水邪隨肝木往來升降之氣上下為患也尤時時津液微生小便續通者肝喜沖逆而主疏泄水液隨之而上下也肺水者其身腫小便難時時鴨溏身下千金有體字鑑趙良曰肺主皮毛行榮衛與大腸合今有水病則水充滿皮膚肺本通調水道下輸膀胱為尿溺今既不通水不得自小便出反從其合與糟粕混成鴨溏也尤鴨溏如鴨之後水糞雜下也脾水者其腹大四肢苦重津液不生但苦少氣小便難尤脾主腹而氣行四肢脾受水氣則腹大四肢重津氣生於穀穀氣運於脾脾濕不運則津液不生而少氣小便難者濕不行也腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦反脈經作皮注云一云大便反堅程腎者胃之關也關門不利故令聚水而生病是有腹大臍腫之證也腰者腎之外候故令腰痛膀胱者腎之腑故令不得溺也以其不得溺則水氣不得泄浸漬於睪囊而為陰汗流注於下焦而為足冷夫腎為水臟又被水邪則上焦之氣血隨水性而下趨故其人面反瘦非若風水裡水之面目洪腫也魏是五水又以分附於五臟而得名矣但臟雖各附而其實異其地者不異其邪治之者亦異其處者不當易其法也師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈鑑諸有水者謂諸水病也治諸水之病當知表裡上下分消之法腰以上腫者水在外當發其汗乃愈越婢青龍等湯證也腰以下腫者水在下當利小便乃愈五苓豬苓等湯證也趙良曰身半以上天之分陽也身半以下地之分陰也而身之腠理行天分之陽小便通地分之陰故水停於天者開腠理水從汗散水停於地者決其出關而水自出矣即內經開鬼門潔淨府法也陳氏證治大還云凡大人小兒通身浮腫喘急小便不利自下而上者名陰水自上而下者名陽水俗名河白用河白草濃煎湯洗浴此草三尖底平葉底及梗有芒刺陽水用無刺者陰水用有刺者一二浴後而小便便利浮腫自消神效神效師曰寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分沈際飛校本脈經卑作革脈經注一云水分程沉為水遲為寒水寒相搏則土敗矣是以胃之趺陽脈則伏脾之水穀則不磨脾衰則寒內著地而為鶩溏胃衰則水外溢而為身腫也少陽者三焦也內經曰三焦者決瀆之官水道出焉今少陽脈卑則不能決瀆矣在男子則小便不利少陰者腎也中藏經曰腎者女子以包血以其與衝脈並行今少陰脈細則寒氣宕於胞門矣在婦人則經水不通經雖為血其體則水況水病而血不行其血亦化為水故名曰血分案沈云卑者即沉而弱徐云卑則低而弱平脈決榮氣弱名曰卑王宇泰云榮主血為陰如按之沉而無力故謂之卑也但少陽未詳何部徐云左關膽脈也沈云右尺金鑑云左尺然左右配位之説仲景所未曾言必別有所指史記倉公傳時少陽初代亦同血分諸家無明解蓋分散也血為水分散流布肢體也又有水分附於左脈經云問曰病有血分何謂也師曰經水前斷後病水名曰血分此病難治問曰病有水分何也師曰先病水後經水斷名曰水分此病易治本事續方云治婦人經脈不通即化黃水水流四肢則遍身皆腫名曰血分其候與水腫相類一等庸醫不問源流便作水疾治之非唯無效又恐喪命此乃醫殺之也宜用此方人參當歸瞿麥穗大黃桂枝茯苓各半兩苦葶藶炒二分上為細末煉蜜丸如梧桐子大每服十五丸空心米飲下漸加至二十丸止於三十丸每無不效者案此方為經水不通而發血分者設焉若胃氣衰者宜另議方而可也問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相搏結在關元始時當微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝喉咽塞噎脅下急痛醫以為留飲而大下之氣擊不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自瘥先治新病病當在後徐本氣擊作氣系無浮咳之浮字當微作尚微沈尤並同魏本氣擊作氣急沈此水病積寒為根兼示誤治之變也病者面目身體四肢皆腫小便不利乃水腫本有之證但病者竟不言此反言胸中痛氣上衝胸狀如炙肉當微咳喘然水病不當有此而見之故問其脈何類程寸口脈沉而緊沉為水緊為寒水寒之氣結於關元當其少壯之時陽氣正旺雖有結寒亦為不覺及至陽衰之後營衛亦虛其陽則損其陰則盛關元結寒乘其陽虛而動腎中陽氣不能以勝陰寒寒氣上衝咽喉閉塞脅下亦相引而急痛也醫者不求其本因寒水結在關元見其標證面目身體四肢皆腫小便不利以為水飲而大下之其沖氣不為下止後重吐之非惟沖氣不止而大吐大下復又損其胃而亡其津液是以咽燥引飲也吐下後其陽愈虛則不能施行便溺其寒愈勝則不能消化水穀是以小便不利而水穀不化面目手足猶然浮腫復與葶藶丸下水而浮腫小瘥食飲過度則脾胃復傷腫復如前其實水寒結於關元而未散寒上衝則胸脅苦痛象若奔豚水揚溢則為浮腫喘咳也魏營衛即陰陽之氣也陰氣之旺於陽氣之衰必相干凌陽日益損陰日益盛沉葶藶丸但下水腫之標不能除水之本故但小瘥而不盡徹稍有食飲過度腫復如前徐當攻擊沖氣令止如痰飲門苓桂朮甘湯是也咳止喘雖不治而自愈矣此乃病根甚深不能驟除故須先去異病則原病可治故曰先治新病病當在後要知沖氣咳喘等皆新病也病當在後病字指水氣言然關元結寒則又為水病之本矣案金鑑云此條文義不屬不釋然今合數家之説而讀之則義略通且世病水之人多類此條證者安可措而不講耶浮咳二字程注似未允俟考末二句即首篇先治其卒病後乃治其痼病之意脈經注云氣擊不去言邪氣不去而元氣反為藥所擊也風水脈浮身重汗出惡風者防己黃耆湯主之腹痛者加芍藥尤此條義詳痙濕暍篇雖有風水風濕之異然而水與濕非二也案此條校之於痙濕暍篇唯濕作水為異耳蓋此後人誤入者附方所載外臺證治的是本經之舊文脈經與外臺同可以證矣防己黃耆湯方方見濕病中風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之沈此風多水少之證也風多傷表外應肌肉內連及胃故惡風一身悉腫胃氣熱蒸其機外向不渴而續自汗出無大熱者則知表有微熱而為實也故以麻黃通陽氣而散表石膏入胃能治氣強壅逆風化之熱甘草薑棗以和營衛若惡風者陽弱而為衛虛故加附子録驗加朮並驅濕矣尤脈浮不渴句或作脈浮而渴渴者熱之內熾汗為熱逼與表虛出汗不同故得以石膏清熱麻黃散腫而無事兼固其表耶案大青龍湯治傷寒煩躁麻黃杏仁甘草石膏湯治汗後汗出而喘無大熱俱麻黃石膏並用之劑而不言有渴今驗之不論渴與不渴皆可用然此斷云不渴者義可疑也以理推之作而渴為是下文黃汗之條汗出而渴脈經注云一作不渴而渴不渴經有誤錯是其明徵也越婢湯方外颱風水門引古今録驗云此本仲景傷寒論方云里水越婢加朮湯主之案越婢名義詳傷寒論輯義麻黃六兩石膏半斤生薑三兩甘草二兩大棗十五枚上五味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風者加附子一枚炮風水加朮四兩古今録驗外颱風水門煮法後云咳肺脹加半夏五合洗一服五合又皮水門云古今録驗皮水越婢湯加朮主之煮法後云範汪同本出仲景傷寒論案據外臺風水加朮四兩當作皮水魏惡風甚者加附子一枚而壯陽正所以除濕且用其流走之烈性以治周身之腫凡正陽所行之地豈水濕之邪可留之區乎此亦不專治水而水治之法也加朮治風水者必風邪輕而水氣重但治其表不足以行水加朮以助水之堤防水由地中行而奏績矣案據外臺原方只五味蓋加味法編書者採録於古今録驗故注此四字陳氏證治大還云越婢湯治脈浮在表及腰以上腫宜此發汗兼治勇而勞甚腎汗出汗出遇風內不得入臟腑外不得越皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水其症惡風一身悉腫脈浮不渴續自汗出風水症少氣時熱從肩背上至頭汗出苦渴小便黃目下腫腹中鳴身重難行正臥則咳煩而不能食巢源婦人腳氣候云若風盛者宜作越婢湯加朮四兩千金越婢湯治風痹腳弱方於本方中加白朮四兩大附子一枚注云胡洽方只五味若惡風者加附子一枚多淡水者加白朮四兩聖惠方麻黃散治風水遍身腫滿骨節痠疼惡風腳弱皮膚不仁于越婢加朮附湯內去甘草加漢防己桑根白皮聖濟總録麻黃湯治水氣通身腫於本方中加茯苓皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之外臺引深師聶聶作集集案聶聶木葉動貌十五難厭厭聶聶如循榆莢沈此邪在皮膚而腫也風入於衛陽氣虛滯則四肢腫皮毛氣虛受風而腫所謂水氣在皮膚中邪正相搏風虛內鼓故四肢聶聶瞤動是因表虛也蓋肺與三焦之氣同入膀胱而行決瀆今水不行則當使小便利而病得除故防己茯苓除濕而利水以黃耆補衛而實表表實而邪不能客甘草安土而制水邪桂枝以和營衛又行陽化氣而實四末俾風從外出水從內泄矣巢源水分候云水分者言腎氣虛弱不能制水令水氣分散流布四肢故云水分但四肢皮膚虛腫聶聶而動者名水分也案此條證據巢源即水分也防己茯苓湯方外臺引深師名木防己湯云本出仲景傷寒論防己三兩黃耆三兩桂枝三兩茯苓六兩甘草二兩外臺有炙字上五味以水六升煮取二升分溫三服聖惠治皮水一方有桑根白皮外臺範汪水防己湯療腫患下水氣四肢腫聶聶動於本方中加生薑芍藥各二兩白朮三兩里水越婢加朮湯主之甘草麻黃湯亦主之外臺引範汪里水作皮水又云皮水一身面目悉腫甘草麻黃湯主之二方各為一條案外臺為是鑑里字當是皮字豈有里水而用麻黃之理閲者自知是傳寫之訛皮水表虛有汗者防己茯苓湯固所宜也若表實無汗有熱者則當用越婢加朮湯無熱者則當用甘草麻當湯發其汗使水外從皮去也越婢加朮湯方原注見上於內加白朮四兩又見中風中甘草麻黃湯方外臺引範汪云本出仲景傷寒論甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒千金云有人患氣急積久不瘥遂成水腫如此者衆諸皮中浮水攻面目身體從腰以上腫皆以此湯發汗悉愈方即本方濟生云有人患氣促積久不瘥遂成水腫服之有效但此藥發表老人虛人不可輕用更宜詳審水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯浮者宜杏子湯氣水下魏添一病字鑑為氣水之氣字當是風字若是氣字則無發汗之理且通篇並無氣水之病水之為病其脈沉小屬少陰水也今脈不沉小而浮浮者為風非少陰水也若無水虛脹者為風水也風水發其汗即已風水脈沉者宜麻黃附子湯汗之脈浮者宜杏子湯汗之案魏氣水之下添一病字氣下為句云無水虛脹者所病不在水乃氣虛散漫更不宜發汗尤亦為氣作句以水字接下句云無水而虛脹者則為氣病不可發汗水病發其汗則已今考文義殊不相協又聖惠論有氣水腫與本條所言自異故姑仍金鑑麻黃附子湯方少陰篇作麻黃附子甘草湯麻黃三兩甘草二兩附子一枚炮上三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八分日三服八分傷寒論作八合沈水病始得之源未有不從腎虛而受風寒郁住衛氣胃關不利水邪泛溢以致通身腫滿故當補陽之中兼用輕浮通陽開鬱利竅之劑則真陽宣而邪自去正謂不治水而水自愈今人不知通陽開竅惟用腎氣丸陰重陽輕之劑壅補其內陽氣愈益不宣轉補轉壅邪無出路水腫日增因藥誤事不知凡幾矣外臺古今録驗麻黃湯療風水身體面目盡浮腫腰背牽引髀股不能食於本方中加桂心生薑杏子湯方原注未見恐是麻黃杏仁甘草石膏湯沈脈浮者邪居氣分而屬肺詳杏子湯必以杏子為君而杏乃專瀉肺氣使肺氣通調邪去而腫自退方雖遺失意想可知也魏余謂浮者為風仲景自言其證矣杏子湯之方內水濕而外風寒其挾熱者可以用麻杏甘石也如不挾熱者莫妙於前言甘草麻黃湯加杏子今謂之三拗湯矣案金鑑載杏子湯即麻黃甘草杏仁三味蓋依魏注也厥而皮水者蒲灰散主之原注方見消渴中尤厥而皮水者水邪外盛隔其身中之陽不行於四肢也此厥之成於水者去其水則厥自愈不必以附子桂枝之屬助其內伏之陽也蒲灰散義見前問曰黃汗之為病身體腫一作重發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜耆芍桂酒湯主之身體腫脈經千金作身體洪腫而渴脈經注云一作不渴沉下外臺有也字脈經作黃耆芍藥桂枝苦酒湯趙本柏作藥非尤黃汗之病與風水相似但風水脈浮而黃汗脈沉風水惡風而黃汗不惡風為異其汗沾衣色正黃如柏汁則黃汗之所獨也風水為風氣外合水氣黃汗為水氣內遏熱氣熱被水遏水與熱得交蒸互郁汗液則黃按前第二條云小便通利上焦有寒其口多涎此為黃汗第四條云身腫而冷狀如周痹此云黃汗之病身體腫發熱汗出而渴後又云劇者不能食身疼重小便不利何前後之不侔也豈新久微甚之辨歟夫病邪初受其未郁為熱者則身冷小便利口多涎其鬱久而熱甚者則身熱而渴小便不利亦自然之道也鑑黃耆桂枝解肌邪以固衛氣芍藥苦酒止汗液以攝營氣營衛調和其病已矣李升璽曰按汗出浴水亦是偶舉一端言之耳大約黃汗由脾胃濕久生熱積熱成黃濕熱交蒸而汗出矣潘氏醫燈續焰云黃汗一證仲景金匱要略收入水氣病中其主治與治疸亦自懸絶後人以其汗黃遂列為五疸之一實非疸也黃耆芍藥桂枝苦酒湯方外臺引仲景傷寒論云備急張文仲千金古今録驗深師範汪經心録同黃耆五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相和煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也原注一方用美酒醯代苦酒外臺云阻一作一方用美清醯代酒尤苦酒阻者欲行而未得遽行久積藥力乃自行耳故曰服至六七日乃解魏古人稱醋為苦酒非另有所謂苦酒也美酒醯即人家所制社醋即鎮江紅醋是也又醋之劣者即白酒醋各處皆是總以社醋入藥何氏醫碥云水寒遏郁汗液於肌內為熱所蒸而成黃汗然汗出浴水亦舉隅之論耳當推廣之愚按黃耆芍藥桂枝苦酒湯無清熱去濕之品徒取固斂得無壅乎此方恐是錯簡終不可用倪氏本草匯言四仙散治汗出染衣黃如柏汁此名黃汗其證發熱汗出而渴身體浮腫此因出汗時受風冷水寒之氣入於汗孔得之宜此方用羅勒二錢桂枝三錢黃耆白芍藥各五錢水酒各一碗煎服出羅勒條黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮臥盜汗出者此勞氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之勞氣原本作榮氣今依諸本改之外臺引仲景傷寒論物作蟲程濕就下而流關節故黃汗病兩脛冷若兩脛熱則屬歷節之病其食已汗出為胃氣外泄暮而盜汗為榮氣內虛又屬虛勞之證二者俱汗出皆非黃汗也欲作黃汗之證汗出已而熱不為汗衰反發熱而熱不止薄於外則銷鑠皮膚故令身體枯稿薄於裡則潰脈爛筋故令生惡瘡也夫濕勝則身重汗出雖濕去身輕而正氣未必不損如此久久必耗散諸陽故身瞤而胸痛是以上焦陽虛則腰以上汗出下焦濕勝而為腰髖弛痛如有物在皮中狀也劇則內傷於脾而不能食外傷肌肉而身體疼重若煩躁小便不利則水氣無從出蘊蓄肌中必為黃汗案此條義難通今姑仍程注金鑑云此承黃汗詳申其證也但文義未屬必是錯簡不釋此説似是桂枝加黃耆湯方桂枝芍藥各三兩甘草二兩生薑三兩大棗十二枚黃耆二兩千金黃疸門五兩上六味以水八升煮取三升溫服一升須臾飲熱稀粥一升余以助藥力溫覆取微汗若不汗更服尤桂枝黃耆亦行陽散邪之法而尤賴飲熱稀粥取汗以發交郁之邪師曰寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則榮衛不利榮衛不利則腹滿脅鳴相逐氣轉膀胱榮衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分實則徐沈作寒則注寒恐是實字脅鳴程魏作腸鳴是尤微則為氣者為氣不足也寒氣不足該寸口趺陽為言寒而氣血復不足也寒氣不足則手足無氣而逆冷榮衛無源而不利由是臟腑之中真氣不充而客寒獨勝則腹滿脅鳴相逐氣轉膀胱即後所謂失氣遺溺之端也榮衛俱勞者榮衛俱乏竭也陽氣溫於表故不通則身冷陰氣榮於裡故不通即骨疼不通者虛極而不能行與有餘而壅者不同陽前通則惡寒陰前通則痹不仁者陽先行而陰不與俱行則陰失陽而惡寒陰先行而陽不與俱行則陽獨滯而痹不仁也蓋陰與陽常相須也不可失失則氣機不續而邪乃著不失則上下交通而邪不容故曰陰陽相得其氣乃行大氣一轉其氣乃散失氣遺溺皆相失之徵曰氣分者謂寒氣乘陽之虛而病於氣也沈營衛相和膻中宗氣一轉大氣乃行痹著之邪相隨而去謂大氣一轉其氣乃散而實者失氣邪從大便喧吹而泄虛者遺溺邪從小便而去此陽虛氣滯化水而精血為痹故曰氣分案此與尤注異然義亦通故兩存之程此章以明水在氣分之大義以氣行則水寒之氣亦行非下章結於心下為盤為杯也鑑名曰氣分之下當有下條桂枝去芍藥加麻黃附子細辛湯主之十五字氣分心下堅大如盤邊如旋杯水飲所作桂枝去芍藥加麻辛附子湯主之脈經或枳朮湯主之鑑氣分心下堅大如盤邊如旋杯水飲所作之十六字當是衍文觀心下堅之本條自知桂枝去芍藥加麻黃附子細辛湯主之十五字當在上條氣分之下義始相屬正是氣分之治法必是錯簡在此桂枝去芍藥加麻黃細辛附子湯方三因名桂附湯桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃細辛各二兩附子一枚炮上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈鑑用桂枝去芍藥加麻黃附子細辛湯者溫養榮衛陰陽發散寒邪之氣也尤當汗出如蟲行皮中者蓋欲使既結之陽復行周身而愈也心下堅大如盤邊如旋盤水飲所作枳朮湯主之肘後卒心痛門作心下堅痛大如碗邊如旋柈名為氣分水飲所結柈即盤字外臺心痛門引文仲亦同下盤字徐沈作杯案證類本草作枳實術湯近是鑑心下堅大如盤邊如旋盤此里水所作也趙良曰心下胃上脘也胃氣弱則所飲之水入而不消痞結而堅必強其胃乃可消痞白朮健脾強胃枳實善消心下痞逐停水散滯氣徐云若盤字乃即杯字偶誤勿泥蓋堅大如盤上之取義在大邊如旋杯下之取義在圓不應又取大字義耳合言之總是堅大而圓也案此注未允潘氏續焰云旋圓也上盤字當據肘後作碗蓋碗高於盤盤大於碗謂其堅大如碗其邊如圓盤文意始通若仍舊文或從徐下盤字為杯則其義竟難解焉枳朮湯方外臺引張文仲云此張仲景傷寒論方備急肘後同枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即當散也外臺五升作一斗鑑李彣曰枳實消脹苦以泄之也白朮去濕苦以燥之也後張元素治痞用枳朮丸亦從此湯化出但此乃水飲所作則用湯以蕩滌之彼屬食積所傷則用丸以消磨之一湯一丸各有深意非漫無主張也嚴氏濟生枳朮湯治飲癖氣分心下堅硬如杯水飲不下即本方加肉桂附子細辛桔梗檳榔甘草生薑李氏辨惑論易水張先生枳朮丸治痞消食強胃枳實麩炒黃色去穰一兩白朮二兩上同為極細末荷葉裹燒飯為丸如桐子大每服五十丸多用白湯下無時附方外臺防己黃耆湯治風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸方見風濕中脈經其人下有能食二字無或字但下有言字外臺引深師作木防己湯云此本仲景傷寒論方沈此乃濕從下受濕多風少故用黃耆實表使水不得上溢以防己驅除風濕術草健脾薑棗以俾營衛和而濕自除矣
