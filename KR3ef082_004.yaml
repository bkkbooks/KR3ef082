body:
  text: 卷四黃疸病脈證並治第十五論二首脈證十四條方七首寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行苦徐本脈經作若程脈得浮緩者必發黃故傷寒脈浮而緩者系在太陰太陰者必發身黃今浮為風緩為痹非外證之中風乃風熱蓄於脾土脾主四肢故四肢苦煩瘀熱行於外則發黃也沈風濕鬱結邪正為痹痹者閉也因風拒閉營衛為痹非內經風寒濕三氣之痹案痹非中風文義不屬恐有脫誤趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治心中懊憹而熱不能食時欲吐名曰酒疸脈經女勞疸酒疸各為別條徐沈魏尤並同疸沈尤作癉程趺陽胃脈也數為熱緊為寒此胃中陰陽不分清濁相干寒熱混雜雖消穀不能傳導故食即滿也尺脈以候腎浮為風則傷腎趺陽以候胃緊則寒不傷胃而傷於脾風寒相搏邪不消穀得穀氣則熏蒸頭目故作眩也谷不消則胃中之濁氣下流而小便又不通利正以腎為胃關脾寒被於少陰則不能行宣泄之令胃熱流於膀胱則熱瘀蓄而不行一身盡黃因作谷疸也尤腎勞而熱黑色上出猶脾病而黃外見也額於部為庭靈樞云庭者顏也又云腎病者顴與顏黑微汗出者腎熱上行而氣通於心也手足心熱薄暮即發者病在裡在陰也膀胱急者腎熱所逼也小便自利病不在腑也此得之房勞過度熱從腎出故名曰女勞癉若腹如水狀則不特陰傷陽亦傷矣故曰不治懊憹鬱悶不寧之意熱內蓄則不能食熱上衝則時欲吐酒氣熏心而味歸脾胃也此得之飲酒過多所致故名酒癉巢源云黃疸之病此由酒食過度腑臟未和水穀相併積於脾胃復為風濕所搏瘀結不散熱氣鬱蒸故食已如飢令身體面目及爪甲小便盡黃而欲安臥黃疸也谷疸之狀食畢頭眩心忪怫鬱不安而發黃由失飢大食胃氣衝熏所致也女勞疸之狀身目皆黃發熱惡寒少腹滿急小便難由大勞大熱而交接交接竟入水所致也案本經云小便自利可疑陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作谷疸雖下之腹滿如故所以然者脈遲故也發陽明篇作微鑑谷疸屬胃熱脈當數今脈遲脾臟寒也寒不化谷所以雖飢欲食食難用飽飽則煩悶胃中填塞健運失常也清者阻於上升故頭眩濁者阻於下降故小便難也此皆欲作谷疸之徵其證原從太陰寒濕鬱黷而生若誤以為陽明熱濕發黃下之雖腹滿暫減頃復如故所以然者脈遲寒故也此發明欲作谷疸屬脾陰寒化而不可下者也張氏傷寒心印云按金匱谷疸有二證此則虛寒而冷𪑳者也傷寒纘論云脈遲胃虛下之無益則發汗利小便之法用之無益惟當用和法如甘草乾薑湯先溫其中然後少與調胃微和胃氣是也夫病酒黃疸必小便不利其候心中熱足下熱是其證也程夫小便利則濕熱行不利則熱留於胃胃脈貫膈下足跗上熏胃脘則心中熱下注足跗則足下熱也酒黃疸者或無熱靖言了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之趙本了作小程本金鑑同脈經千金徐沈魏並作靖言了了徐沈云靖恐是清字外臺同千金作靜尤同程本金鑑作譫案了作小靖作譫並繫於後人改定故今仍脈經等作靖言了了吐趙本作嘔非尤酒黃癉者心中必熱或亦有不熱靜言了了者則其熱不聚於心中而或從下積為腹滿或從上衝為欲吐鼻燥也腹滿者可下之欲吐者可因其勢而越之既腹滿且欲吐則可下亦可吐然必審其脈浮者邪近上宜先吐脈沉弦者則邪近下宜先下也沈詳先字要知吐下之後再以清解餘熱不待言矣案靖本作竫靜同見後漢崔駰傳注千金云夫人病酒疸者或無熱靖言了了腹滿欲吐嘔者宜吐之方苦參散七味者是苦參散治人無漸忽然振寒發黃皮膚黃麴塵出小便赤少大便時秘氣力無異食飲不妨已服諸湯散餘熱不除久黃者宜吐下方苦參黃連瓜蒂黃柏大黃黃芩各一兩千金缺今據翼方補之葶藶二兩上六味治下篩飲服方寸匕當大吐吐者日一服不吐日再亦得下服五日知可消息不覺退更服之酒疸心中熱欲吐者吐之愈趙吐作嘔非程前證熱深則懊憹欲吐今熱微則心中熱亦欲吐病屬上焦故一吐之可愈酒疸下之久久為黑疸目青面黑心中如啖蒜齏狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之巢源外臺無雖黑微黃四字程爪作抓尤酒疸雖有可下之例然必審其腹滿脈沉弦者而後下之不然濕熱乘虛陷入血中則變為黑疸目青面黑皮膚不仁皆血變而瘀之徵也然雖曰黑疸而其原則仍是酒家故心中熱氣熏灼如啖蒜狀一如懊憹之無奈也且其脈當浮弱其色雖黑當微黃必不如女勞疸之色純黑而脈必沉也鑑趙良曰便如黑漆其目青與脈浮弱皆血病也魏黃變為黑如物之初被火灼則黃久被火熏則黑也巢源云黑疸之狀苦小腹滿身體盡黃額上反黑足下熱大便黑是也夫黃疸酒疸女勞疸久久多變為黑疸千金茵陳大黃等七味方云夫黃髮已久變作桃皮色心下有堅嘔逆不下飲食小便極赤色少四肢逆冷脈深沉極微細遲者不宜服此方得下必變啘也案桃皮色蓋謂帶黑不明潤故附記備考案汪氏醫學原理云雖黑微黃者難治未知何據師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱面黃肚熱熱在裡當下之兩熱所得之所字程金鑑作相面黃趙本脈經作而黃徐程沈魏尤並同案面當作而魏此病發時乃風寒外感之病發也尤煩滿燥渴病發於熱而復以火劫之以熱遇熱相得不解則發黃疸然非內兼濕邪則熱與熱相攻而反相散矣何癉病之有哉故曰黃家所得從濕得之明其病之不獨因於熱也而治此病者必先審其在表在裡而施或汗或下之法若一身盡熱而腹熱尤甚則其熱為在裡里不可從表散故曰當下鑑但捫其肚熱其熱在裡當下之沈即梔子大黃湯之意也脈沉渴欲飲水小便不利者皆發黃鑑脈沉主裡也渴欲飲水熱瘀也小便不利濕鬱也熱瘀濕鬱於裡故發黃也首條謂脈浮緩緊數皆令發黃是得之於外因也此條脈沉亦令發黃是得之於內因也故治黃有汗下二法也李彣曰脈沉而渴渴欲飲水小便不利則濕熱內蓄無從分消故發黃也腹滿舌痿黃躁不得睡屬黃家原注舌痿疑作身痿案舌痿諸注並云作身痿但尤仍原文釋之非魏云痿當作委舌苔色正黃無間色亦非躁趙徐沈作燥非徐腹滿里證也乃有腹滿而如身痿黃躁不得睡瘀熱外行此發黃之漸也故曰屬黃家見當圖治於將成不得俟既成而後藥之也案痿黃即萎黃謂身黃不明潤沈云濕熱鬱蒸則腹滿身痿津血枯燥土色外越故黃躁不得眠此以痿為痿弱之義且黃躁連讀謬亦太甚黃疸之病當以十八日為期治之十日以上瘥反劇為難治劇趙本作極鑑高世栻曰十八日乃脾土寄旺於四季之期十日土之成數也黃疸之病在於脾土故當以十八日為期然治之宜先故治之十日以上即當瘥至十日以上不瘥而疸病反劇者是謂難治謂土氣虛敗不可治也疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也陽部上脈經千金程本金鑑有發於二字是發熱之發巢源千金作微沈此言表病易治里病難治也胃中濕熱蒸越皮膚則一身盡黃雖發於外當以表裡陰陽辨證則知可治與難治若疸而渴者邪雖外越胃中濕熱半居於內耗竭津液則渴津枯血燥陽火亢極表裡皆邪故曰難治不渴者熱邪一發盡越於表里無餘蘊一解表而即散故曰可治然邪在胸膈胃腑之裡為發陰部內逆上衝其人必嘔其邪盡發皮殼之表為陽部乃太陽所主故振寒而發熱也案疸本作癉癉熱也故有消癉癉瘧等之稱而熱鬱發黃謂之黃疸疸乃非黃病之謂字書注疸字云黃病也誤然如本條單言疸者蓋省黃字也亦不必拘耳谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之黃下肘後有失飢大食胃氣衝熏所致十字程濕熱與宿谷相搏留於胃中因作谷疸尤谷疸為陽明濕熱瘀郁之證陽明既郁榮衛之源壅而不利則作寒熱健運之機窒而不用則為不食食入則適以助濕熱而增逆滿為頭眩心胸不安而已徐頭眩為谷疸第一的據也觀方下注云一宿腹減此亦必小便不快而腹微脹可知茵陳蒿湯方茵陳蒿六兩大黃二兩梔子十四枚陽明篇有擘字上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也程茵梔以導之則濕熱行矣大黃以下之則宿谷去矣苦以泄之之劑也徐氏傷寒類方云先煮茵陳則大黃從小便出此秘法也千金茵陳湯傷寒七八日內實瘀熱結身黃如橘小便不利腹微脹滿宜下之方即本方與陽明篇文少異故附載之外臺範汪療谷疸茵陳湯即本方又小品三物茵陳蒿湯療黃疸身目皆黃皮膚麴塵出茵陳蒿一把梔子二十四枚石膏一斤千金加大黃二兩上三味以水八升煮取二升半去滓以猛火燒石膏令正赤投湯中沸定取清汁適寒溫服一升自覆令汗出又廣濟茵陳丸療黃疸遍身面悉黃小便如濃梔子汁於本方去梔子加黃芩枳實蜜丸又必效茵陳湯及丸療一切黃蔣九處得其父遠使得黃服此極效於本方加黃芩千金茵陳湯主黃疸酒疸酒癖身體面目盡黃方按外臺云太醫校尉史脫處於本方加黃芩黃連人參甘草又治發黃身面目悉黃如金色小便如濃煮柏汁於本方加黃芩柴胡升麻龍膽又治發黃方於本方加黃柏黃連丸方更加黃芩黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝石礬石散主之之病千金作疸一字鑑此詳申女勞疸之為病黃疸日晡所發熱乃陽明熱症當不惡寒也而反惡寒者非陽明熱症此或為女勞得之也女勞得之疸證雖膀胱急少腹滿而小便自利身雖盡黃而額上則黑雖發熱惟足下甚此少陰熱因作黑疸也故腹脹如水狀而大便必黑時溏知非水脹病乃為女勞得之疸脹病也時溏黑色者亦臟病及血之徵也血病者顏必變豈有色黑而血不病者乎女勞疸腹滿者為難治以其脾胃兩敗也以硝石入血消堅礬石入氣勝濕然此方治標固宜非圖本之治世久書訛姑辨其理也尤黃家日晡所本當發熱乃不發熱而反惡寒者此為女勞腎熱所致與酒疸谷疸不同酒疸谷疸熱在胃女勞疸熱在腎胃淺而腎深熱深則外反惡寒也膀胱急額上黑足下熱大便黑皆腎熱之徵雖少腹滿脹有如水狀而實為腎熱而氣內蓄非脾濕而水不行也硝石礬石散方外臺引仲景傷寒論云肘後小品崔氏文仲千金範汪深師並同硝石礬石燒等分硝石下外臺尤本有熬黃二字上二味為散以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是候也候上徐沈尤有其字外臺云大麥則須是無皮麥者程內經曰中滿者泄之於內潤下作咸硝石之苦鹹礬石之酸鹹皆所以泄中滿而潤下使其小便黃而大便黑也然硝石主胃脹閉滌蓄結礬石主熱在骨髓而經言勞者溫之是方得無太峻歟然所服者方寸匕耳和以大麥粥汁正所以寬胃而益脾也案硝石即火硝時珍辨之詳矣下大黃硝石湯同喻氏法律云硝石礬石散從來不解用硝石之義方書俱改為滑石礬石散且並改大黃硝石湯為大黃滑石湯醫學之陋一至此乎夫男子血化為精精動則一身之血俱動以女勞而碩其精血必繼之故因女勞而尿血者其血尚行猶易治也因女勞而成疸者血瘀不行為難治矣甚者血瘀之久大腹盡滿而成血蠱尤為極重而難治矣味仲景之文及制方之意女勞疸非亟去其膀胱少腹之瘀血萬無生路在傷寒熱瘀膀胱之證其人下血乃愈血不下者用抵當湯下之亦因其血之暫結可峻攻也此女勞疸蓄積之血必匪朝夕峻攻無益但取石藥之悍得以疾趨而下達病所硝石鹹寒走血可消逐其熱瘀之血故以為君礬石本草謂其能除痼熱在骨髓用以清腎及膀胱臟腑之熱並建消瘀除濁之功此方之極妙者也以陳無擇之賢模稜兩可其說謂無發熱惡寒脈滑者用此湯若發熱惡寒其脈浮緊則以滑石石膏治之青天白日夢語喃喃況其他乎世豈有血蓄下焦反見浮滑且緊之脈者乎妄矣妄矣何氏醫碥云傷寒陽明證發熱者必不惡寒乃濕與熱瘀痹於內表陽不宣故惡寒也此乃辨證之法額最高火氣之所熏故黑先則額黑後則周身皆黑故作黑疸硝石鹹寒除熱礬石除痼熱在骨髓大麥粥調服恐傷胃也然此方難用肘後方云女勞疸身目皆黃發熱惡寒小腹滿急小便難由大勞大熱交接後入水所致治之方即本方又治交接勞復陰卵腫或縮入腹腹中絞痛或便絕即本方千金云濕疸之為病始得之一身盡疼發熱面色黑黃七八日後壯熱熱在裡有血當下去之如豚肝狀其小腹滿者急下之亦治一身盡黃目黃腹滿小便不利方於本方硝石代滑石王氏準繩載滑石散治女勞疸即此方注云按此即前硝石方硝與滑字形相近未知孰是兩存之又黃疸之為病日晡所發熱惡寒小腹急身體黃額黑大便溏黑足下熱此為女勞腹滿者難治治之方滑石石膏各等分服法與本方同外臺引千金翼云小品千金備急文仲並同千金翼瀉腎散主男女諸虛不足腎氣之方即本方不用大麥粥用粳米粥酒黃疸心中懊憹或熱痛梔子大黃湯主之徐前酒疸正條尚有不能食欲吐後各變證如小便不利足下熱腹滿不一此獨舉心中懊憹為酒疸第一的據也魏為實熱之邪立法也梔子大黃大苦寒之品以泄之枳實以開破之香豉以升散之酒家積鬱成熱非此不當其施也喻氏法律云此治酒熱內結昏惑懊憹之劑然傷寒證中有云陽明病無汗小便不利心中懊憹者身必發黃是則諸凡熱甚於內者皆足致此非獨酒也梔子大黃湯方外臺引仲景傷寒論云肘後千金同名梔子枳實豉大黃湯千金翼名梔子湯梔子十四枚大黃一兩枳實五枚豉一升上四味以水六升煮取二升分溫三服肘後云酒疸者心懊痛足脛滿小便黃飲酒發赤斑黃黑由大醉當風入水所致治之方即本方千金枳實大黃湯治傷寒飲酒食少飲多痰結髮黃酒疸心中懊憹而不甚熱或乾嘔方即本方諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之方見水氣病中千金載本方用黃耆五兩沈此風多濕少邪機向表通治之方也諸病黃家乃胃中濕熱釀成而濕性下流當從下驅為順故但利小便而為常法假令脈浮則濕少風多而風性通揚邪機在表當以汗解不可拘利小便為常矣故用桂枝湯和營衛而解肌表之邪風為表虛加黃耆而實腠理啜熱稀粥為助使周身微微小汗則肌表之邪去而雖有里濕亦從下滲矣徐云黃疸家不獨谷疸酒疸女勞疸有分別即正黃疸病邪乘虛所著不同予治一黃疸百藥不效而垂斃者見其偏於上令服鮮射干一味斤許而愈又見一偏於陰者令服鮮益母草一味數斤而愈其凡黃疸初起非系谷疸酒疸女勞疸者輒令將車前根葉子合搗取自然汁酒服數碗而愈甚有臥床不起者令將車前一味自然汁數盂置床頭隨意飲之而愈然則汗下之說亦設言以啟悟其可無變通耶案此等治法出於繩墨之外所謂草頭藥者亦有效驗故附載之外臺許仁則療急黃始得大類天行病經三兩日宜合麻黃等五味湯服之發汗以泄黃勢方麻黃三兩葛根五兩石膏八兩生薑六兩茵陳二兩上以水八升煮取二升七合去滓分溫三服覆被微取汗以散之案黃家脈浮熱盛者桂枝加黃耆湯非所宜此方有大青龍之意當隨證撰用故附於此諸黃豬膏發煎主之程扁鵲有療黃經明堂有烙三十六黃法皆後人所未見唯聖濟總錄載三十六黃方論詳明治法始備今豬膏發煎能治諸黃當是黃之輕者可從小便而去至若陰黃急黃女勞之屬豈豬膏發煎所能治乎醫者審之尤此治黃疸不濕而燥者之法按傷寒類要云男子女人黃疸飲食不消胃脹熱生黃衣在胃中有燥屎使然豬膏煎服則愈蓋濕熱經久變為堅燥譬如盒曲熱久則濕去而干也本草豬脂利血脈解風熱亂髮消瘀開關格利水道故曰病從小便出豬膏發煎方外臺引仲景傷寒論云肘後備急文仲千金古今錄驗深師範汪同豬膏半斤外臺作八兩亂髮如雞子大三枚肘後外臺作一枚上二味和膏中煎之發消藥成分再服病從小便出味下外臺有內發二字藥成作盡研絞去膏細滓七字方後云大醫校尉史脫家婢再病胃中干糞下便瘥神驗案外臺引肘後療黃疸者一身面目悉黃如橘柚暴得熱外以冷迫之熱因留胃中生黃衣熱熏上所致方豬脂一斤上一味煎成者溫令熱盡服之日三燥屎當下下則稍愈便止證類本草引傷寒類要尤則採之於證類也今本肘後無考外臺又引近效主療亦同肘後女勞疸者身目皆黃發熱惡寒小腹滿急小便難由大勞大熱交接後入水所致治之方即本方喻氏法律引肘後云蓋女勞疸血瘀膀胱非直入血分之藥必不能開然虻蛭過峻礬石過燥明是治血燥矣徐云予友駱天遊黃疸腹大如鼓百藥不效用豬膏四兩發灰四兩一劑而愈仲景豈欺我哉黃疸病茵陳五苓散主之原注一本云茵陳湯及五苓散並主之徐此表裡兩解之方然五苓中有桂術乃為稍涉虛者設也尤此正治濕熱成疸者之法茵陳散結熱五苓利水去濕也鑑黃疸病之下當有小便不利者之五字茵陳五苓散方有著落必傳寫之遺茵陳五苓散方外臺引仲景傷寒論文同云小品古今錄驗張文仲經心錄同茵陳蒿末十分五苓散五分方見痰飲中上二味和先食飲方寸匕日三服外臺作上二味和先食白飲和方寸匕服之日三外臺又五苓散利小便治黃疸方即本方不用茵陳云千金深師範汪同三因方五苓散治伏暑郁發黃小便不利煩渴用茵陳煎湯調下嚴氏濟生方加減五苓散治飲食伏暑郁發黃煩渴小便不利於本方去桂枝加茵陳準繩茵陳五苓散治傷寒溫濕熱病感冒後發為黃疸小便黑赤煩渴發熱不得安寧此蓋汗下太早服藥不對證因感濕熱病以致遍身發黃上用生料五苓散一兩加入茵陳半兩車前子一錢木通柴胡各一錢半酒後得證加乾葛二錢燈心五十莖水一碗煎八分連進數服小便清利為愈黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯宋本硝石作滑石下同非脈經作大黃黃柏梔子芒硝湯鑑李彣曰腹滿小便不利而赤里病也自汗出表和也里病者濕熱內甚用梔子清上焦濕熱大黃瀉中焦濕熱黃柏清下焦濕熱硝石則於苦寒瀉熱之中而有燥烈發散之意使藥力無所不至而濕熱悉消散矣大黃硝石湯方千金名大黃黃柏湯翼名大黃湯外臺引仲景傷寒論名大黃黃柏皮梔子硝石湯小品千金翼深師範汪並同大黃黃柏硝石各四兩梔子十五枚上四味以水六升煮取二升去滓內消更煮取一升頓服喻氏法律云濕熱鬱蒸而發黃其當從下奪亦須仿治傷寒之法裡熱者始可用之重則用大黃硝石湯盪滌其濕熱如大承氣湯之例稍輕則用梔子大黃湯清解而兼下奪如三黃湯之例更輕則用茵陳蒿湯清解為君微加大黃為使如梔豉湯中加大黃如博棋子大之例是則汗法固不敢輕用下法亦在所慎施以疸證多夾內傷不得不迴護之耳外臺必效大黃湯療急黃疸內等黃方大黃三兩芒硝二兩上二味以水二升生漬大黃一宿平旦絞汁一升半內芒硝攪服須臾當快利瘥聖惠治黃病腹脹滿小便澀而赤少於本方中加冬葵子黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之方見痰飲中外臺引仲景傷寒論云範汪同尤便清自利內無熱徵則腹滿非裡實喘非氣盛矣雖有疸熱亦不可以寒藥攻之熱氣雖除陽氣則傷必發為噦噦呃逆也魏氏謂胃陽為寒藥所墜欲升而不能者是也小半夏溫胃止噦噦止然後溫理中臟使氣盛而行健則喘滿除黃病去非小半夏能治疸也聖惠小半夏散陰黃小便色不變欲自利而不利腹滿而喘者必噦噦者宜服此方半夏一兩人參二兩葛根二兩上件藥搗粗羅為散每服四錢以水一中盞入生薑半分煎至六分去滓不計時候溫服諸黃腹痛而嘔者宜柴胡湯原注必小柴胡湯方見嘔吐中原本黃作勞今據諸本改定魏作勞解之非程經曰嘔而腹滿視其前後知何部不利利之則愈今黃家腹痛而嘔應內有實邪當是大柴胡以下之若小柴胡則可止嘔未可療腹痛也明者詳之鑑嘔而腹痛胃實熱也然必有潮熱便硬始宜大柴胡湯兩解之若無潮熱便軟則當用小柴胡湯去黃芩加芍藥和之可也案玉機小柴胡湯加梔子男子黃小便自利當與虛勞小建中湯方見虛勞中鑑高世栻曰女為陰男為陽陰主血陽主氣男子黃陽氣虛也黃者土之色陽氣虛而土色外呈中無濕熱故小便自利此為虛也尤小便利者不能發黃以熱從小便去也今小便利而黃不去知非熱病乃上虛而色外見宜補中而不可除熱者也夫黃疸之病濕熱所郁也故在表者汗而發之在裡者攻而去之此大法也乃亦有不濕而燥者則變清利為潤導如豬膏發煎之治也不熱而寒不實而虛者則變攻為補變寒為溫如小建中之法也其有兼證錯出者則先治兼證而後治本證如小半夏及小柴胡之治也仲景論黃疸一證而於正變虛實之法詳盡如此其心可謂盡矣王氏陰證略例云內感傷寒勞役形體飲食失節中州變寒之病生黃非傷寒壞之而得只用建中理中大建中足矣不必用茵陳也何氏醫碥曰陰黃小便清白大便不實喜靜能臥脈遲弱無力身冷自汗當以虛寒治之仲景所謂男子黃小便自利與小建中湯王海藏謂中州寒生黃用大小建中不必茵陳皆氣虛之陰黃也氣虛則脾不運久瘀於裡則脾敗而色外見故黃其黃色必淡戴復庵謂失血後多令面黃或遍身黃血不榮也如竹木春夏葉潤則綠至秋則干黃宜養榮湯十全大補湯此血虛之陰血也此為干黃小便利四肢不沉重也案治陰黃醫學綱目用理中加茯苓湯喻氏治女勞疸屬虛者用八味腎氣丸聖惠治房黃用鹿茸散鹿茸熟地山茱五味黃耆牡蠣之類皆不用茵陳然如韓氏小茵陳湯附子甘草茵陳茵陳四逆湯茵陳附子湯茵陳茱萸湯羅氏茯苓梔子茵陳湯之類皆附子茵陳並用蓋本於千金翼治黃疸小便赤黃方前胡茯苓椒目附子茵陳之意寒熱錯雜者亦宜隨證而選用不必執拘矣附方瓜蒂湯治諸黃方見暍病中沈瓜蒂湯吐藥也若邪衝於胸膈或心煩懊憹欲吐而無他病者當用此湯吐去黃水因其高而越之也外臺刪繁療天行毒熱通貫臟腑沉鼓骨髓之間或為黃疸黑疸赤疸白疸谷疸馬黃等疾喘急須臾而絕方瓜蒂二七枚上一味以水一升煮取五合作一服案此方與暍病所載同北史麥鐵杖傳瓜蒂噴鼻療黃不瘥考千金外臺用瓜蒂等二三味者凡八方多繫於吹兩鼻中出黃水正是別法故此不錄出當考原書千金麻黃醇酒湯治黃疸外臺引仲景傷寒論云小品古今錄驗張文仲經心錄同千金云治傷寒熱出表發黃疸方外臺煮法後引古今方文同麻黃三兩外臺作一大把去節肘後同上一味以美清酒五升煮取二升半頓服盡冬月用酒春月用水煮之沈外感風寒濕熱在表郁盦成黃或脈自浮當以汗解者用此一味煮酒使其徹上徹下行陽開腠而驅營分之邪則黃從表解矣驚悸吐衄下血胸滿瘀血病脈證治第十六脈證十二條方五首寸口脈動而弱動即為驚弱則為悸沈驚從外入悸是內發悸者心神恍惚跳動不能自主之貌也徐前奔豚章既言有驚怖有火邪皆從驚發得之此又另揭驚悸言之非詳其病所從得乃謂病有驚狂不安者有隻心悸不寧者驚乃邪襲於心在實邊故其寸口脈動動者有粒如豆也悸乃神不能主在虛邊故其寸口脈弱弱脈來無力也動而弱者有邪襲之而心本原虛也故驚悸並見然而脈仍分屬動則驚氣之發弱則悸氣所形故曰動即為驚弱則為悸師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止尺趙程金鑑作夫巢源作尺中自浮未上有必字脈經云問曰病衄連日不止其脈何類師曰脈來輕輕在肌肉尺中自溢注一云尺脈浮以下與本文同尤尺脈浮知腎有遊火目睛暈黃知肝有蓄熱衄病得此則未欲止蓋血為陰類為腎肝之火熱所逼而不守也若暈黃去目睛且慧了知不獨肝熱除腎熱亦除矣故其衄今當止又曰從春至夏衄者太陽從秋至冬衄者陽明尤血從陰經並衝任而出者則為吐從陽經並督脈而出者則為衄故衄病皆在陽經但春夏陽氣浮則屬太陽秋冬陽氣伏則屬陽明為異耳所以然者就陰陽言則陽主外陰主內就三陽言則太陽為開陽明為闔少陽之脈不入鼻頞故不主衄也衄家不可汗汗出必額上陷脈緊急直視不能眴不得眠尤血與汗皆陰也衄家復汗則陰重傷矣脈者血之府額上陷者額上兩旁之動脈因血脫於上而陷下不起也脈緊急者寸口之脈血不榮而失其柔如木無液而枝乃勁也直視不眴不眠者陰氣亡則陽獨勝也經云奪血者無汗此之謂夫詳傷寒論輯又太陽中篇病人面無血色無寒熱脈沉弦者衄浮弱手按之絕者下血煩咳者必吐血巢源寒熱上無無字趙徐沈尤並無血色之血字程靈樞經曰血脫者夭然不澤上經曰男子面色薄者主渴及亡血今病人面無血色脫血之象也上經曰男子脈虛沉弦無寒熱時目瞑兼衄今無寒熱而脈弦衄者則與上證不殊為勞證也若脈浮弱手按之絕者有陽無陰也故知下血煩咳者病屬上焦也故知吐血尤無寒熱病非外感也衄因外感者其脈必浮大陽氣重也衄因內傷者其脈當沉弦陰氣厲也雖與前尺脈浮不同其為陰之不靖則一也若脈浮弱按之絕者血下過多而陰脈不充也煩咳者血從上溢而心肺焦燥也此皆病成而後見之診也夫吐血咳逆上氣其脈數而有熱不得臥者死巢源數下有浮大二字尤脈數身熱陽獨勝也吐血咳逆上氣不得臥陰之爍也以既爍之陰而從獨勝之陽有不盡不已之勢故死夫酒客咳者必致吐血此因極飲過度所致也徐此言吐血不必由於氣不攝血亦不必由於陰火熾盛其有酒客而致咳則肺傷已極又為咳所擊動必致吐血故曰極飲過度所致則治之者當以清酒熱為主也三因方云病者因飲食過度傷胃或胃虛不能消化致翻嘔吐逆物與氣上衝蹙胃口決裂所傷吐出其色鮮紅心腹絞痛白汗自流名曰傷胃吐血理中湯能止之者以其功最理中脘分利陰陽安定血脈證治要訣加葛根川芎或只煮乾薑甘草湯飲之亦妙方見養生必用寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相擊此名曰革婦人則半產漏下男子則亡血尤此條已見虛勞病中仲景復舉之者蓋謂亡血之證有從虛寒得之者耳亡血不可發其表汗出即寒慄而振太陽中篇脈經血下有家字鑑凡失血之後血氣未復為亡血也皆不可發汗失血之初固屬陽熱亡血之後熱隨血去熱雖消而氣逐血虛陽亦微矣若發其汗則陽氣衰微力不能支故身寒噤慄而振振聳動也發陰虛之汗汗出則亡陰即發吐衄之汗也故見不得眴不得眠亡陰之病也發陽虛之汗汗出則亡陽即發亡血之汗也故見寒慄而振亡陽之病也李彣曰奪血者無汗以汗與血俱為心液血亡液竭無復余液作汗也今又發表則陰虛且更亡陽表間衛氣虛極故寒慄而振病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血此下脈經有當汗出不出內結亦為瘀血十一字鑑表實無汗胸滿而喘者風寒之胸滿也裡實便澀胸滿煩熱者熱壅之胸滿也面目浮腫胸滿喘不得臥者停飲之胸滿也呼吸不快胸滿大息而稍寬者氣滯之胸滿也今病人無寒熱他病惟胸滿唇痿舌青口燥漱水不欲咽乃瘀血之胸滿也唇舌血華之處也血病不榮故痿瘁色變也熱在血分故口燥漱水不欲咽也脈微大來遲陰凝之診則當腹滿今腹不滿詢之其人言我滿在胸不在腹也與上如是之證推之為有瘀血也沈假令氣分熱盛則腹脹滿今腹不滿而言我滿者乃外雖不滿內臟血壅氣滯而脹故言我滿知是瘀血也案程云唇痿未詳所以誤病者如熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之陰伏之伏趙本作狀非鑑此承上文互詳證脈以明其治也如熱狀即所謂心煩胸滿口乾燥渴之熱證也其人當得數大之陽脈今反見沉伏之陰脈是為熱伏於陰乃瘀血也血瘀者當下之宜桃核承氣抵當湯丸之類也火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之沈不載此條程此章當在第八篇中簡脫在此尤此但舉火邪二字而不詳其證按傷寒論云傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安又曰太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪仲景此條殆為驚悸下血備其證歟桂枝湯去芍藥之酸加蜀漆之辛蓋欲使火氣與風邪一時並散而無少有留滯所謂從外來者驅而出之於外也龍骨牡蠣則收斂其浮越之神與氣爾案外臺奔豚氣門引小品云師曰病有奔豚有吐膿有驚怖有火邪此四部病者皆從驚發得之火邪者桂枝加龍骨牡蠣湯主之據此則程注為是桂枝救逆湯方桂枝三兩去皮甘草二兩炙生薑三兩牡蠣五兩熬龍骨四兩大棗十二枚蜀漆三兩洗去腥上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升為末宋板傷寒論作七味是心下悸者半夏麻黃丸主之脈經無此條鑑此方是治寒水心下悸者與首條之脈弱悸病不合必是錯簡半夏麻黃丸方肘後無方名半夏肘後云湯洗去滑干麻黃等分上二味末之煉蜜和丸小豆大飲服三丸日三服按服三丸甚少本草綱目作三十丸似是然要之此方可疑吐血不止者柏葉湯主之徐此重不止二字是謂寒涼止血藥皆不應矣吐血本由陽虛不能導血歸經然血亡而陰虧故以柏葉之最養陰者為君艾葉走經為臣而以乾薑溫胃為佐馬通導大便下為使愚意無馬通童便亦得按本草載此方乃是柏葉一把乾薑三升阿膠一挺炙合煮入馬通一升未知孰是候參程中焦受氣取汁變化而赤是謂血血者內溉臟腑外行肌膚周流一身如源泉之混混得熱則迫血妄行而作吐衄即後瀉心湯之證是也得寒則不與氣俱行滲於胃中而作吐故有隨滲隨出而令不止柏葉湯者皆辛溫之劑神農經曰柏葉主吐血乾薑止唾血艾葉止吐血馬通者白馬屎也凡屎必達洞腸乃出故曰通亦微溫止吐血四味皆辛溫行陽之品使血歸經遵行隧道而血自止柏葉湯方外臺引仲景傷寒論千金無方名柏葉乾薑各三兩千金作二兩外臺作青柏葉三兩乾薑二兩切艾三把千金作一把上三味以水五升取馬通汁一升合煮取一升分溫再服案外臺作上三味以水五升煮取一升去滓別絞取新出馬通汁一升相合煎取一升綿濾之溫分再服馬通是馬屎汁也一方有阿膠無艾外臺為是證類本草云馬屎名馬通止崩中吐下血金瘡止血千金治吐血內崩上氣面色如土方即本方注云仲景柏葉湯不用阿膠小品不用柏葉與肘後同又治上焦熱膈傷吐血衄血或下血連日不止欲死於本方去柏葉用竹茹阿膠下血先便後血此遠血也黃土湯主之遠原本作近誤今據諸本校改程先便後血以當便之時血亦隨便而下行內經曰結陰者便血一升再結二升三結三升以陰氣內結不得外行血無所稟滲入腸間故上經曰小腸有寒者其人下重便血夫腸有夾層其中脂膜聯絡當其和平則行氣血及其節養失宜則血從夾層滲入腸中非從腸外而滲入腸中也滲而即下則色鮮滲而留結則色黯內經曰陰脈不和則血留之用黃土附子之氣厚者血得溫即循經而行也結陰之屬宜於溫補者如此鑑先便後血此遠血也謂血在胃也即古之所謂結陰今之所謂便血也先血後便此近血也謂血在腸也即古之所謂腸澼為痔下血今之所謂臟毒腸風下血也趙良曰腸胃陽明經也以下血言胃居大腸之上若聚於胃必先便後血去肛門遠故曰遠血若聚大腸去肛門近故曰近血尤黃土溫燥入脾合白朮附子以復健行之氣阿膠地黃甘草以益脫竭之血而又慮辛溫之品轉為血病之厲故又以黃芩之苦寒防其大過所謂有制之師也黃土湯方原注亦主吐血衄血外臺引仲景傷寒論千金治卒吐血及衄血方甘草乾地黃千金用乾薑注云仲景用地黃白朮附子炮千金無阿膠外臺有炙字黃芩各三兩灶中黃土半斤千金作伏龍肝半升外臺作釜灶下黃焦土半升綿裹上七味以水八升煮取三升分溫二服外臺作煮六味取二升去滓內膠令烊下血先血後便此近血也赤小豆當歸散主之方見狐惑中程此內經所謂飲食不節起居不時則陰受之陰受之則入五臟為腸澼下血之屬故用當歸以和血脈赤豆以清臟毒與黃土湯不侔也梅師方云熱毒下血或食熱物發動以赤小豆為末水調服則知此方治臟毒下血黃土湯治結陰下血有霄壤之分也徐氏醫法指南云先血後便近血也大腸血也感而即發俗謂之腸風赤小豆當歸散主之先便後血遠血也胃血也積久而發俗謂之臟毒黃土湯主之案千金諸下血先見血後見便此為遠血宜服黃土湯先見便後見血此為近血宜服赤小豆散此遠近二字互誤三焦虛實門有遠血近血二方主療與本經同而千金翼論及外臺引崔氏亦誤張氏醫通卻以金匱為傳寫之誤尤非也巢源云大便下血鮮而腹痛冷氣在內亦大便下其色如小豆汁出時疼而不甚痛前便後下血者血來遠前下血後便者血來近此亦可以證耳備預百要方血痢方赤小豆三升炒令熟當歸三兩上二味搗篩為散服方寸匕日三薄粥溫下千金伏龍肝湯治下焦虛寒損或先見血後便轉此為近血或利不利方伏龍肝五合末乾地黃五兩阿膠牛膝甘草乾薑黃芩地榆各三兩發灰二合上九味㕮咀以水九升煮取三升去滓下膠煮消下發灰分為三服張氏衍義云可見治血但取歸經不必究其先後遠近耳又續斷止血湯治下焦虛寒損或先便轉後見血此為遠血或利或不利好因勞冷即發續斷當歸桂心蒲黃阿膠各一兩甘草二兩乾薑乾地黃各四兩上八味㕮咀以水九升煮取三升半去滓下膠取烊下蒲黃分三服張氏衍義云驗其血色晦淡則當用金匱法鮮紫當用千金法方為合轍醫林方阿膠丸治便血先便而後血謂之濕毒阿膠一錢黃連三錢白茯苓二錢白芍藥四錢上為細末水和為丸如桐子大每服五十丸加至一百丸溫水送下日進四五服又芍藥柏皮丸治先血而後便為之臟毒白芍藥黃柏當歸以上各等分上為細末滴水為丸如桐子大每服五七十丸煎甘草湯送下案濕毒臟毒即遠血近血也故附載以備考心氣不足吐血衄血瀉心湯主之千金心臟門不足作不定尤心氣不足者心中之陰氣不足也陰不足則陽獨盛血為熱迫而妄行不止矣大黃黃連黃芩瀉其心之熱而血自寧寇氏云若心氣獨不足則當不吐衄也此乃邪熱因不足而客之故令吐衄以苦泄其熱以苦補其心蓋一舉而兩得之案出本草衍義此說亦通濟眾方用大黃生地汁治衄血其下熱涼血亦瀉心湯類耳案金鑑改不足二字作有餘二字非瀉心湯方原注亦治霍亂案程沈尤金鑑刪去四字是大黃二兩黃連黃芩各一兩上三味以水三升煮取一升頓服之程心主血心氣不足而邪熱乘之則迫血妄行故有吐衄之患夫炎上作苦故內經曰苦先入心三黃之苦以泄心之邪熱千金巴郡太守奏三黃丸治男子五勞七傷消渴不生肌肉婦人帶下手足寒熱者方春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩上三味隨時加減和搗以蜜為丸如大豆飲服五丸日三不知稍加至七丸取下而已又三黃散治黃疸身體面目盡黃外臺集驗大黃散同本方三味各四兩治下篩先食服方寸匕日三和劑局方三黃丸治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便秘結五臟俱熱即生㾬癤瘡痍及治五般痔疾糞門腫痛或下鮮血小兒積熱本方三味各十兩上為細末煉蜜為丸如梧桐子大每服三十丸用熟水吞下如臟腑壅實加服丸數本事方三黃散治衄血無時本方三味細末每服二錢新汲水調下蜜水亦得直指方川芎三黃散治實熱衄血於本方加川芎各等分為末每服二錢食後井水調服拔萃方犀角地黃湯治熱甚血積胸中於本方加犀角地黃神效名方黃連散治黃疸大小便秘澀壅熱於本方用黃連三兩加甘草一兩上為細末每服二錢食後溫水調下一日三服嘔吐噦下利病脈證治第十七論一首脈證二十七條方二十三首夫嘔家有癰膿不可治嘔膿儘自愈鑑嘔家嘔吐或谷或水或痰涎或冷沫令嘔而有膿此內有癰膿潰而嘔非嘔病也故曰不可治嘔膿儘自愈趙良曰此癰之在胃脘上口者也若過半中在肺之下者膿則不從嘔出而從大便出矣詳傷寒論輯義厥陰篇先嘔卻渴者此為欲解先渴卻嘔者為水停心下此屬飲家嘔家本渴令反不渴者以心下有支飲故也此屬支飲此屬飲家四字千金作小半夏湯主之嘔家本渴以下見飲病篇此屬支飲飲病篇作小半夏湯主之尤嘔家必有停痰宿水先嘔卻渴者痰水已去而胃陽將復也故曰此為欲解先渴卻嘔者因熱飲水過多熱雖解而飲旋積也此嘔因積飲所致故曰此屬飲家嘔家本渴水從嘔去故也今反不渴者以宿有支飲在心下愈動而愈出也故曰此屬支飲外臺載嘔家本渴以下而注云張仲景雜方此證當用小半夏加茯苓湯方在支飲門中問曰病人脈數數為熱當消穀引食而反吐者何也師曰以發其汗令陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之今脈反弦故名曰虛太陽中篇陽微作陽氣微故也之間有吐字無問曰及何也師曰字尤脈數為熱乃不能消穀引飲而反吐以發汗過多陽微膈虛所致則其數為客熱上浮之數而非胃實氣熱之數矣客熱如客之寄不久即散故不能消穀也脈弦為寒乃不曰寒而曰虛者以寒在於上而醫反下之所致故其弦非陰寒外加之弦而為胃虛生寒之弦矣胃虛且寒陽氣無餘則朝食暮吐而變為胃反也讀此知數脈弦脈均有虛候曰熱曰寒蓋淺之乎言脈者耳鑑問曰病人脈數至胃中虛冷故也等句已詳傷寒論陽明篇內錯簡在此且與脈弦者虛也文義不屬巢源云夫榮衛俱虛血氣不足停水積飲在於胃管則臟冷臟冷而脾不磨脾不磨則宿穀不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如柸往來寒熱甚者食已則吐其脈緊而弦緊則為寒弦則為虛虛寒相搏故食已則吐名為反胃也聖惠論云夫反胃者為食物嘔吐胃不受食言胃口翻也則有因飲酒過傷所致則有因憂悒怏蓄怒腸結胃翻所致則有宿滯痼癖積聚冷痰久不全除致成茲疾其中有才食便吐有食久乃翻不可一概用方切在仔細體認也案反翻同寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷鑑按此條文義不屬必是錯簡趺陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治虛則脈經千金趙本尤本並作澀則千金脈緊上有趺陽二字案金鑑云虛則傷脾之虛字當是澀字是傳寫之訛未考諸本也程經曰趺陽脈浮而澀知脾氣不足胃氣虛也夫浮為虛澀為血不足趺陽得之必知脾氣不治華佗曰脾主消磨水穀聞聲則動動則磨胃而主運化今胃能納而脾不能磨則胃中之谷必不能消是以朝食而暮吐暮食而朝吐為胃反之證也尤胃為陽脾為陰浮則為虛者胃之陽虛也澀則傷脾者脾之陰傷也谷入於胃而運於脾脾傷則不能磨脾不磨則穀不化而朝食者暮當下暮食者朝當下若穀不化則不得下不得下必反而上出也魏緊者寒盛也澀者津亡也胃中因虛而寒因寒而燥因燥而津枯正不足而邪有餘反胃之病難治可決矣欲補陽而津枯有妨於補陽欲生津而陽衰有礙於補陰棘手難下者要在乎失治於早而已病人慾吐者不可下之尤病人慾吐者邪在上而氣方逆若遽下之病氣必與藥氣相爭而正乃蒙其禍矣否則裡虛邪入病氣轉深或痞或利未可知也故曰不可下之程欲字作吐而未吐之義使人溫溫欲吐也噦而腹滿視其前後知何部不利利之即愈徐云噦恐嘔字案厥陰篇亦作噦沈此明實噦之治也噦者俗謂呃也鑑趙良曰腹滿為實實則氣上逆而作噦故必視其前後何部不利而利之則滿去而噦止魏胃氣上逆沖而為噦治法當視其前後審大小便調不調也前部不利者水邪之逆也當利其小便而噦愈後部不利者熱邪實也當利其大便而噦愈活人書云前部不利豬苓湯後部不利調胃承氣湯嘔而胸滿者茱萸湯主之尤胸中陽也嘔而胸滿陽不治而陰乘之也故以吳茱萸散陰降逆人參薑棗補中益陽氣茱萸湯方吳茱萸一升人參三兩生薑六兩大棗十二枚上四味以水五升煮取三升溫服七合日三服詳傷寒輯義陽明篇肘後方云治人食畢噫醋及醋心即本方外臺引延年作食訖醋咽多噫三因方云病者心膈脹滿氣逆於胸間食入即嘔嘔盡卻快名曰氣嘔胃者足陽明合榮於足今隨氣上逆結於胃口故生嘔病也茱萸人參湯治氣嘔胸滿不納食嘔吐涎沫頭疼即本方乾嘔吐涎沫頭痛者茱萸湯主之方見上徐乾嘔者有聲無物也物雖無而吐涎沫仲景曰上焦有寒其口多涎上焦既有寒寒為陰邪格陽在上故頭痛比胸滿而嘔似有輕重表裡不同然邪必乘虛故亦用茱萸湯兼補以驅濁陰謂嘔有不同寒則一也詳傷寒論輯義厥陰篇嘔而腸鳴心下痞者半夏瀉心湯主之尤邪氣乘虛陷入心中中氣則痞中氣既痞升降失常於是陽獨上逆而嘔陰獨下走而腸鳴是雖三焦俱病而中氣為上下之樞故不必治其上下而但治其中黃連黃芩苦以降陽半夏乾薑辛以升陰陰升陽降痞將自解人參甘草則補養中氣以為交陰陽通上下之用也徐親見一乳母吐嘔五日百藥不能止後服乾薑黃連二味立止即此方之意也半夏瀉心湯方半夏半升洗黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草三兩炙上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服詳傷寒論輯義太陽下篇外臺刪繁半夏瀉心湯療上焦虛寒腸鳴下利心下痞堅於本方去大棗加桂心三兩出霍亂門乾嘔而利者黃芩加半夏生薑湯主之徐傷寒論芩甘棗芍四味為黃芩湯治太陽少陽合病蓋太少之邪合而內入則協熱而利故以黃芩為主也然邪既內入或有復搏飲者嘔多此其明證矣故加半夏生薑程乾嘔者無物嘔出也中焦不和則氣逆於上而作嘔迫於下而為利故用半夏生薑入上焦以止嘔甘草大棗入中焦以和脾黃芩芍藥入下焦以止利如是則正氣安而邪氣去三焦和而嘔利止巢源云乾嘔者胃氣逆故也但嘔而欲吐吐而無所出故謂之乾嘔也黃芩加半夏生薑湯方黃芩三兩甘草二兩炙芍藥二兩半夏半升生薑三兩大棗十二個上六味以水一斗煮取三升去滓溫服一升日再夜一服諸嘔吐谷不得下者小半夏湯主之方見痰飲中鑑趙良曰嘔吐谷不得下者有寒有熱不可概論也食入即吐熱也朝食暮吐寒也此則非寒非熱由中焦停飲氣結而逆故用小半夏湯外臺傷寒嘔噦門仲景傷寒論嘔噦心下悸痞硬不能食小半夏湯又嘔噦心下痞硬者以膈間有水頭眩悸小半夏加茯苓湯嘔吐而病在膈上後思水者解急與之思水者豬苓散主之外臺無而字解字程上章言先嘔卻渴此為欲解今嘔吐而病在膈上後思水者解亦與上證不殊故急與之以和胃然思水之人又有得水而貪飲則胃中熱少不能消水更與人作病故思水者用豬苓以散水飲尤嘔吐之餘中氣未復不能勝水設過與之則舊飲方去新飲復生故宜豬苓散以崇土而逐水也蘭臺軌範云傷飲惡飲此乃常理若胸中有水則津液下流反口乾思水但不能多飲耳豬苓散方外臺引仲景傷寒論豬苓茯苓白朮各等分千金云各三兩上三味杵為散飲服方寸匕日三服千金豬苓散治嘔而膈上寒即本方外臺服法後云欲飲水者極與之本虛與水則噦攻其熱亦噦嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之魏嘔而脈弱者胃氣虛也小便複利氣不足以統攝之脫而下泄也身有微熱見厥內積陰寒外越虛陽陽衰陰盛其嘔為陽浮欲越之機也見此知為難治非尋常火邪痰飲之嘔也主之以四逆湯益陽安胃溫中止逆亦大不同於尋常寒熱錯雜治嘔之方也附子辛熱乾薑辛溫甘草甘平強人倍用以急回其陽勿令飛越則嘔可止也詳傷寒論輯義厥陰篇四逆湯方外臺引仲景傷寒論附子一枚生用乾薑一兩半甘草二兩炙上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩程神農經曰療寒者以熱藥內經云寒淫於內治以甘熱四逆湯者辛甘大熱之劑也故用附子以回陽散厥乾薑以去寒止嘔甘草以調和血脈三因方四逆湯治寒厥或表熱裡寒下利清穀食入則吐或乾嘔或大汗大吐大下之後四肢冰冷五內拘急舉體疼痛不渴脈沉伏即本方嘔而發熱者小柴胡湯主之亦見厥陰篇魏嘔而皮膚髮熱者傷寒病少陽經證也合以口苦咽乾目眩而少陽病全但見嘔而發熱雖非傷寒正病亦少陽經之屬也主之以小柴胡表解里和而病愈小柴胡湯方柴胡半斤黃芩三兩人參三兩甘草三兩半夏半升生薑三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服詳傷寒論輯義太陽中篇胃反嘔吐者大半夏湯主之原注千金云治胃反不受食食入即吐外臺云治嘔心下痞硬者案今千金入作已即吐作即嘔吐鑑高世栻曰朝食暮吐宿穀不化名曰胃反胃反但吐不嘔然吐不離乎嘔故曰胃反嘔吐者用半夏助燥氣以消穀人參補元氣以安胃白蜜入水揚之使甘味散於水中水得蜜而和緩蜜得水而淡滲庶胃反平而嘔吐愈李升璽曰嘔家不宜甘味此用白蜜何也不知此胃反自屬脾虛經所謂甘味入脾歸其所喜是也況君以半夏味辛而止嘔佐以人參溫氣而補中胃反自立止矣大半夏湯方半夏二升洗完用人參三兩白蜜一升千金有白朮一升生薑三兩上三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升余分再服千金云揚之二三百下外臺云本論治反胃支飲水用泉水三因痰嘔門大半夏湯治心氣不行郁生涎飲聚結不散心下痞硬腸中瀝瀝有聲食入即吐即本方食已即吐者大黃甘草湯主之原注外臺方又治吐水外臺引必效云療胃反吐水及吐食鑑吐者有物無聲之謂也朝食暮吐者寒也食已而吐者火也以寒性遲火性急也故以大黃甘草湯緩中瀉火火平自不吐也王肯堂曰病人慾吐者不可下之又用大黃甘草治食已即吐何也曰欲吐者其病在上因而越之可也而逆之使下則必抑塞憤亂而益甚故禁之若既已吐矣吐而不已有升無降則當逆而折之引令下行無速於大黃故取之也尤東垣通幽湯治幽門不通上衝吸門者亦是此意但有緩急之分耳案食入即吐名回食出於龔氏回春當考肘後云治人胃反不受食食畢輒吐出大黃甘草湯方大黃四兩甘草一兩肘後作二兩千金外臺同上二味以水三升煮取一升分溫再服千金味下有㕮咀二字外臺云如得可則隔兩日更服一劑神驗千金不傳此本仲景傷寒論方千金翼云主脾氣實其人口中淡甘臥憒憒痛無常處嘔吐反胃方大黃六兩上一味以水六升煮取一升分再服又主食即吐並大便不通者加甘草二兩煮取二升半分為三服胃反吐而渴欲飲水茯苓澤瀉湯主之尤豬苓散治吐後飲水者所以崇土氣勝水氣也茯苓澤瀉湯治吐未已而渴欲飲水者以吐未已知邪未去則宜桂枝甘姜散邪氣苓朮澤瀉消水氣也鑑李彣云吐而渴者津液亡而胃虛燥也飲水則水停心下茯苓澤瀉降氣行飲白朮補脾生津此五苓散原方之義也然胃反因脾氣虛逆故加生薑散逆甘草和脾又五苓散治外有微熱故用桂枝此胃反無表熱而亦用之者桂枝非一於攻表藥也乃徹上徹下達表裡為通行津液和陽治水之劑也茯苓澤瀉湯方原注外臺治消渴脈絕胃反吐食者有小麥一升案外臺脈上有陰字此本出千金並用小麥三升外臺引千金出消渴門茯苓半斤澤瀉四兩外臺作茯苓甘草一兩桂枝二兩千金外臺作三兩白朮三兩生薑四兩千金外臺用三兩上六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日三服程此方乃五苓散去豬苓加甘草生薑以豬苓過於利水故去之甘草生薑長於和胃止吐故加之茯苓白朮澤瀉桂枝相須宣導補脾而利水飲魏服法後煮澤瀉取其陰性以利水不宜煮之太過也蘭臺軌範云此治蓄飲之吐內澤瀉再煮似先煮五味後煮澤瀉外臺集驗茯苓小澤瀉湯療胃反吐而渴者千金無方名於本方去白朮生薑加半夏千金云一方入生薑四兩吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛程此證貪飲與上證欲飲水豬苓散之思水不同夫貪飲者飲水必多多則淫溢上焦必有溢飲之患故用此湯以散水飲方中皆辛甘發散之藥故亦主微風脈緊頭痛尤用麻黃杏仁等發表之藥者必兼有客邪鬱熱於肺不解故也觀方下云汗出即愈可以知矣文蛤湯方文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十個大棗十一枚上七味以水六升煮取二升溫服一升汗出即愈程此大青龍湯去桂枝加文蛤水停於裡文蛤之鹹寒可以利水而消飲水溢於外青龍之辛熱可以勝濕而解表此湯與茯苓澤瀉湯豬苓散皆預防水飲之劑張氏醫通云是方即大青龍湯無桂枝有文蛤大青龍主發散風寒兩感今是證初不言外邪而用取汗何哉蓋因陽明經中有實熱所以貪飲故用麻黃杏仁開發腠理甘草薑棗調和營衛石膏解利鬱熱文蛤直入少陰散水止渴為太陽少陰二經散邪滌飲之聖藥故又主微風脈緊頭痛之疾乾嘔吐逆吐涎沫半夏乾薑散主之魏乾嘔吐逆吐涎沫者亦胃中虛寒津液變為涎沫隨逆氣上衝作嘔也乾嘔無物止有涎沫虛邪非實邪可知矣主之以半夏乾薑散方猶之小半夏湯惟易生薑為乾薑以生薑性僭上而發越不如乾薑之辛溫為度專功理中也用意亦甚微也尤與前乾嘔吐涎沫頭痛不同彼為厥陰陰氣上逆此是陽明寒涎逆氣不下而已故以半夏止逆消涎乾薑溫中和胃漿水甘酸調中引氣止嘔吐也半夏乾薑散方千金無方名半夏乾薑各等分上二味杵為散取方寸匕漿水一升半煎取七合頓服之千金作上二味㕮咀以漿水一升半煮取七合頓服之日三程脾寒則涎不攝胃寒則氣上逆故乾嘔吐涎沫也半夏之辛以散逆乾薑之熱以溫脾煎以漿水者藉其酸溫以通關利膈也此證與茱萸湯迥別以不頭痛也病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之無奈外臺作徹無聊賴四字噦下無徹字沈似喘不喘似嘔不嘔似噦不噦誠不是喘不是嘔不是噦也徹者通也僅是通心中憒憒然無奈即泛泛噁心之義也尤寒邪搏飲結於胸中而不得出則氣之呼吸往來出入升降者阻矣似喘不喘似嘔不嘔似噦不噦皆寒飲與氣相搏互擊之證也且飲水邪也心陽臟也以水邪而逼處心臟欲卻不能欲受不可則徹心中憒憒然無奈也生薑半夏湯即小半夏湯而生薑用汁則降逆之力少而散結之力多乃正治飲氣相搏欲出不出者之良法也生薑半夏湯方外臺傷寒嘔噦門引仲景傷寒論作生薑汁半夏湯云兼主天行半夏半升生薑汁一升上二味以水三升煮半夏取二升內生薑汁煮取一升小冷分四服日三夜一服止停後服外臺作以水三升煎半夏取一升內薑汁取一升半綿漉小冷分二服一日一夜服令盡嘔噦一服得止者停後服鑑李彣曰生薑半夏辛溫之氣足以散水飲而舒陽氣然待小冷服者恐寒飲固結於中拒熱藥而不納反致嘔逆今熱藥冷飲下嗌之後冷體既消熱性便發情且不違而致大益此內經之旨也此方與前半夏乾薑湯略同但前溫中氣故用乾薑此散停飲故用生薑前因嘔吐上逆頓服之則藥力猛峻足以止逆降氣嘔吐立除此心中無奈寒飲內結難以猝消故分四服使胸中邪氣徐徐散也外臺必效療腳氣方大半夏三兩淨削去皮生薑汁三升上二味水五升煮取二升去滓空腹一服盡每日一劑三劑必好此方梁公家出方始有本奇異神效又文仲療腳氣入心悶絕欲死者半夏三兩洗切生薑汁一升半上二味內半夏煮取一升八合分四服極效又深師療傷寒病啘不止半夏散半夏洗焙乾上一味末之生薑湯和服一錢匕乾嘔噦若手足厥者橘皮湯主之肘後云治卒嘔啘又厥逆方程乾嘔噦則氣逆於胸膈間而不行於四末故手足為之厥橘皮能降逆氣生薑為嘔家聖藥小劑以和之也然乾嘔非反胃厥非無陽故下咽氣行即愈尤未可便認陽虛而遽投溫補也橘皮湯方外臺引仲景傷寒論名小橘皮湯云兼主天行橘皮四兩生薑半斤外臺作去皮八兩上二味以水七升煮取三升溫服一升下咽即愈外臺二味下有狹長切三字外臺廣濟橘皮湯療嘔噦不止於本方中加枇杷葉甘草又延年人參飲主吐於本方中加人參又範汪半夏湯病痰飲者當以溫藥和之療心腹虛冷遊痰氣上胸脅滿不下食嘔逆胸中冷於本方中加半夏噦逆者橘皮竹茹湯主之魏噦逆者胃氣虛寒固矣亦有少挾虛熱作噦者將何以為治仲景主之橘皮竹茹湯橘皮竹茹行氣清胃而毫不犯攻伐寒涼之忌佐以補中益氣溫胃之品而胃氣足胃陽生浮熱不必留意也上諸方於嘔吐噦家淺深緩急之治可謂至詳盡矣案噦說文氣牾也楊上善注陰陽應象大論云氣折也王氏準繩云噦於月切又乙劣切乙劣之訛遂為吃逆亦猶俗呼團為突欒角為葛洛其故明矣而活人書等以噦為咳逆如金鑑仍襲其說然樓氏綱目王氏準繩張氏類經辨訂其非尤詳今不繁引也橘皮竹茹湯方橘皮二斤竹茹二升大棗三十枚生薑半斤甘草五兩人參一兩上六味以水一斗煮取三升溫服一升日三服活人有半夏鑑李彣曰噦有屬胃寒者有屬胃熱者此噦逆因胃中虛熱氣逆所致故用人參甘草大棗補虛橘皮生薑散逆竹茹甘寒疏逆氣而清胃熱因以為君外臺深師大橘皮湯療傷寒嘔噦胸滿虛煩不安於本方去竹茹大棗又廣濟麥門冬湯療煩熱嘔逆不下食食則吐出於本方去橘皮加麥門冬茅根活人大橘皮湯動氣在下不可發汗發汗則無汗心中大煩骨節疼痛目運惡寒食則反吐谷不得入先服大橘皮湯吐止後服小建中湯即本方三因橘皮竹茹湯治咳逆嘔噦胃中虛冷每一噦至八九聲相連收氣不回至於驚人即本方夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁下甚者手足不仁程手足寒者陽不行於四末也上氣者宗氣衰微也平人宗氣積於胸中出於喉嚨以貫心脈而行呼吸宗氣衰則奔促上氣也腳縮者寒主收引無陽以伸也此六腑氣絕於外者如此下利不禁者下焦不闔也脾衰則四臟俱衰故經曰脾氣孤弱五液注下下焦不闔清便下重即不禁之謂也下甚而至於手足不仁者四體絕也此五臟氣絕於內者如此徐下甚手足因無陰以維陽而臟氣不相統攝則為不仁不仁者伸縮皆不能也下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死魏此滯下之病非飧泄之病也沉為陽陷入陰分沉中見弦為少陽之氣不能宣達故氣隨陽降而下重也脈沉弦而大者陽氣陷入之深而且多故為未止脈微弱者陽氣陷入淺而少更兼見數陽氣勃勃欲動於陰斯易為升達也故為欲自止是以雖滯下而發熱亦不死也若夫脈沉弦而大再身見發熱陽邪入陰而熾盛陰分受傷而煎耗可以有死之道也汪氏傷寒辨注云此辨熱利之脈也脈沉弦者沉主裡弦主急故為裡急後重如滯下之證也脈大者邪熱甚也經云大則病進故為利未止也脈微弱數者此陽邪之熱已退真陰之氣將復故為利自止也下利一候大忌發熱茲者脈微弱而帶數所存邪氣有限故雖發熱不至死耳下利手足厥冷無脈者灸之不溫若脈不還反微喘者死少陰負趺陽者為順也少陰以下厥陰篇玉函成本分為兩條尤下利厥冷無脈陰亡而陽亦絕矣灸之所以引既絕之陽乃厥不回脈不還而反微喘殘陽上奔大氣下脫故死下利為土負水勝之病少陰負趺陽者水負而土勝也故曰順詳傷寒論輯義以下三條同下利有微熱而渴脈弱者今自愈今宋板傷寒論作令下同尤微熱而渴者胃陽復也脈弱者邪氣衰也正復邪衰故今自愈下利脈數有微熱汗出今自愈設脈緊為未解趙本下利上有若字非程寒則下利脈數有微熱則裡寒去汗出則表氣和表裡俱和故今自愈設復緊者知寒邪尚在是為未解也下利脈數而渴者今自愈設不瘥必圊膿血以有熱故也程脈數而渴則寒邪去而利當止經曰若脈不解而下不止必挾熱而便膿血此有熱陷於下焦使血流腐而為膿也下利脈反弦發熱身汗者自愈程脈弦為寒發熱則陽氣復汗出則寒邪去故知自愈尤弦脈陰陽兩屬若與發熱身汗並見則弦亦陽也與脈數有微熱汗出正同故愈按上數條皆是傷寒邪氣入里之候故或熱或渴或汗出或脈數陽氣既復邪氣得達則愈若雜病濕熱下利之證則發熱口渴脈數均非美證內經云下利身熱者死仲景云下利手足不逆冷反發熱者不死蓋內經所言者雜病濕熱下利之證仲景所言者傷寒陰邪內入之證二者不可不分也下利氣者當利其小便氣脈經作熱尤下利氣者氣隨利失即所謂氣利是也小便得利則氣行於陽不行於陰而愈故曰當利其小便喻氏所謂急開支河者是也下利寸脈反浮數尺中自澀者必清膿血徐下利果屬寒脈應沉遲反浮數其陽勝可知而尺中自澀澀為陽邪入陰此亦熱多故曰必圊膿血詳傷寒論輯義厥陰篇以下四條同下利清穀不可攻其表汗出必脹滿程寒不殺穀寒勝則下利清穀也若發其表汗出則胃中之陽益虛其寒益勝故作脹滿下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也案厥趙本作熱非汪氏傷寒論辨注云下利脈沉而遲裡寒也所下者清穀裡寒甚也面少赤身微熱下焦虛寒無根失守之火浮於上越於表也以少赤微熱之故其人陽氣雖虛猶能與陰寒相爭必作鬱冒汗出而解鬱冒者頭目之際郁然昏冒乃真陽之氣能勝寒邪里陽回而表和順故能解也病人必微厥者此指未汗出鬱冒之時而言面戴陽系下虛此申言面少赤之故下虛即下焦元氣虛按仲景雖云汗出而解然於未解之時當用何藥郭白雲云不解宜通脈四逆湯下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死尤下利後脈絕手足厥冷者陰先竭而陽後脫也是必俟其晬時經氣一周其脈當還其手足當溫設脈不還其手足亦必不溫則死之事也下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯尤下利腹脹滿里有寒也身體疼痛表有邪也然必先溫其里而後攻其表所以然者裡氣不充則外攻無力陽氣外泄則裡寒轉增自然之勢也而四逆用生附則寓發散於溫補之中桂枝有甘芍則兼固里於散邪之內仲景用法之精如此四逆湯方方見上桂枝湯方桂枝三兩去皮芍藥三兩甘草三兩炙趙本作二兩案據太陽篇當作二兩生薑三兩案據太陽篇脫切字大棗十二枚案據太陽篇脫擘字上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水淋漓若一服汗出病瘥停後服淋漓太陽篇作流離下利三部脈皆平按之心下堅者急下之宜大承氣湯利下脈經有後字似是沈三部脈皆平下利而按之心下堅者脈證不符是非風寒所屬當責食填胃中未傷血氣而不形於脈也故用大承氣湯峻攻有形之滯則下利自止經謂土鬱奪之通因通用之法也下利脈遲而滑者實也利未欲止急下之宜大承氣湯沈此亦食滯之利也食壅於胃氣道不利故脈來遲然脈雖遲而非虛寒之比但遲為氣壅滑為血實血實氣壅水穀為病故為實也內滯中氣不和利未欲止但恐成停擱之患故宜大承氣湯急奪其邪也下利脈反滑者當有所去下乃愈宜大承氣湯程經曰滑為有宿食故當下去之而利自愈鑑趙良曰下利虛證也脈滑實脈也以下利之虛證而反見滑實之脈故當有所去也下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯沉此舊積之邪復病也下利瘥後至期年月日時復發者是前次下利之邪隱僻腸間今值臟腑司令之期觸動舊邪而復發然隱僻之根未除終不能愈故當大承氣迅除之耳案程尤並云脾主信故按期復發鑿甚許氏本事方云有人因憂愁中傷食結積在腸胃故發吐利自冬後至暑月稍傷則發暴下數日不已玉函云下利至隔年月日不期而發者此為有積宜下之止用溫脾湯厚朴乾薑甘草桂心附子大黃尤佳如難取可佐以乾薑丸即備急丸加人參後服白朮散即附子理中湯去甘草乾姜加木香生薑大棗戴氏證治要訣云瀉已愈隔年及後期復瀉古論云病有期年而發者有積故也宜感應丸並本條之義也大承氣湯見痓病中下利譫語者有燥屎也小承氣湯主之鑑下利裡虛證也譫語裡實證也何以決其有燥屎也若脈滑數知有宿食也其利穢黏知有積熱也然必脈證如此始可知其有燥屎也宜下之以小承氣湯於此推之而燥屎又不在大便硬不硬也尤譫語者胃實之徵為有燥屎也與心下堅脈滑者大同然前用大承氣者以因實而致利去之惟恐不速也此用小承氣者以病成而適實攻之恐傷及其正也見厥陰篇當參考小承氣湯方大黃四兩厚朴三兩炙趙本作二兩枳實大者三枚炙上三味以水四升煮取一升二合去滓分溫二服得利則止下利便膿血者桃花湯主之尤此治濕寒內淫臟氣不固膿血不止者之法赤石脂理血固脫乾薑溫胃驅寒粳米安中益氣崔氏去粳米加黃連當歸用治熱利乃桃花湯之變法也案崔氏方名黃連丸出外臺傷寒門鑑初病下利便膿血者大承氣湯或芍藥湯下之熱盛者白頭翁湯清之若日久滑脫則當以桃花湯養腸固脫可也桃花湯方赤石脂一斤一半銼一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓溫七合內赤石脂末方寸匕日三服若一服愈余勿服張氏傷寒宗印云石脂色如桃花故名桃花湯或曰即桃花石徐氏傷寒類方云兼末服取其留滯收澀外臺崔氏療傷寒後赤白滯下無數阮氏桃華湯方赤石脂八兩冷多白滯者加四兩粳米一升乾薑四兩冷多白滯加四兩切上三味以水一斗煮米熟湯成去滓服一升不瘥復作熱多則帶赤冷多則帶白傷寒論千金範汪同張仲景傷寒論煮湯和赤石脂末一方寸匕服千金桃花丸治下冷臍下攪痛乾薑赤石脂各十兩上二味蜜丸如豌豆服十丸日三服加至二十丸和劑局方桃花丸治腸胃虛弱冷氣乘之臍腹攪痛下痢純白或冷熱相搏赤白相雜腸滑不禁日夜無度方同上只面和為丸為異肘後方赤石脂湯療傷寒若下膿血者於本方中去粳米加附子外臺文仲久下痢膿血方於本方中加烏梅千金大桃花湯治冷白滯痢腹痛於本方去粳米加當歸龍骨牡蠣附子白朮人參甘草芍藥熱利下重者白頭翁湯主之趙本作重下程熱利下重則熱客於腸胃非寒不足以除熱非苦不足以堅下焦故加一熱字別以上之寒利魏滯下之病多熱不同於瀉泄下利之證多寒也故名之曰熱利而以下重別之白頭翁湯方外臺引千金翼云此張仲景傷寒論方白頭翁三兩趙本及傷寒論作二兩黃連黃柏秦皮各三兩上四味以水七升煮取二升去滓溫服一升不愈更服錢氏溯源集云白頭翁神農本經言其能逐血止腹痛陶弘景謂其能止毒痢故以治厥陰熱痢黃連苦寒能清濕熱厚腸胃黃柏瀉下焦之火秦皮亦屬苦寒治下痢崩帶取其收澀也外臺古今錄驗白頭翁湯療寒急下及滯下方本方去黃柏加乾薑甘草當歸石榴皮證類本草阿膠條引續傳信方張仲景調氣方治赤白痢無問遠近小腹㽲痛不可忍出入無常下重疼悶每發麵青手足俱變者黃連一兩去毛好膠手許大碎蠟如彈子大三味以水一大升先煎膠令散次下蠟又煎令散即下黃連末攪相和分為三服惟須熱吃冷即難吃神效案此方亦見玉函經附遺名調氣飲用三味各三錢知卻是繫於後人改定並附備考下利後更煩按之心下濡者為虛煩也梔子豉湯主之程更煩言本有煩不為利除而轉甚也尤熱邪不從下減而復上動也按之心下濡則中無阻滯可知故曰虛煩鑑此利後熱遺於胸中也按之心下濡雖熱而非實熱故用此以清其虛煩梔子豉湯方梔子十四枚香豉四合綿裹趙本綿作絹非上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分二服溫進一服得吐則止詳傷寒論輯義厥陰篇下同下利清穀裡寒外熱汗出而厥者通脈四逆湯主之尤挾熱下利者久則必傷脾陰中寒清穀者甚則並傷腎陽裡寒外熱汗出而厥有陰內盛而陽外亡之象通脈四逆湯即四逆加乾薑一倍所謂進而求陽以收散亡之氣也詳傷寒論輯義厥陰篇通脈四逆湯方附子大者一枚生用乾薑三兩強人可四兩甘草二兩炙上三味以水三升煮取一升二合去滓分溫再服程厥甚者脈必絕附子辛熱用以復脈回陽下清穀者胃必寒乾薑辛溫用以溫胃止利甘草甘平用以佐姜附之熱而回厥逆下利肺痛紫參湯主之本草圖經肺痛二字作者一字程肺痛未詳或云肺痛當是腹痛本草云紫參治心腹積聚寒熱邪氣鑑按此文脫簡不釋紫參湯方紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫三服原注疑非仲景方氣利訶黎勒散主之尤氣利氣與屎俱失也訶黎勒澀腸而利氣粥飲安中益腸胃頓服者補下治下制以急也鑑氣利所下之氣穢臭所利之物稠黏則為氣滯不宣或下之或利之皆可也若所利之氣不臭所下之物不黏則謂氣陷腸滑故用訶黎勒散以固腸或用補中益氣以舉陷亦可訶黎勒散方訶黎勒十枚煨上一味為散粥飲和頓服原注疑非仲景方程寇宗奭曰訶黎勒能澀便而又寬腸澀能治利寬腸能治氣故氣利宜之調以粥飲者藉穀氣以助腸胃也論曰仲景治氣利用訶黎勒散詳其主治不知其義及後讀杜壬方言氣利裡急後重始知訶黎勒用以調氣蓋有形之傷則便垢而後重無形之傷則氣墜而後重便腸垢者得諸實氣下墜者得諸虛故用詞藜勒溫澀之劑也唐貞觀中太宗苦氣利眾醫不效金吾長張寶藏以牛乳煎蓽茇進服之立瘥案此見劉禹錫隋唐嘉話蓽茇溫脾藥也劉禹錫傳信方治氣利用礬石礬石亦澀氣藥也大都氣利得之虛寒氣下陷者多其用溫澀之藥可見矣案楊氏直指方牛乳湯治氣痢泄如蟹渤蓽茇末二錢牛乳半升同煎減半空腹服今驗之氣墜而後重氣與屎俱失者其所泄多如蟹渤程注得直指而義尤明顯外臺廣濟療嘔逆不能多食方訶黎勒三兩去核煨上一味搗為散蜜和丸空腹服二十丸日二服以知為度利多減服無所忌附方千金翼小承氣湯治大便不通噦數譫語方見上案千金翼用枳實五枚案尤氏云即前下利譫語有燥屎之法雖不贅可也誤本文主下利而此條示噦用小承氣之法即上文噦而腹滿後部不利者丹溪醫案載超越陳氏二十餘載因飽後奔走數里遂患噦病但食物則連噦百餘聲半日不止飲酒與湯則不作至晚發熱如此者二月脈澀數以血入氣中治之用桃仁承氣湯加紅花煎服下汙血數次即減再用木香和中丸加丁香服之十日而愈此亦以攻下治噦之一格也外臺黃芩湯治乾嘔下利外臺引仲景傷寒論云出篇十六卷黃芩人參乾薑各三兩桂枝二兩大棗十二枚半夏半升上六味以水七升煮取三升溫分三服尤此與前黃芩加半夏生薑湯治同而無芍藥甘草生薑有人參桂枝幹姜則溫里益氣之意居多凡中寒氣少者可於此取法焉瘡癰腸癰浸淫病脈證並治第十八論一首脈證三條方六首諸浮數脈應當發熱而反灑淅惡寒若有痛處當發其癰辨脈法無反字處下有飲食如常者五字當發其癰作蓄積有膿也尤浮數脈皆陽也陽當發熱而反灑淅惡寒者衛氣有所遏而不出也夫衛主行榮氣者也而榮過實者反能阻遏其衛若有痛處則榮之實者已兆故曰當發其癰師曰諸癰腫欲知有膿無膿以手掩腫上熱者為有膿不熱者為無膿膿無間脈經有與字程靈樞經曰榮衛稽留於經脈之中則血澀而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐腐則為膿故知熱聚者則作膿熱未聚者但腫而未作膿也皆以手掩知之巢源云凡癰經久不復可消者若按之都牢硬者未有膿也按之半硬半軟者有膿也又以手掩腫上不熱者為無膿若熱甚者為有膿陳氏三因方引原文云此亦大略說也若脈不數不熱而疼者蓋發於陰也不疼尤是惡證不可不知陳氏外科精要云伍氏方論曰凡瘡腫以手指從瘡旁按至四畔上赤黑者按之色不變膿已結成又按之隨手赤色此亦有膿按之白良久方赤遊毒已息陳氏外科正宗云輕按熱甚便痛者有膿且淺且稠重按微熱方痛者有膿且深且稀按之陷而不起者膿未成按之軟而復起者膿已成按之都硬不痛者無膿非是膿即瘀血也按之都軟不痛者有膿非是膿即濕水也腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散主之尤甲錯肌皮乾起如鱗甲之交錯由榮滯於中故血燥於外也腹皮急按之濡氣雖外鼓而病不在皮間也積聚為腫脹之根脈數為身熱之候今腹如腫狀而中無積聚身不發熱而脈反見數非腸內有癰榮郁成熱而何薏苡破毒腫利腸胃為君敗醬一名苦菜治暴熱火瘡排膿破血為臣附子則假其辛熱以行鬱滯之氣爾巢源云腸癰者由寒溫不適喜怒無度使邪氣與榮衛相干在於腸內遇熱加之血氣蘊積結聚成癰熱積不散血肉腐壞化而為膿其病之狀小腹重而微強抑之即痛小便數似淋時時汗出復惡寒其身皮膚甲錯腹皮急如腫狀診其脈洪數者已有膿也其脈遲緊者未有膿也甚者腹脹大轉側聞水聲或繞臍生瘡穿而膿出或膿自臍中出或大便去膿血惟宜急治之又云大便膿血似赤白下而實非者是腸癰也薏苡附子敗醬散方薏苡仁十分附子二分敗醬五分上三味杵為末取方寸匕以水二升煎減半頓服小便當下魏薏仁下氣則能泄膿附子微用意在直走腸中屈曲之處可達加以敗醬之鹹寒以清積熱服後以小便下為度者小便者氣化也氣通則癰膿結者可開滯者可行而大便必泄汙穢膿血腸癰可已矣頓服者取其快捷之力也千金腸癰湯薏苡仁一升牡丹皮桃仁各三兩瓜瓣仁二升上四味㕮咀以水六升煮取二升分再服張氏衍義云即金匱薏苡附子敗醬散之變方也聖惠方治腸癰皮肉狀如蛇皮及如錯小腹堅心腹急方即本方用敗醬二兩附子半兩薏苡仁二兩半上搗粗羅為散每服三錢以水中盞入生薑半分煎至六分去滓溫服案本方僅用方寸匕似甚少聖惠為是腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹湯主之腸原本作腫今據趙程沈金鑑及脈經改之脈經無痞字巢源作小便數如淋無小便自調四字程腫則形於外痞則著於內少腹既已痞腫則腸癰已成故按之即痛也如淋者以小腹為厥陰經脈所過厥陰脈循陰器故按少腹而痛引陰莖有如淋狀而小便則自調也靈樞經曰有所結氣歸之內既有癰則榮衛稽留於內而不衛外故令有發熱汗出惡寒也脈遲緊者則熱未聚而肉未腐故宜大黃牡丹湯下之以消其腫瘍若脈洪數則膿已成將成潰瘍不可下也大黃牡丹湯在當有血句下以古人為文法所拘故綴於條末傷寒論中多有之按上證癰在小腸以小腸在上癰近於腹則位深但腹皮急而按之有如腫形故用前湯導其毒從小便而出此證癰在大腸以大腸在下癰隱少腹其位淺則有痞腫之形其跡易見其按即痛故用大黃牡丹湯排其膿血從大便而下也尤云不可下者謂雖下之而亦不能消之也大黃牡丹湯腸癰已成未成皆得主之故曰有膿當下無膿當下血大黃牡丹湯方千金云肘後名瓜子湯案今本肘後無考大黃四兩牡丹一兩千金用三兩桃仁五十個瓜子半斤千金用一斤芒硝三合上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血程諸瘡瘍痛皆屬心火大黃芒硝用以下實熱血敗肉腐則為膿牡丹桃仁用以下膿血瓜子當是甜瓜子味甘寒神農經不載主治考之雷公曰血泛經過飲調瓜子則瓜子亦腸中血分藥也故別錄主潰膿血為脾胃腸中內壅要藥想亦本諸此方案瓜子沈以為冬瓜子蓋依時珍治腸癰之說然古本草無所考程注為是張氏千金方衍義云大黃下瘀血血閉牡丹治瘀血留舍芒硝治五臟積熱滌去蓄結推陳致新之功較大黃尤銳桃仁治疝瘕邪氣下瘀血血閉之功亦與大黃不異甜瓜瓣別錄治腹內結聚破潰膿血專於開痰利氣為內癰脈遲緊膿未成之專藥張氏醫通云腸癰下血腹中㽲痛其始發熱惡寒欲驗其證必小腹滿痛小便淋澀反側不便即為腸癰之確候無論已成未成俱用大黃牡丹湯加犀角急服之劉涓子鬼遺方云治腸癰大黃湯癰之為病診小腹腫痞堅按之則痛或在膀胱左右其色或赤或白色堅大如掌熱小便欲調時白汗出時復惡寒其脈遲堅者未成膿也可下之當有血脈數膿成不可服此方即本方唯不用瓜子用芥子案千金引劉涓子不用芥子必後世傳寫之訛而聖濟總錄及外科正宗等亦用芥子得效方則用栝蔞子並誤聖惠牡丹散治產後血運腹滿欲狼狽出婦人產後門即本方不用瓜子用冬瓜子加生薑產育寶慶集同云若口噤則拗開灌之必效欲產先煎下以備緩急但不用生薑又牡丹散治腸癰未成膿腹中痛不可忍出腸癰門下同即本方加木香芍藥敗醬用甜瓜子又甜瓜子散治腸癰腫痛如悶氣欲絕於本方中加薏苡敗醬當歸檳榔又赤茯苓散治腸癰小腹牢強按之痛小便不利時有汗出惡寒脈遲未成膿於本方中加赤茯苓奇效良方梅仁散治腸癰裡急隱痛大便閉澀於本方桃仁代梅仁加犀角問曰寸口脈浮微而澀法當亡血若汗出設不汗者云何答曰若身有瘡被刀斧所傷亡血故也脈經無浮字斧作器趙本法作然尤血與汗皆陰也陰亡則血流不行而氣亦無輔故脈浮微而澀也經云奪血者無汗奪汗者無血茲不汗出而身有瘡則知其被刀斧所傷而亡其血與汗出不止者跡雖異而理則同也病金瘡王不留行散主之沈此金刃所傷皮肉筋骨故為金瘡乃屬不內外因尤金瘡金刃所傷而成瘡者經脈斬絕榮衛沮弛治之者必使經脈復行營衛相貫而後已王不留行散則行氣血和陰陽之良劑也王不留行散方王不留行十分八月八日採蒴藋細葉十分七月七日採桑東南根白皮十分三月三日採甘草十八分趙本無八字川椒三分除目及閉口去汗黃芩二分乾薑二分芍藥二分厚朴二分上九味桑根皮以上三味燒灰存性勿令灰過各別杵篩合治之為散服方寸匕小瘡即粉之大瘡但服之產後亦可服如風寒桑東根勿取之前三物皆陰乾百日魏王不留行為君專走血分止血收痛而且除風散痹是收而兼行之藥於血分最宜也佐以蒴藋葉與王不留行性共甘平入血分清火毒祛惡氣倍用甘草以益胃解毒芍藥黃芩助清血熱川椒乾薑助行血瘀厚朴行中帶破惟恐血乃凝滯之物故不憚周詳也桑根白皮性寒同王不留行蒴藋細葉燒灰存性者灰能入血分止血也為金瘡血流不止者設也小瘡則合諸藥為粉以敷之大瘡則服之治內以安外也產後亦可服者行瘀血也風寒之日桑根勿取者恐過於寒也前三物皆陰乾百日存其陰性不可日曝及火炙也此金瘡家之聖方奏效如神者也沈金瘡當取生氣為本故用桑東南根乃得生氣而生氣血燒灰存性取黑色而能止血案徐云若風寒此屬經絡邪桑皮止利肺氣不能逐外邪故勿取沈及金鑑義同此解似不允當王不留行本經云治金瘡止血逐痛蒴藋本草不載治金瘡而接骨木一名木蒴藋唐本草云治折傷續筋骨蓋其功亦同桑根白皮本經云治絕脈別錄云可以縫金瘡知是三物為金瘡之要藥排膿散方枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服尤枳實苦寒除熱破滯為君得芍藥則通血得桔梗則利氣而尤賴雞子黃之甘潤以為排膿化毒之本也排膿湯方甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服尤此亦行氣血和營衛之劑案以上二方徐注為瘡癰概治之方沈云此兩方專治軀殼之內腸胃之癰而設魏云排膿散為瘡癰將成未成治理之法也排膿湯甘草桔梗即桔梗湯蓋上部胸喉之間有欲成瘡癰之機即當急服也數說未知孰是程本金鑑並不載此兩方似有所見矣浸淫瘡從口流向四肢者可治從四肢流來入口者不可治鑑浸淫瘡者浸謂浸浸淫謂不已謂此瘡浸淫留連不已也從口流向四肢者輕以從內走外也故曰可治從四肢流走入口者重以從外走內也故曰不可治魏不可治者難治之義非當委之不治也案玉機真臟論身熱膚痛而為浸淫漢書五王傳師古注浸淫猶漸染也巢源浸淫瘡候云浸淫瘡是心家有風熱發於肌膚初生甚小先癢後痛而成瘡汁出侵潰肌肉浸淫漸闊乃遍體其瘡若從口出流散四肢者輕若從四肢生然後入口者則重以其漸漸增長因名浸淫也千金云浸淫瘡者淺搔之蔓延長不止瘙癢者初如疥搔之轉生汁相連著是也又云瘡表裡相當名浸淫瘡乃知此瘑疥濕瘡之屬沈云脫疽遊丹之類金鑑云猶今之癩癘之類皆非外臺載七方可參考浸淫瘡黃連粉主之原注方未見尤方未見大意以此為濕熱浸淫之病故取黃連一味為粉粉之苦以燥濕寒以除熱也魏按外科精義以一味黃柏散調塗本此徐沈併為黃連一味為粉之方千金黃連胡粉散黃連二兩胡粉十分水銀一兩上三味黃連為末相和軟皮裹熟挼之自能和合縱不得成一家亦得水銀細散入粉中也以傅乳瘡諸濕瘡黃爛肥瘡等若干著甲煎為膏案外臺刪繁療瘑瘡多汁方同黃連粉蓋此類也趺蹶手指臂腫轉筋陰狐疝蛔蟲病脈證治第十九論一首脈證一條方五首師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也徐沈金鑑趺作跌篇目同是沈此趺蹶當辨經絡而治也人身足陽明脈絡於腿外之前太陽脈絡於腿外側之後少陽脈絡於腿外側之中也夫跌而致蹶者足不能行也然不能行又當辨其前後治之但能前者陽明無傷也不能卻者乃不能後抵太陽經脈受傷也當刺腨入二寸腨即小腿肚本屬陽明乃太陽經絡所過之處與陽明經氣會合于飛陽承筋間故刺之使太陽陽明氣血和而無滯則前後如常矣案揚子方言跌蹶也說文蹶僵也程云趺足背也趺蹶即痹厥之屬恐非金鑑云證刺俱未詳必有缺文不釋此說近是病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之尤濕痰凝滯關節則腫風邪襲傷經絡則動手指臂腫動身體瞤瞤者風痰在膈攻走肢體陳無擇所謂痰涎留在胸膈上下變生諸病手足項背牽引釣痛走易不定者是也藜蘆吐上膈風痰甘草亦能取吐方雖未見然大略是湧劑耳李氏案程云證未詳方亦缺不釋金鑑同此固然然尤引李彣其義略通故姑仍之藜蘆甘草湯方原注未見轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之此條脈經載霍亂篇末沈此木土不和風邪而轉筋也風邪乘於脾胃風濕相搏以故表裡皆病若風濕盛於經表則臂腳直脈上下行而微弦經謂諸暴強直皆屬於風亦風淫末疾之義也或中氣虛而木邪內逆直攻於臟則轉筋入腹當以雞屎白下氣消積去風安脾之治非治臂腳直之方也魏直上下行全無和柔之象亦同於痙病中直上下行之意也案金鑑云臂同背古通用臂腳直謂足背強直不能屈伸是轉筋之證也誤轉筋不必足背故肘後有療兩臂腳及胸脅轉筋之方巢源云冷入於足之三陰三陽則腳轉筋入於手之三陰三陽則手筋轉隨冷所入之筋筋則轉轉者由邪冷之氣擊動其筋而移轉也雞屎白散方外臺引肘後云若轉筋入腹中轉者方仲景經心錄備急集驗必效同出於霍亂轉筋門雞屎白上一味為散取方寸匕以水六合和溫服肘後云以水六合煮三沸頓服之勿令病者知之外臺同案雞屎白別錄云治轉筋利小便故取而用之素問用雞屎醴治鼓脹通利大小便驗之雖本草云微寒無毒然瀉下之力頗峻用者宜知之況霍亂轉筋多津液虛燥者恐非所宜陰狐疝氣者偏有小大時時上下蜘蛛散主之尤陰狐疝氣者寒濕襲陰而睪丸受病或左或右大小不同或上或下出沒無時故名狐疝蜘蛛有毒服之能令人利合桂枝辛溫入陰而逐其寒濕之氣也靈經脈篇云肝足厥陰所生病者狐疝葛氏傷寒直格云狐疝言狐者疝氣之變化隱見往來不可測如狐也陳氏三因云寒疝之氣注入㿗中名曰狐疝亦屬㿗病蜘蛛散方蜘蛛十四枚熬焦桂枝半兩上二味為散取八分一匕飲和服日再服蜜丸亦可程別錄云蜘蛛治大人小兒㿉㿉疝也其性有毒服之能使人利得桂枝引入厥陰肝經而治狐疝雷斆炮炙論云蜘蛛凡使勿用五色者兼大身上有刺毛生者並薄小者以上皆不堪用須用屋西南有網身小尻大腹內有蒼黃膿者真也凡用去頭足了研如膏投藥中用之今之方法若仲景炒焦用全無功矣王氏古方選注云蜘蛛性陰而厲其功在殼能泄下焦結氣桂枝芳香入肝專散沉陰結疝陰狐疝偏有大小時時上下如狐之出入無定四時刺逆從論云厥陰滑為狐疝氣推仲景之意亦謂陰狐疝氣是陰邪挾肝風而上下無時也治以蜘蛛如批卻導窾蜘蛛本草言有毒人咸畏之長邑宰林公諱瑛山海衛人壯年調理方用之多年炙熟其味鮮美恆得其功本草言有毒者南北所產不同耳問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲尤腹痛脈多伏陽氣內閉也或弦者邪氣入中也若反洪大則非正氣與外邪為病乃蛔動而氣厥也然必兼有吐涎心痛等證如下條所云乃無疑耳蛔蟲之為病令人吐涎心痛發作有時毒藥不止者甘草粉蜜湯主之程巢元方曰蛔蟲長五寸至一尺發則心腹作痛口喜唾涎及清水貫傷心則死靈樞經曰蟲動則胃緩胃緩則廉泉開故涎下是以令人吐涎也心痛者非蛔蟲貫心乃蛔蟲上入胃脘即痛下入胃中即止是以發作有時也若毒藥不能止用甘草粉蜜湯從其性以治之尤吐涎吐出清水也心痛痛如咬齧時時上下是也發作有時者蛔飽而靜則痛立止蛔飢求食則痛復發也毒藥即錫粉雷丸等殺蟲之藥毒藥者折之以其惡也甘草粉蜜湯誘之以其所喜也甘草粉蜜湯方甘草二兩粉一兩重趙及諸本無重字蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升瘥即止案粉諸注以為鉛粉尤云誘使蟲食甘味既盡毒性旋發而蟲患乃除此醫藥之變詐也此解甚巧然古單稱粉者米粉也釋名云粉分也研米使分散也說文粉敷面者也徐曰古敷面亦用米粉傷寒論豬膚湯所用白粉亦米粉耳故萬氏保命歌括載本方云治蟲齧心痛毒藥不止者粉乃用粳米粉而千金諸書藉以治藥毒並不用鉛粉蓋此方非殺蟲之劑乃不過用甘平安胃之品而使蛔安應驗之於患者始知其妙而已甘味蛔所喜東方朔神異經云南方有甘蔗之林其高百丈圍三尺八寸促節多汁甜如蜜咋齧其汁令人潤澤可以節蛔蟲人腹中蛔蟲其狀如蚓此消穀蟲也多則傷人少則谷不消是甘蔗能減多益少凡蔗亦然此所以得甘味而平也千金方解鴆毒及一切毒藥不止煩懣方即本方粉用粱米粉千金翼同外臺引翼作白粱粉聖濟總錄用葛粉楊氏家藏方用綠豆粉聖濟名甘草飲蛔厥者當吐蛔令病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔案柯氏來蘇集作此非臟寒蛔上入膈非也尤蛔厥蛔動而厥心痛吐涎手足冷也蛔動而上逆則當吐蛔蛔暫安而復動則病亦靜而復時煩也然蛔之所以時安而時上者何也蟲性喜溫臟寒則蟲不安而上膈蟲喜得食臟虛則蛔復上而求食故以人參姜附之屬益虛溫胃為主而以烏梅椒連之屬苦酸辛氣味以折其上入之勢也蛔厥者烏梅丸主之烏梅丸方烏梅三百個細辛六兩乾薑十兩黃連一斤當歸四兩附子六兩炮川椒四兩去汗桂枝六兩人參黃柏各六兩上十味異搗篩合治之以苦酒漬烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍加至二十丸禁生冷滑臭等物鑑李彣曰烏梅味酸黃連黃柏味苦桂枝蜀椒乾薑細辛味辛以蛔得酸則止得苦則安得甘則動於上得辛則伏於下也然胃氣虛寒人參附子以溫補之吐亡津液當歸以辛潤之則蛔厥可愈矣詳傷寒論輯義厥陰篇案此方主胃虛而寒熱錯雜以致蛔厥者故藥亦用寒熱錯雜之品治之而有胃虛以偏於寒而動蛔者陶華用立安蛔理中湯主之即理中湯加烏梅花椒出全生集而有胃不虛以偏於熱而動蛔者汪琥因制清中安蛔湯主之黃連黃柏枳實烏梅川椒出傷寒辨注此各取本方之半而治其所偏也對證施之皆有奇效
