body:
  text: 卷一臟腑經絡先後病脈證第一論十三首脈證三條問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾旺不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰虛虛實實補不足損有餘是其義也餘臟準此趙本心火氣盛下更有心火氣盛四字肝氣盛下有故實脾三字並是程治未病者謂治未病之臟腑非治未病之人也愚謂見肝補脾則可若謂補脾則傷腎腎可傷乎火盛則傷肺肺可傷乎然則肝病雖愈又當準此法以治肺治腎五臟似無寧日也傷字當作制字看制之則五臟和平而諸病不作矣尤按素問云邪氣之客於身也以勝相加肝應木而勝脾土以是知肝病當傳脾也實脾者助令氣旺使不受邪所謂治未病也設不知而徒治其肝則肝病未已脾病復起豈上工之事哉肝之病補用酸者肝不足則益之以其本味也與內經以辛補之之説不同然肝以陰臟而含生氣以辛補者所以助其用補用酸者所以益其體言雖異而理各當也助用苦焦者千金所謂心旺則氣感於肝也益用甘味之藥調之者越人所謂損其肝者緩其中也酸入肝以下十五句疑非仲景原文類後人謬添注腳編書者誤收之也蓋仲景治肝補脾之要在脾實而不受肝邪非補脾以傷腎縱火以刑金之謂果爾則是所全者少而所傷者反多也且脾得補而肺將自旺腎受傷必虛及其子何制金強木之有哉細按語意見肝之病以下九句是答上工治未病之辭補用酸三句乃別出肝虛正治之法觀下文云肝虛則用此法實則不在用之可以見矣蓋臟腑惟虛者受之而實者不受臟邪惟實則能傳而虛則不傳故治肝實者先實脾土以杜滋蔓之禍治肝虛者直補本宮以防外侮之端此仲景虛實並舉之要旨也後人不察肝病緩中之理謬執甘先入脾之語遂略酸與焦苦而獨於甘味曲窮其説以為是即治肝補脾之要妙昔賢云詖辭知其所蔽此之謂耶鑑中工不曉虛實虛者瀉之是為虛虛實者補之是為實實非其義也上工知其虛實補其不足損其有餘是其義也案七十七難曰經言上工治未病中工治已病者何謂也然所謂治未病者見肝之病則知肝當傳之與脾故先實其脾氣無令得受肝之邪故曰治未病焉云云八十一難曰經言無實實虛虛損不足而益有餘並本條之義也傷腎三因引本經作制腎程注蓋本於此肝虛三因作虛肝今據尤注以十五句為注腳則文義相接旨趣明晰不必作虛肝也夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人即安和客氣邪風中人多死千般疢難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷以此詳之病由都盡若人能養慎不令邪風乾忤經絡適中經絡未流傳腑臟即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦酸辛甘不遣形體有衰病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也稟徐彬本沈本金鑑作秉才趙本作才沈此條是書中大旨通部之綱領前人誤編次章茲冠於首以正頭緒不致紛紜也五常者五行也夫人秉五常即秉天地五行陰陽之常氣氣即風也然風即東方甲乙生髮之氣為四時六氣之首而天氣化生長養萬物必隨八風動蕩之機而發發則寒暑燥濕火相隨應時而化人感此氣而成謂因風氣而生長然風有邪正正風者即溫和之風生育萬物也邪風者乃飄聚風之風肅殺萬物故以風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟之譬五臟元真通暢人即安和者謂人之內氣不虛則不受邪而為病也若天氣寒時而反熱熱時而反寒為客氣邪風中人多死乃謂沖方來者傷人之風也凡人身之病不出表裡陰陽內因外因不內外之三因故曰千般疢難不越三條一者經絡受邪入臟腑為內所因即大邪中表感冒風寒傳經入里乃經絡受邪之病也二者邪從四肢九竅入於血脈肌肉筋骨壅塞不通即拘攣癱瘓風痹之類為外皮膚所中是軀殼井滎俞合募原受邪為病也三者不從六淫而因房室蟲獸所傷為不內外因即自作勞傷之病也靈樞曰虛邪不能獨傷人必因身形之虛而後客之故得三焦之氣統領氣血津液充溢臟腑腠理則邪不能入所謂病則無由入其腠理然三焦之氣充溢軀殼臟腑肌肉皮膚相合罅隙之路為腠故為三焦通會元真之處為血氣所注而精津血液溉灌滋滲臟腑筋骨肌肉皮膚出入之竅為理故為皮膚臟腑之紋理總皆賴三焦之氣充溢臟腑津液實之則腠理密而不受邪為病也尤按陳無擇三因方以六淫邪氣所觸為外因五臟情志所感為內因飲食房室跌撲金刃所傷為不內外因蓋仲景之論以客氣邪風為主故不從內傷外感為內外而以經絡臟腑為內外無擇合天人表裡立論故以病從外來者為外因從內生者為內因其不從邪氣情志所生者為不內外因亦最明晰雖與仲景並傳可也程腠理一作膲理三焦出氣以溫肌肉元真之所湊會血氣之所灌滲也理者有粗理有小理有密理有分理有肉理此皮膚之理也腑之環回周疊臟之厚薄結直此臟腑之理也案文子曰人者天地之心五行之端是以稟天地五行之氣而生荀子曰水所以載舟亦所以覆舟疢疹同疾也陶弘景肘後百一方以內疾外發他犯三者分為上中下三卷蓋本於此條而義少異無擇則依陶氏所以與本條之旨不同忤逆也戾也一切經音義云凡人自摩自捏伸縮手足除勞去煩名為導引若使別人握搦身體或摩或捏即名按摩也莊子刻意曰吹呵呼吸吐故納新熊經鳥伸為壽而已道書口吐濁氣曰吐故鼻納清氣曰納新此所謂內丹外丹也膏摩即摩膏之謂玉函經總例云湯散丸藥針灸膏摩一如其法金鑑以為按摩誤問云病人有氣色見於面部願聞其説師曰鼻頭色青腹中痛苦冷者死原注一云腹中冷若痛者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痓不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲徐此段乃醫家之望法也鑑色者青赤黃白黑也氣者五色之光華也程內經曰精明五色者氣之華也故五色微疹可以目察鼻者明堂也明堂潤澤以清則無病尤鼻頭脾之部青肝之色腹中痛者土受木賊也冷則陽亡而寒水助邪故死腎者主水黑水之色脾負而腎氣勝之故有水氣色黃者面黃也其病在脾脾病則生飲故胸上有寒寒寒飲也色白亦面白也亡血者不華於色故白血亡則陽不可更越設微赤而非火令之時其為虛陽上泛無疑故死目正圓者陰之絶也痙為風強病陰絶陽強故不治痛則血凝泣而不流故色青勞則傷腎故色黑經云腎虛者面如漆柴也風為陽邪故色赤脾病則不運故便難色鮮明者有留飲經云水病人目下有臥蠶面目鮮澤也徐目為五臟精華之所聚神氣之所生正圓則目瞋不轉而至於痙是陰絶産婦多痙亦主陰也今之正圓陰絶無疑故曰不治案靈五色篇曰青黑為痛黃赤為風余當參考師曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病原注一作痛徐此段乃醫家聞法也語聲寂寂然喜驚呼者骨節間病謂靜默屬陰而厥陰肝木在志為驚在聲為呼令寂寂而喜驚呼知屬厥陰深入骨節間矣語聲喑喑然不徹者心膈間病謂聲雖有五臟之分皆振響於肺金故亮而不啞今喑喑然不徹是胸中大氣不轉壅塞金氣故不能如空谷之音所以知病在胸中膈間經謂中盛臟滿氣勝傷恐者聲如從室中言是中氣之濕也其即此歟語聲啾啾然細而長者頭中病謂頭中有病則唯恐音氣之上攻故抑小其語聲而引長髮細耳魏此亦約舉其一二以該之示人引伸觸類之義也醫燈續焰云欲言復寂忽又驚呼非深入骨節之病不如此也況骨節中屬大筋筋為肝合骨乃膽主驚呼亦出於肝膽故耳喑喑低渺之聲聽不明徹必心膈間有所阻礙啾啾細長之聲頭中有濕混其清陽故發聲如此也案金鑑云頭字當是腹字語聲啾啾然細長者謂唧唧噥噥小而悠長也因不敢使氣急促動中故知腹中病也腹中有病而有氣急促動中者此説未為得矣師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫魏又就氣息示之息搖肩息而肩動也心中堅氣堅痞於心中格阻其正氣之升降故息而肩搖也而邪實正虛猶當加意也息引胸中上氣者咳咳則氣亂而逆故息引胸中其氣逆上此咳家之息而虛實之邪又當別為諦審矣息張口短氣者肺臟津枯氣耗之可驗者也故知為肺痿而兼有唾沫之外證可徵信焉蓋必津枯氣耗而後口乾沫黏反欲多唾唾又無津而但沫也此肺病之洞然者也鑑搖肩謂抬肩也心中堅謂胸中壅滿也呼吸引胸中之氣上逆喉中作癢梗氣者咳病也呼吸張口不能續自似喘而不抬肩者短氣病也咳時唾痰嗽也若咳唾涎沫不已非咳病也乃肺痿也師曰吸而微數其病在中焦實也當下之即愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治尤息兼呼吸而言吸則專言入氣也中焦實則氣之入者不得下行故吸微數數猶促也下之則實去氣通而愈若不繫實而系虛則為無根失守之氣頃將自散故曰不治或云中焦實而元氣虛者既不任受攻下而又不能自和故不治亦通其實在上焦者氣不得入而輒還則吸促促猶短也實在下焦者氣欲歸而不驟及則吸遠遠猶長也上下二病並關臟氣非若中焦之實可從下而去者故曰難治魏至於呼吸之間周身筋脈動搖振振然是陽已脫而氣已散矣又何以為治故言不治也右俱就氣息以決人之生死人之生死原乎氣就此決之誠一定而無舛者矣案金鑑云吸促之促字當是遠字吸遠之遠字當是促字方合病義必傳寫之訛此説於義相畔不可從師曰寸口脈動者因其旺時而動假令肝旺色青四時各隨其色肝色青而反色白非其時色脈皆當病鑑寸口者統言左右三部脈也脈動法乎四時命乎五臟然必因其旺時而動則為平脈也假令肝旺於春隨其時色當青脈當弦此不病之色脈也若色反白脈反浮此非其時乃病之色脈也四時準此徐謂鼓而有力為動問曰有未至而至有至而不至有至而不去有至而達過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也尤上之至謂時至下之至謂氣至蓋時有常數而不移氣無定刻而或遷也冬至之後甲子謂冬至後六十日也蓋古造歷者以十一月甲子朔夜半冬至為曆元依此推之則冬至後六十日當復得甲子而氣盈朔虛每歲遞遷於是至日不必皆值甲子當以冬至後六十日花甲一周正當雨水之候為正雨水者冰雪解散而為雨水天氣溫和之始也云少陽起者陽方起而出地陽始生者陽始盛而生物非冬至一陽初生之謂也竊嘗論之矣夏至一陰生而後有小暑大暑冬至一陽生而後有小寒大寒非陰生而反熱陽生而反寒也天地之道否不極則不泰陰陽之氣剝不極則不復夏至六陰盡於地上而後一陰生於地下是陰生之時正陽極之時也冬至六陽盡於地上而後一陽生於地下是陽生之時正陰極之時也陽極而大熱陰極而大寒自然之道也則所謂陽始生天得溫和者不得與冬至陽生同論也審矣至未得甲子而天大寒不解或如盛夏五六月時則氣之有盈有縮為候之或後或先而人在氣交之中者往往因之而病惟至人為能與時消息而無忤耳案冬至之後得甲子少陽旺云云本見於七難而易通卦驗演而論之文繁不録師曰病人脈浮者在前其病在表浮者在後其病在裡腰痛背強不能行必短氣而極也徐以前後分浮脈之陰陽而定表裡此仲景創論也沈此以關脈前後分表裡而辨內傷外感也前者關前寸口脈也寸口屬陽主表而浮者在前邪在於表即風中於前之外感也後者關後尺脈也尺脈屬陰主裡而浮者在後為病在裡即內傷精血之病也兩尺主腎其脈貫脊陰虛陽盛則見脈浮精血虛而受邪痹著不行不能上貫於脊腰痛背強不能行精虛不能攝氣歸源氣反上逆故短氣而急也案十四難前大後小即頭痛目眩前小後大即胸滿短氣張世賢注云前者謂寸後者謂尺正與本條之義合矣揚雄方言極疲也沈訓急未知何據問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽程厥陽即陽厥也以其人秋冬奪於所用有陽無陰內經謂腎氣日衰陽氣獨勝故手足為之熱此厥陽獨行之義也案經云今內經難經無所考問曰寸脈沉大而滑沉則為實滑則為氣實氣相搏血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈尤實謂血實氣謂氣實實氣相搏者血與氣並而俱實也五臟者藏而不瀉血氣入之卒不得還神去機息則唇青身冷而死六腑者傳而不藏血氣入之乍滿乍瀉氣還血行則身和汗出而愈經云血之與氣並走於上則為大厥厥則暴死氣復反則生不反則死是也案出素調經論沈邪氣入臟神明昏憒卒倒無知謂之卒厥案寸脈通三部而言血氣程本作厥氣金鑑云寸脈沉大而滑沉則為實滑則為氣實氣相搏之十八字文理不順衍文也血氣之血字當是厥字始與卒厥相合必傳寫之訛也並似有理然據尤注義不相乖姑從之問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口起流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死尤脈脫者邪氣乍加正氣被遏經隧不通脈絶似脫非真脫也蓋暴厥之屬經曰趺陽脈不出脾不上下身冷膚硬又曰少陰脈不至腎氣微少精血為尸厥即脈脫之謂也厥病入臟者深而難出氣竭不復則死入腑者淺而易通氣行汗出即愈浸淫瘡瘡之浸淫不已外臺所謂轉廣有汁流繞周身者也從口流向四肢者病自內而之外故可治從四肢流來入口者病自外而之裡故不可治李瑋西云病在外二句概指諸病而言即上文百病皆然之意入里者死如痹氣入腹腳氣衝心之類鑑趙良曰脫者去也經脈乃臟腑之隧道為邪氣所逼故絶氣脫去其脈而入於內問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳上氣喘噦咽腸鳴脹滿心痛拘急五臟病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中里㯏飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡㯏飥趙本作䅽飪是徐作䅽飩沈作𮡑飥非程陽病屬表而在經絡故一頭痛二項三腰四脊五臂六腳掣痛此病在三陽三六一十八病陰病屬裡而在臟腑故一咳二上氣喘三噦四咽五腸鳴脹滿六心痛拘急此病在三陰三六一十八病合為九十病也沈六微者小邪中里邪襲六腑鑑此章曰十八曰九十等文乃古醫書之文今不可考難以強釋五勞七傷等説亦詳在千金故不復注也頭痛項腰脊臂腳掣痛病皆在外故為陽病也咳上氣喘噦咽腸鳴脹滿心痛拘急病皆在內故為陰病也清邪居上謂霧邪本乎天也濁邪居下謂濕邪本乎地也六淫天邪故名大邪六淫傷外故曰中表也七情人邪故名小邪七情傷內故曰中里也漀飥者飲食也飲食之邪從口而入食傷隔夜不化故名曰宿食也五邪謂風寒濕霧飲食也夫五邪之中人莫不各以類而從前者早也風中於早從陽類也寒中於暮從陰類也霧邪清輕故傷皮膚濕邪濁重故流關節飲食失節故傷脾胃尤經脈陰而傷於寒絡脈陽而傷於熱合而言之無非陽邪親上陰邪親下熱氣歸陽寒氣歸陰之理案十八病九十病金鑑不釋為是六微亦未詳何義程云見千金未有所考咽沈以為咽痛恐非廣韻咽一結切音噎哽咽也蓋咽中哽塞之謂䅽趙本釋音䅽音谷即谷也案此古文異構詳見於方氏通雅飪熟食也金鑑欲改作漀且以極寒為飲食之寒熱並不可從唐大烈吳醫匯講以馨飪解之亦非也尤云大邪漫風雖大而力散故中於表小邪戶牖隙風雖小而氣鋭故中於里程云風寒即大邪故從表入䅽飪即小邪故從口入即後食傷脾胃也二説亦通問曰病有急當救里救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表也沈此病分表裡治有先後也問急當救里救表者乃病在表而醫反下之誅伐無過致傷脾胃之氣所以下利清穀不止然雖身疼表證未解當救誤下之逆為急不可姑慮表邪以致內傷下脫必俟元陽恢復清便自調之後急當救表然表當急救何也蓋恐內陽初復未充外邪陷入又變結胸痞滿耳詳見傷寒論輯義太陽中篇夫病痼疾加以卒病當先治其卒病後乃治其痼疾也鑑趙良曰痼疾病已沉痼非旦夕可取效者卒病謂卒然而來新感之病可取效於旦夕者乘其所入未深急去其邪不便稽留而為患也且痼疾之人正氣素虛邪尤易傳設多瞻顧致令兩邪相合為患不淺故仲景立言於此使後學者知所先後也師曰五臟病各有得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也程內經曰肝色青宜食甘心色赤宜食酸肺色白宜食苦脾色黃宜食鹹腎色黑宜食辛此五臟得飲食而愈者肝病愈於丙丁起於甲乙心病愈於戊己起於丙丁脾病愈於庚辛起於戊己肺病愈於壬癸起於庚辛腎病愈於甲乙起於壬癸此五臟自得其位而愈者五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥各隨其所惡而不喜者為病也若病人素不食而暴食之則食入於陰長氣於陽必發熱也暴思之婁全善作暴食之為是案病者素不應食以下必是別條沈尤輩接上為義未免強解瘥後勞復病篇曰病人脈已解而日暮微煩以病新瘥人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈正與此條相發夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯余皆仿此尤無形之邪入結於臟必有所據水血痰食皆邪藪也如渴者水與熱得而熱結在水故與豬苓湯利其水而熱亦除若有食者食與熱得而熱結在食則宜承氣湯下其食而熱亦去若無所得則無形之邪豈攻法所能去哉豬苓湯方見後消渴證中鑑如渴者之下當有小便不利四字必傳寫之遺也臟者里也痓濕暍病脈證第二論一首脈證十二條方十一首太陽病發熱無汗反惡寒者名曰剛痓原注一作痙余同沈柯魏並作痙是玉函千金翼反上有而字徐此條與下條即傷寒論辨寒傷榮風傷衛法也取以為痓病剛柔之別省文也蓋痓即痙強直之謂也痓病必有背項強直等的證故曰痓即省文不言但治痓病剛柔之辨最為吃緊故特首拈無汗反惡寒為剛有汗不惡寒為柔以示辨證之要領耳程痓病者以太陽病發汗太多榮血已亡風寒易中故筋脈徑急作剛柔二痓也寒邪內入於營鬱於肌膚則發熱凝其血脈則無汗無汗為表實不應惡寒今反惡寒者以寒邪嚴厲從衛入營衛亦因之而不闔故反惡寒也其痓故名曰剛案成無己曰痓當作痙傳寫之誤也痓惡也非強也今考痓惡也見張揖廣雅而説文痙強急也成説為是聖濟總録云痓又謂之痙者痙痓一類古人特以強直名之郭白雲云痓是病名痙是病證楊氏直指方李氏永類鈐方遂立痙痓門皆不考耳金鑑云反惡寒之反字衍文也玩痙病之條自知當惡寒也今考甲乙經引本條文無反字則知金鑑之説有所據也然錢氏溯源集云發熱無汗本應惡寒而曰反惡寒者不當惡之詞也然而非也以時頭熱面赤目脈皆赤之見證似乎熱甚而仍身熱足寒頭項強急而惡寒故曰反也反者甚之之詞依此解則反字不必刪而義自通龐安時作反不惡寒亦不可從太陽病發熱汗出而不惡寒名曰柔痓程風傷於衛則發熱開其腠理則汗出汗出當惡寒今不惡寒者以風為陽邪木性曲直和耎雖汗出亦不惡寒其痓故名曰柔案程剛柔之解誤徐則為柔軟之義痙病以強急得名豈有柔軟者乎其説尤非金鑑云太陽病發熱無汗惡寒為實邪名曰剛痙者強而有力也發熱汗出不惡寒為虛邪名曰柔痙者強而無力也此注近是然以有力無力分剛柔者未為得矣蓋剛柔乃陰陽之義陰陽乃虛實之謂表實故稱以剛表虛故稱以柔神巧萬全方云太陽病發熱不惡寒無汗為陽痙發熱不惡寒汗出為陰痙又活人書云剛痙屬陽痙柔痙屬陰痙活人續集解惑論云合面而臥為陰痙仰目者為陽痙其義可見耳太陽病發熱脈沉而細者名曰痓為難治傷寒論玉函經脈經並無為難治三字徐古人以強直為痓外證與傷寒相似但其脈沉細而項背反張強硬如發癇狀為異耳如前二條既以無汗有汗分剛柔為辨此復以脈沉細為辨溯源集云邪在太陽若中風之脈則當浮緩傷寒之脈則當浮緊此則同是太陽發熱之表症而其脈與中風傷寒特異反見沉細者因邪不獨在太陽之表也則表裡皆有風寒邪氣浸淫於皮膚筋骨臟腑經絡之間非若中風傷寒之邪先表后里以次傳變之可比乃邪之甚而病之至者乃難治危惡之證也所以金匱此條之下有為難治三字太陽病發汗太多因致痓鑑太陽病當發汗若發汗太過腠理大開表氣不固邪氣乘虛而入因成痙者乃內虛所召入也宜以桂枝加附子湯主之固表溫經也由此推之凡病出汗過多新産金瘡破傷出血過多而變生此證者皆其類也溯源集云生氣通天論云陽氣者精則養神柔則養筋陽氣衰微不能噓養其筋骨故筋脈徑急而成痓所以太陽篇云太陽病醫發汗遂漏不止四肢拘急難以屈伸者桂枝加附子湯主之痓之見症雖又甚焉亦理之相似者也張氏醫通云真武湯夫風病下之則痓復發汗必拘急程風傷於衛若下之虛其陰血風乘其虛而陷於營血之中血不榮筋因作痓四肢為諸陽之本復發汗以虛其陽必令四肢拘急張氏醫通云附子湯瘡家雖身疼痛不可發汗汗出則痓鑑瘡家初起毒熱未成法當汗散已經潰後血氣被傷雖有身痛表證亦不可發汗恐汗出血液愈竭筋失所養因而成痙或邪風乘之亦令痙也徐産後多致痙陰虛液脫之故産後誤汗下而致或亦有之故仲景不另出方聽人消息張氏醫通云芍藥甘草附子湯巢源金瘡中風痙候云夫金瘡痙者此由血脈虛竭飲食未復未滿月日營衛傷穿風氣得入五臟受寒則痙其狀口急背直搖頭馬鳴腰為反折須臾大發氣息如絶汗出如雨不及時救者皆死凡金瘡卒無汗者中風也邊自出黃汁者中水也並欲作痙急治之又腕折中風痙候云夫腕折傷皮肉作瘡者慎不可當風及自扇若風入瘡內犯諸經絡所致痙痙者脊背強直口噤不能言也案此後世所謂破傷風也其中水者謂之破傷濕見三因方巢源又有産後中風痙候附載於婦人産後病病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痓病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇原注一云其脈浛浛傷寒論作目脈赤獨頭面搖無若發其汗以下二十五字痓病也作為痓也玉函脈經無若發其汗以下十七字脈經作痓病發其汗已其脈浛浛如蛇相得程徐作相搏浛浛趙本作滄滄鑑諸家以剛柔二痙列為首條今以此為第一條者蓋剛柔之辨俱從此條分出痙病之最備者宜冠諸首程身熱頭熱邪在太陽也面赤目赤足陽明之正系目系邪在陽明也頸屬陽明項屬太陽邪在二經則頸項強急惡寒也陽明之脈挾口故卒口噤太陽之脈循背上頭故頭獨搖背反張也此其人必汗下亡血之後正氣已虛而邪氣但勝於上其足則寒此痙病之證具見也鑑李彣曰手三陽之筋結入於頷頰足陽明之筋上挾於口風寒乘虛入其筋則攣故牙關急而口禁尤寒濕相得者汗液之濕與外寒之氣相得不解而表氣以汗而益虛寒氣得濕而轉增則惡寒甚也沈其脈堅徑動猶如蛇乃譬掙紐奔迫之狀溯源集云上文有脈無證此條有證無脈合而觀之痓病之脈證備矣身熱者風寒在表也足寒者陰邪在下也頸項強急背反張者太陽之經脈四行自巔下項夾背脊而行於兩旁寒邪在經諸寒收引其性徑急邪發則筋脈抽掣故頸項強急背如角弓之反張所謂筋所生病也惡寒者寒邪在表則當惡寒在下焦而陽氣虛衰亦所當惡也時頭熱面赤目脈赤者頭為諸陽之會陽邪獨盛於上所以足寒於下也時者時或熱炎於上而作止有時也頭面為諸陽之所聚乃元首也不宜動搖因風火扇動於上故獨頭面動搖卒然口噤而不言也案金鑑云若發其汗六句與上文義不屬與後之為欲解脈如故反伏弦者痙句文義相屬宜分於彼然今考此六句其意不明晰疑是他篇錯簡傷寒論亦無之宜刪暴腹脹大者為欲解脈如故反伏弦者痓沈本脈上有其字伏玉函脈經作復程暴腹脹大為欲解於理不順脈伏弦即後條伏堅之意鑑暴腹脹大者句衍文也當刪之夫痓脈按之緊如弦直上下行原注一作築築而弦脈經云痓家其脈伏堅直上下案脈經云十二字舊本大書與原文同今依趙本為細注玉函脈經作築築而弦尤緊如弦即堅直之象李氏曰上下行者自寸至尺皆見緊直之脈也鑑痙之為病其狀徑急強直故其脈亦徑急強直按之緊徑急之象也如弦直行之象也案緊不散也弦不緩也如字當讀為而玉函脈經可證痓病有灸瘡難治徐治痓終以清表為主有灸瘡者經穴洞達火熱內盛陰氣素虧即後栝蔞桂枝湯葛根湯嫌不遠熱大承氣湯更慮傷陰故曰難治尤有灸瘡者膿血久潰穴俞不閉婁全善云即破傷風之意蓋陰傷而不勝風熱陽傷而不任攻伐也故曰難治玉函經栝蔞桂枝湯後出一條云脊強者五痙之總名其證卒口噤背反張而瘛瘲諸藥不已可灸身柱大椎陶道案依此則痙病不必禁灸也太陽病其證備身體強𠘧𠘧然脈反沉遲此為痓栝蔞桂枝湯主之玉函無反字尤太陽證備者趙氏謂太陽之脈自足上行循背至頭項此其所過之部而為之狀者皆是其證是也𠘧𠘧背強連頸之貌沉本痓之脈遲非內寒乃津液少而營衛之行不利也傷寒項背強𠘧𠘧汗出惡風者脈必浮數為邪風盛於表此證身體強𠘧𠘧然脈反沉遲者為風淫於外而津傷於內故用桂枝則同而一加葛根以助其散一加栝蔞根兼滋其內則不同也沈此出柔痙之方也雖不言有汗之柔痙此用桂枝湯和營衛而解太陽衛分之邪栝蔞能清胸膈之熱不出有汗風傷衛之大法可以意會程𠘧𠘧俯仰不自如之貌按説文𠘧字無鉤挑有鉤挑者乃几案之幾字也𠘧乃鳥之短羽象小鳥毛羽未盛之形飛𠘧𠘧也故鳧字從𠘧蓋形容其頸項強急之意簡案明理論𠘧音殊𠘧引頸之貌𠘧短羽鳥也短羽之鳥不能飛騰動則先伸引其頭爾項背強者動亦如之非若几案之幾而偃屈也程注本於此為是本事方為幾足之義三因方作兀兀證治準繩引詩幽風赤鳥几几為解並不可從栝蔞桂枝湯方栝蔞根二兩程沈作三兩桂枝三兩芍藥三兩甘草二兩徐沈有炙字生薑三兩徐沈有切字大棗十二枚徐沈有擘字上六味以水九升煮取三升分溫三服取微汗汗不出食頃啜熱粥發案神農本經云栝蔞根治消渴身熱煩滿大熱三因栝蔞桂枝湯治柔痓身體強兀兀然脈反沉遲自汗即本方又桂枝栝蔞根湯治傷風汗下不解鬱於經絡隨氣湧泄衄出清血或清氣道閉流入胃管吐出清血遇寒泣之色必瘀黑者於本方加川芎等分太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痓葛根湯主之尤無汗而小便反少者風寒濕甚與氣相持不得外達亦並不下行也不外達不下行勢必逆而上衝為胸滿為口噤不得語馴至面赤頭搖項背強直所不待言故曰欲作剛痙葛根湯即桂枝湯加麻黃葛根乃剛痙無汗者之正法也葛根湯方三因名葛根麻黃湯葛根四兩麻黃三兩去節桂二兩去皮傷寒論作桂枝當補枝字芍藥二兩趙作三兩非甘草二兩炙生薑三兩傷寒論有切字大棗十二枚傷寒論有擘字上七味㕮咀以水一斗先煮麻黃葛根減二升去沫納諸藥煮取三升去滓溫服乙升覆取微似汗不須啜粥余如桂枝湯法將息及禁忌一斗趙作七升非柯氏來蘇集云葛根味甘氣涼能起陰氣而生津液滋筋脈而舒其牽引故以為君麻黃生薑能開玄府腠理之閉塞祛風而去汗故以為臣寒熱俱輕故少佐桂芍同甘棗以和里此於麻桂二湯之間衡其輕重而為調和表裡之劑也葛根與桂枝同為解肌和里之藥故有汗無汗下利不下利皆可用與麻黃專於治表者不同案神農本經曰葛根氣味甘辛平治消渴身大熱起陰氣柯氏以為發表生津之品全本於本經而剛痙所主亦在乎此實卓見也徐沈諸家皆以為解陽明之邪者非痓為病原注一本痓字上有剛字胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯玉函脈經作剛痙為病必上有其人二字徐沈齘作介程胸滿即氣上衝胸之互文臥不著席亦反張之互詞也龐安常曰痓病臥不著席者小兒腰背去席二指大人手側掌為難治邪在太陽則攣急邪在陽明則口噤靈樞經曰熱而痙者死腰折瘛瘲噤齒也出熱病篇齘切齒也噤之甚者則切靈樞熱病篇有齧齒當是齘齒之類痓病屬表屬虛未可與承氣下也當詳之鑑此申痙病入里以明其治也痙病而更胸滿裡氣壅也臥不著席反張甚也腳攣急徑急甚也必齘齒牙緊甚也此皆陽明熱盛灼筋筋急而甚之象故以大承氣湯直攻其熱非攻陽明之實也柯氏傷寒論翼云六氣為病皆能發熱然寒與熱相因暑與濕相從獨燥與濕相反濕病多得之地氣燥病多得之內因此病因之殊也病機十九條燥症獨無若諸痙項強皆屬於濕愚竊疑之今本論有痙濕之分又曰太陽病發汗太多因致痓則痓之屬燥無疑也夫痓以狀命名因血虛而筋急耳六氣為患皆足以致痓然不熱則不燥不燥則不成痓矣又云治風寒不惜津液所以發汗太多因致痓者多矣夫痓本有由來一經妄治即奇形畢現項背強𠘧𠘧是痓之徵兆故用葛根身體強是痓之已著故用栝蔞根臥不著席腳攣急口噤齒齘是痓之劇甚故用大黃芒硝無非取多津液之品以滋養陰血不得與當汗不汗者同例也大承氣湯方大黃四兩酒洗厚朴半斤炙去皮枳實五枚炙芒硝三合上四味以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝更上火微一二沸分溫再服得下止服火微宋版傷寒論作微火三因大承氣湯治剛痓云云以陽明養宗筋陽明者胃也風濕寒入於胃則熱甚宗筋無以養故急直利陽明以治其能養也案甲乙經云剛痙太陽中風感於寒濕者也其脈往來進退以沉遲細異於傷寒熱病巢源千金並云風邪傷於太陽經復遇寒濕則發痙也於是成無己以降皆宗其説無復異論焉特至張介賓則云病在筋脈筋脈拘急所以反張其病在血液血液枯燥所以筋攣也柯氏因而以燥證斷之其説固確矣故徐沈諸家凡以寒濕注之者皆不可憑也徐氏蘭臺軌範云痓病乃傷寒壞證小兒得之猶有愈者其餘則百難療一其實者或有因下而得生虛者竟無治法金匱諸方見效絶少案千金方云病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痙也此癇痙之辨也所謂癇即聖惠方以降稱驚風急驚即陽癇慢驚即陰癇二證自判然矣沈云方中行傷寒條辨謂小兒角弓反張手足抽搦後世兒科總名驚風誤治謂非驚風亦為痙病余詳此乃少陰少陽客熱所至為驚為瘛感冒熱邪所致實非驚風並非痙故詳及之沈此説極是惜似不知驚風即是古之癇焉太陽病關節疼痛而煩脈沉而細原注一作緩者此名濕痹原注玉函云中濕濕痹之候小便不利大便反快但當利其小便尤濕為六淫之一故其感人亦如風寒之先在太陽但風寒傷於肌腠而濕則流入關節風脈浮寒脈緊而濕脈則沉而細濕性濡滯而氣重著故亦名痹痹者閉也其人平日土德不及而濕動於中由是氣化不速而濕侵於外外內合邪為關節疼痛為小便不利大便反快治之者必先逐內濕而後可以除外濕故曰當利其小便東垣亦云治濕不利小便非其治也然此為脈沉而小便不利者設耳若風寒在表與濕相搏脈浮惡風身重疼痛者則必以麻黃白朮薏苡杏仁桂枝附子等發其汗為宜矣溯源集云夫濕者六氣之一也然一氣之中猶有別焉霧露之氣為升於地之輕清而上騰者故為濕中之清傷人皆中於上雨雪泥水之濕為著於地之重濁而在下者為濕中之濁傷人皆中於下經云清邪中上濁邪中下所以金匱要略云濕傷於下霧傷於上霧傷皮腠濕流關節也亦稱太陽病者以風寒暑濕之邪皆由衛氣不密其氣得從皮毛而入以營衛皆屬太陽故也關節筋骨肢節之間也以雨露水濕之氣因衛陽不能外固由太陽而流入於關節筋骨之間致肢節疼痛而煩擾不寧其脈沉而細者寒濕流於皮肉筋脈之間血凝氣滯營衛不快於流行也寒濕內淫則三焦不能施化氣化不得流行其人小便不利是以水穀不能泌別濕氣流溢於大腸故大便不得燥結而反快也若此者不必以燥濕為治其濕氣淫溢非燥濕之所能勝故但當利其小便小便利則谷水分而濕淫去矣此條蓋論雨雪泥水地氣之濕乃濕中之濁者故曰但當利其小便若霧露之清邪即當以微似汗解之矣然利小便句當察其脈證機宜未可泛然以淡滲為治也脈既沉細關節已疼而小便不利則陰寒可知自當以寒濕為治責之下焦無火膀胱之氣化不行則五苓散及甘草附子湯之類當意在言表活人書云若小便不利大便反快當利其小便宜甘草附子湯五苓散至真要論云治濕之法不利小便非其治也醫説引信效方云春夏之交人病如傷寒其人汗自出肢體重痛轉仄難小便不利此名風濕非傷寒也陰雨之後卑濕或引飲過多多有此證但多服五苓散小便通利濕去則愈切忌轉瀉發汗小誤必不可救初虞世云醫者不識作傷風治之發汗下之必死案此蓋與本條之證同附以備考濕家之為病一身盡疼原注一云疼煩發熱身色如熏黃也玉函作一身疼煩程脾主身之肌肉濕為寒邪鬱於肌中不得散則一身盡疼發熱也陽明瘀熱則黃色鮮明如橘子太陰寒濕則黃色黧暗如煙燻成無己云身黃如橘子色者陽明瘀熱也此身色如似熏黃即非陽明瘀熱身黃髮熱者梔子柏皮湯主之為表裡有熱則身不疼痛此一身盡疼非傷寒客熱也知濕邪在經而使之脾惡濕濕傷則脾病而色見是以身發黃者為其黃如煙燻非正黃色也張卿子云濕熱即梔子柏皮湯證也此白朮附子湯症溯源集云濕邪充塞浸灌於表裡肌肉肢節之間所以一身盡疼而身色如熏黃也熏黃者如煙燻之狀黃中帶黑而不明潤也蓋黃家有陰陽之別陽黃則明潤陰黃則黑暗而無光澤身如橘子色者濕熱停蓄所致屬陽黃此一身盡疼已屬寒濕之邪流於關節而身色如似熏黃即陰黃之屬也當於寒濕中求之濕家其人但頭汗出背強欲得被覆向火若下之早則噦或胸滿小便不利原注一云利舌上如胎者以丹田有熱胸上有寒渴欲得飲而不能飲則口燥煩也不利玉函作利脈經無煩字似是龐氏總病論煩作故神巧萬全方胎作苔胸上作胸中程濕為陰邪陰邪客於陰則陽上越而不行於腠理肌肉故但頭汗出背為陽寒濕勝則陽虛故背強欲得被覆向火也若當表邪未解之時誤以陽明內濕之熱上越之頭汗而早下之則虛其胃濕干於胃則噦寒客於上則胸滿亡其津液則小便不利以寒濕在上故舌上如苔而實非苔也丹田有熱者以下后里虛上焦陽氣因虛而陷於下焦為丹田有熱表中寒氣乘虛而客於胸上為胸上有寒唯其丹田有熱則渴欲飲水胸上有寒不能散水雖得水而不能飲故口燥煩也魏口但燥而心發煩溯源集云舌上如苔者若熱邪入胃則舌上或黃或黑或芒刺或乾硬或燥裂皆苔也此云如苔乃濕滑而色白似苔非苔也此因寒濕之邪陷入於裡而在胸膈命門之真陽不得上升而在下焦上下不通故曰丹田有熱胸中有寒下焦之真火既不得上達即所謂清陽不升是下焦無蒸騰之用氣液不得上騰而為涕唾故渴又以寒濕在胸道路阻絶故雖欲得水而不能飲則口燥而煩渴也仲景雖不立治法然以理推之下文之桂枝附子湯甘草附子湯即其治也前人擬小陷胸湯恐非其治即五苓散理中湯雖近於理猶未盡善案以上三方見張卿子注何也以但能溫中而不能解外故必以用桂枝者為妥也案胸上有寒丹田有熱諸注欠詳第程錢二氏義似稍通然猶未清晰因考此寒熱互誤黃連湯條云胸中有熱胃中有邪氣邪氣即寒也方中用乾薑桂枝其義可見耳他諸瀉心湯烏梅丸之類悉為上熱下冷設巢源有冷熱不調之候云陽並於上則上熱陰並於下則下冷而無上冷下熱之證其故何也蓋火性炎上水性就下病冷熱不調則熱必浮於上寒必沉於下是所以無下熱上冷之候也凡誤下之證下焦之陽驟虛氣必上逆則上焦之陽反因下而成實以火氣不下行故為上熱下冷之證此條證亦然舌上如苔而口燥者上熱之徵渴欲得飲而不能飲者下冷之驗與厥陰病心中疼熱飢而不能食雖有飲食之別其理則一也故如此證亦必非寒熱錯雜之劑則難奏效學者宜致思焉濕家下之額上汗出微喘小便利原注一云不利者死若下利不止者亦死尤濕病在表者宜汗在裡者宜利小便苟非濕熱蘊積成實未可遽用下法額汗出微喘陽已離而上行小便利下利不止陰復決而下走陰陽離決故死一作小便不利者死謂陽上遊而陰不下濟也亦通鑑李瑋西云濕家當利小便以濕氣內瘀小便原自不利宜用藥利之此下后里虛小便自利液脫而死不可一例概也風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也蓋發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲出汗者風濕俱去也傷寒論玉函脈經冒問曰二字蓋作答曰二字玉函雨下有溜字濕氣在作濕氣仍在脈經作濕氣續在玉函脈經醫作師成本作似欲汗出徐此言風濕當汗解而不可過也謂風濕相搏疼痛原當汗解值天陰雨則濕更甚可汗無疑而不愈何故蓋風性急可驟驅濕性滯當漸解汗大出則驟風去而濕不去故不愈若發之微則出之緩緩則風濕俱去矣然則濕在人身黏滯難去驟汗且不可而況驟下乎故前章曰下之死此但云不愈見用法不當而非誤下比也程茲條為治濕汗之嚴律王宇泰云風濕宜汗桂枝加白朮黃耆防己湯張卿子云風濕相搏法當汗出而解如麻黃加朮湯使微微蒸發表裡氣和風濕俱去濕家病身疼發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈原注脈經云病人喘而無濕家病以下至而喘十三字案十三字當作十一字傷寒論作濕家病身上疼痛沈此濕淫於上與濕從下受不同也濕邪感於太陽與肺氣相合氣鬱於表故身疼發熱面黃而喘頭痛鼻塞而煩也邪居於表故脈大自能飲食者腹中和而無病當責病在頭中寒濕寒濕者以濕屬陰故也蓋鼻為肺竅肺氣受濕則鼻塞故當納藥鼻中搐去黃水俾肺氣通調大氣一轉肌腠開而濕痹解矣魏瓜蒂散方瓜蒂上一味為末吹鼻中溯源集云病淺不必深求毋庸製劑但當以辛香開發之藥納之鼻中以宣泄頭中之寒濕則愈朱奉議及王氏準繩俱用瓜蒂散濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之鑑趙良曰濕與寒合令人身疼大法表實成熱則可發汗無熱是陽氣尚微汗之恐虛其表是證雖不云熱而煩以生煩由熱也所以服藥不敢大發其汗且濕亦非暴汗可散用麻黃湯治寒加朮去濕使其微汗耳不可火攻火攻則增其熱必有他變所以戒人慎之喻昌曰麻黃加朮則雖發汗不至多汗而術得麻黃並可以行表裡之濕程若以火攻之則濕熱相搏血氣流溢迫而為衄鬱而為黃非其治法麻黃加朮湯方麻黃三兩去節桂枝二兩去皮甘草二兩炙案據麻黃湯本方當一兩杏仁七十個去皮尖白朮四兩案術分蒼白始出於名醫別録此白字後人所加宜刪上五味以水九升先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服八合覆取微似汗三因麻黃白朮湯治寒濕身體煩疼無汗惡寒發熱者即本方千金翼治多睡欲閣眼則先服以止睡方麻黃去節白朮各五兩甘草一兩炙上三味以日中時南向搗篩為散食後以湯服方寸匕日三服病者一身盡疼發熱日晡所劇者名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯玉函脈經作日晡即劇非鑑病者謂一身盡痛之病人也濕家一身盡痛風濕亦一身盡痛然濕家痛則重著不能轉側風濕痛則輕掣不可屈伸此痛之有別者也濕家發熱早暮不分微甚風濕之熱日晡所必劇蓋以濕無來去而風有休作故名風濕原其由來或為汗出當風或為久傷取冷相合而致則麻黃杏仁薏苡甘草湯發散風濕可與也明矣尤痙病非風不成濕痹無寒不作故以麻黃散寒薏苡除濕杏仁利氣助通泄之用甘草補中豫勝濕之權也麻黃杏仁薏苡甘草湯方麻黃去節半兩湯泡案外臺作四兩無湯泡二字是甘草一兩炙案外臺作二兩是薏苡仁半兩案外臺作半升是杏仁十個去皮尖炒案外臺作二兩無炒字徐沈亦刪炒是上銼麻豆大每服四錢匕水盞半煮八分去滓溫服有微汗避風案此方劑小而煎法與諸方異蓋後人所改定外臺腳氣門所載卻是原方分兩注於各藥下云濕家始得病時可與薏苡麻黃湯引古今録驗方後云上四味㕮咀以水五升煮取二升分再服汗出即愈濕家煩疼可以甘草麻黃湯發汗不瘥更合飲家加白朮四兩名白朮麻黃湯是也薏苡本經云治風濕痹別録云除筋骨中邪氣本方證比之於麻黃加朮湯證濕邪滯著較深故用此等品風濕脈浮身重汗出惡風者防己黃耆湯主之鑑脈浮風也身重濕也寒濕則脈沉風濕則脈浮若浮而汗不出惡風者為實邪可與麻黃杏仁薏苡甘草湯汗之浮而汗出惡風者為虛邪故以防己白朮以去濕黃耆甘草以固表生薑大棗以和營衛也趙良曰身重乃風濕在皮毛之表故不作疼虛其衛氣而濕著為身重故以黃耆實衛甘草佐之防己去濕白朮佐之然則風濕二邪無散風之藥何耶蓋汗多知其風已不留以表虛而風出入乎其間因之惡風爾惟實其衛正氣壯則風自退此不治而治者也尤風濕在表法當從汗而解乃汗不得發而自出表尚未解而已虛汗解之法不可守矣故不用麻黃出之皮毛之表而用防己驅之肌膚之裡然非耆朮甘草焉能使衛陽復振而驅濕下行哉防己黃耆湯方防己一兩案千金外臺作四兩是甘草半兩炒案水氣病篇炒作炙外臺作一兩是白朮七錢半案千金作三兩是黃耆一兩一分去蘆案千金外臺作五兩是上銼麻豆大每抄五錢匕生薑四片大棗一枚水盞半煎八分去滓溫服良久再服喘者加麻黃半兩胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮中從腰下如冰後坐被上又以一被繞腰下溫令微汗瘥冰趙本作水繞腰下趙徐沈金鑑作繞腰以下案此方分兩煎法亦繫於後人改定千金卻是原方作生薑三兩大棗十二枚云上六味㕮咀以水六升煮取三升分三服服了坐被中欲解如蟲行皮臥取汗千金無方名脈經作防己湯活人書名漢防己湯溯源集云脈浮汗出惡風似乎風邪在表應用桂枝而仲景又偵知其衛氣已虛皮膚不密毛孔不閉所以汗出惡風乃濕家之表虛者故用防己利水以黃耆固表白朮甘草燥濕補中而已皆因其表氣已虛衛陽不固並微似汗之桂枝亦不輕用矣非用意淵深而能制方若是耶傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若大便堅小便自利者去桂加白朮湯主之渴下千金翼有下已二字外臺有下之二字太陽下篇若下有其人二字堅作硬宋版注一云臍下心下硬脈經作去桂加朮附子湯是鑑謂此風濕之病雖得之傷寒八九日而不嘔不渴是無傷寒里病之證也脈浮虛澀是無傷寒表病之脈也脈浮虛表虛風也澀者濕也身體煩疼風也不能轉側濕也乃風濕相搏之身體疼痛非傷寒骨節疼痛也與桂枝附子湯溫散其風濕從表而解也若脈浮實者則又當以麻黃加朮湯大發其風濕也如其人有是證雖大便硬小便自利而不議下者以其非邪熱入里之硬乃風燥濕去之硬故仍以桂枝附子湯去桂枝者以大便堅小便自利不欲其發汗再奪津液也加白朮者以身重著濕在肌分用以佐附子逐水氣於皮中也尤脈浮虛而澀知風濕外持而衛陽不正故以桂枝湯去芍藥之酸收加附子之辛溫以振陽氣而敵陰邪若大便堅小便自利知其在表之陽雖弱而在裡之氣猶冷則皮中之濕自可驅之於里使從水道而出不必更發其表以危久弱之陽矣故於前方去桂枝之辛散加白朮之苦燥合附子之大力健行者於以並走皮中而逐水氣亦因勢利導之法也案去桂加白朮之義未得其詳沈云若中虛邪陷逼迫津液偏滲前陰不潤腸間則大便堅小便自利所以去走表之桂枝加白朮安中而生營血津液滋潤腸間之燥耳白朮潤燥恐誤溯源集云濕在裡則小便不利大便反快大便硬則濕不在裡小便利則濕氣已去不須汗泄故去桂枝想風濕之後寒濕之餘氣未盡身體尚疼轉側未便故仍用去桂枝之白朮附子湯也桂枝附子湯方桂枝四兩去皮生薑三兩切附子三枚炮去皮破八片甘草二兩炙大棗十二枚擘上五味以水六升煮取二升去滓分溫三服溯源集云風邪非桂枝不能汗解寒邪非附子不足以溫經非生薑亦不能宣發甘草大棗緩薑附之性助桂枝而行津液也此方乃太陽上篇誤下之後脈促胸滿微惡寒之桂枝去芍藥湯而加附子非汗後遂漏不止之桂枝加附子湯也桂枝附子湯乃去芍藥者故另立一名而無加字桂枝加附子湯乃不去芍藥者即於桂枝全湯中加入故多一加字觀仲景立法處方無不各有深意三因朮附湯治冒雨濕著於肌膚與胃氣相併或腠開汗出因浴得之即於本方加白朮茯苓白朮附子湯方白朮二兩附子一枚半炮去皮甘草一兩炙生薑一兩半切大棗六枚上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳太陽下篇白朮四兩附子三枚甘草二兩生薑三兩大棗十二枚擘外臺同魏云如冒法律改為如蝟不敢從溯源集云即朮附湯也因承上文桂枝附子湯加減故云去桂枝加白朮湯也古方術上無白字故稱朮附湯成本傷寒論誤附桂枝加附子湯後方中用附子二枚古之附子乃山野所生或小於今之種蒔者亦未可為定法恐是後人傳寫之誤以愚意度之當以應用之分兩為度桂枝四兩即宋之一兩八分元則較重於宋今更重矣生薑三兩即宋之八錢附子若用一枚約重一兩二三錢炮過可得乾者三錢半若分三次服亦不為過前人有古方不可治今病之説皆不知古今斤兩不同故也三因生附白朮湯治中風濕昏悶恍惚脹滿身重手足緩縱漐漐自汗失音不語便利不禁於本方乾薑代生薑去大棗曾氏活幼口議云朮附湯治小兒臟腑虛寒泄瀉洞利手足厥冷即本方乾薑代生薑去大棗風濕相搏骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之疼煩成本傷寒論作煩疼沈此陽虛邪盛之證也風濕傷於營衛流於關節經絡之間邪正相搏骨節疼煩掣痛陰血凝滯陽虛不能輕蹺故不得屈伸近之則痛劇也衛陽虛而汗出裡氣不足則短氣而小便不利表陽虛而惡風不欲去衣陽傷氣滯故身微腫然表裡陰陽正虛邪實故用甘朮附子助陽健脾除濕固護而防汗脫桂枝宣行營衛兼去其風乃補中有發不驅邪而風濕自除蓋風濕證須識無熱自汗便是陽氣大虛當先固陽為主喻氏尚論篇云此條復互上條之意而辨其症之較重者痛不可近汗出短氣惡風不欲去衣小便不利或身微腫正相搏之最劇處方氏條辨云或未定之詞身微腫濕外薄也不外薄則不腫故曰或也甘草附子湯方甘草二兩炙附子二枚炮去皮白朮二兩桂枝四兩去皮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者服六七合為妙妙宋版傷寒論作始徐沈作佳徐氏方論云此與桂枝附子湯證同是風濕相搏然後彼以病淺寒多故肢體為風濕所困而患止軀殼之中此則風濕兩勝挾身中之陽氣而奔逸為災故骨節間風入增徑不能屈伸大傷其衛而汗出短氣惡風水亦乘風作勢而身微腫其病勢方欲擾亂於肌表與靜而困者不侔矣此方附子除濕溫經桂枝祛風和營術去濕實衛甘草補諸藥而成斂散之功也溯源集云雖名之曰甘草附子湯實用桂枝去芍藥湯以汗解風邪增入附子白朮以驅寒燥濕也千金腳氣門四物附子湯即是後方云體腫者加防己四兩悸氣小便不利加茯苓三兩既有附子今加生薑三兩三因方名之六物附子湯外臺載古今録驗附子湯即本方三因桂枝附子湯主療同本條即本方太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口前開板齒燥若發其汗則其惡寒甚加溫針則發熱甚數下之則淋甚傷寒論作口開前板齒燥諸家注本亦同宜改傷寒論惡寒甚上無其字玉函脈經作發熱益甚脈經淋上有復字程內經曰先夏至為病溫後夏至為病暑又曰熱病者皆傷寒之類也以其太陽受病與傷寒相似亦令發熱惡寒身重而疼痛也內經曰寒傷形熱傷氣氣傷則氣消而脈虛弱所以弦細芤遲也小便已毛聳者陽氣內陷不能衛外手足亦逆冷也勞動則擾乎陽故小勞身即熱也內經曰因於暑汗煩則喘喝故熱盛則口開口開則前板齒燥也發汗虛其陽則惡寒甚溫針動火邪則發熱甚下之亡津液則淋甚也案此注本於成氏溯源集云太陽中暍而發熱惡寒不云汗出而又不渴是以知其非陽邪獨盛之暍也脈弦則陰邪徑急細則元氣已虛芤則脈空遲則為寒小便已灑灑然毛聳者小便雖通其莖中艱澀可知衛陽已虛惡寒之狀可見乃下焦無火氣化不快於流行也四肢為諸陽之本手足逆冷者是陽虛而氣不達於四肢也凡此皆陰寒無火之脈症也小有勞身即熱者起居動靜間小有勞動即擾動其陽氣而虛邪伏暑即因之而發熱也口開前板齒燥者脈雖弦細芤遲症雖手足逆冷以小勞而鼓動其陽邪身熱而枯燥其津液雖不渴而板齒燥矣若發其汗則衛陽愈虛陽虛則生外寒故惡寒甚若加溫針則火力內攻必反助其暑熱之陽邪故發熱甚邪不在裡而數下之適足以敗壞真陽使下焦愈冷氣化不行小便艱澀而淋甚也喻氏醫門法律云夏月人身之陽以汗而外泄人身之陰以熱而內耗陰陽兩俱不足仲景於中暍禁汗下溫針汗則傷其陽下則傷其陰溫針則引火熱內攻故禁之也而其用藥但取甘寒生津保肺固陽益陰為治此等關係最巨傷寒選録云徐氏曰此條無治法東垣以清暑益氣湯主之所謂發千古之祕也案醫壘元戎黃耆湯治中暍脈弦細芤遲人參白朮黃耆甘草茯苓芍藥生薑各等分正為此條證設東垣方有黃柏專治長夏濕熱之證與本條之證自別太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之傷寒論渴下有也字無白虎加人參湯主之八字以此條揭中暍之首沈本金鑑亦舉之首條玉函脈經無加人參三字沈此言正暑病也邪之傷人無有不從皮毛而入故曰太陽中熱鑑汗出惡寒身熱而渴頗似太陽溫熱之病但溫熱無惡寒以熱從里生故雖汗出而不惡寒也中暍暑邪由表而入故汗出惡寒也究之於渴溫熱之渴初病不過欲飲中暍之渴初病即大引飲也用白虎加人參湯主之者蓋以益氣為主清暑熱次之也李彣曰熱傷氣氣泄則汗出氣虛則惡寒熱蒸肌腠則身熱熱傷津液則作渴此惡寒身熱與傷寒相類然所異者傷寒初起無汗不渴中暍初起即汗出而渴也溯源集云暍者盛夏暑熱中之邪氣也此條先言本證之情形如此而以中熱二字通解暍字之義即內經熱論所謂病暑也王肯堂云中暍中暑中熱名雖不同實一病也謂之暍者暑熱當令之時其氣因暑為邪耳非即夏月暑熱當令之正氣也即熱論所謂後夏至日者為病暑是也暍乃暑熱之邪其氣本熱不待入里故中人即渴也暍為夏至以後之病陽極陰生之後陰氣已長當暑汗大出之時腠理開張衛陽空疏表氣已虛不能勝受外氣故汗出惡寒也是熱邪乘腠理之虛而為暍證也故以白虎加人參湯主之即用石膏以治時令暑熱之邪又加人參以補汗出之表虛添津液而治燥渴也案錢氏辨潔古東垣中暑中熱之誤甚詳然非本條之所幹且文詞繁冗故不載此案淮南人間訓云夫病溫而強之食病暍而飲之寒此衆人之所以為養也可見古溫暍對言也而説文暍傷暑也玉篇中熱也以此推之中暍之中字似贅然而先賢立命必有令人不可思議者宜置而不論焉白虎加人參湯方知母六兩石膏一斤碎太陽上篇有綿裹二字諸本同甘草二兩太陽上篇有炙字諸本同粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服程白虎西方神名也其令為秋其政清肅涼風至白露降則溽暑潛消以此湯有徹暑熱之功行清肅之政故以白虎名之表有熱者散以石膏之辛寒里有熱者降以知母之甘苦熱則氣傷人參用以生津而益氣石膏過於寒涼甘草粳米之甘用以和胃補中共除中熱而解表裡案直指方竹葉石膏湯治伏暑內外熱熾煩躁大渴正是與本條用白虎之證同太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之傷寒論玉函脈經無一物瓜蒂湯主之七字程脈虛身熱得之傷暑此證先中於熱再傷冷水水氣留於腠理皮膚之中則身熱疼重也與瓜蒂湯以散水氣鑑李彣曰中暍邪在表故身熱傷冷水故身疼重暑傷氣氣虛故脈微弱也溯源集云暍症三條有本證變證之不同此條言其變證身熱太陽之證也不言汗出惡寒者邪氣較輕於前也疼重者身體重而疼痛也傷寒則有身疼腰痛骨節疼痛之證而濕家亦有筋骨煩疼一身盡疼關節疼痛之證此以中暑之陽邪而亦有此寒濕之證是或飲冷水或以冷水盥濯水寒留著滲入皮中所致也中暑之脈本虛又以水寒所傷故尤見微弱也論中不立治法而金匱要略有一物瓜蒂湯主之王肯堂云瓜蒂一物散或曰五苓散愚竊以理推之若暑邪盛而表證甚者當以瓜蒂之苦寒上湧下泄使水去而表邪亦去以因吐得汗有發散之義故也若身熱微而表證少但脈微弱而疼重水行皮中者則水寒較勝自當用五苓散使從水道氣化而出可也一物瓜蒂湯方瓜蒂二七個趙本七作十上銼以水一升煮取五合去滓頓服程本草云瓜蒂味苦寒主大水身面四肢浮腫用之以散皮膚水氣苦寒又可勝熱也案此方與證不對恐是錯出傷寒論玉函脈經並不載可以為佐證矣百合狐惑陰陽毒病證治第三論一首證三條方十二首案當十一首論曰百合病者百脈一宗悉致其病也意欲食復不能食常默然欲臥不能臥欲行不能行飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月微見者各隨證治之默然趙本作默默不用聞食臭之用字徐沈作欲微見巢源作復見千金作後見魏快作怏非尤百脈一宗者分之則為百脈合之則為一宗悉致其病則無之非病矣然詳其證意欲食矣而復不能食常默然靜矣而又躁不得臥飲食或有時美矣而復有不用聞食臭時如有寒如有熱矣而又不見為寒不見為熱諸藥不能治得藥則劇吐利矣而又身形如和全是恍惚去來不可為憑之象惟口苦小便赤脈微數則其常也所以者何熱邪散漫未統於經其氣遊走無定故其病亦去來無定而病之所以為熱者則徵於脈見於口與便有不可掩然者矣夫膀胱者太陽之腑其脈上至巔頂而外行皮膚溺時頭痛者太陽乍虛而熱氣乘之也淅然快然則遞減矣夫乍虛之氣溺已即復而熱淫之氣得陰乃解故其甚者必六十日之久諸陰盡集而後邪退而愈其次四十日又其次二十日熱瘥減者愈瘥速也此病多於傷寒熱病前後見之其未病而預見者熱氣先動也其病後四五日或二十日或一月見者遺熱不去也各隨其證以治具如下文案魏氏以此證斷為氣病而今驗之於病者氣病多類此者然下條百合諸方並似與氣病不相干故其説雖甚巧竟難信據千金云傷寒虛勞大病已後不平復變成斯疾其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便堅三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也三十三日當愈各隨其證治之思邈所論如此參之於本條明是百合病別是一種病尤注頗詳故今從之張氏醫通有治百合病醫案一則當參考百合病發汗後者百合知母湯主之千金作百合病已經發汗之後更發者下文例並同尤人之有百脈猶地之有衆水也衆水朝宗於海百脈朝宗於肺故百脈不可治而可治其肺百合味甘平微苦色白入肺治邪氣補虛清熱故諸方悉以之為主而隨證加藥治之用知母者以發汗傷津液故也魏百合病用百合蓋古有百合病之名即因百合一味而瘳此疾因得名也如傷寒論條內云太陽病桂枝證亦病因藥而得名之義也案本草蘇頌云仲景治百合病凡四方病名百合而用百合治之不識其義今得魏注而義自明後世有病名河白者以河白草治之出證治大還即與此同義百合知母湯方百合七枚擘知母三兩切上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服外臺滓別之間有置之一處四字百合病下之後者滑石代赭湯主之外臺滑石上有百合二字尤本仍之魏至下之後不用知母而以滑石代赭湯主之者以重墜之品隨下藥之勢使邪自下泄也用代赭石之澀澀大便也用滑石之滑利小便也徐加之泉水以瀉陽而陰氣自調也滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分溫服外臺滓別間有置一廂三字別作又百合病吐之後者用後方主之鑑百合病不應吐而吐之不解者則虛中以百合雞子湯清而補之也尤本草雞子安五臟治熱疾吐後臟氣傷而病不去用之不特安內亦且攘外也百合雞子湯方百合七枚擘雞子黃一枚上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓納雞子黃攪勻煎五分溫服百合病不經吐下發汗病形如初者百合地黃湯主之鑑百合一病不經吐下發汗病形如初者是謂其病遷延日久而不增減形證如首章之初也以百合地黃湯通其百脈涼其百脈尤此則百合病正治之法也蓋肺主行身之陽腎主行身之陰百合色白入肺而清氣中之熱地黃色黑入腎而除血中之熱氣血既治百脈俱清雖有邪氣亦必自下服後大便如漆則熱除之驗也外臺云大便當出黑沫百合地黃湯方百合七枚擘生地黃汁一升上以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓納地黃汁煎取一升五合分溫再服中病勿更服大便常如漆常趙本作當是徐沈尤並同程如漆地黃汁也案程注親驗之説今從之地黃汁服之必瀉利故云中病勿更服百合病一月不解變成渴者百合洗方主之尤病久不解而變成渴邪熱留聚在肺也單用百合漬水外洗者以皮毛為肺之合其氣相通故也洗已食煮餅按外臺云洗身訖食白湯餅今餺飥也本草粳米小麥併除熱止渴勿以咸豉者恐鹹味耗水而增渴也百合洗方上以百合一升以水一斗漬之一宿以洗身洗已食煮餅勿以鹽豉也總病論云煮餅是切面條湯煮水淘過熱湯漬食之活人書注云煮餅即淡熟麵條也張師正倦遊録云凡以面為食煮之皆謂湯餅百合病渴不瘥者栝蔞牡蠣散主之尤病變成渴與百合洗方而不瘥者熱盛而津傷也栝蔞根苦寒生津止渴牡蠣鹹寒引熱下行不使上爍也栝蔞牡蠣散方栝蔞根牡蠣熬等分上為細末飲服方寸匕日三服百合病變發熱者原注一作發寒熱百合滑石散主之鑑百合病如寒無寒如熱無熱本不發熱今變發熱者其內熱可知也故以百合滑石散主之熱從小便而除矣百合滑石散方百合一兩炙滑石三兩上為散飲服方寸匕日三服當微利者止服熱則除千金一本云治百合病小便赤澀臍下堅急外臺同郭白雲云仲景以藥之百合治百合病與神農經主治不相當千古難曉其義是以孫真人言傷寒雜病自古有之前古名賢多所防禦至於仲景時有神功尋思旨趣莫測其致所以醫人不能鑽仰萬一也然百合之為物豈因治百合之病而後得名哉或是病須百合可治因名曰百合乎少時見先生言以百合湯治一僕病得愈余是時未甚留意不解仔細詳看雖見其似寒似熱似飢似飽欲行欲臥如百合之證又自呼其姓名有終夕不絶聲至醒問之皆云不知豈所謂如有神靈者耶百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆脈經陽法作陰法陰法作陽法沈此治百合病之要法也微邪伏於營衛流行而病表裡當分陰陽以施救治可也鑑百合一病難分陰陽表裡故以百合等湯主之若病見於陰者以溫養陽之法救之見於陽者以涼養陰之法救之即下文見陽攻陰或攻陰之後表仍不解復發其汗者此為逆見陰攻陽或攻陽之後里仍不解乃復下之者此亦為逆也徐內經所謂用陰和陽用陽和陰即是此義故諸治法皆以百合為主至病見於陽加一二味以和其陰病見於陰加一二味以和其陽案千金云百合病見在於陰而攻其陽則陰不得解也復發其汗為逆也見在於陽而攻其陰則陽不能解也復下之其病不愈文異意同狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面乍赤乍黑乍白蝕於上部則聲喝原注一作嗄甘草瀉心湯主之巢源作目攣不得閉外臺作目瞑不得眠為狐之下巢源外臺有狐惑之病並五字其面目外臺無目字脈經千金外臺並無甘草二字然方則載甘草瀉心湯巢源外臺喝作嗄案字書喝於遏切音餲嘶聲嗄先齊切音西聲破曰嗄程此證因傷寒而變斯疾故初得猶狀傷寒病後猶腸胃空虛而有熱則蟲上下作蟲上作則蝕咽喉為惑蟲下作則蝕二陰為狐靈樞經曰蟲動則令人悗心是以起臥不安雖默默欲眠而目不得閉蟲聞食臭則求食故惡聞食臭而不欲飲食也蟲動胃虛則面目之色無定是以乍赤乍黑乍白也徐毒盛在上蝕於喉為惑謂熱淫如惑亂之氣感而生惑也毒偏在下侵蝕於陰為狐謂柔害而幽隱如狐性之陰也蝕者若有食之而不見其形如日月之蝕也尤狐惑蟲病即巢氏所謂𧈟病也蓋雖蟲病而能使人惑亂而狐疑故曰狐惑至生蟲之由則趙氏所謂濕熱停久蒸腐氣血而成瘀濁於是風化所腐而成蟲者當矣甘草瀉心不特使中氣運而濕熱自化抑亦苦辛雜用足勝殺蟲之任鑑狐惑牙疳下疳等瘡之古名也近時惟以疳呼之下疳即狐也蝕爛肛陰牙疳即惑也蝕咽腐齦脫牙穿腮破唇每因傷寒病後餘毒與濕𧈟之為害也或生斑疹之後或生癖疾下利之後其為患亦同甘草瀉心湯必傳寫之誤也姑存之醫説云古之論疾多取像取類使人易曉以時氣聲嗄咽乾欲睡復不安眠為狐惑以狐多疑惑也郭白雲云狐惑𧈟病多因醫者汗吐下太過又利小便重亡津液熱毒內攻臟腑焦枯蟲不得安故上下求食亦有不發汗內熱焦枯而成者凡人之喉及陰肛比他肌肉津潤故蟲緣津潤而食之𧈟病又不止因傷寒而成多自下感或居濕地或下利久而得當於𧈟中求之案此説極是但至言蟲不得安上下求食豈有此理蝕是蝕爛之義濕熱鬱蒸所致非蟲實食喉及肛之謂也甘草瀉心湯方甘草四兩案據傷寒論當有炙字黃芩人參乾薑各三兩半夏半升案趙本作半斤非黃連一兩大棗十二枚案據傷寒論當有擘字上七味水一斗煮取六升去滓再煎溫服一升日三服案據傷寒論味下脫以字三服下外臺有兼療下利不止心中愊愊堅而嘔腸中鳴者方十八字案竇氏瘡瘍全書李氏醫學入門並用三黃瀉心湯蓋因脈經單作瀉心湯耶三黃瀉心湯吐衄篇稱瀉心湯蝕於下部則咽乾苦參湯洗之巢源干下有此皆由濕毒氣所為也九字蝕於肛者雄黃熏之千金外臺肛下有外字程本黃下有散字雄黃上一味為末筒瓦二枚合之燒向肛熏之原注脈經云病人或從呼吸上蝕其咽或從下焦蝕其肛陰蝕上為惑蝕下為狐狐惑病者豬苓散主之徐程刪此注徐下部毒盛所傷在血而咽乾喉屬陽咽屬陰也藥用苦參熏洗以去風清熱而殺蟲也蝕於肛則不獨隨經而上侵咽濕熱甚而糜爛於下矣故以雄黃熏之雄黃之殺蟲去風解毒更力也苦參湯方原本缺徐沈尤本及金鑑所載如下苦參一升以水一斗煎取七升去滓熏洗日三服案尤本金鑑並無服字是苦參湯方徐熔附遺云以龐安時傷寒總病論補之程同苦參半斤槐白皮狼牙根各四兩上銼以水五升煎三升半洗之案二方未知何是然以理推之用苦參一味為佳用苦參一味治齲齒見於史記倉公傳亦取乎清熱殺蟲脈經所載豬苓散樓氏綱目云未考案證類豬苓條圖經云黃疸病及狐惑病並豬苓散主之豬苓茯苓等分杵末每服方寸匕水調下蓋此方也病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥原注一本此有黃字黑若能食者膿已成也赤小豆當歸散主之玉函脈經作目四眥皆黃總病論眥作周鑑數主瘡主熱今外無身熱而內有瘡熱瘡之熱在於陰故默默但欲臥也熱在於陽故微煩汗出也然其病初得之三四日目赤如鳩眼者是熱蘊於血故眥絡赤也七八日四眥皆黑者是熱瘀血腐故眥絡黑也若不能食其毒尚伏諸里若已能食其毒已化成膿也程能食者邪氣散漫不在臟腑而在陰肛爛肉腐肌而成膿矣尤按此一條注家有目為狐惑病者有目為陰陽毒者要之亦是濕熱蘊毒之病其不腐而為蟲者積而為癰不發於身面者則發於腸臟亦病機自然之勢也仲景意謂與狐惑陰陽毒同源而異流者故特論列於此歟赤小豆當歸散方赤小豆三升浸令芽出曝乾當歸十兩案原本缺兩數今依宋本及俞本補之千金作三兩徐熔附遺引龐安時當歸一兩上二味杵為散漿水服方寸匕日三服程當歸主惡瘡瘍赤小豆主排癰腫漿水能調理臟腑三味為治癰膿已成之劑此方蝕於肛門者當用之按後先血後便此近血也亦用此湯以大腸肛門本是一源病雖不同其解臟毒則一也漿酢也炊粟米熱投冷水中浸五六日生白花色類漿者案漿水法出本草蒙筌張氏醫通云此方治腸癰便毒及下部惡血諸疾陽毒之為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之脈經無鱉甲二字陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲湯去雄黃蜀椒主之肘後七日不可治作過此死三字脈經千金升麻以下十字作甘草湯三字尤毒者邪氣蘊蓄不解之謂陽毒非必極熱陰毒非必極寒邪在陽者為陽毒邪在陰者為陰毒也而此所謂陰陽者亦非臟腑氣血之謂但以面赤斑斑如錦紋咽喉痛唾膿血其邪著而在表者謂之陽面目青身痛如被杖咽喉痛不唾膿血其邪隱而在表之裡者謂之陰耳故皆得辛溫升散之品以發其蘊蓄不解之邪而亦並用甘潤鹹寒之味以安其邪氣經擾之陰五日邪氣尚淺發之猶易故可治七日邪氣已深發之則難故不可治其蜀椒雄黃二物陽毒用之者以陽從陽欲其速散也陰毒去之者恐陰邪不可劫而陰氣反受損也沈陰毒者非陰寒之陰即陰血受寒為陰而血凝不散故成陰毒後人不解其義視為陰寒直中變為陰毒擬用霹靂散正陽丹案徐程注意並如是皆是未入仲景藩籬耳惟元時王安道辨非陰寒直中案出溯洄集可謂言直理正惜其又云天地惡毒異氣混淆未明使後人無所措手案金鑑本於王氏之言遂云陰毒陽毒即今世俗所稱痧證陰毒反去雄黃蜀椒必傳寫之訛故治是證者不必問其陰陽但刺其尺澤委中手中十指脈絡暴出之處出血輕則用刮痧法隨即服紫金錠此説亦叵從升麻鱉甲湯方升麻二兩當歸一兩蜀椒炒去汗一兩甘草二兩鱉甲手指大一片炙雄黃半兩研上六味以水四升煮取一升頓服之老小再服汗原注肘後千金方陽毒用升麻湯無鱉甲有桂陰毒用甘草湯無雄黃案四升肘後作五升一升玉函肘後作二升似是蘭臺軌範云蜀椒辛熱之品陽毒用而陰毒反去之疑誤活人書加犀角等四味頗切當董氏醫級云此湯兼治陽毒陰毒二症陽毒用此方治療陰毒亦以此方去雄黃倍川椒為治以陰毒不吐膿血故去雄黃陰盛則陽衰故倍川椒也大抵亢陽之歲多陽毒流衍之紀多陰毒也但每遇此症按法施治曾無一驗凡遇此證多以不治之證視之百歲老人袁雲龍曰細詳此二證俱有咽喉痛三字竊論瘍科書有鎖喉風纏喉風鐵蛾纏三證其狀相似有面色赤如斑者有面色悽慘而青黑者有吐膿血者有身痛如杖有氣喘息促譫語煩躁者總以咽喉痹痛為苦一髮之間三五日不減即無生理豈非陽毒陰毒之類乎再詳其脈緩大者生細促者死豫見此二症先用咽喉科利痰方治之全活甚衆案巢源云夫欲辨陰陽毒病者始得病時可看手足指冷者是陰不冷者是陽又云陽毒者面目赤或便膿血陰毒者面目青而體冷若發赤斑十生一死若發黑斑十死一生千金亦云陽毒狂言或走或見鬼或吐血下利其脈浮大數陰毒短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數由此觀之陽毒乃不得不用活人陽毒升麻湯及化斑湯之屬即後世所謂陽斑也陰毒乃不得不用龐氏附子飲霹靂散正陽丹之類即後世所謂陰斑也而以升麻鱉甲湯一方主之者可疑董氏無一驗之説覺不誣矣瘧病脈證並治第四證二條方六首師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之瘥弦遲者可溫之弦緊者可發汗針灸也浮大者可吐之弦數者風發也以飲食消息止之弦緊下脈經有數字風發外臺作風疾程內經曰痎瘧皆生於風其蓄作有時者何也岐伯曰瘧之始發也先起於毫毛伸欠乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱渴欲飲水方其寒湯火不能溫及其熱冰水不能寒此陰陽交爭虛實並作邪舍於營衛之間風寒之氣不常故休作有時而作往來寒熱也木鬱則發熱熱則脈數此邪氣微者故以飲食消息止之經曰五臟病各有得者愈五臟病各有所惡各隨其不喜者為病遂其喜惡而消息之則瘧自止上説如此後並無汗吐下溫針灸之法去古既遠文多簡略不可考矣徐瘧者半表裡病而非驟發之外病也故內經曰夏傷於暑秋必痎瘧又曰在皮膚之內腸胃之外唯其半表裡則脈必出於弦弦者東方甲木之氣經屬少陽故曰瘧脈自弦自者謂感有風寒而脈唯自弦也於是脈既有一定之象而兼數為熱兼遲為寒此其大綱也尤瘧者少陽之邪弦者少陽之脈有是邪則有是脈也然瘧之舍固在半表半裡之間而瘧之氣則有偏多偏少之異故其病有熱多者有寒多者有里多而可下者有表多而可汗可吐者有風從熱出而不可以藥散者當各隨其脈而施治也徐氏曰脈大者為陽小者為陰緊雖寒脈小緊則內入而為陰矣陰不可從表散故曰下之愈遲既為寒溫之無疑弦緊不沉為寒脈而非陰脈非陰故可發汗針灸也瘧脈概弦而忽浮大知邪在高分高者引而越之故可吐既云弦數者多熱矣而復申一義云弦數者風發見多熱不已必至於極熱熱極則生風風生則肝木侮土而傳其熱於胃坐耗津液此非徒求之藥須以飲食消息止其熾熱即梨汁蔗漿生津止渴之屬正內經風淫於內治以甘寒之旨也案風發以飲食消息止之其義未清晰姑舉二氏之説以備考金鑑云弦小緊者之小字當是沉字則有可下之理弦緊者當是弦浮緊則有可發汗之理弦浮大者當是弦滑大則有可吐之理且不遺本文瘧脈自弦之意此説不必矣徐尤之注義自允當病瘧以月一日發當以十五日愈設不瘥當月盡解如其不瘥當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎圓脈經自病瘧止師曰此三十字無結上有瘧疾二字無急治之三字趙本圓作丸下並同程五日為一候三候為一氣一氣十五日也夫人受氣於天氣節更移營衛亦因之以易故交一節氣當愈不愈者再易一氣故云月盡解也尤設更不愈其邪必假血依痰結為癥瘕僻處脅下將成負固不服之勢故宜急治鱉甲煎丸行氣逐血之藥頗多而不嫌其峻一日三服不嫌其急所謂乘其未集而擊之也魏寒熱雜合之邪在少陽而上下格阻之氣結厥陰聚肝下之血分而實為瘧病之母氣足於生瘧而不已此所陰陽互盛歷月經年而病不除也蓋有物以作患於裡如草樹之有根荄必須急為拔去不然旋伐旋生有母在焉未有不滋蔓難圖者矣案玉篇痗莫厚切病痗癖也乃瘧母之母從疒者三因云結為癥癖在腹脅名曰老瘧亦名曰母瘧鱉甲煎丸方外臺作大鱉甲煎引張仲景傷寒論云出第十五卷中鱉甲十二分炙千金作成死鱉注云要略作鱉甲三兩烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾薑三分大黃三分芍藥五分桂枝三分葶藶一分熬石韋三分去毛厚朴三分牡丹五分去心瞿麥二分紫葳三分半夏一分人參一分蟅蟲五分熬阿膠三分炙蜂窠四分炙赤硝十二分蜣螂六分熬桃仁二分上二十三味為末取鍛灶下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁納諸藥煎為丸如梧子大空心服七丸日三服原注千金方用鱉甲十二片又有海藻三分大戟一分蟅蟲五分無鼠婦赤硝二味以鱉甲煎和諸藥為丸案今考千金無鼠婦紫葳赤硝有虻蟲紫菀海藻大戟凡二十四味分兩頗異不繁引於此浸灰候酒盡一半作以酒浸灰去灰取酒似是程瘧母者邪氣內搏於臟腑血氣羈留而不行息而成積故內結癥瘕而外作往來寒熱內經曰堅者削之結者行之以鱉甲主癥瘕寒熱故以為君邪結於血分者用大黃芍藥蟅蟲桃仁赤硝牡丹鼠婦紫葳攻逐血結為臣邪結於氣分者厚朴半夏石韋葶藶瞿麥烏羽蜂房蜣螂下氣利小便以為佐調寒熱和陰陽則有黃芩乾薑通營衛則有桂枝柴胡和氣血則有阿膠人參六味又用之以為使也結得溫即行灶灰之溫清酒之熱所以制鱉甲同諸藥而逐癥瘕瘧母內經曰治有緩急方有大小此急治之大方也案烏扇即射干見本經千金作烏羽赤硝活人書云硝石生於赤山考本草射干散結氣腹中邪逆鼠婦治月閉血瘕寒熱石韋治勞熱邪氣利水道紫葳治癥瘕血閉寒熱瞿麥利小便下閉血蜂窠治寒熱邪氣蜣螂治腹脹寒熱利大小便蟅蟲治血積癥瘕破堅煅灶灰即煅鐵灶中灰爾亦主癥瘕堅積此方合小柴胡桂枝大承氣三湯去甘草枳實主以鱉甲更用以上數品以攻半表之邪半里之結無所不至焉然三因云古方雖有鱉甲煎等不特服不見效抑亦藥料難備此説殆有理焉師曰陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消鑠肌肉肌趙本作脫案素問瘧論曰但熱而不寒氣內藏於心而外舍於分肉之間令人消鑠脫肉則趙本為是程疸熱也內經曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒客於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒此肺素有熱而成疸瘧也今所云陰氣孤絶者以熱邪亢盛熱盛則氣消故煩冤少氣表裡俱病今手足熱而欲嘔心陽臟也心惡熱邪氣內藏於心外舍於分肉之間內外燔灼故令人消鑠肌肉此熱藏於心而為疸瘧也然則疸瘧之所舍屬心肺兩經者歟溫瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之嘔下千金有朝發暮解暮發朝解名溫瘧十一字程內經曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏之腎其氣先從內出之外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧今但熱不寒則與疸瘧無異意者內經以先熱後寒為溫瘧仲景以但熱不寒為溫瘧也脈如平非平也其氣不及於陰故但熱無寒邪氣內藏於心故時嘔外舍於肌肉故骨節疼煩今陽邪偏勝但熱無寒加桂枝於白虎湯中引白虎辛寒而出入營衛制其陽邪之亢害尤脈如平者病非乍感故脈如其平時也骨節煩疼時嘔者熱從腎出外舍於其合而上並於陽明也白虎甘寒除熱桂枝則因其勢而達之耳白虎加桂枝湯方知母六兩甘草二兩炙石膏一斤粳米二合案千金作六合據傷寒論作六合為是桂去皮三兩俞本作桂枝是上銼每五錢水一盞半煎至八分去滓溫服汗出愈俞本出下有即字案徐沈作上五味以水一斗煮米熟湯成去滓溫服一升日三服一云上銼每五錢水盞半煎至八分去滓溫取汗出愈尤本依前法此蓋古之煎法其云錢云盞繫於宋人改定千金云上四味㕮咀以水一斗二升煮米爛去滓加桂枝三兩煎取三升分三服覆令汗先寒發熱者愈外臺引千金方後傷寒論云用粃粳米不熟稻米是也案聖濟總録知母湯治溫瘧骨節疼痛時嘔朝發暮解暮發朝解即本方活人白虎加蒼朮湯治濕溫多汗於白虎湯中加蒼朮三兩此方出傷寒微旨亦仿金匱白虎加桂湯瘧多寒者名曰牡瘧蜀漆散主之程作牝瘧金鑑同尤瘧多寒者非真寒也陽氣為痰飲所遏不得外出肌表而但內伏心間心牡臟也故名牡瘧蜀漆吐瘧痰痰去則陽伸而寒愈取雲母龍骨者以蜀漆上越之猛恐並動心中之神與氣也案尤注詳備第牡瘧之解本於喻氏法律此恐非也外臺引本條云張仲景傷寒論瘧多寒者名牝瘧吳氏醫方考云牝陰也無陽之名故多寒名牝瘧此説得之金鑑云此言牝瘧其文脫簡內經已詳不復釋今考內經無牝瘧證亦誤蘭臺軌範云似當作牝字諸本皆作牡存考蜀漆散方蜀漆洗去腥案趙本洗作燒非雲母燒二日夜龍骨等分上三味杵為散未發前以漿水服半錢溫瘧加蜀漆半分臨發時服一錢匕原注一方雲母作雲實漿水千金作酢漿外臺作清漿水尤本刪溫瘧以下十四字千金注云要略不用雲母用雲實程蜀漆常山苗也得漿水能吐瘧之頑痰三陰者其道遠故於未發之先服令藥入陰分以祛其邪屬心肺者其道近故於臨發之時服令藥力入心肺以祛其邪此方乃吐頑痰和陰陽之劑故牝瘧溫瘧俱可服醫通云方後有云濕瘧加蜀漆半分而坊本誤作溫瘧大謬此條本以邪伏髓海謂之牝瘧趙以德不辨亥豕注為邪在心而為牡喻嘉言亦仍其誤而述之非智者之一失歟案危氏得效方云寒熱身重煩疼脹滿名濕瘧丹溪纂要云在三陰總謂之濕瘧濕瘧之稱古經方無所考僅見於此則其言不可從況邪伏髓海之説未見所據仁齋直指云凡瘧方來與正發不可服藥服藥在於未發兩時之先否則藥病交爭轉為深害案以未發前服之語觀之即是後世所謂截瘧之藥也外臺載廣濟常山湯常山三兩以漿水三升浸經一宿煎取一升欲發前頓服之後微吐瘥止與本方其意殆同矣附外臺祕要方程本金鑑並不載附方以下各篇同牡蠣湯治牡瘧牡蠣四兩熬麻黃去節四兩甘草二兩蜀漆三兩外臺云若無用常山代之上四味以水八升先煮蜀漆麻黃去上沫得六升納諸藥煮取二升溫服一升若吐則勿更服尤案此係宋孫奇等所附蓋亦蜀漆散之意而外攻之力較猛矣趙氏云牡蠣軟堅消結麻黃非獨散寒且可發越陽氣使通於外結散陽通其病自愈外臺云仲景傷寒論牝瘧多寒者名牝瘧牡蠣湯主之依此則牡即牝之訛此方外臺列於蜀漆散前云並出第十五卷中柴胡去半夏加栝蔞湯治瘧病發渴者亦治勞瘧柴胡八兩人參黃芩甘草各三兩栝蔞根四兩生薑二兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日二服徐傷寒論寒熱往來為少陽邪在半表裡故也瘧邪亦在半表裡故入而與陰爭則寒出而與陽爭則熱此少陽之象也是謂少陽而兼他經之證則有之謂他經而全不涉少陽則不成其為瘧矣所以小柴胡亦為治瘧主方渴易半夏加栝蔞根亦治少陽成法也攻補兼施故亦主勞瘧外臺云張仲景傷寒論瘧發渴者與小柴胡去半夏加栝蔞湯經心録療勞瘧出第十五卷中案巢源勞瘧候云凡瘧積久不瘥者則表裡俱虛客邪未散真氣不復故疾雖暫間小勞便發柴胡桂薑湯治瘧寒多微有熱或但寒不熱原注服一劑如熱俞本薑作蔞非柴胡半斤桂枝三兩去皮乾薑二兩栝蔞根四兩黃芩三兩牡蠣二兩熬甘草二兩炙上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈徐胸中之陽氣散行於分肉之間今以邪氣痹之則外衛之陽鬱伏於內守之陰而血之痹者既寒凝而不散遇衛氣行陽二十五度而病發其邪之入營者既無外出之熱而營之素痹者亦不出而與陽爭所以多寒少熱或但寒不熱也小柴胡本陰陽兩停之方寒多故加桂枝幹薑則進而從陽痹著之邪可以開矣更加牡蠣以軟其堅壘則陰陽豁然貫通而大汗解矣所以云一劑如神案栝蔞根除留熱徐氏不釋者何案此方外臺瘧門無所考本出於傷寒太陽中篇醫通云小柴胡湯本陰陽兩停之方可隨瘧之進退加桂枝幹薑則進而從陽若加栝蔞石膏則退而從陰可類推矣中風歷節病脈證並治第五論一首脈證三條方十二首夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然鑑風病內經論之詳矣但往往與痹合論後人惑之故仲景復言之曰風之為病當半身不遂即經所謂偏枯也或但臂不遂者非中風也即痹病也蓋痹為陰病脈多沉澀風為陽病脈多浮緩今脈微而數中風使然其脈微者正氣虛也數者邪氣勝也故病風中之人因虛而召風者未有不見微弱之脈者也因熱而生風者未有不見數急之脈者也沈此分中風與痹也風之為病非傷於衛即侵於榮故當半身不遂謂半身之氣傷而不用也若但臂不遂此為痹痹者閉也謂一節之氣閉而不仁也於是診之於脈必微而數微者陽之微也數者風之數也此中風使然謂風乘虛入而後使半身不遂也尤風徹於上下故半身不遂痹閉於一處故但臂不遂以此見風重而痹輕風動而痹著也風從虛入故脈微風發而成熱故脈數曰中風使然者謂痹病亦是風病但以在陽者則為風而在陰者則為痹耳案字彙遂從志也不遂即不從志之謂案脈微而數可疑今驗風病多脈浮大而滑而或數或不數醫通云此即內經風論所謂各入其門戶所中者之一證也千金補金匱之不逮立附子散治中風手臂不仁口面喎僻專以開痹舒筋為務也方附於下千金附子散附子炮桂心各五兩細辛防風人參乾薑各六兩上六味搗下篩酒服方寸匕日三稍增之寸口脈浮而緊緊則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口吐涎脈經作淤涎案以上四字句此似是尤寒虛相搏者正不足而邪乘之為風寒初感之診也浮為血虛者氣行脈外而血行脈中脈浮者沉不足為血虛也血虛則無以充灌皮膚而絡脈空虛並無以捍禦外氣而賊邪不瀉由是或左或右隨其空處而留著矣邪氣反緩正氣即急者受邪之處筋脈不用而緩無邪之處正氣獨治而急緩者為急者所引則口目為僻而肢體不遂是以左喎者邪反在右右喎者邪反在左然或左或右則有邪正緩急之殊而為表為里亦有經絡臟腑之別經云經脈為里支而橫者為絡絡之小者為孫是則絡淺而經深絡小而經大故絡邪病於肌膚而經邪病連筋骨甚而入腑又甚而入臟則邪遞深矣蓋神藏於臟而通於腑腑病則神窒於內故不識人諸陰皆連舌本臟氣厥不至舌下則機息於上故舌難言而涎自出也沈喎僻者邪犯陽明少陽經絡口眼歪斜是也不遂者半身手足不用也周身之絡皆在肌肉皮膚之間風邪痹於絡脈氣血不行則為不仁羈持經氣不能周行通暢則重不勝邪入於腑堵塞胸間神機不能出入鑑照則不識人入於五臟並湊於心臟真不能溉灌於舌舌即難言魏喎僻不遂口喎眼僻心有所使而能給則心遂今舉手手不應舉足足不應故謂之不遂也程不識人者經所謂矇昧暴喑此邪入腑則矇昧不識人入臟則舌難言而為喑矣舌難言則唇吻不收而涎下也案喎僻不遂內經所謂偏風偏枯巢源有風口喎候又有風偏枯風身體手足不隨風半身不隨等候即外臺以降所謂癱瘓風也肌膚不仁巢源有風不仁候云其狀搔之皮膚如隔衣是也重不勝巢源有風腲腿候云四肢不收身體疼痛肌肉虛滿骨節懈怠腰腳緩弱不自覺知又有風嚲曳候云筋肉懈惰肢體弛緩不收攝蓋此之類也不識人內經所謂擊僕巢源有風癔候云其狀奄忽不知人喉里噫噫然有聲即卒中急風是也詳見於醫説劉子儀論舌難言內經所謂喑痱巢源有風舌強不得語候云脾脈絡胃夾咽連舌本散舌下心之別脈系舌本今心脾二臟受風邪故舌強不得語也由以上數義觀之正知此條乃是中風諸證之一大綱領也張璐則以侯氏黑散主之誤甚侯氏黑散治大風四肢煩重心中惡寒不足者原注外臺治風癲菊花四十分白朮十分細辛三分茯苓三分牡蠣三分桔梗八分防風十分人參三分礬石三分黃芩五分當歸三分乾薑三分芎藭三分桂枝三分上十四味杵為散酒服方寸匕日一服初服二十日溫酒調服禁一切魚肉大蒜常宜冷食六十日止即藥積在腹中不下也熱食即下矣冷食曰能助藥力六十日止即藥積七字趙本作自能助藥力五字非食下曰字趙本作自是徐大風概指涎浙卒倒之後也沈直侵肌肉臟腑故為大風邪困於脾則四肢煩重陽氣虛而風未化熱則心中惡寒不足故用參朮茯苓健脾安土同乾薑溫中補氣以菊花防風能驅表裡之風芎藭宣血養血為助桂枝導引諸藥而開痹著以礬石化痰除濕牡蠣收陰養正桔梗開提邪氣而使大氣得轉風邪得去黃芩專清風化之熱細辛祛風而通心腎之氣相交以酒引群藥至周身經絡為使也案此方主療文法與前後諸條異先揭方名而後治云云者全似後世經方之例故程氏尤氏金鑑並云宋人所附然巢源寒食散發候云仲景經有侯氏黑散外颱風癲門載本方引古今録驗無桔梗有鍾乳礬石方後云張仲景此方更有桔梗八分無鍾乳礬石乃知此方隋唐之人以為仲景方則非宋人所附較然矣又案依外臺方中有礬石鐘乳而後方云冷食自能助藥力後人因謂仲景始制五石散信乎寸口脈遲而緩遲則為寒緩則為虛營緩則為亡血衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中則胸滿而短氣中經沈本作入經尤遲者行之不及緩者至而無力不及為寒而無力為虛也沉而緩者為營不足浮而緩者為衛中風衛在表而營在裡也經不足而風入之血為風動則身癢而癮疹心不足而風中之陽用不布則胸滿而短氣經行肌中而心處胸間也沈營衛未致大虛邪氣不能內入持於經絡風血相搏風邪主病則發身癢癮疹邪機外出之徵若心氣不足正不御邪進而擾亂於胸大氣不轉津液化為痰涎則胸滿短氣蓋賊風內入最怕入心乘胃而成死證案遲者數之反緩者急之反金鑑改遲作浮雲遲緩二脈不能並見必是傳寫之訛此卻非也醫方集成云有中之輕者在皮膚之間言語微蹇眉角牽引遍身瘡癬狀如蟲行目旋耳鳴亦謂邪氣中經也風引湯除熱癱癇大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各三兩寒水石滑石赤石脂白石脂紫石英石膏各六兩上十二味杵粗篩以韋囊盛之取三指撮井花水三升煮三沸溫服一升原注治大人風引少小驚癇瘛瘲日數十發醫所不療除熱方巢氏云腳經宜風引湯案巢源腳經候云脈微而弱宜服風引湯尤此下熱清熱之劑孫奇以中風多從熱起故特附於此歟中有薑桂石脂龍蠣者蓋以澀馭泄以熱監寒也然亦猛劑用者審之案此方亦非宋人所附外颱風癇門引崔氏甚詳云療大人風引少小驚癇瘛瘲日數十發醫所不能療除熱鎮心紫石湯方與本方同上十二味搗篩盛以韋囊置於高涼處大人欲服乃取水二升先煮兩沸便納藥方寸匕又煮取一升二合濾去滓頓服之少小未滿百日服一合熱多者日二三服每以意消息之永嘉二年大人小兒頻行風癇之病得發例不能言或發熱半身掣縮或五六日或七八日死張思惟合此散所療皆愈此本仲景傷寒論方古今録驗範汪同千金風癲門紫石散即本方主療服法並同由此觀之風引即風癇掣引之謂而為仲景之方甚明程氏尤氏輩亦何不考也但除熱癱癇四字義未允劉氏幼幼新書作除熱去癱癇樓氏綱目作除熱癲癇王氏準繩同其改癱作癲於理為得矣汪氏醫方集解云侯氏黑散風引湯喻氏雖深贊之亦未知其果當以此治風而獲實驗乎抑亦門外之揣摩云爾也防己地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防己一分桂枝三分防風三分甘草一分趙本分並作錢非上四味以酒一杯漬之一宿絞取汁生地黃二斤㕮咀蒸之如斗米飯久以銅器盛其汁更絞地黃汁和分再服尤趙氏云狂走譫語身熱脈大者屬陽明也此無寒熱其脈浮者乃血虛生熱邪並於陽而然桂枝防風防己甘草酒浸取汁用是輕清歸之於陽以散其邪用生地黃之甘寒熟蒸使歸於陰以養血除熱蓋藥生則散表熟則補衰此煎煮法亦表裡法也蘭臺軌範云此方他藥輕而生地獨重乃治血中之風也此等法最宜細玩案此方程氏金鑑並不載蓋以為宋人所附也未知果然否千金風眩門所收卻似古之制今録於下以備考防己地黃湯治言語狂錯眼目霍霍或言見鬼精神昏亂防己甘草各二兩桂心防風各三兩生地黃五斤別切勿合藥漬疾小輕用二斤上五味㕮咀以水一升漬一宿絞汁著一面取滓著竹簀上以地黃著藥滓上於五鬥米下蒸之以銅器承取汁飯熟以向前藥汁合絞取之分再服頭風摩散方千金作頭風散方大附子一枚炮千金雲中形者炮裂鹽等分千金作如附子大上二味為散沐了以方寸匕已摩疢上令藥力行已徐沈作以尤本無疢趙本作疾千金無已字疢作頂案本草藏器云鹽去皮膚風此方外臺引千金程氏金鑑併為宋人附方是三因附子摩頭散治因沐頭中風多汗惡風當先風一日而病甚頭痛不可以出至日則少愈名曰首風即本方寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節黃汗出故曰歷節程聖濟總録曰歷節風者由血氣衰弱為風寒所侵血氣凝澀不得流通關節諸筋無以滋養真邪相搏所歷之節悉皆疼痛或晝靜夜發痛徹骨髓謂之歷節風也節之交三百六十五十二筋皆結於骨節之間筋骨為肝腎所主今肝腎並虛則脈沉弱風邪乘虛淫於骨節之間致腠理疏而汗易出汗者心之液汗出而入水浴則水氣傷心又從流於關節交會之處風與濕相搏故令歷節黃汗而疼痛也鑑趙良曰腎主水骨與之合故脈沉者病在骨也肝藏血筋與之合血虛則脈弱故病在筋也心主汗汗出入水其汗為水所阻水汗相搏聚以成濕久變為熱濕熱相蒸是以歷節發出黃汗也尤案後水氣篇中雲黃汗之病以汗出入水中浴水從汗孔入得之合觀二條知歷節黃汗為同源異流之病其瘀郁上焦者則為黃汗其並傷筋骨者則為歷節也案寸口脈沉以下止即為肝二十二字脈經移於下文味酸則傷筋之首文脈貫通旨趣明顯蓋古本當如是矣趺陽脈浮而滑滑則穀氣實浮則汗自出沈此診趺陽則知胃家內濕招風為病也趺陽脈浮浮為風邪入胃滑為水穀為病此顯脈浮而滑者乃素積酒谷濕熱招風為穀氣實然內濕外風相蒸風熱外越津液隨之故汗自出也程亦歷節之脈少陰脈浮而弱弱則血不足浮則為風風血相搏即疼痛如掣程少陰腎脈也疹在太溪若脈浮而弱弱則血虛虛則邪從之故令浮弱風血相搏則邪正交爭於筋骨之間則疼痛如掣尤趺陽少陰二條合看知陽明穀氣盛者風入必與汗偕出少陰血不足者風入遂著而成病也盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致自原本作血今依諸本改之魏盛人者肥盛而豐厚之人也外盛者中必虛所以肥人多氣虛也氣虛必短氣氣虛必多汗汗出而風入筋骨之間遂歷節疼痛之證見矣尤緣酒客濕本內積而汗出當風則濕復外郁內外相召流入關節故歷節痛不可屈伸也合三條觀之汗出入水者熱為濕鬱也風血相搏者血為風動也飲酒汗出當風者風濕相合也歷節病因有是三者不同其為從虛所得則一也諸肢節疼痛身體鬼王羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之鬼王趙本作尪沈尤金鑑同魏作鬼王案此當作尪脈經作瘣瘰非魏濕熱在體風邪乘之而歷節成矣於是掣痛之勢如脫甚不可奈濕上甚而為熱熱上甚而引風風上甚而耗氣衝胸頭眩短氣溫溫欲吐皆風邪熱邪濕邪合為患者也主之以桂枝芍藥知母湯以桂枝防風麻黃生薑之辛燥治風治濕白朮甘草之甘平補中芍藥知母之酸寒苦寒生血清熱是風濕熱三邪併除之法也其間加附子走濕邪於經隊中助麻桂為驅逐非以溫經也況此方乃通治風濕熱三邪之法非專為瘦人出治也肥人平日陽虛於內者多非扶助其陽氣則邪之入筋骨間者難於輕使之出用附子於肥人尤所宜也勿嫌其辛溫而云不可治血虛內熱之證也瘦人陰虛火盛之甚加芍藥減附子又可臨時善其化裁矣案歷節即痹論所謂行痹痛痹之類後世呼為痛風丹溪有痛風論見於格致餘論知是元以降之稱三因直指稱白虎歷節風是也白虎病見於外臺引近效云其疾晝靜而夜發發即徹髓痠疼乍歇其疾如虎之齧故曰白虎病此即歷節風也而別為一證恐非蓋風寒濕三氣雜至合而所發痛久則邪盛正弱身體即尪羸也痹氣下注腳腫如脫上行則頭眩短氣擾胃則溫溫欲吐表裡上下皆痹故其治亦雜揉桂麻防風發表行痹甘草生薑和胃調中芍藥知母和陰清熱而附子用知母之半行陽除寒白朮合於桂麻則能祛表裡之濕而生薑多用以其辛溫又能使諸藥宣行也與越婢加朮附湯其意略同沈氏則謂脾胃肝腎俱虛非也溫溫金鑑改作嗢嗢不必然詳見於傷寒論證義桂枝芍藥知母湯方桂枝四兩芍藥三兩甘草二兩麻黃二兩生薑五兩白朮五兩知母四兩防風四兩附子二兩炮二兩趙作一枚上九味以水七升煮取二升溫服七合日三服案千金外臺防風湯七升作一斗二升作三升外臺古今録驗防風湯主身體四肢節解疼痛如墮脫腫案之皮急頭眩短氣溫溫悶亂如欲吐即本方去麻黃千金防風湯主療與外臺同於本方無麻黃附子有半夏杏仁芎藭味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄營氣不通衛不獨行營衛俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也四屬程作四肢此條程魏接下烏頭溥為一條非徐此論飲食傷陰致營衛俱痹足腫脛冷有類歷節但當以發熱別之也謂飲食既傷陰然味各歸其所喜政酸為肝之味過酸則傷筋筋所以束骨而利機關傷則緩漫不收肝氣不斂故名曰泄咸為腎之味過咸則傷腎腎所以華髮而充骨傷則髓竭精虛腎氣痿憊故名曰枯肝腎者人之本也腎不榮而肝不斂根銷源斷故曰斷泄飲食傷陰營先受之乃營氣不通營衛本相依營傷衛不獨治因循既久營衛俱微三焦所以統領內氣而充貫四肢者也失營衛之養而無所恃以為御御者攝也四屬之氣不相統攝而斷絶四屬者四肢也元氣既憊身體羸瘦足尤在下陽氣不及腫大脛冷榮中氣鬱則熱而黃汗然此皆陰分病非歷節歷節挾外之濕邪而重且痛也唯外邪必發熱故曰假令發熱是表分亦有邪從肌肉而歷關節使為歷節尤虛病不能發熱歷節則未有不熱者故曰假令發熱便為歷節後水氣篇中又云黃汗之病兩脛自冷假令發熱此屬歷節蓋即黃汗歷節而又致其辨也鑑名曰斷泄之泄字當是絶字始與下文相屬必是傳寫之訛案平脈法林億注四屬者謂皮肉脂髓成注亦同病歷節不可屈伸疼痛烏頭湯主之脈經作疼痛不可屈伸是沈此寒濕歷節之方也經謂風寒濕三氣合而為痹此風少寒濕居多痹於筋脈關節肌肉之間以故不可屈伸疼痛即寒氣勝者為痛痹是也所以麻黃通陽出汗散邪而開痹著烏頭驅寒而燥風濕芍藥收陰之正以蜜潤燥兼制烏頭之毒黃耆甘草固表培中使痹著開而病自愈謂治腳氣疼痛者亦風寒濕邪所致也烏頭湯方治腳氣疼痛不可屈節尤本治上有亦字程金鑑刪治以下九字案此後人所添今從之麻黃芍藥黃耆各三兩甘草炙川烏五枚㕮咀以蜜二升煎取一升即出烏頭案甘草原本及趙程魏金鑑並欠兩數俞徐沈尤並云三兩未知何據上五味㕮咀四味以水三升煮取一升去滓納蜜煎中更煎之服七合不知盡服之張氏醫通云烏頭善走入肝逐風寒故筋脈之急者必以烏頭治之然以蜜煎取緩其性使之留連筋骨以利其屈伸且蜜之潤又可益血養筋兼制烏頭燥熱之毒千金大棗湯治歷節疼痛於本方去芍藥附子加烏頭大棗生薑礬石湯治腳氣衝衝心衝趙作沖程本金鑑不載此方至篇末五方並刪礬石二兩雜療方作半斤上一味以漿水一斗五升煎三五沸浸腳良此方雜療救卒死篇無漿字千金翼浸下有洗字尤腳氣之病濕傷於下而氣衝於上礬石味酸澀性燥能卻水收濕解毒毒解濕收上衝自止案千金論腳氣云魏周之代蓋無此疾所以姚公集驗殊不殷勤徐王撰録未以為意外臺蘇長史云晉宋以前名為緩風古來無腳氣名由此觀之此方亦是宋以前人所附非仲景原方明矣程云凡仲景方經證在前而方在後未有方在前而證在後者固然附方古今録驗續命湯治中風痱身體不能自收口不能言冒昧不知痛處或拘急不得轉側原注姚云與大續命同兼治婦人産後去血者及老人小兒案外颱風痱門載古今録驗西州續命湯即是冒昧下有不識人三字千金名大續命湯而西州續命湯主療與此同無人參有黃芩分兩亦異主療與姚同麻黃桂枝當歸人參石膏乾薑甘草各三兩芎藭杏仁四十枚千金用芎藭三兩外臺麻黃三兩芎藭一兩余各二兩杏仁與本方同俞本芎藭一兩五錢非上九味以水一斗煮取四升溫服一升當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風並治但伏不得臥咳逆上氣面目浮腫浮外臺作洪沈靈樞云痱之為病身無痛者四肢不收智亂不甚其言微甚則不能言不可治故後人仿此而出方也尤痱者廢也精神不持筋骨不用非特邪氣之擾亦真氣之衰也麻黃桂枝所以散邪人參當歸所以養正石膏合杏仁助散邪之力甘草合乾薑為復氣之需乃攻補兼行之法也案漢賈誼傳云闢者一面病痱者一方病師古注闢足病痱風病也聖濟總録云痱字書病痱而發肉非其肉者以身體無痛四肢不收而無所用也樓氏綱目云痱廢也痱即偏枯之邪氣深者以其半身無氣營運故名偏枯以其手足廢而不收或名痱或偏廢或全廢皆曰痱也知是痱即中風之謂脈解篇喑俳即喑痱也徐則謂痱者痹之別名此説本喻氏法律尤誤矣外臺本方煎法後云範汪方主病及用水升數煮取多少並同汪云是仲景方本欠兩味汪為東晉人而其言如此正知此亦仲景舊方原本失載宋臣因而附之也虞氏醫學正傳云金匱要略本方有石膏當歸無附子防風防己愚案本方石膏當歸固不可無而附子防風防己尤不可缺此恐傳寫者之脫簡耳簡案續命湯千金外臺所載凡數十方唯外臺風身體手足不隨門古今録驗小續命湯方中附子石膏並用虞氏之言不可從王氏古方選注云古今録驗者其方録於竹簡從古至漢始刊於金匱附方中續命者有卻病延年之功案十六國春秋有盧循遺劉裕益智粽裕乃答以續命湯又歐陽修有細為續命絲之句可徵二字之謂延年矣千金三黃湯治中風手足拘急百節疼痛煩熱心亂惡寒經日不欲飲食千金賊風門云仲景三黃湯拘急作拘攣三因云兼治賊風偏風猥退風半身不遂失喑不言麻黃五分獨活四分細辛二分黃耆二分黃芩三分上五味以水六升煮取二升分溫三服一服小汗二服大汗心熱加大黃二分腹滿加枳實一枚氣逆加人參三分悸加牡蠣三分渴加栝蔞根三分先有寒加附子一枚心熱千金作心中熱千金翼一枚下有此仲景方神祕不傳八字魏亦為中風正治而少為變通者也以獨活代桂枝為風入之深者設也以細辛代乾薑為邪入於經者設也以黃耆補虛以熄風也以黃芩代石膏清熱為濕鬱於下熱甚於上者設也心熱加大黃以泄熱也腹滿加枳實以開鬱行氣也氣逆加人參以補中益胃也悸加牡蠣防水邪也渴加栝蔞根以肅肺生津除熱也大約為虛而有熱者言治也先有寒即素有寒也素有寒則無熱可知縱有熱亦內真寒外假熱而已云加附子則方中之黃芩亦應斟酌矣此又為虛而有寒者言治也近效方術附湯治風虛頭重眩苦極不知食味暖肌補中益精氣外臺此下載甘草附子湯主療風濕相搏骨節疼痛云云三十餘字白朮二兩附子一枚半炮去皮甘草一兩炙上三味銼每五錢匕薑五片棗一枚水盞半煎七分去滓溫服徐腎氣空虛風邪乘之漫無出路風挾腎中濁陰之氣厥逆上攻致頭中眩苦至極兼以胃氣亦虛不知食味此非輕揚風劑可愈故用附子暖其水臟白朮甘草暖其土臟水土一暖猶之冬月井中水土既暖陽和之氣可以立復而濁陰之氣不驅自下矣案外颱風頭眩門所載近效白朮附子湯有桂枝而無生薑大棗上四味切以水六升煮取三升分為三服日三初服得微汗即解能食復煩者將服五合以上愈此本仲景傷寒論方即是甘草附子湯也而此所載去桂加朮附子湯且煎法及分兩宋人所改不知何以差謬如此蓋孫奇等失之不檢也崔氏八味丸治腳氣上入少腹不仁乾地黃八兩山茱萸薯蕷各四兩澤瀉茯苓牡丹皮各三兩桂枝附子炮各一兩上八味末之煉蜜和丸梧子大酒下十五丸日再服尤腎之脈起於足而入於腹腎氣不治濕寒之氣隨經上入聚於少腹為之不仁是非驅濕散寒之劑所可治者須以腎氣丸補腎中之氣以為生陽化濕之用也案外臺腳氣不隨門載崔氏方凡五條第四條云若腳氣上入少腹少腹不仁即服張仲景八味丸方用澤瀉四兩附子二兩桂枝三兩山茱萸五兩余並同於本書舊唐經籍志崔氏纂要方十卷崔知悌撰新唐藝文志崔行功撰所謂崔氏其人也不知者或以為仲景收録崔氏之方故詳及之千金方越婢加朮湯治肉極熱則身體津脫腠理開汗大泄厲風氣下焦腳弱麻黃六兩石膏半斤生薑二兩甘草二兩白朮四兩大棗十五枚上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服惡風加附子一枚炮案徐沈以厲風為癩甚誤矣外臺引刪繁肉極論曰凡肉極者主脾也脾應肉肉與脾合若脾病則肉變色云云脾風之狀多汗陰動傷寒寒則虛虛則體重怠惰四肢不欲舉不欲飲食食則咳咳則右脅下痛隱隱引肩背不可以動轉名曰厲風是也又案千金肉極門不見方云方見七卷中而今考之七卷中腳氣門所載越婢湯有附子故外臺肉極門引千金亦有附子煎法後云一名起脾湯而腳氣門越婢湯方後注云此仲景方本云越婢加朮湯又無附子胡洽云若惡風者加附子一枚多冷痰者加白朮蓋孫奇等彼是湊合所録故與外臺有少異焉
