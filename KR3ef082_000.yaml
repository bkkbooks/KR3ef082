front:
  text: 金匱玉函要略方論序張仲景為傷寒雜病論合十六卷今世但傳傷寒論十卷雜病未見其書或於諸家方中載其一二矣翰林學士王洙在館閣日於蠹簡中得仲景金匱玉函要略方三卷上則辨傷寒中則論雜病下則載其方並療婦人乃錄而傳之士流才數家耳嘗以對方證對者施之於人其效若神然而或有證而無方或有方而無證救疾治病其有未備國家詔儒臣校正醫書臣奇先校正傷寒論次校定金匱玉函經今又校成此書仍以逐方次於證候之下使倉卒之際便於檢用也又採散在諸家之方附於逐篇之末以廣其法以其傷寒文多節略故斷自雜病以下終於飲食禁忌凡二十五篇除重複合二百六十二方程云仲景只二百二十九方余俱附方勒成上中下三卷依舊名曰金匱方論臣奇嘗讀魏志華佗傳云出書一卷曰此書可以活人每觀華佗凡所療病多尚奇怪不合聖人之經臣奇謂活人者必仲景之書也大哉炎農聖法屬我盛旦恭惟主上丕承大統撫育元元頒行方書拯濟疾苦使和氣盈溢而萬物莫不盡和矣太子右贊善大夫臣高保衡尚書都官員外郎臣孫奇司封郎中充秘閣校理臣林億等傳上案魏志華佗傳云佗臨死出一卷書與獄吏曰此可以活人吏畏法不受佗亦不強索火燒之此佗書無傳明矣而張蕆活人書序云華佗指張長沙傷寒論為活人書襄陽府志云仲景著傷寒論十卷行於世華佗讀而喜曰此真活人書而丁德用注難經則云難經歷代傳之一人至魏華佗乃燼其文於獄下此則難經為燼餘之文此皆實無其事不過藉佗而神其書耳仲景金匱錄岐黃素難之方近將千卷患其混雜煩重有求難得故周流華裔九州之內收合奇異捃拾遺逸揀選諸經筋髓以為方論一編其諸救療暴病使知其次第凡此藥石者是諸仙之所造服之將來固無夭橫或治療不早或被師誤幸具詳焉此一篇宋本俞本趙本並載林億等序後按葛氏肘後方序云仲景元化劉戴秘要金匱綠帙黃素方近將千卷患其混雜煩重有求難得故周流華夏九州之中收合奇異捃拾遺逸選而集之使種類殊分緩急易簡凡為百卷名曰玉函然非有力不能盡寫云云亦見抱朴子茲所載文與此頗同但首尾異耳徐本刪之為是金匱要略序出趙本聖人設醫道以濟夭枉俾天下萬世人盡天年博施濟眾仁不可加矣其後繼聖開學造極精妙著於時名於後者和緩扁倉之外亦不多見信斯道之難明也與漢長沙太守張仲景以穎特之資徑造閫奧於是採摭群書作傷寒卒病論方合十六卷以淑後學遵而用之困蘇廢起莫不應效若神蹟其功在天下猶水火谷粟然是其書可有而不可無者也惜乎後之傳者止得十卷而六卷則亡之宋翰林學士王洙偶得雜病方三卷於蠹簡中名曰金匱方論即其書也豐城之劍不終埋沒何其幸耶林億等奉旨校正並版行於世今之傳者復失三卷豈非世無和氏而至寶妄倫於荊石與僕幼嗜醫書旁索群隱乃獲於盱之丘氏遂得與前十卷表裡相資學之者動免掣肘嗚呼張茂先嚐言神物終當有合是書也安知不有所待而合顯於今也故不敢秘特勒諸梓與四方共之由是張氏之學不遺軒岐之道昭著林林總總壽域同躋豈曰小補之哉後至元庚辰樵川玉佩鄧珍敬序大明應天徐熔謹按文獻通考二百二十二卷中金匱玉函經八卷條下晁氏曰漢張仲景撰晉王叔和集設答問雜病形證脈理參以療治之方仁宗朝王洙得於館中用之甚效合二百六十二方案宋晁公武撰郡齋讀書志趙希弁作附志此乃系附志所載陳振孫書錄解題作三卷是據此並前林序云依舊名曰金匱方論則王洙館中所得名曰金匱玉函要略方系五代時改名耳所以通考只云金匱玉函經也是金匱玉函經元時已無矣夫金匱玉函經八卷東漢張仲景祖書名也金匱方論三卷傷寒論十卷似西晉王叔和選集撰次後俗傳書名也案元明之際玉函經八卷晦而不傳徐不及寓目故有此說不可從若金匱玉函要略方五代及宋相沿書名也今單名金匱要略而去其玉函二字愈遠而愈失其真矣又據晉皇甫謐甲乙云仲景論廣伊尹湯液用之多驗王叔和撰次仲景選論甚精指事施用即今俗所分傷寒論金匱要略是也孫真人千金云江南諸師秘仲景傷寒方法不傳是叔和選論思邈亦未曾研也惟文潞公藥准云仲景為群方之祖朱奉議活人書云古人治傷寒有法治雜病有方葛稚川作肘後孫真人作千金陶隱居作集驗玄晏先生作甲乙其論傷寒治法者長沙太守一人而已華佗指張長沙傷寒論為活人書昔人又以金匱玉函名之其重於世如此然其言雅非精於經絡不能曉會若孫思邈則未能詳仲景之用心者是宋時才分傷寒論金匱要略為二書也成聊攝明理論云自古諸方歷歲浸遠難可考評惟仲景之方最為眾方之祖是以仲景本伊尹之法伊尹本神農之經醫帙之中特為樞要參今法古不越毫末乃大聖之所作也劉河間原病式云自黃帝之後二千五百有餘年有仲景方論一十六卷使後之學者有可依據文亦玄奧以致今之學者尚為難焉故今人所習皆近代方論而已但究其末而不求其本唯近世朱奉議多得其意遂以本仲景之論而兼諸書之說作活人書其言直其類辯使後學者易為尋檢施行故今之用者多矣據河間十六卷之言此時仲景書尚未分傷寒雜病為二門也或金匱玉函經八卷坊間分作十六卷亦未可知案河間就仲景自序等而言之耳金時必無為十六卷者焉故東垣內外傷辯惑論曰易張先生云仲景藥為萬世法號群方之祖治雜病若神後之醫者宗內經法學仲景心可以為師矣王海藏此事難知云余讀醫書幾十載矣所仰慕者仲景一書為尤然讀之未易洞達其趣欲得一師指之遍國中無有能知者故於醫壘元戎云折中湯液萬世不易之法當以仲景為祖又云金匱玉函要略傷寒論皆張仲景祖神農法伊尹體箕子而作也唐宋以來如孫思邈葛稚川朱奉議王朝奉輩其餘名醫雖多皆不出仲景書又湯液本草於孫葛朱王外添王叔和範汪胡洽錢仲陽成無己陳無擇云其議論方定增減變易千狀萬態無有一毫不出於仲景者潔古張元素其子張璧東垣李明之皆祖張仲景湯液惜乎世莫有能知者又云仲景廣湯液為大法晉宋以來號名醫者皆出於此又按丹溪局方發揮或問曰仲景治傷寒一百一十三方治雜病金匱要略二十有三門何也答曰仲景諸方實萬世醫門之規矩準繩也後之欲為方圓平直者必於是而取則焉曰要略之方果足用乎曰天地氣化無窮人身之病亦變化無窮仲景之書載道者也醫之良者引例推類可謂無窮之應用借令略有加減修合終難逾越矩度又曰圓機活法內經具舉與經意合者仲景書也仲景因病以制方局方製藥以俟病據數家說是元末及我國朝初醫家方分傷寒雜病為二家也只因聊攝七十八歲撰成明理論八十歲時注完傷寒論未暇注金匱論所以俗醫分為二門致今時眾口一辭誚仲景能治傷寒而不能療雜證也冤哉余素慨金匱方論與傷寒論暌離孤處及註解傷寒論又明理論乖散失群已近五百年因謀諸新安師古吳君校壽一梓成濟暌而得會遇庶業醫音弗致得此失彼各自專門為粗陋又冀華劍復合昌鏡再圓天作之合云爾萬曆戊戌孟夏吉日匿跡市隱逸人謹識
