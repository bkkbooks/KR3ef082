body:
  text: 卷六雜療方第二十三案以下三篇魏尤並不載論一首證一條方二十二首退五臟虛熱四時加減柴胡飲子方冬三月加柴胡八分白朮八分大腹檳榔四枚並皮子用陳皮五分生薑五分桔梗七分春三月加枳實減白朮共六味夏三月加生薑三分枳實五分甘草三分共八味秋三月加陳皮三分共六味上各㕮咀分為三帖一帖以水三升煮取二升分溫三服如人行四五里進一服如四體壅添甘草少許每帖分作三小帖每小帖以水一升煮取七合溫服再合滓為一服重煮都成四服原注疑非仲景方鑑此方證不屬不釋案程不載此方蓋為宋人所附也長服訶黎勒丸方原注疑非仲景方訶黎勒趙有煨字陳皮厚朴各三兩上三味末之煉蜜丸如梧子大酒飲服二十丸加至三十丸程二味破氣行氣之劑不可長服宜審之案本草云訶黎勒破胸膈結氣三物備急丸方原注見千金司空裴秀為散用亦可先和成汁乃傾口中令從齒間得入至良驗千金云張仲景三物備急丸司空裴秀為散用治心腹諸卒暴百病方先和上有口已噤可四字外臺古今諸家丸方門同大黃一兩乾薑一兩巴豆一兩去皮心熬外研如脂外外臺作別沈脂作泥上藥各須精新先搗大黃乾薑為末研巴豆內中合治一千杵用為散蜜和丸亦佳密器中貯之莫令歇主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死者以暖水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口噤亦須折齒灌之歇下徐沈並千金有氣字程本金鑑歇作泄鑑方名備急者以備暴然諸腹滿腹急痛及中惡客忤噤閉卒死者也若口噤亦須折齒灌之是恐人不急救則死之義然不如後人管吹入鼻之法為良李彣云人卒得病欲死者皆感毒厲邪陰不正之氣而然三物相須能蕩邪安正或吐或下使穢氣上下分消誠足備一時急需也案停尸無考蓋是即遁尸巢源云遁尸者言其停遁在人肌肉血脈之間瘥後復發停遁不消故謂之遁尸也千金月令抵聖備急丸主幹霍亂心腹百病疰痛等方即本方丸如緑豆大每服空心服三丸快利為度外臺許仁則巴豆等三味丸療干霍心腹脹滿攪刺疼痛手足逆冷甚者流汗如水大小便不通求吐不出求痢不下須臾不救便有性命之慮巴豆一百枚熬去心皮乾薑三兩崔氏以芒硝五兩代與千金同大黃五兩上藥先搗乾薑大黃為散後別搗巴豆如膏和前二味同搗令調細下蜜丸以飲下初服三丸如梧子大服訖數挼用令轉動速下利良久不覺則以熱飲投之良又古今録驗三味備急散本療卒死感忤宮泰以療人卒上氣呼吸氣不得下喘逆瘥後已為常用方出食飲水上氣方即本方合搗下篩服半錢匕得吐下則愈又古今録驗司空三物備急散療卒死及感忤口噤不開者即本方出卒死又崔氏備急散療卒中惡心痛脹滿欲吐短氣方大黃二兩桂心四分巴豆一分去皮熬研上三味搗篩為散取一錢匕以湯七合和服當吐下即愈甚妙肘後千金治遁尸尸疰心腹刺痛不可忍方三味酢和如泥敷病上千金翼解散雷氏千金丸即本方去乾薑加硝石煉蜜和丸如小豆許飲服一丸日二以利為度聖惠方備急丸治霍亂心腹疰痛冷氣築心即本方又治因食熱飽及飲冷水過多上攻肺臟喘急不已即本方用巴豆一分余同又治乾霍亂心腹㽲痛氣短急四體悶不吐利煩啘難忍此名乾霍亂斯須不救即殺人急治方即本方加吳茱萸一兩用乾薑三分大黃一兩巴豆三枚上件藥搗羅為末入巴豆令勻煉蜜和搗一二百丸如梧桐子大每服以粥飲下十五丸須臾更以熱茶投之當吐利即瘥聖濟總録備急丸治霍亂卒暴心腹痛即本方十便良方返魂丹治腸內一切卒暴百病同上全生指迷論云若寒熱如瘧不以時度腸滿膨脝起則頭暈大便不通或時腹痛胸膈痞悶此由宿谷停留不化結於腸間氣道不舒陰陽反亂宜備急丸同上出幼幼新書瘧疾寒熱交作門本事方治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先取去然後調治易瘥不可畏虛以養病也宜溫脾湯即千金方溫脾湯去人參加厚朴桂枝不要晚食分三服溫服自夜至曉令盡不快食前更以乾薑丸佐之即本方加人參各等分上煉蜜為丸如梧子大服前湯時用湯吞下一丸米飲亦得御藥院方備急丸治積聚頭痛即本方丸如豌豆大米飲下一丸羸人服半丸緑豆大以大便利為度淡寮集驗方云曾有婦人熱而大便祕脈實子死腹中已致昏不知人醫用備急丸胎下人活李氏脾胃論備急丹主療分量同千金等婦人有孕不可服如所傷飲食在胸膈間兀兀欲吐反復悶亂以物探吐去之李氏辨惑論云易張先生又名獨行丸乃急劑也又云名備急大黃丸程氏醫學心悟云獨行丸治中食至甚胸高滿悶吐法不效須用此藥攻之若昏暈不醒四肢僵硬但心頭溫者抉齒灌之即本方三味各一錢研細薑汁為丸如黃豆大每服五七丸用薑湯化下若服後瀉不止者用冷粥湯飲之即止治傷寒令愈不復紫石寒食散方原注見千金翼案千金翼云張仲景紫石寒食散方又巢源寒食散發候云仲景經有紫石英方蓋指此方紫石英白石英赤石脂鍾乳研煉趙研作碓栝蔞根防風桔梗文蛤鬼臼各十分太一餘糧十分燒乾薑附子炮去皮桂枝去皮各四分上十三味杵為散酒服方寸匕千金翼有人參一兩為十四味服下有三字鑑方未詳不釋救卒死方肘後冠張仲景諸要方六字千金治卒魘死薤搗汁灌鼻中千金搗韭汁灌鼻孔中劇者灌兩耳注張仲景云灌口中鑑卒然昏死皆尸蹶也薤白類蒜而小北人謂之小根菜南人謂之釣喬是也其味極辛搗汁灌鼻亦通竅噴嚏之意也又方雄雞冠割取血管吹內鼻中肘後雄上有丹字豬脂如雞子大苦酒一升煮沸灌喉中雞肝及血塗面上以灰圍四旁立起肘後肝作冠恐非大豆二七粒以雞子白並酒和盡以吞之鑑雄雞冠血及肝卵白豬脂大豆酒醋等物無非用陽物以勝陰祟也管吹內鼻中謂將雞冠血或合熱酒含在不病人口內以葦管或筆管插入病人鼻孔中使氣連藥吹之其藥自能下咽氣通噤自開也肘後云凡卒死中惡及尸蹶皆天地及人身自然陰陽之氣忽有乖離痞隔上下不通偏竭所致故雖涉死境猶可治而生緣氣未都竭也當爾之時兼有鬼神於其間故亦可以符術而獲濟者巢源云卒死者由三虛而遇賊風所為也三虛謂乘年之衰一也乘月之空二也失時之和三也人有此三虛而為賊風所傷使陰陽偏竭於內則陽氣阻隔於外二氣擁閉故暴絶如死也若腑臟氣未絶者良久乃蘇然亦有挾鬼神之氣而卒死者皆有頃邪退乃活也救卒死而壯熱者方礬石半斤以水一斗半煮消以漬腳令沒踝程厥陽獨行故卒死而壯熱岐伯曰血之與氣並走於上則為大厥厥則暴死礬石收澀藥也以之浸足而收斂其厥逆之氣救卒死而目閉方肘後同外臺引備急騎牛臨面搗薤汁灌耳中吹皂莢末鼻中立效程按葛洪肘後方治卒魘不寤以青牛蹄或馬蹄臨人頭上即活則騎牛臨面系厭惡驅邪法也目閉者邪氣內著也灌薤汁以辟邪安魂吹皂莢以取嚏開竅救卒死而張口反折者方肘後外臺口引備急作目灸手足兩爪後十四壯了飲以五毒諸膏散原注有巴豆者外臺爪下有各字注四字為原文肘後同程灸手足兩爪後當是灸兩手足爪後其文則順以十爪甲為十二經之終始灸之以接引陽氣而回卒死此惡氣中於太陽令卒死而開口反張也五毒諸膏散方未見案肘後卒死門云有三物備急丸散及裴公膏救卒死尤良裴氏五毒神膏見於百病備急散膏無巴豆而千金加巴豆莽草薤白為裴公八毒膏所謂五毒諸膏散蓋此類也五毒周禮鄭注石膽丹砂雄黃礬石磁石今考五毒膏八毒膏但用丹砂雄黃耳其餘並他品而為五味八味也救卒死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗之又取牛洞原注稀糞也一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯瘥洗之外臺作洗足程卒死而四肢不收者無陽以行四末也失便者正氣衰微不能約束便溺也物之臭者皆能解毒殺邪故以牛馬糞及後條狗糞治之心下一寸當是上脘穴臍上三寸當是中脘穴臍下四寸當是關元穴灸之以復三焦之陽而回其垂絶之氣救小兒卒死而吐利不知是何病方狗屎一丸絞取汁以灌之無濕者水煮乾者取汁肘後用馬屎沈本無干者二字鑑凡屎皆發陽氣用狗屎亦取發陽氣也尸厥脈動而無氣氣閉不通故靜而死也治方原注脈證見上卷徐熔附遣云見上卷即第三葉問曰寸口脈沉大而卒厥證一條是也案肘後外臺冠張仲景云四字菖蒲屑內鼻兩孔中吹之令人以桂屑著舌下肘後外臺舌下下有又云扁鵲法治楚王效九字案說苑扁鵲治虢太子尸厥子明吹耳三因方名內鼻散程甲乙經曰尸厥者死不知人脈動如故傷寒論曰尸厥者令人不仁即氣閉不通靜而死之謂也菖蒲內鼻中以通其肺氣桂內舌下以開其心竅心肺開則上焦之陽自能開發尸厥之疾可愈又方外臺宋本云集驗療尸厥方肘後千金文仲備急必效同此本出素問剔取左角發方寸燒末酒和灌令入喉立起方寸肘後作方二寸外臺宋本作方寸匕燒灰以酒和剔素問作鬄音剃同剃韓非子嬰兒不剔首則腹痛程內經曰邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡皆竭令人身脈皆動而形無知也其狀若尸或曰尸厥以竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已見繆刺論今仲景亦剔左角之發治者以左角為陽氣之所在五絡之所繞五絡皆竭故剔其五絡之血餘以治之和以酒灌者助藥力而行氣血也肘後云尸厥之病卒死而脈猶動聽其耳中循循如嘯聲而股間暖是也耳中雖然嘯聲而脈動者故當以尸蹶救之巢源云尸厥者陰氣逆也此由陽脈卒下墜陰脈卒上升陰陽離合榮衛不通真氣厥亂客邪乘之其狀如死猶微有息而不常脈尚動而形無知也聽其耳內循循有如嘯之聲而股間暖者是也救卒死客忤死還魂湯主之方肘後無方名冠張仲景諸要方六字三因名追魂湯原注千金方云主卒忤鬼擊飛尸諸奄忽氣絶無復覺或已無脈口噤拗不開去齒下湯湯下口不下者分病人發左右捉㩉肩引之藥下復增取一升須臾立愈案千金無脈作死一字無拗字捉㩉作捉踏取下有盡字麻黃三兩去節一方四兩肘後千金翼用四兩杏仁去皮尖七十個甘草一兩炙原注千金用桂心二兩案外臺引肘後療中惡短氣欲絶方用桂心二兩今本肘後不用桂上三味以水八升煮取三升去滓分令咽之通治諸感忤外臺引肘後云通療諸昏客忤良集驗張文仲備急同徐凡卒死及客忤死總是正不勝邪故陽氣驟閉而死肺朝百脈為一身之宗麻黃杏仁利肺通陽之君藥合炙甘以調中故為救卒死主方名曰還魂湯著其功也鑑中惡客忤便閉裡實者仲景用備急丸可知無汗表實者不當用備急丸通里當用還魂湯以通表也通里者抑諸陰氣也通表者扶諸陽氣也昧者不知以麻黃為入太陽發汗之藥抑知不溫覆取汗則為入太陰通陽之藥也陽氣通動魂可還矣又方肘後冠張仲景諸要方外臺引肘後韭根一把烏梅二七個肘後作二十個吳茱萸半升炒肘後作半斤上三味以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死煮取三升去滓分飲之水一斗外臺作勞水一升徐韭根有薤白之功烏梅有開關之力吳茱萸能降濁陰陰降而關開則魂自還故亦取之然櫛浮則生沉則死蓋櫛為本人日用之物氣之所及也浮則其人陽氣未絶沉則久已有陰無陽故主死然仍分飲之信櫛無寧信藥耳程方亦可解而櫛之浮沉則不可解也肘後云客忤者中惡之類也多於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治亦殺人又云客者客也忤者犯也謂客氣犯人也救自縊死旦至暮雖已冷必可治暮至旦小難也恐此當言忿氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之方救外臺作仲景云三字忿趙本外臺作陰為是案巢源云自縊死旦至暮雖已冷必可治暮至旦則難治此謂其晝則陽盛其氣易通夜則陰盛其氣難通可以證也治之方外臺作活一字徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手少挽其發常弦弦勿縱之一人以手按據胸上數動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須臾可少桂湯及粥清含與之令濡喉漸漸能咽及稍止若向令兩人以管吹其兩耳罙好此法最善無不活者據程金鑑作揉及稍外臺作乃稍若向二字程金鑑作更一字外臺作兼一字罙程金鑑作朵無好字外臺作彌趙本音釋罙莫分切深入也並義難通外臺為是鑑觀此諄諄告切仲景仁心惟恐人畏其繁瑣而不治也此法嘗試之十全八九始知言果不謬弦弦猶言緊緊也揉胸按腹摩臂脛屈伸之皆引導其氣之法也巢源云徐徐捧下其陰陽經絡雖暴壅閉而臟腑真氣故有未盡所以猶可救療故有得活者若見其懸柱便忽遽截斷其繩舊云則不可救此言氣已壅閉繩忽暴斷其氣雖通而奔走運悶故則氣不能還即不得復生千金治自縊死方凡救自縊死者極須按定其心勿截繩手抱起徐徐解之心下尚溫者以氍毹覆口鼻兩人吹其兩耳肘後療自縊死心下尚微溫久猶可治方徐徐抱解其繩不得斷之懸其發令足去地五寸許塞兩鼻孔以蘆管內其口中至咽令人噓之有頃其腹中礱礱或是通氣也其舉手撈人當益堅捉持更遞噓之若活了能語乃可置若不得懸發可中分發兩手牽強耳又方皂莢末蔥葉吹其兩鼻孔中逆出復內之又方以蘆管吹其兩耳極則易人吹取活乃止若氣通者以少桂湯稍稍咽之徐徐乃以少粥清與之出外臺今本肘後無考管氏五絶治法云徐徐放下將喉氣管捻圓揪髮向上揉擦用口對口接氣糞門用火筒吹之以半夏皂角搐鼻以薑汁調蘇合香丸灌之或煎水香細辛湯調灌亦得如蘇可治繩小痕深過時身冷者不治程氏醫學心悟云豫嘗見自暮至旦而猶救活者不可輕棄也顧氏瘍醫大全云必須心口尚溫大便未下舌未伸出者救活案桂湯諸書無考蓋此單味桂枝煎湯耳而洗冤録引本經之文後載官桂湯方未知何本録左備考洗冤録官桂湯廣陳皮八分厚朴半夏各一錢肉桂乾薑各五分甘草三分凡中暍死不可使得冷得冷便死療之方外臺引肘後今本肘後無考屈草帶繞暍人臍使三兩人溺其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人取令溺須得流去此謂道路窮卒無湯當令溺其中欲使多人溺取令溫若湯便可與之不可泥及車缸恐此物冷暍既在夏月得熱泥土暖車缸亦可用也外臺屈草帶作屈草帶按及作若脫著暍人作著暍人臍上須得作不得令溺其中作令人溺其中欲使上有仲景云三字若湯間有有字與之下有仲景云三字不可下有用字程中暍不可得冷猶被凍不可沃以熱湯寒熱拒隔反為大害本草車轄一名車缸即車軸鐵轄頭巢源云夏月炎熱人冒涉途路熱毒入內與五臟相併客邪熾盛或郁瘀不宣致陰氣卒絶陽氣暴壅經絡不通故奄然悶絶謂之暍然此乃外邪所擊真臟未壞若遇便治救氣宣則蘇夫熱暍不可得冷得冷便死此謂外卒以冷觸其熱蘊積於內不得宣發故也三因方云中暑悶倒急扶在陰涼處切不可與冷當以布巾衣物等蘸熱湯尉臍中及氣海續以湯淋布上令徹臍腹暖即漸醒如倉卒無湯處掬道上熱土於臍上仍撥開作窩子令人更溺於其中以代湯急嚼生薑一大塊冷水送下如已迷亂悶嚼大蒜一大瓣冷水送下如不能嚼即用水研灌之立醒葉氏避暑録話云道路城市間中暑昏僕而死者此皆虛人勞人或飢飽失節或素有疾一為暑氣所中不得泄則關竅皆窒非暑氣使然氣閉塞而死也大蒜一握道上熱土雜研爛以新水和之濾去滓抉其齒灌之有頃即蘇救溺死方外臺引小品云療溺死若身尚暖者方取灶中灰兩石余以埋人從類至足水出七孔即活鑑嘗試蠅子落水而死者用灶灰埋之自治案出本草綱目冬灰條李彣曰灶灰得火土相生之氣以埋人則外溫衛氣而內滲水濕故能使水出七孔而活巢源云人為水所沒溺水從孔竅入灌注腑臟其氣壅閉故死若早拯救得出即泄瀝其水令氣血得通便得活經半日及一日猶可活氣若已絶心上暖亦可活千金治落水死方以灶中灰布地令厚五寸以甑側著灰上令死者伏於甑上使頭少垂下炒鹽二方寸匕內竹管中吹下孔中即當吐水水下因去甑下死者著灰中壅身使出鼻口即活又方掘地作坑熬數斛灰內坑中下死人覆灰濕徹即易勿令大熱煿人灰冷更易半日即活上療自縊溺暍之法並出自張仲景為之其意殊絶殆非常情所及本草所能關實救人之大術矣傷寒家數有暍病非此遇熱之暍原注見外臺肘後目案外臺引肘後今本肘後無考意下有理字程所能下句實作系外臺作亦非本草之所能開悟實下有拯字程本無數字外臺作別復二字又暍病下有在上仲景論中六字程之暍下有詳之二字沈本金鑑不載此條原注目字疑是同字訛俞本無目字是案三因方云傷暑中暍其實一病但輕重不同新校正要略者乃云傷寒家別有暍病非也又本草綱目人尿附方引此條亦為林億語並誤殊不知此肘後文外臺已引之疏亦甚治馬墜及一切筋骨損方原注見肘後方案今本肘後無考千金傷損門治腕折瘀血三味桃仁湯方注引肘後云仲景方用大黃云云詳注左大黃一兩切浸湯成下肘後用三兩緋帛如手大燒灰亂髮如雞子大燒灰用久用炊單布一尺燒灰肘後一尺上有方字敗蒲一握三寸肘後寸下有切字桃仁四十九個去皮尖熬甘草如中指節炙銼上七味以童子小便量多少煎湯成內酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆斯須通利數行痛楚立瘥利及浴水赤勿怪即瘀血也肘後先字作別斯字作服藥二字徐從高墜下雖當救損傷筋骨為主然頓跌之勢內外之血必無不瘀瘀不去則氣不行氣不行則傷不愈故以桃仁大黃逐瘀為主緋帛紅花之餘亂髮血之餘合童便以消瘀血敗蒲亦能破血行氣故入煎能療腹中損傷瘀血湯浴能活周身血氣然筋骨瘀血必有熱氣滯郁故以炊單布受氣最多而易消者以散滯通氣從其類也加少炙甘草補中以和諸藥也千金桃仁湯治腕折瘀血方桃仁四十枚亂髮一握大黃如指節大一枚上三味以布方廣四寸以繞亂髮燒之㕮咀大黃桃仁以酒三升煮取一升盡服血盡出禽獸魚蟲禁忌並治第二十四論辨二首合九十法方二十一首金鑑云金匱要略二十四二十五兩門原列在卷末其文似後人補入注家或注或刪但傳世已久難以削去茲仍附原文另為一篇以存參考云凡飲食滋味以養於生食之有妨反能為害自非服藥煉液焉能不飲食乎切見時人不閒調攝疾疢競起若不因食而生苟全其生須知切忌者矣所食之味有與病相宜有與身為害若得宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之若不因食之若字徐云恐是無字沈云恐是莫字程凡物之毒者必熱熱飲則助其毒勢也案王充論衡言毒篇云夫毒太陽之熱氣也中人人毒人食湊悶者其不堪任也不堪任則謂之毒矣又云天下萬物含太陽氣而生者皆有毒螫在蟲則為蝮蛇蜂蠆在草則為巴豆冶葛在魚則為鮭與𩶰䱙乃知毒物皆熱也肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣王脾氣敗若食肝則又補肝脾氣敗尤甚不可救又肝王之時不可以死氣入肝恐傷魂也若非王時即虛以肝補之佳餘臟准此傷原本徐程作復今依趙本金鑑改定程上段以生克言下段以禁忌言六畜六獸聖人以之養生事死其食忌亦不可不察案漢書藝文志神農黃帝食禁十二卷此篇所載豈其遺歟凡肝臟自不可輕啖自死者彌甚肘後云搗附子末服一刀圭日三服鑑謂諸畜獸臨殺之時必有所驚肝有所忿食之俱不利故曰不可輕啖如獸自死者必中毒或疫癘而死更不可食也外臺引張文仲云又食生肝中毒方服附子方寸匕日三須以生薑湯服之不然自生其毒案三元延壽書云臨死驚風入心絶氣歸肝俱不可多食必傷人凡心皆為神識所舍勿食之使人來生復其報對矣程畜獸雖異於人其心亦神識所舍勿食之生殺果報諒不誣也凡肉及肝落地不著塵土者不可食之豬肉落水浮者不可食程皆涉怪異食之必有非常之害下見水自動熱血不斷塵土不汙並同諸肉及魚若狗不食鳥不啄者不可食諸徐沈作豬非也下同鑑凡禽獸不食之肉必有毒不可食之諸肉不幹火炙不動見水自動者不可食不動程金鑑作而動食下趙有之字肉中有如朱點者不可食之鑑朱點惡血所聚此色惡不食也六畜肉熱血不斷者不可食之父母及身本命肉食之令人神魂不安程仁人孝子當自識之隋蕭吉五行大義云十二屬並是鬥星之氣散而為人之命繫於北斗是故用以為屬春秋運鬥樞曰樞星散為龍馬旋星散為虎機星散為狗摧星散為蛇玉衡散為雞兔鼠闔陽散為羊牛搖光散為猴猿此等皆上應天星下屬年命也食肥肉及熱羹不得飲冷水鑑食肥肉熱羹後繼飲冷水冷熱相搏膩膈不行不腹痛吐利必成痞變慎之慎之諸五臟及魚投地塵土不汙者不可食之穢飯餒肉臭魚食之皆傷人程物已敗腐必不宜於臟腑食之則能傷人臭惡不食也自死肉口閉者不可食之程自死既已有毒口閉則其毒不得泄不可食之六畜自死皆疫死則有毒不可食之鑑疫毒能死六畜其肉必有疫毒故不可食獸自死北首及伏地者食之殺人程首頭向也凡獸向殺方以自死及死不僵直斜倒而伏地者皆獸之有靈知故食之殺人檀公曰狐死正丘首豹死首山樂其生不忘本也獸豈無靈知者邪食生肉飽飲乳變成白蟲原注一作血蠱程生肉非人所食食生肉而飲乳汁西北人則有之脾胃弱者未有不為蟲為蠱鑑食生肉飽即飲乳酪則成濕熱必變生白蟲疫死牛肉食之令病洞下亦致堅積宜利藥下之鑑疫死牛肉有毒不可食食之若洞瀉為其毒自下或致堅積宜下藥利之脯藏米甕中有毒及經夏食之發腎病鑑脯肉藏米甕中受濕熱鬱蒸之氣及經夏已腐者食之腐氣入腎故發腎病治自死六畜肉中毒方案據千金治下脫食字黃柏屑搗服方寸匕千金云水服黃柏末方寸匕治食鬱肉漏脯中毒方原注郁肉密器蓋之隔宿者是也漏脯茅屋漏下沾著者是也燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得肘後犬作人韭作薤升下有以少水和之五字巢源云郁肉毒者謂諸生肉及熟肉內器中密閉頭其氣壅積不泄則為郁肉有毒不幸而食之乃殺人其輕者亦吐利煩亂不安又云凡諸肉脯若為久故茅草屋漏所浸則有大毒食之三日乃成暴症不可治千金注張文仲云茅室諸水迷脯為漏脯又云肉閉在密器中經宿者為漏脯治黍米中藏干脯食之中毒方肘後云此是郁脯大豆濃煮汁飲數升即解亦治貍肉漏脯等毒貍肘後及外臺引張文仲作諸千金不載此方云曲一兩鹽兩撮以水一升煮服之良治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈程三尺以上曰糞三尺以下曰土土能解一切毒非止解肉毒也鑑地漿能解諸毒掘得黃土有泉滲出謂之地漿三尺大概言也未見黃土皆穢土得黃土乃可取用案證類本草弘景地漿注云此掘地作坎深三尺以新汲水沃入攪濁少頃取清用之故曰地漿亦曰土漿金鑑之說未見所本治六畜鳥獸肝中毒方外臺引張文仲同水浸豆豉絞取汁服數升愈程豆豉為黑大豆所造能解六畜胎子諸毒案本於別録豆豉主治馬腳無夜眼者不可食之程夜眼在馬前兩足膝上馬有此能夜行一名附蟬尸鑑凡馬皆有夜眼若無者其形異故勿食之本綱張鼎云馬生角馬無夜眼白馬青蹄白馬黑頭者並不可食令人癲食酸馬肉不飲酒則殺人程本酸作駿徐沈云酸當作駮出秦穆公岐下野人傳蓋馬肉無不酸者外臺引張文仲亦作駿程馬肉苦冷有毒故飲酒以解之孟詵曰食馬肉毒發心悶者飲清酒則解飲濁酒則加韓非子曰秦穆公亡駿馬見人食之繆公曰食駿馬肉不飲酒者殺人即飲之酒居三年食駿馬肉者出死力解繆公之圍案穆公事又見呂氏春秋而巢源亦云凡駿馬肉及馬鞍下肉皆有毒不可食之食之則死程注為是馬肉不可熱食傷人心鑑馬屬火肉熱火甚恐傷心當冷食之馬鞍下肉食之殺人外臺引文仲千金黃帝云白馬鞍下烏色徹肉裡者食之傷人五臟程馬鞍下肉多臭爛有毒食之必殺人白馬黑頭者不可食之外臺引肘後下同白馬青蹄者不可食之程虎鈐經曰白馬青蹄皆馬毛之利害者騎之不利人若食之必能取害也馬肉豚肉共食飽醉臥大忌鑑馬肉屬火豚肉屬水共食已屬不和若醉飽即臥則傷脾氣故曰大忌本綱孟詵云馬肉同豚肉食成霍亂驢馬肉合豬肉食之成霍亂程諸肉雜食傷損腸胃撩亂臟腑故成霍亂馬肝及毛不可妄食中毒害人程馬肝及毛皆有大毒不可妄食馬肝一名懸烽王充論衡云馬肝氣勃而毒盛故食走馬肝殺人治馬肝毒中人未死方外臺引張文仲云仲景同雄鼠屎二七粒末之水和服日再服原注屎尖者是是程作雄肘後千金外臺並作兩鬥尖程馬稟火氣而生火不能生水故有肝無膽而木臟不足故食其肝者死漢武帝云食肉無食馬肝又云文成食馬肝而死韋莊云食馬留肝則其毒可知矣馬食鼠屎則腹脹故用鼠屎而治馬肝毒以物性相制也案食肉無食馬肝見史記儒林傳景帝語程誤又云乃是武帝語又方人垢取方寸匕服之佳程人垢汗所結也味鹹有毒亦以毒解毒之意鑑人垢即人頭垢也用方寸匕酒化下得吐為佳案千金云治食野菜馬肝肉諸脯肉毒方取頭垢如棗核大吞之起死人肘後云食六畜鳥獸幞頭垢一錢匕外臺引張文仲云服頭垢一錢匕瘥仲景千金同又本草附方自死肉毒故頭巾中垢一錢熱水服取吐大明云頭垢中蠱毒菌毒米飲或酒化下並取吐為度依以上諸方則金鑑為是然人垢亦吐人見儒門事親治食馬肉中毒欲死方外臺引張文仲云食馬肉洞下欲死者方仲景同案肘後亦同香豉二兩外臺作二百粒杏仁三兩外臺作二十枚上二味蒸一食頃熟杵之服日再服外臺作上二味合於炊飯中蒸之搗丸服之立瘥肘後作蒸之五升飯下熟合搗之兩朝服令盡程香豉解毒杏仁利氣則毒可除又方煮蘆根汁飲之良千金云蘆根汁飲以浴即解鑑蘆根味甘性寒解諸肉毒疫死牛或目赤或黃食之大忌程牛疫死而目赤黃者疫厲之毒不去也食之大忌牛肉共豬肉食之必作寸白蟲千金黃帝云程牛肉性滯豬肉動風入胃不消釀成濕熱則蟲生也亦有共食而不生蟲者視人之胃氣何如耳青牛腸不可合犬肉食之程青牛水牛也其腸性溫犬肉性熱溫熱之物不可合食牛肺從三月至五月其中有蟲如馬尾割去勿食食則損人程春夏之交濕熱蒸郁牛感草之濕熱則蟲生於胃而緣入肺竅故勿食之牛羊豬肉皆不得以楮木桑木蒸炙食之令人腹內生蟲鑑古人煉藥多用桑柴火楮實子能健脾消水楮木亦可燒用何以蒸炙諸肉食之即生蟲乎其或物性相反也啖蛇牛肉殺人何以知之啖蛇者毛髮向後順者是也巢源云凡食牛肉有毒者由毒蛇在草牛食因誤啖蛇則死亦有蛇吐毒著草牛食其草亦死此牛肉有大毒治啖蛇牛肉食之欲死方飲人乳汁一升立愈又方以泔洗頭飲一升愈牛肚細切以水一斗煮取一升暖飲之大汗出者愈程藏器曰北人牛瘦多以蛇從鼻灌之其肝則獨乳汁能解獨肝牛肉毒啖蛇牛當是獨肝牛也以泔洗頭飲者取頭垢能吐所毒也以牛肚煮服者取其同類相親同氣相求大發其汗以出其毒也鑑用牛肚不甚善本草人乳條別録云解獨肝牛肉毒合濃豉汁服之神效案牛肚即牛胃本綱牛胃附方引本方治食牛肉中毒方甘草煮汁飲之即解肘後云飲一二升程甘草能解百毒羊肉其有宿熱者不可食之程羊之五臟皆平溫唯肉屬火而大熱人宿有熱者不可食之時珍云羊肉大熱熱病及夭行病瘧疾病後食之必發熱致危羊肉不可共生魚酪食之害人千金黃帝云程生魚鮓之屬酪乳之屬生魚與酪食尚成內瘕加以羊肉食之必不益也羊蹄甲中有珠子白者名羊懸筋食之令人癲徐沈懸上無羊字千金黃帝云程鑑此義未詳白羊黑頭食其腦作腸癰千金黃帝云下同程羊腦有毒食之發風疾損精氣不唯作腸癰也方書只用為外敷藥羊肝共生椒食之破人五臟鑑羊肝生椒皆屬於火共食恐損傷人五臟豬肉共羊肝和食之令人心悶程豬肉能閉血脈與羊肝合食則滯氣故令人心悶豬肉以生胡荽同食爛人臍程胡荽損精神發痼疾豬肉令人乏氣少精發痼疾宜其不可共食若爛臍則不可解豬脂不可合梅子食之鑑豬脂滑利梅子酸澀性相反也故不可合食豬肉和葵食之少氣程葵性冷利生痰動風豬肉令人乏氣合食之非止於少氣也鑑此義未詳鹿肉不可和蒲白作羹食之發惡瘡肉原本作人今依徐程沈金鑑改和金鑑作合千金黃帝云程鹿肉九月以後至正月以前堪食他月食之則發冷痛蒲白想是蒲筍之類當詳之鑑發惡瘡此義未詳案本草蘇敬云香蒲可作薦者春初生取白為菹又蘇頌云其中心入地白蒻大如匕柄者生啖之知是蒲白乃蒲蒻一名蒲筍麋脂及梅李子若妊婦食之令子青盲男子傷精外臺引肘後云麋脂不可合梅李食程麋脂忌梅李故不可合食按麋蹄下有二竅為夜目淮南子曰孕女見麋而子四目今食麋脂而令子青盲物類相感了不可知其於胎教不可不慎也又麋脂能痿陽傷精麋角能興陽益髓何一體中而性治頓異耶案李時珍云麋似鹿而色青黑大如小牛肉蹄目下有二竅為夜目程云蹄下有二竅恐誤獐肉不可合蝦及生菜梅李果食之皆病人程獐肉十二月至七月食之動氣蝦能動風熱生菜梅李動痰合食之皆令人病痼疾人不可食熊肉令終身不愈程張鼎云腹中有積聚寒熱者食熊肉永不除白犬自死不出舌者食之害人鑑凡犬死必吐舌惟中毒而死其舌不吐毒在內也故食之害人食狗鼠余令人發瘻瘡程余狗鼠之剩食也其涎毒在食中人食之則毒散於筋絡令發瘻瘡巢源養生方云正月勿食鼠殘食作鼠瘻發於頸項或毒入腹下血不止或口生瘡如有蟲食治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方千金同杏仁一升合皮熟研用以沸湯三升和取汁分三服利下肉片大驗程犬肉畏杏仁故能治犬肉不消近人以之治狂犬咬皆此意婦人妊娠不可食兔肉山羊肉及鱉雞鴨令子無聲音程妊娠食兔肉則令子缺唇食羊肉則令子多熱食鱉肉則令子項短不令無聲音也若食犬肉則令子無聲音雞鴨肉胎産需以補益二者不必忌之鑑此數者妊婦皆不當食也案二說未詳孰是故兩存之兔肉不可合白雞肉食之令人面發黃外臺引肘後云兔肉不可雜獺肉及白雞心食鑑二物合食動脾氣而發黃故不可合食千金黃帝云兔肉和獺肝食之三日必成遁尸共白雞肝心食之令人而失色一年成疸黃兔肉著乾薑食之成霍亂程兔肉味酸乾薑味辛辛能勝酸故合食之成霍亂陶弘景曰並不可與橘芥同食二味亦辛物也凡鳥自死口不閉翅不合者不可食之外臺引肘後閉作開程鳥自死必斂翅閉口若張翅開口其死也異其肉也必毒不可食之諸禽肉肝青者食之殺人程青者必毒物所傷故食之能殺人雞有六翮四距者不可食之千金引黃帝作六距本草引食療作六指鑑距雞腳爪也形有怪異者有毒故不可食烏雞白首者不可食之鑑色有不相合者有毒不可食雞不可共葫蒜食之滯氣原注一云雞子案葫蒜即大蒜程雞能動風蒜能動痰風痰發動則氣壅滯山雞不可合鳥獸肉食之程山雞鸐雞也小於雉而尾長人多畜之樊中性食蟲蟻而有毒非唯不可共鳥獸肉同食即單食亦在所忌也雉肉久食之令人瘦程雉肉有小毒發瘡疥生諸蟲以此則令人瘦鴨卵不可合鱉肉食之程鴨卵性寒發冷氣鱉肉性冷亦發冷氣不可合食婦人妊娠食雀肉令子淫亂無恥金鑑肉下有飲酒二字案此依陶弘景注而補之程雀性最淫周書云季秋雀入大水為蛤雀不入水國多淫泆物類相感理所必然妊娠當戒食之古慎胎教也雀肉不可合李子食之程雀肉壯陽益氣得李子酸澀則熱性不行故不可共食燕肉勿食入水為蛟龍所啖程淮南子曰燕入水為蜃蛤高誘注謂蚊龍嗜燕人食燕者不可入水而祈禱家用燕召龍能興波祈雨故名遊波雷公曰海竭江枯投遊波而立泛其召龍之說似亦有之也鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及鹽汁服之解程箭藥多是射罔毒射罔乃烏頭所熬大豆汁能解烏頭毒故也咸能勝熱故鹽亦解其毒巢源云射獵人多用射罔藥塗箭頭以射蟲鹿傷皮則死以其有毒故也人獲此肉除箭處毒肉不盡食之則被毒致死其不死者所誤食肉處去毒箭遠毒氣不深其毒則輕雖不死猶能令人困悶吐利身體痹不安罔藥以生烏頭搗汁用作之是也案肘後云肉有箭毒以藍汁大豆解射罔毒又外臺引張文仲云禽獸有中毒箭死者其肉有毒可以藍汁大豆解射罔也依此則鹽是藍之訛字形相似也千金云甘草解百藥毒方稱大豆汁解百藥毒余試之大懸絶不及甘草又能加之為甘豆湯其驗尤奇魚頭正白如連珠至脊上食之殺人以下四條外臺引肘後魚頭中無鰓者不可食之殺人程能殺人詳酉陽雜俎魚無腸膽者不可食之三年陰不起女子絶生魚頭似有角者不可食之魚目合者不可食之鑑以上皆怪異之形色必有毒也六甲日勿食鱗甲之物程六甲日有六甲之神以直日食鱗甲則犯其忌也本草思邈云損人神魚不可合雞肉食之外臺引肘後程今人常合食之亦不見為害或飛潛之物合食所當忌耶或過之不消則魚能動火雞能動風能令作病耶本草弘景雲雞同魚汁食成心瘕魚不得合鸕鷀肉食之外臺引肘後程鸕鷀食魚物相制而相犯也不可合食本草孟詵云鸕鷀性制魚若合食不利人鯉魚鮓不可合小豆藿食之其子不可合豬肝食之害人程鯉魚鮓小豆藿味皆咸咸能勝血故陶弘景雲合食成消渴其子合豬肝食傷人神鑑小豆藿即小豆葉也鯉魚不可合犬肉食之外臺引肘後犬上有白字程鯉魚犬肉俱令熱中不可合食鯽魚不可合猴雉肉食之一云不可合豬肝食外臺引肘後雉肉作豬肝程鯽魚同猴雉肉豬肝食生癰疽鯷魚合鹿肉生食令人筋甲縮外臺引肘後云鯷魚不可合鹿肉食之程鯷魚鮎魚也鯷魚鹿肉皆能治風生食反傷其筋脈致令筋甲縮青魚鮓不可合生胡荽及生葵並麥醬食之醬原本作中今依程本金鑑改之外臺引肘後作醬程青魚鮓不益人胡荽生葵能動風發痼疾必與青魚鮓不相宜鮓味鹹麥醬亦咸合食必作消渴鰍鱔不可合白犬血食之程鰍鱔為無鱗魚白犬血為地厭非唯不可合食抑衛生家所當忌也又鰍鱔善竄能動風白犬血性熱能動火是不可合食龜肉不可合酒果子食之外臺引肘後云不可合瓜及飲酒程仲景以龜肉忌酒果子而蘇恭以龜肉釀酒治大風陶弘景曰龜多神靈人不可輕殺更不可輕啖也果子亦不知何果鱉目凹陷者及厭下有王字形者不可食之凹趙作回非厭趙及外臺引肘後作壓程金鑑作腹程淮南子曰鱉無耳以目為聽目凹陷則歷年多而神內守故名曰神守若有王字則物已靈異矣食之有害案厭壓並與厴同唐韻厴於琰反腹下厴其肉不得合雞鴨子食之外臺引肘後趙其上有又字程鱉肉令人患水雞子令人動風鴨子令人氣短不可合食龜鱉肉不可合莧菜食之外臺引肘後程龜鱉肉皆反莧菜食之成鱉瘕陶弘景雲昔有人銼鱉以赤莧同包置濕地經旬皆成生鱉蝦無須及腹中通黑煮之反白者不可食之外臺引肘後程無須失蝦之形腹黑必蝦之毒色白反蝦之色物既反常必不可食食膾飲乳酪令人腹中生蟲為瘕程鱠乃生魚所作非胃弱所宜乳酪之性黏滯合而食之則停留於胃為瘕為蟲也鱠食之在心胸間不化吐復不出速下除之久成癥病治之方橘皮一兩朴硝二兩大黃二兩肘後千金用三兩上三味以水一大升煮至小升頓服即消案據千金大升當二升小升當一升程橘皮能解魚毒硝黃能下癥瘕千金治食魚鱠及生肉在胸膈中不化吐之不出便成癥瘕方厚朴三兩大黃二兩上二味㕮咀以酒二升煮取一升盡服立消人強者倍大黃用酒三升煮取二升再服之又治食魚鱠不消方大黃三兩切朴硝二兩上二味以酒二升煮取一升頓服之注云仲景方有橘皮一兩肘後食豬肉遇冷不消必成蟲癥下之方大黃朴硝各一兩芒硝亦佳煮取一升盡服之若不消並皮研杏子湯三升和三服吐出神驗食鱠多不消結為癥病治之方外臺引肘後作療食鱠過多冷不消不療必成蟲瘕馬鞭草上一味搗汁飲之或以姜葉汁飲之一升亦消又可服吐藥吐之外臺引肘後作馬鞭草搗絞取汁飲一升即消去亦宜服諸吐藥吐之千金同云生薑亦良程馬鞭草味苦寒下癥瘕破血姜葉亦能解魚毒食魚後食毒兩種煩亂治之方千金注引肘後云治食魚中毒面腫煩亂者今本面腫以下無橘皮濃煎汁服之即解千金云煮橘皮停極冷飲立驗程神農經曰橘皮主胸中瘕熱逆氣通神明魚毒食毒俱可解食鯸鮧魚中毒方徐沈無鮧字非蘆根煮汁服之即解肘後云食鱸魚肝及鯸鮧魚中毒銼蘆根煮汁飲一二升良鑑鯸鮧即河豚魚味美其腹膄呼為西施乳頭無鰓身無鱗其肝毒血殺人脂令舌麻子令腹脹眼令目花惟蘆根汁能解之程河豚畏蘆根故其汁可解其毒巢源云此魚肝及腹內子有大毒不可食食之往往致死蟹目相向足斑目赤者不可食之外臺引肘後程蟹骨眼而相背相向者其蟹異足斑目赤者其蟹毒故不可食食蟹中毒治之方紫蘇煮汁飲之三升紫蘇子搗汁飲之亦良徐沈脫子字外臺引肘後療食蟹及諸肴膳中毒方濃煮香蘇飲汁一升解本仲景方證類本草引金匱方三升下云以子汁飲之亦治凡蟹未經霜多毒又方冬瓜汁飲二升食冬瓜亦可程紫蘇冬瓜並解魚蟹毒傅肱蟹譜云不可與柿子同食發霍亂孟詵云大黃紫蘇冬瓜汁解之即瘥凡蟹未遇霜多毒其熟者乃可食之外臺引肘後者作煮程未遇霜者霜降節前也節前食水莨菪故有毒霜降節後食稻將蟄則熟而味美乃可食也莨菪生水濱有大毒巢源云此蟹食水莨水莨有大毒故蟹亦有毒則悶亂欲死若經霜以後遇毒即不能害人未被霜蟹煮食之則多有中毒令人悶亂精神不安肘後云是水莨所為蟛蜞亦有毒蔡謨食之幾死本草云未被霜甚有毒食水莨菪所致人中之多死霜後將蟄故味美乃可食之案熟字外臺巢源為熟煮之義然蟹非可生食物則其不熟煮者人亦不食因疑熟或是蟄之訛蜘蛛落食中有毒勿食之程蜘蛛有毒落食中或有尿有絲黏食上故不可食凡蜂蠅蟲蟻等多集食上食之致瘻程蜂蠅蟲蟻稟濕熱而有毒集食上而人食之濕熱之毒傳於肌肉致生瘻瘡案巢源有蜂瘻蠅瘻蟻瘻皆由飲食內有蜂蠅等因誤食之毒入於五臟流出經絡變生諸瘻證證各異今不繁引果實菜谷禁忌並治第二十五果子生食生瘡程諸果之實皆成於夏秋稟濕熱之性食之故令生瘡果子落地經宿蟲蟻食之者人大忌食之程落地經宿則果壞蟲蟻食之則果毒在人大忌食之令人患九漏生米停留多日有損處食之傷人程有損處謂為蟲鼠所食皆有毒故傷人桃子多食令人熱仍不得入水浴令人病淋瀝寒熱病沈無寒字程金鑑作寒熱淋瀝病並非程桃實酸甘辛生於春則味酸成於夏則酸甘成於秋則酸辛其性熱故多食令人熱也若多食而入水浴則酸味不得內泄多令人癃水寒之氣因而外客故令人寒熱也案淋瀝寒熱連綿不已之謂肘後云尸注大略使人寒熱淋瀝恍恍默默不的知其所苦又外臺云勞極之病吳楚謂之淋瀝是也程及金鑑以為癃誤千金黃帝云飽食桃入水浴成淋病此是別義杏酪不熟傷人金鑑一云殺人程古人杏酪以酒蜜釀成亦有甘草生薑汁熬成者以杏仁有毒半生半熟皆能害人也今人另有製法案杏酪一名杏酥藏器云服之潤五臟去痰嗽生熟吃俱可若半生半熟服之殺人金鑑為杏酪二物誤梅多食壞人齒千金食治同程梅實能致津液津液出則骨傷以腎主五液齒為腎之標故也案時珍發明詳論此理程注本之當參考案本草食梅齒齼者嚼胡桃肉解之蓋胡桃補腎也李不可多食令人臚脹鑑李味酸澀若多食則中氣不舒故令人腹脹林檎不可多食令人百脈弱千金同程林檎酸澀而閉百脈故多食令人百脈弱橘柚多食令人口爽不知五味程橘柚味酸能戀膈生痰聚飲飲聚膈上則令口痰不知咳鑑尚書注小曰橘大曰柚二者其味皆酸而性寒若過食則口雖爽而五味不知焉案時珍云橘皮下氣消痰其肉生痰聚飲表裡之異如此程注本之但爽字未妥案爾雅釋言爽瘥也忒也老子五味令人口爽乃為口失味之義梨不可多食令人寒中金瘡産婦亦不宜食千金云金瘡産婦勿食令人萎困寒中程梨性大寒故令人寒中寒能凝血脈故金瘡産婦不宜食櫻桃杏多食傷筋骨鑑櫻桃杏味酸性寒若過食則傷筋骨內經云酸則傷筋寒主傷骨故傷筋骨安石榴不可多食損人肺肺徐沈作腹千金與原文同鑑安石榴味酸澀酸澀則氣滯肺主氣宜利而不宜滯滯則傷損矣故不可過食也本草震亨云榴者留也其汁酸性滯戀成痰胡桃不可多食令人動痰飲千金云動痰飲令人噁心吐水吐食程胡桃能潤肺消痰今令人動痰飲何也以胡桃性熱多食則煎熬津液而為痰飲矣生棗多食令人熱渴氣脹寒熱羸瘦者彌不可食傷人千金食治方程生棗味甘辛氣熱以辛熱則令人渴甘則令人氣脹也羸弱者內熱必盛而脾胃必虛故彌不可食食諸果中毒治之方豬骨燒過過趙作灰金鑑二字作煅黑上一味末之水服方寸匕亦治馬肝漏脯等毒程豬骨治諸果毒亦治馬肝漏脯毒其義不可曉鑑以豬骨治果子毒物性相制使然治馬肝毒者以豬畜屬水馬畜屬火此水剋火之義也治漏脯毒者亦骨肉相感之義也木耳赤色及仰生者勿食菌仰卷及赤色者不可食證類引金匱玉函耳下赤字作青程木耳諸菌皆覆卷仰卷則變異色赤則有毒故不可食食諸菌中毒悶亂欲死治之方人糞汁飲一升土漿飲一二升大豆濃煮汁飲之服諸吐利藥並解鑑李彣曰悶亂欲死毒在胃也服吐利藥並解使毒氣上下分消也巢源云凡園圃所種之菜本無毒但菌菌等物皆是草木變化所生出於樹者為菌生於地者為菌並是鬱蒸濕氣變化所生故或有毒者人食遇此毒多致死甚疾速其不死者猶能令煩悶吐利良久始醒千金治食山中樹菌中毒方人屎汁服一升良又解諸菌毒掘地作坑以水沃中攪令濁澄清飲之名地漿本草陳藏器云菌冬春無毒秋有毒有蛇蟲從下過也夜中有光者欲爛無蟲者煮之不熟者煮訖照人無影者上有毛下無紋者仰卷赤色者並有毒殺人中其毒者地漿及糞清解之宋周密癸辛雜識云嘉定乙亥歲楊和王墳上感慈庵僧德明遊山得奇菌歸作糜供家毒發僧行死者十餘人德明亟嘗糞獲免有日本僧定心者寧死不汙至膚理坼裂而死清吳林吳菌譜云鏡水忍可禪師在寧國山中一日與僧三四人食菌俱中毒剎那間二便頻遺身軟口呿正窘急時欻有市藥者上山僧衆言其故隨以甘草濃煎灌之同時獲愈又陽山西花巷有人在一荒墩上採菌一叢煮而食之卒然毒發膚如琉璃使人往採菌處察之見菌叢生如故即掘見一古冢滿中是蛇即以甘草煎湯啜之尋愈故余每於臘月中糞坑內浸甘草人中黃以治菌毒及天行疫毒伏氣熱病痘科毒甚不能貫漿者悉有神效其法用甘草為末將毛竹筒一段兩頭留節刮去青皮節上開一竅納甘草於中仍以芭蕉葉柄削針閉竅浸糞坑中四十九日須至立春日取出陰乾任用食楓樹菌而笑不止治之以前方樹笑並原本作柱哭今據程本金鑑改之程弘景曰楓木上生者令人笑不止以地漿解之鑑李彣曰心主笑笑不止是毒氣入心也張氏醫說云四明溫臺間山谷多生菌然種類不一食之間有中毒往往至殺人者蓋蛇毒氣所熏蒸也有僧教掘地以冷水攪之令濁少頃取飲者皆得全活此方見本草陶隱居注謂之地漿亦治楓樹菌食之笑不止俗言食笑菌者居山間不可不知此法案陶谷清異録云菌菌有一種食之令人得乾笑疾士人戲呼為笑矣乎此間無楓樹然間有食菌而笑不已者此豈所謂笑矣乎者耶誤食野芋煩毒欲死治之方原注以前方其野芋根山東人名魁芋人種芋三年不收亦成野芋並殺人程野芋三年不收又名梠芋味辛冷有毒只可敷摩瘡腫人若食之中其毒土漿豆汁糞汁俱可解也本草陶弘景雲野芋形葉與芋相似芋種三年不採成梠音呂芋並能殺人誤食之煩悶垂死者惟以土漿及糞汁大豆汁飲之則活矣程注摩敷瘡腫出於時珍蜀椒閉口者有毒誤食之戟人咽喉氣病欲絶或吐下白沫身體痹冷急治之方病肘後作便外臺作戟人咽使不得出氣便欲絶肘後下字無肉桂煎汁飲之肘後無肉字多飲冷水一二升肘後多作若外臺同或食蒜肘後作大蒜或飲地漿肘後云慎不可飲熱殺人或濃煮豉汁飲之並解外臺引肘後云又急飲酢又食椒不可飲熱飲熱殺人程蜀椒氣大熱有毒味辛麻閉口者毒更甚辛則戟人咽喉麻則令人吐下白沫身體痹冷也冷水地漿豉汁寒涼能解熱毒其桂蒜大熱而肘後諸方亦云解椒毒不知其義豈因其氣欲絶身體冷痹而用耶鑑如桂與蒜皆大辛大熱之物通血脈辟邪穢以熱治熱是從治之法也正月勿食生蔥令人面生遊風程正月甲木始生人氣始發蔥能走頭面而通陽氣反引風邪而病頭面故令生遊風案遊風未詳千金頭面風鴟頭酒治風頭眩轉面上遊風方又菊花散治頭面遊風方又本事方知母湯治遊風攻頭面或四肢作腫塊此似指頭風眩運又千金面藥門有治面上風方即指鼻皰等此云生遊風則當是鼻皰面皯粉刺等之謂二月勿食蓼傷人腎程扁鵲云食蓼損髓少氣減精二月木正旺若食蓼以傷腎水則木不生故二月勿食三月勿食小蒜傷人志性千金黃帝云程小蒜辛熱有毒三月為陽氣長養之時不可食此奪氣傷神之物四月八月勿食胡荽傷人神程胡荽葷菜也辛芳之氣損人精神四月心火正旺八月肺將斂以心藏神而肺藏魄食此走散之物必能傷神也五月勿食韭令人乏氣力程韭菜春食則香夏食則臭脾惡臭而主四肢是以令人乏氣力案春香夏臭出於寇宗奭五月五日勿食一切生菜發百病千金黃帝云程五月五日為天中節為純陽日人當養陽以順令節若食生菜則伐天和故生百病六月七月勿食茱萸傷神氣千金引黃帝氣下有起伏氣三字程六七月陽氣盡發吳茱萸辛熱辛能走氣故傷神氣八月九月勿食姜傷人神程八九月人氣收斂姜味辛發食之則傷神也雲笈七籤曰九月食生薑成痼疾孫真人曰八九月食姜至春多患眼損筋力減壽朱晦庵有秋姜夭人天年之語謂其辛走氣瀉肺也案秋不食姜令人瀉氣出於本綱李杲之說十月勿食椒損人心傷心脈千金黃帝云案自正月止於勿食椒外臺引仲景方程內經曰九月十月人氣在心椒能走氣傷心故傷心脈十一月十二月勿食薤令人多涕唾程薤白氣味冷滑能引涕唾非獨十一月十二月然也四季勿食生葵令人飲食不化發百病非但食中藥中皆不可用深宜慎之程脾王四季生葵冷滑非脾所宜發病之物藥餌中皆不宜也時病瘥未健食生菜手足必腫千金引黃帝必下有青字程時病熱病也熱病所瘥而脾胃尚弱食生菜則傷脾故令手足浮腫夜食生菜不利人程夜食生菜則易停留而難轉化不利於人也十月勿食被霜生菜令人面無光目澀心痛腰疼或發心瘧瘧發時手足十指爪皆青困委千金黃帝云程道藏云六陰之月萬物至此歸根覆命以待來復不可食寒冷以伐天和生菜性冷經霜則寒寒冷之物能損陽氣食之能發上證素刺瘧論云心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰三因云病者心煩欲飲清水反寒多不甚熱乍來乍去以喜傷心心氣耗散所致名曰心瘧蔥韭初生芽者食之傷人心氣程萌芽含抑鬱之氣未伸食之能傷心氣飲白酒食生韭令人病增鑑酒多濕韭性熱濕熱相合令人病增生蔥不可共蜜食之殺人獨顆蒜彌忌程孫真人曰蔥同蜜食令人利下獨蒜氣味辛臭與蜜更不宜也案本草思邈曰燒蔥同蜜食壅氣殺人又云大蒜合蜜食殺人棗合生蔥食之令人病程棗與蔥食令人五臟不和鑑此義未詳生蔥和雄雞雉白犬肉食之令人七竅經年流血鑑李彣曰此皆生風發火之物若合食則血氣更淖溢不和故七竅流血食糖蜜後四日內食生蔥韭令人心痛韭趙作蒜程蜜與蔥韭蒜皆相反雖食蜜後四日內尤忌之相犯仍令人心痛千金黃帝云食生蔥即啖蜜變作下利食燒蔥並啖蜜擁氣而死案糖說文飴也方言餳謂之糖明是糖與蜜各別程金鑑言蜜而不及糖何夜食諸姜蒜蔥等傷人心程人之氣晝行於陽而夜行於陰夜食辛物以擾乎陽則傷上焦心膈之陽氣也蕪菁根多食令人氣脹千金同程蕪菁即蔓菁也多食動氣案多食動氣出於宗奭薤不可共牛肉作羹食之成瘕病韭亦然千金黃帝云程薤韭牛肉皆難克化之物積而不消則為癥瘕蓴多食動痔疾食原本沈作病非今改之千金同程李廷飛曰蓴性滑故發痔疾鑑滑而易下故發痔疾野苣不可同蜜食之作內痔千金引黃帝無內字本綱引本經作肉痔程野苣苦蕒也性苦寒能治痔與蜜同食復生內痔物性相忌則易其性也白苣不可共酪同食作䘌蟲千金引黃帝無䘌字程白苣苦寒乳酪甘寒合食停於胃中則生蝕䘌時珍云白苣處處有之似萵苣而葉色白折之有白汁四月開黃花如苦蕒結子黃瓜食之發熱病程黃瓜動寒熱虛熱天行熱病後皆不可食案此注本孟詵案藏器曰胡瓜北人避石勒諱改呼黃瓜至今因之而今此稱黃瓜則避石勒諱之說難信歟葵心不可食傷人葉尤冷黃背赤莖者勿食之程葵心有毒其葉黃背赤莖者亦有毒不可食案弘景雲葵葉尤冷利不可多食葵心此猶蓴心桃葉心之心謂葵菜嫩心也胡荽久食之令人多忘千金同程胡荽開心竅傷神久食之故令人多忘病人不可食胡荽及黃花菜鑑胡荽耗氣黃花菜破氣耗血皆病人忌食案本綱黃瓜菜一名黃花菜始出於汪穎食物本草本經所指未知此物否芋不可多食動病案千金云動宿冷程芋難克化滯氣困脾案此注本於宗奭妊婦食姜令子余指程余指六指也姜形如列指物性相感也博物志云妊娠啖生薑令兒多指蓼多食發心痛程孫真人曰黃帝云食蓼過多有毒發心痛以氣味辛溫故也蓼和生魚食之令人奪氣陰咳疼痛咳程金鑑作核是程生魚鮓之屬合食則相犯令人脫氣陰核痛鑑陰核痛亦濕熱致病耳案千金云黃帝書曰食蓼過多有毒發心痛和生魚食令人脫氣陰核痛求死又黃帝云食小蒜啖生魚令人奪氣陰核疼求死陰核即陰丸也芥菜不可共兔肉食之成惡邪病千金黃帝云程芥菜昏人眼目兔肉傷人神氣合食必為惡邪之病小蒜多食傷人心力程小蒜辛溫有小毒發痼疾多食氣散則傷心力食躁或躁方或趙徐作式豉濃煮汁飲之程豉汁雖能解毒而躁字有誤鑑食躁或躁者即今之食後時或噁心欲吐不吐之病也故以豉湯吐之鉤吻與芹菜相似誤食之殺人解之方原注肘後云與茱萸食芹相似今本肘後芹作芥無茱萸二字千金引肘後云鉤吻茱萸食芥相似外臺引肘後云鉤吻與食芹相似肘後又云此非鉤吻薺苨八兩上一味水六升煮取二升分溫二服原注鉤吻生地旁無他草其莖有毛以此別之案此注千金外臺引肘後接前與食芹相似為一條千金云煮取三升冷如人體服五合日三夜二凡煮薺苨惟令濃佳肘後外臺無此文案外臺引肘後又云此多生籬埒水瀆邊絶似茶人識之無敢食但不知之必是鉤吻按本草鉤吻一名野葛又秦鉤吻乃併入藥用非此又一種葉似黃精唯花黃莖紫亦呼為鉤吻不可食故經方引與黃精為比言其形色相似也本經所謂與芹菜相似者別是一種陶氏於本草則云鉤吻是毛茛而於肘後則云此非鉤吻蓋以蔓生者為鉤吻以似芹者為毛茛耶唐本注已辨其非當考本草蓋鉤吻有數種故古人所說不一者以其所見各不同也今以此間所有考之藤本之外草本木本黃精葉及芹葉凡五種皆見有俚人誤食中毒者則知當據各書所論而辨其物也若欲強併為一草則謬矣菜中有水莨菪葉圓而光有毒誤食之令人狂亂狀如中風或吐血治之方甘草煮汁服之即解程薺苨甘草解百藥毒蘇敬唐本注云毛茛是有毛石龍芮也百一方云菜中有水茛葉圓而光生水旁有毒蟹多食之案此草生水旁其毒如莨菪故名之水莨菪蘇氏以為毛茛引百一方此豈水茛下脫菪字耶外臺引肘後亦云食蟹中毒或云是水茛所為時珍不辨茛莨作水茛附於釋名中恐疏案莨音浪茛音艮云葉圓而有光則水莨菪即是石龍芮而毛茛葉有毛而無光千金治食莨菪悶亂如卒中風或似熱盛狂病服藥即劇飲甘草汁藍汁肘後療食野葛已死者飲甘草汁但唯多更善外臺備急療諸藥各各有相解然難常儲今但取一種而兼解衆毒求之易得者甘草濃煮汁多飲之無不生也又食少蜜佳千金甘草湯主天下毒氣及山水露霧毒氣去地風氣瘴癘等毒方甘草二兩上一味以水二升煮取一升分服春秋二時龍帶精入芹菜中人偶食之為病發時手青腹滿痛不可忍名蛟龍病治之方青原本作背今據趙本及證類本草改之硬糖二三升千金云服寒食餳三斗大驗上一味口兩度服之吐出如蜥蜴三五枚瘥程芹菜生江湖陂澤之涯蛟龍雖云變化莫測其精那能入此大抵是蜥蜴虺蛇之類春夏之交遺精於此故耳且蛇嗜芹尤為可證按外臺祕要云蛟龍子生在芹菜上食之入腹變成龍子須慎之飴粳米杏仁乳餅煮粥食之吐出蛟子大驗仲景用硬糖治之余考之本草並無硬糖當是粳米飴糖無疑二物味甘甘能解毒故也金鑑同案程所引外臺文並無考詳見下案劉熙釋名云糖之清者曰飴形怡怡然也稠者曰餳強硬如錫也時珍云古人寒食多食餳故醫方亦收用之明硬糖即是餳程注殆妄矣千金云開皇六年三月八日有人食芹得之其人病發似癲癇面色青黃因食寒食餳過多便吐出狀似蛟龍有頭有尾外臺廣濟療蛟龍病三月八月近海及水邊因食生芹為蛟龍子生在芹菜上食入人腹變成龍子須慎之其病發似癲面色青黃少腹脹狀如懷妊宜食寒食餳方寒食粥餳三升日三服之吐出蛟龍有兩頭及尾開皇六年又賈橋有人吃餳吐出蛟龍大驗醫說云古有患者飲食如故發則如癲面色青黃小腹脹滿狀如妊孕醫者診其脈與證皆異而難明主療忽有一山叟曰聞開皇六年灞橋有人患此病蓋因三月八日水邊食芹菜得之有識者曰此蛟龍病也為龍游於芹菜之上不幸食之而病也遂以寒食餳每劑五合服之數劑吐出一物雖小但似蛟龍狀而有兩頭其病者依而治之獲愈出名醫録食苦瓠中毒治之方黍穰黍原本作黎今依程本金鑑及肘後外臺改之案穰禾莖也黎何有穰其訛明矣煮汁數服之解肘後外臺作飲濃汁數升程苦瓠匏也詩云匏有苦葉國語云苦匏不材於人共濟而已此苦瓠也黍穰能解苦瓠毒者風俗通云燒穰可以殺瓠或云種瓠之家不燒穰種瓜之家不燒漆物性相畏也人食苦瓠過分吐利不止者以黍穰汁解之本諸此程注本於時珍蘇敬云服苦瓠過分吐利不止者以黍穰灰汁解之扁豆寒熱者不可食之本草引弘景鑑扁豆性滯而補如患寒熱者忌之久食小豆令人枯燥程小豆逐津液利小便津液消減故令肌膚枯燥千金云赤小豆不可久服令人枯燥食大豆屑忌啖豬肉屑原本作等今據徐程及千金改之程大豆壅氣豬肉滯膈故忌之小兒十歲以下尤忌千金云大豆黃屑忌豬肉小兒以炒豆豬肉同食必壅氣致死十有八九十歲以上不畏也大麥久食令人作㿍沈作癬程大麥下氣久食令手足痿弱而懈惰鑑李彣曰㿍疥同蓋麥入心久食則心氣盛而內熱內經曰諸瘡瘍皆屬心火故作㿍案㿍字典俗疥字而農家多常食大麥未盡患疥李注不可從孟詵云暴食似腳弱為下氣故也程則本此白黍米不可同飴蜜食亦不可合葵食之程黍米令人煩熱飴蜜令人中滿故不可同食黍米合葵食成痼疾亦不可合食千金黃帝云五種黍米合葵食之令人成痼疾荍麥麵多食之令人發落案本綱蕎麥一名荍音翹麥千金黃帝云蕎麥作麵和豬羊肉熱食之不過八九頓作熱風令人眉須落又還生仍稀少涇邠以北多患此疾今蕎麥麵人多食之未有發落者此必脫和豬羊肉等字程金鑑並云蕎字有誤當詳之蓋失考耳鹽多食傷人肺程鹽味鹹能傷腎又傷肺多食發哮喘為終身痼疾也千金云鹽不可多食傷肺喜咳令人色膚黑損筋力食冷物冰人齒食熱物勿飲冷水鑑寒熱相搏脾胃乃傷飲酒食生蒼耳令人心痛鑑酒性純陽蒼耳味苦有毒苦先入心飲酒以行其毒故心痛夏月大醉汗流不得冷水洗著身及使扇即成病程夏月大醉汗流浴冷水即成黃汗扇取涼即成漏風飲酒大忌灸腹背令人腸結程金鑑無忌字程毋灸大醉人此灸家所必避忌也資生經下經云灸時不得傷飽大飢飲酒醉後勿飽食發寒熱鑑醉則肝膽之氣肆行木來侮土故曰勿食飽發寒熱飲酒食豬肉臥秫稻穰中則發黃程飲酒而食肉則腠理開臥稻穰中則濕熱入是以發黃也食飴多飲酒大忌鑑諺云酒家忌甘此義未詳凡水及酒照見人影動者不可飲之程此涉怪異宜不可飲醋合酪食之令人血瘕程醋酸斂而酪黏滯令作血瘕千金黃帝云食甜酪竟即食大酢者變作血瘕及尿血食白米粥勿食生蒼耳成走注程白米粥能利小便蒼耳子能搜風小便利而食搜風之物虛其經絡反致走注疼痛鑑同食成走注病然必性味不合也巢源云走注候注者住也言其病連滯停住死又注易傍人也人體虛受邪氣邪氣隨血而行或淫奕皮膚去來擊痛遊走無有常所故名為走注千金黃帝云食甜粥復以蒼耳甲下之成走注食甜粥已食鹽即吐程甘者令人中滿食甜物必泥於膈上隨食以鹽得咸則湧泄也犀角箸攪飲食沫出及澆地墳起者食之殺人鑑抱朴子云犀食百草及衆木之棘故知飲食之毒若攪飲食沫出者必有毒也澆地墳起者此怪異也故食之殺人抱朴子云蠱之鄉有飲食以此角攪之有毒則生白沫無毒則否國語云置鴆於酒置堇於肉公祭之地地墳與犬犬斃韋昭注墳起也又範寧注穀梁云地賁賁沸起也飲食中毒煩滿治之方千金滿作悶外臺引千金苦參三兩苦酒一升半千金用酒二升半不用苦酒外臺同上二味煮三沸三上三下服之吐食出即瘥或以水煮亦得程酸苦湧泄為陰苦參之苦苦酒之酸所以湧泄煩滿而除食毒又方犀角湯亦佳肘後附方引梅師方云或取煮犀角汁一升亦佳鑑中毒煩滿毒在胃中犀角解胃中毒千金治諸食中毒方飲黃龍湯及犀角汁無不治也飲馬尿亦良貪食食多不消心腹堅滿痛治之方鹽一升水三升上二味煮令鹽消分三服當吐出食便瘥程鹹味湧泄鹽水以越心腹堅滿千金治霍亂蠱毒宿食不消積冷心腹煩滿鬼氣方用極鹹鹽湯三升熱飲一升以指刺口令吐宿食使盡不吐更服訖復飲三吐乃住此法大勝諸治俗人以為田舍淺近法鄙而不用守死而已凡有此病即須先用之礬石生入腹破人心肝亦禁水程礬石傷骨蝕肉內用必傷心肝也礬石得水則化故亦禁水本草吳普云礬石久服傷人骨宗奭云礬石不可多服損心肺卻水故也水化書紙上干則水不能濡故知其性卻水也商陸以水服殺人程商陸有大毒能行水而忌水服物性相惡而然也葶藶子敷頭瘡藥成入腦殺人徐沈並云成恐是氣字程金鑑作氣鑑葶藶大寒雖能敷瘡殺蟲然藥氣善能下行則瘡毒亦攻入腦矣故殺人水銀入人耳及六畜等皆死以金銀著耳邊水銀則吐徐沈並云吐疑是出鑑水銀大毒入耳則沉經墮絡皆能死人以金銀著耳門引之則吐出此物性感召之理猶磁石之引針也苦楝無子者殺人程苦楝有雌雄兩種雄者無子根赤有毒服之使人吐不能止時有至死者雌者有子根白微毒可入藥用案此注本於宗奭凡諸毒多是假毒以投無知時宜煮甘草薺苨汁飲之通除諸毒藥案無原本作元無元字形相似故訛耳程金鑑作無是也投無徐沈作損元不可從程凡諸毒多借飲食以投毒而服毒之人原自不知若覺之則時時煮甘草薺苨湯飲之以二物能解草石百毒也外臺引肘後云諸饌食直爾何容有毒皆是以毒投之耳既不知是何處毒便應煎甘草薺苨湯療之漢質帝食餅魏任城王啖棗皆致死即其事也證類本草云金匱玉函治誤飲饌中毒者未審中何毒卒急無藥可解只煎甘草薺苨湯服之入口便活案與本經文頗異故録備考巢源云凡人往往因飲食忽然困悶少時致甚乃至死者名為飲食中毒言人假以毒物投食里而殺人但其病頰內或懸壅內初如酸棗大漸漸長大是中毒也急治則瘥久不治毒入腹則死但診其脈浮之無陽微細而不可知者中毒也
