body:
  text: 金匱玉函要略綜概案張仲景自序曰作傷寒雜病論合十六卷而梁七錄張仲景辨傷寒十卷新唐藝文志傷寒卒病論十卷此乃今所傳傷寒論所謂十六卷中之十卷其六卷則雜病論即今金匱要略其遺佚者元鄧珍序中亦嘗論之考千金方江南諸師秘仲景要方不傳隋巢元方作病源論其傷寒門中有傷寒論文而不著仲景之名蓋據小品所引而收載乎然於其婦人三十六疾則云仲景義最玄深非愚淺能解巢氏豈特寓目於雜病論而未及傷寒論耶孫思邈晚年獲仲景原本收翼方第九卷第十卷中而他門並無引仲景者孫氏豈特得研傷寒論而未及見雜病論耶後天寶中至王燾撰外臺秘要載此書方藥而云出張仲景傷寒論乃其不易舊目者原書或僅存於臺閣中而王氏特得窺之耶詳見傷寒綜概中意者仲景之書自晉經隋唐或顯或晦或離或合其傳不一如此蓋唐時有合傷寒雜病論改名金匱玉函以傳之者今玉函經亦是系乎唐末人所號即是傷寒論之異本如其總例則於晉及六朝經方中而湊合所撰疑出於道家者流也後人因刪略其要約為三卷更名曰金匱玉函要略歟不爾則其所以名要略之義竟不可曉焉況林億序云傷寒文多節略傷寒乃有傷寒全本故知其多節略至雜病則雖無他本可考以傷寒例之則其節略舊文可復知也林序又云依舊名曰金匱方論徐熔因謂王洙館中所得名曰金匱玉函要略方論系五代時改名耳然周禮疾醫職賈公彥疏張仲景金匱云神農能嘗百藥則炎帝者也今要略無此文豈系其所刪略耶以此知唐時已有金匱之目必非五代時改名也而隋及舊新唐志中無仲景金匱玉函究其目之所由晉書葛洪傳云洪著金匱藥方百卷據肘後方及抱朴子自云所撰百卷名曰玉函方則二者必是一書葛洪又著玉函煎方五卷見隋志由是觀之金匱玉函原是葛洪所命書即唐人尊宗仲景者遂取而為之標題以珍秘不出之故著錄失其目歟林億金匱玉函經疏云緣仲景有金匱錄故以金匱玉函名取寶而藏之義也案仲景金匱他書無其目唯宋本及俞稿本趙開美本林序後有一小序云仲景金匱錄云云僅出於此予每疑之然宋本已載之則此必唐末作要略者所撰其文原於肘後方序及抱朴子味其旨趣氾濫不經亦是道流之筆耳漢志有堪輿金匱十四卷高紀如淳云金匱猶金滕也師古曰以金為匱保慎之義王子年拾遺記周靈王時浮提之國獻神通善書二人佐老子撰道德經寫以玉牒編以金繩貯以玉函神仙傳衛叔卿入太華山謂其子度世曰汝歸當取吾齋室西北隅大柱下玉函函中有神素書取而按方合服之一年可能乘雲而行淮南要略訓高誘注曰鴻烈二十篇略數其要明其所指序其微妙論其大體也命名之義豈其出於此耶皇甫謐云仲景垂妙於定方晉書本傳陶弘景雲惟仲景一部最為眾方之祖又悉依本草但其善診脈明氣候以意消息之爾出本草序例二氏距仲景未遠其言如此然而要略中方論盡有不合繩墨者故今人或云某論非仲景之舊或云某方非仲景之真肆意刪改以為復古程林輩亦已論之此誤也巢氏病源引小品云華佗之精微方類單省而仲景經有侯氏黑散紫石英方皆數種相出入節度陳延之以晉初人其言亦如是此他至篇末宋人附方千金外臺中引仲景者頗多豈知今之致疑者盡非仲景之本論原方乎此宜存而不議焉近代清姚際恆著古今偽書考云金匱玉函經又名金匱要略稱漢張仲景撰晉王叔和集案此非仲景撰乃後人偽託者蓋概論也歷覽史志傷寒論玉函經及要略之外仲景書目猶載數部黃素方二十五卷傷寒身驗方一卷評病要方二卷以上出七錄療婦人方二卷出隋志陳自明婦人良方云男子婦人傷寒仲景治法別無異議比見民間有婦人傷寒方書稱仲景所撰而王叔和為之序以法考之間有可取疑非古方特假聖人之名以信其說於天下也張仲景方卷十五太平御覽引張仲景方序論載仲景及張伯祖衛沈事見隋志及舊新唐志脈經五臟榮衛論五臟論療黃經口齒論各一卷出宋志凡十部五十卷今無一存實可惜矣寬政甲寅春正月晦書於日光山中永觀精舍丹波元簡廉夫譔余曏者撰傷寒論輯義而又輯金匱方論之義屬草於文化丙寅九月十日呵凍揮汗未竟一期至今年八月六日而訖如綜概一篇乃十餘年前所著今略加改竄以揭卷首所校諸本曰宋本不載雜療以下曰徐熔本收於醫統正脈中曰俞稿本曰趙開美本也採輯注家徐者彬也論注程者林也直解沈者明宗也編注魏者荔彤也本義尤者怡也心典鑑者醫宗金鑑也程云明初有趙以德注嗣後有胡引年注方論訛舛甚多此間二家並無傳其體例一如傷寒輯義因不別作序及凡例唯恐考據未確舛漏猶多不敢示之大方聊以授兒輩云櫟蔭拙者元簡識男元胤元堅對讀
