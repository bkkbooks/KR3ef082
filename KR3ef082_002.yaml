body:
  text: 卷二血痹虛勞病脈證並治第六論一首脈證九條方九首問曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈因趙本作困臥上脈經有起字加作如關上下沈本有尺中二字千金但上有形如風狀四字緊上無小字脈經並同鑑歷節屬傷氣也氣傷痛故疼痛也血痹屬傷血也血傷腫故麻木也前以明邪氣聚於氣分此以明邪氣凝於血分故以血痹名之也尊榮人謂膏粱之人素食甘肥故骨弱肌膚盛重是以不任疲勞則汗出汗出則腠理開亦不勝久臥臥則不時動搖動搖即加被微風亦遂得以干之此言膏粱之人外盛內虛雖微風小邪易為病也然何以知病血痹也但以身體不仁脈自微澀則知邪凝於血故也寸口關上小緊亦風寒微邪應得之脈也針能導引經絡取諸痹故宜針引氣血以瀉其邪令脈不澀而和緊去邪散血痹自通也醫通云血痹者寒濕之邪痹著於血分也辛苦勞勩之人皮腠緻密筋骨堅強雖有風寒濕邪莫之能客惟尊榮奉養之人肌肉豐滿筋骨柔脆素常不勝疲勞行臥動搖或遇微風則能痹著為患不必風寒濕之氣雜至而為病也夫血痹者即內經所謂在脈則血凝不流仲景直髮其所以不流之故言血既痹脈自微澀然或寸或關或尺其脈見小急之處即風入之處也故其針藥所施皆引風外出之法也案五臟生成篇曰臥出而風吹之血凝於膚者為痹王注痹謂𤸷痹也廣韻𤸷音頑巢源千金間有頑痹之文知頑麻之頑原是𤸷字此即血痹也而易通卦驗曰太陽脈虛多病血痹鄭玄注痹者氣不達未當至為病蓋血痹之稱昉見於此千金云風痹遊走無定處名曰血痹後世呼麻木者即是活人書云痹者閉也閉而不仁故曰痹也本出於中藏經血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之千金作如風狀脈經作如風落狀並非鑑此承上條互詳脈證以明其治也上條言六脈微澀寸口關上小緊此條言陰陽寸口關上俱微尺中亦小緊合而觀之可知血痹之脈浮沉寸口關上尺中俱微俱澀俱小緊也微者虛也澀者滯也小緊者邪也故血痹應有如是之診也血痹外證亦身體頑麻不知痛癢故曰如風痹狀沈血痹乃陰陽營衛俱微邪入血分而成血痹中上二焦陽微所以寸口關上脈亦見微微邪下連營血主病故尺中小緊是因氣虛受邪而成血痹也用桂芍薑棗調和營衛而宣陽氣雖然邪痹於血因表陽失護而受邪故以黃耆補其衛外之陽陰陽平補俾微邪去而痹自開矣尤不仁者肌體頑痹痛癢不覺如風痹狀而實非風也以脈陰陽俱微故不可針而可藥經所謂陰陽形氣俱不足者勿刺以針而調以甘藥也案血氣形志篇王注不仁謂不應用則𤸷痹矣巢源血痹候云血痹者由體虛邪入於陰經故也血為陰邪入於血而痹故為血痹也其狀形體如被微風所吹此形容頑痹之狀也風痹諸家不注唯金鑑云不似風痹歷關節流走疼痛也此以風痹為歷節恐誤也巢源風痹候云痹者風寒濕三氣雜至合而成痹其狀肌肉頑厚或疼痛由人體虛腠理開故受風邪也據此則風痹乃頑麻疼痛兼有而血痹則唯頑麻而無疼痛歷節則唯疼痛而不頑麻三病各異豈可混同乎黃耆桂枝五物湯方黃耆三兩芍藥三兩桂枝三兩生薑六兩大棗十二枚趙本作十一枚非上五味以水六升煮取二升溫服七合日三服原注一方有人參案千金用人參三兩凡六味故單名黃耆湯無五物二字案據桂枝湯法生薑當用三兩而多至六兩者何生薑味辛專行痹之津液而和營衛藥中用之不獨專於發散也成氏嘗論之其意蓋亦在於此耶夫男子平人脈大為勞極虛亦為勞尤本極上有脈字魏虛勞者因勞而虛因虛而病也人之氣通於呼吸根於臟腑靜則生陰動則生陽陰陽本氣之動靜所生而動靜能生氣之陰陽此二神兩化之道也故一靜一動互為其根在天在人俱貴和平而無取於偏勝偏則在天之陽愆陰伏而化育乖在人則陽亢陰獨而疾病作然則虛勞者過於動而陽煩失於靜而陰擾陰日益耗而陽日益盛也是為因勞而虛因虛而病之由然也虛勞必起於內熱終於骨蒸有熱者十有七八其一二虛寒者必邪熱先見而其後日久隨正氣俱衰也夫脈大者邪氣盛也極虛者精氣奪也以二句揭虛勞之總而未嘗言其大在何脈虛則何經是在主治者隨五勞七傷之故而諦審之豈數言可盡者乎鑑李彣曰平人者形如無病之人經云脈病人不病者是也勞則體疲於外氣耗於中脈大非氣盛也重按必空濡乃外有餘而內不足之象脈極虛則精氣耗矣蓋大者勞脈之外暴者也極虛者勞脈之內衰者也男子面色薄者主渴及亡血卒喘悸脈浮者重虛也魏仲景再為驗辨之於色於證於脈以決之男子面色薄即不澤也此五臟之精奪而面色失其光潤也然光必在麵皮內蘊潤必在麵皮內敷方為至厚若夫見呈耀則亦非正厚色矣今言薄則就無光潤者言也其人必患消渴及諸失亡其血之疾因而喘於胸而悸於心卒者忽見忽已之謂沈陰血虛而陽氣則盛虛火上潛津液不充則渴氣傷而不攝血則亡血虛陽上逆沖肺卒喘心營虛而真氣不斂則悸尤脈浮為裡虛以勞則真陰失守孤陽無根氣散於外而精奪於內也男子脈虛沉弦無寒熱短氣裡急小便不利面色白時目瞑兼衄少腹滿此為勞使之然脈經作時時目瞑鑑此復申虛極為勞以詳其證之義也脈虛沉弦陰陽俱不足也無寒熱是陰陽雖不足而不相乘也短氣面白時瞑兼衄乃上焦虛而血不榮也裡急小便不利少腹滿乃下焦虛而氣不行也凡此脈證皆因勞而病也故曰此為勞使之然程白為肺色鼻為肺竅氣既不能下化則上逆於頭故目為之瞑迫於血而鼻為之衄也內經曰勞則氣耗其類是歟案本篇標男子二字者凡五條未詳其意諸家亦置而無說蓋婦人有帶下諸病産乳衆疾其證似虛勞而否者不能與男子無異故殊以男子二字別之歟勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行脈經酸上有足字行下有少陰虛滿四字酸削巢源作痠𤺊外臺作痠削徐脈大既為勞矣而更加浮其證則手足煩蓋陰既不足而陽必盛也魏邪本陰虧陽亢內生之焰也然亦隨天時為衰旺春夏者陽時也陰虛之病必劇秋冬者陰時也陰虛之病稍瘥火盛於上則必陽衰於下邪火熾於上焦邪寒凝於下焦陰寒即內迫陽精自外出為白濁為遺精為鬼交皆上盛下虛之必致也精既出奪必益虛寒腿腳痠軟肌肉瘦削遂不可行立而骨痿不能起於床矣案陰寒程云寒字作虛字看金鑑直以為傳寫之訛誤甚矣陰寒者陰冷也乃七傷之一巢源云腎主精髓開竅於陰今陰虛陽弱血氣不能相榮故使陰冷也久不已則陰痿弱是也魏為陰寒之氣亦非酸削巢源作痠𤺊周禮痟首疾注云痟酸削也疏云人患頭痛則有酸嘶而痛千金婦人門酸𢠹恍惚不能起居劉熙釋名云酸遜也遜遁在後也言腳疼力少行遁在後以遜遁者也消弱也如見割消筋力弱也即酸削痠𤺊酸嘶酸𢠹與酸削同朱氏格致餘論云內經冬不藏精者春必病溫若於此時縱嗜欲至春升之際必有溫熱病今人多春末夏初患頭痛腳軟食少體熱仲景謂春夏劇秋冬瘥正俗所謂注夏病也案本條所說與注夏病不相干此恐非也男子脈浮弱而澀為無子精氣清冷原注一作泠浮脈經巢源作微案泠水名作泠為是沈此以脈斷無子也男精女血盛而成胎然精盛脈亦當盛若浮弱而澀者浮乃陰虛弱為真陽不足澀為精衰陰陽精氣皆為不足故為精氣清冷則知不能成胎謂無子也蓋有生而不育者亦是精氣清冷所致乏嗣者可不知之而守養精氣者乎尤精氣交虧而清冷不溫此得之天稟薄弱故當無子巢源虛勞無子候云丈夫無子者其精清如水冷如冰鐵皆為無子之候夫失精家少腹弦急陰頭寒目眩原注一作目眶痛發落脈極虛芤遲清穀亡血失精目眩脈經作目眶痛案此條原本連下桂枝龍蠣湯今依程本分作二條魏失精家腎陽大泄陰寒凝閉小腹必急小腹中之筋必如弦之緊而不能和緩陰頭必寒下真寒如是上假熱可徵矣火浮則目眩血枯則發落診其脈必極虛或浮大或弱澀不待言矣更兼芤遲芤則中虛胃陽不治遲則裡寒腎陽無根或便清穀中焦無陽也或吐衄亡血上焦浮熱也或夢交遺精下焦無陽也此虛勞之所以成而精失血亡陰陽俱盡也巢源虛勞失精候云腎氣虛損不能藏精故精漏失其病小腹弦急陰頭寒目眶痛發落令其脈數而散者失精脈也凡脈芤動微緊男子失精也脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之脈經桂枝下有加字尤脈得諸芤動微緊者陰陽並乖而傷及其神與精也故男子失精女子夢交沈氏所謂勞傷心氣火浮不斂則為心腎不交陽泛於上精孤於下火不攝水不交自泄故病失精或精虛心相內浮擾精而出則成夢交者是也徐氏曰桂枝湯外證得之能解肌去邪氣內證得之能補虛調陰陽加龍骨牡蠣者以失精夢交為神情間病非此不足以收斂其浮越也桂枝加龍骨牡蠣湯方原注小品云虛弱浮熱汗出者除桂加白薇附子各三分故曰二加龍骨湯桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩上七味以水七升煮取三升分溫三服案小品之文出於外臺虛勞夢泄精門云小品龍骨湯療夢失精諸脈浮動心悸少急隱處寒目眶疼頭髮脫者常七日許一劑至良方同煮法後云虛羸浮熱汗出云云又深師桂心湯療虛喜夢與女邪交接精為自出方一名喜湯亦與本方同本草白薇益陰清熱天雄散方程氏金鑑並刪此方天雄三兩炮白朮八兩桂枝六兩龍骨三兩上四味杵為散酒服半錢匕日三服不知稍增之徐恐失精家有中焦陽虛變上方而加天雄白朮尤案此疑亦後人所附為補陽攝陰之用也案外臺載範汪療男子虛失精三物天雄散即本方無龍骨云張仲景方有龍骨文仲同知是非宋人所附也案天雄本草大明云助陽道暖水臟補腰膝益精男子平人脈虛弱細微者喜盜汗也喜趙本作善汗下脈經有出字魏男子平人為形若無病者言也其形雖不病而其脈之虛而弱則陽已損也細而微則陰已消也陽損必馴至於失精陰耗必馴至於亡血也驗其外證必喜盜汗陽損斯表不固陰損而熱自發皆盜汗之由而即虛勞之由也巢源虛勞盜汗候云盜汗者因眠睡而身體流汗也此由陽虛所致久不已令人羸瘠枯瘦心氣不足亡津液故也診其脈男子平人脈虛弱微細皆為盜汗脈也案金鑑云此節脈證不合必有脫簡未知其意如何蓋虛勞盜汗脈多虛數故有此說乎人年五六十其病脈大者痹挾背行若腸鳴馬刀俠癭者皆為勞得之脈下程有浮字若趙作苦尤人年五六十精氣衰矣而病脈反大者是其人當有風氣也痹俠背行痹之俠背者由陽氣不足而邪氣從之也若腸鳴馬刀俠癭者陽氣以勞而外張火熱以勞而上逆陽外張則寒動於中而為腸鳴火上逆則與痰相搏而為馬刀俠癭李氏曰癭生乳腋下曰馬刀又夾生頸之兩旁者為俠癭俠者挾也馬刀蠣蛤之屬瘡形似之故名馬刀癭一作纓發於結纓之處二瘡一在頸一在腋下常相聯絡故俗名癧串案金鑑云若腸鳴三字與上下文不屬必是錯簡俠癭之癭字當是瘰字每經此證先勞後瘰先瘰後勞者有之從未見勞癭先後病也必是傳寫之訛此一偏之見不可憑也靈經脈篇少陽所生病云腋下腫馬刀俠癭而癰疽篇云其癰堅而不潰者為馬刀俠纓潘氏醫燈續焰釋之云馬刀蛤蠣之屬癰形似之俠纓者發於結纓之處大迎之下頸側也二癰一在腋一在頸常相連絡故俗名癧串義尤明顯知是癭當依癰疽篇而作纓馬刀俠癭即靈寒熱篇所謂寒熱瘰癧及鼠瘻寒熱之證張氏注云結核連續者為瘰癧形長如蜆蛤者為馬刀又張氏六要云馬刀小蜆也圓者為瘰癧長者為馬刀皆少陽經鬱結所致久成癧勞是也蓋瘰癧者未潰之稱已潰漏而不愈者為鼠瘻其所由出於虛勞癭者考巢源等瘤之生於頸下而皮寬不急垂捶捶然者故說文云癭頸瘤也與瘰癧迥別癭乃纓之訛無疑矣又案痹挾背行若腸鳴馬刀俠癭各是一證非必三證悉見也故以皆字而斷之脈沉小遲名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也案沈云喝當作急非也靈經脈篇喝喝而喘鑑脈沉細遲則陽大虛故名脫氣脫氣者謂胸中大氣虛少不充氣息所用故疾行喘喝也陽虛則寒寒盛於外四末不溫故手足逆冷也寒盛於中故腹滿溏泄食不消化也魏沉小兼數則為陰虛血亡沉小兼遲則必陽虛氣耗也故名之曰脫氣案抱朴子曰奔馳而喘逆或咳或悶用力役體汲汲短乏者氣損之候也面無光色皮膚枯臘唇焦脈白腠理萎瘁者血滅之證也所謂氣損乃脫氣也脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精此條亦見於辨脈及婦人雜病程人之所以有身者精與血也內填骨髓外溉肌膚充溢於百骸流行於臟腑乃天一所生之水四大藉此以成形是先天之神氣必恃後天之精血以為運用有無相成陰陽相生毋令戕害若其人房室過傷勞倦過度七情暗損六淫互侵後天之真陰已虧先天之神氣並竭在婦人則半産胞胎或漏下赤白在男子則吐衄亡血或夢交泄精診其脈必弦而大弦為寒而大為虛既寒且虛則脈成革矣革者如按鼓皮中空之象即芤大之脈內經曰渾渾革至如湧泉病進而危弊故仲景一集中前後三致意焉虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之外臺無悸衄二字口燥下有並婦人少腹痛六字引古今録驗名芍藥湯程裡急腹中痛四肢痠疼手足煩熱脾虛也悸心虛也衄肝虛也失精腎虛也咽乾口燥肺虛也此五臟皆虛而土為萬物之母故先建其脾土尤此和陰陽調營衛之法也夫人生之道曰陰曰陽陰陽和平百疾不生若陽病不能與陰和則陰以其寒獨行為裡急為腹中痛而實非陰之盛也陰病不能與陽和則陽以其熱獨行為手足煩熱為咽乾口燥而實非陽之熾也昧者以寒攻熱以熱攻寒寒熱內賊其病益甚惟以甘酸辛藥和合成劑調之令和則陽就於陰而寒以溫陰就於陽而熱以和醫之所以貴識其大要也豈徒云寒可治熱熱可治寒而已哉或問和陰陽調營衛是矣而必以建中者何也曰中者脾胃也營衛生成於水穀而水穀轉輸於脾胃故中氣立則營衛流行而不失其和又中者四運之軸而陰陽之機也故中氣立則陰陽相循如環無端而不極於偏是方甘與辛合而生陽酸得甘助而生陰陰陽相生中氣自立是故求陰陽之和者必於中氣求中氣之立者必以建中也案裡急諸家無明解巢源虛勞裡急候云勞傷內損故腹裡拘急也二十九難云衝脈之為病逆氣裡急丁注逆氣腹逆也裡急腹痛也此云腹中痛則巢源為是小建中湯方桂枝三兩去皮甘草三兩炙大棗十二枚芍藥六兩生薑三兩膠飴一升上六味以水七升煮取三升去滓納膠飴更上微火消解溫服一升日三服嘔家不可用建中湯以甜故也原注千金療男女因積冷氣滯或大病後不復常苦四肢沉重骨肉痠疼吸吸少氣行動喘乏胸滿氣急腰背強痛心中虛悸咽乾唇燥面體少色或飲食無味脅肋腹脹頭重不舉多臥少起甚者積年輕者百日漸致瘦弱五臟氣竭則難可復常六脈俱不足虛寒乏氣小腹拘急羸瘠百病名曰黃耆建中湯又有人參二兩案此千金腎臟文本於肘後積冷氣滯作積勞虛損胸滿氣急作小腹拘急脅肋腹脹頭重不舉作陰陽廢弱悲憂慘戚六脈俱不足以下則肺臟門小建中湯主療六脈俱不足作肺與大腸俱不足方後注云肘後用黃耆人參各二兩名黃耆建中湯此所引頗舛程內經曰脾為中央土以灌四旁故能生萬物而法天地失其職則不能為胃行其津液五臟失所養亦從而病也建中者必以甘甘草大棗膠飴之甘所以健中而緩諸急通行衛氣者必以辛薑桂之辛用以走表而通衛收斂榮血者必以酸芍藥之酸用以走里而收營營衛流行則五臟不失權衡而中氣斯建矣外臺集驗黃耆湯即黃耆建中湯方後云嘔者倍生薑又古今録驗黃耆湯亦即黃耆建中湯方後云嘔即除飴糖總病論云舊有微溏或嘔者不用飴糖也虛勞裡急諸不足黃耆建中湯主之尤裡急者裡虛脈急腹當引痛也諸不足者陰陽諸脈並俱不足而眩悸喘喝失精亡血等證相因而至也急者緩之必以甘不足者補之必以溫而充虛塞空則黃耆尤有專長也黃耆建中湯方於小建中湯內加黃耆一兩半余依上法氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏三兩千金及外臺引集驗用黃耆三兩氣短胸滿四字作嘔者二字茯苓作四兩及療以下十四字無方後云此本仲景方程生薑泄逆氣故短氣胸滿者加生薑甘令中滿故去大棗淡能滲泄故加茯苓茯苓能止咳逆故療肺虛不足補加半夏未詳案小建中湯黃耆建中湯考千金諸書主療及分兩異同藥劑增減頗多茲見其一二以示運用之法千金建中湯治五勞七傷小腹急痛膀胱虛滿手足逆冷食飲苦吐酸痰嘔泄下少氣目眩耳聾口焦小便自利方於黃耆建中湯內加乾薑當歸人參半夏橘皮附子又大建中湯治五勞七傷小腹急臍下彭亨兩脅脹滿腰脊相引鼻口乾燥目暗䀮䀮憒憒不樂胸中氣急逆不下食飲莖中策策痛小便黃赤尿有餘瀝夢與鬼神交通去精驚恐虛乏方於黃耆建中湯加遠志當歸澤瀉人參龍骨千金翼無當歸又前胡建中湯治大勞虛劣寒熱嘔逆下焦虛熱小便赤痛客熱上熏頭目及骨肉疼痛口乾方於黃耆建中湯加前胡當歸茯苓人參半夏又芍藥湯治産後苦腹少痛方即小建中湯又云凡身重不得食食無味心下虛滿時時欲下喜臥者皆針胃脘太倉服建中湯及服平胃丸又堅中湯治虛勞內傷寒熱嘔逆吐血方於小建中湯方內加半夏三兩千金翼無甘草桂心有生地黃外臺刪繁建中湯療肺虛損不足補氣方於黃耆建中湯內加半夏案原文所載即是蓋繫於後人所附程云未詳失考耳又古今録驗黃耆湯主虛勞裡急引少腹絞痛極攣卵腫縮疼痛即黃耆建中湯方後云嘔即除飴又芍藥湯主療及方並與本文小建中湯同又黃耆湯療虛勞裡急少腹痛氣引胸脅痛或心痛短氣於黃耆建中湯內加乾薑當歸又建中黃耆湯療虛勞短氣少腹急痛五臟不足於黃耆建中湯去芍藥又深師黃耆建中湯療虛勞腹滿食少小便多於黃耆建中湯內加人參半夏去飴又必效黃耆建中湯療虛勞下焦虛冷不甚渴小便數於黃耆建中湯內加人參當歸若失精加龍骨白蘞又深師黃耆湯療大虛不足少腹裡急勞寒拘引臍氣上衝胸短氣言語謬誤不能食吸吸氣乏悶亂者於黃耆建中湯內加半夏人參去飴若手足冷加附子又大建中湯療內虛絶裡急少氣手足厥逆少腹攣急或腹滿弦急不能食起即微汗出陰縮或腹中寒痛不堪勞苦唇口舌乾精自出或手足乍寒乍熱而煩苦痠疼不能久立多夢寤補中益氣方於黃耆建中湯內加人參當歸半夏附子去飴又小品黃耆湯療虛勞胸中客熱冷癖痞滿宿食不消吐噫脅間水氣或流飲腸鳴不生肌肉頭痛上重下輕目視𥇀𥇀恍惚志損常燥熱臥不得安少腹急小便赤餘瀝臨事不起陰下濕或小便白濁傷多方於黃耆建中湯內加人參當歸去飴有寒加厚朴蘇沈良方云小建中湯治腹痛如神然腹痛按之便痛重按卻不甚痛此止是氣痛重按愈痛而堅者當自有積也氣痛不可下下之愈甚此虛寒證也此藥偏治腹中虛寒補血尤主腹痛三因方治此證加味小建中湯於本方內加遠志王氏易簡方云或吐或瀉狀如霍亂及冒涉濕寒賊風入腹拘急切痛加附子三分名附子建中湯疝氣發作當於附子建中湯煎時加蜜一箸頭許名蜜附子湯易簡小建中湯無飴張氏醫說云養生必用方論虛勞不得用涼藥如柴胡鱉甲青蒿麥門冬之類皆不用服唯服黃耆建中湯有十餘歲女子因發熱咳嗽喘急小便少後來成腫疾用利水藥得愈然虛羸之甚遂用黃耆建中湯日一服三十餘日遂愈蓋人稟受不同虛勞小便白濁陰臟人服橘皮煎黃耆建中湯獲愈者甚衆至於陽臟人不可用暖藥雖建中湯不甚熱然有肉桂服之稍多亦反為害要之用藥亦量其所稟審其冷熱而不可一概以建中湯治虛勞也出醫余聖濟總録結陰門芍藥湯治非時便血小建中湯去大棗直指方黃耆建中湯治傷濕鼻塞身痛即本方不用膠飴又加味建中湯治諸虛自汗於本方加炒浮小麥又黃耆建中湯加川藭當歸治血刺身痛危氏得效方黃耆建中湯治汗出汙衣甚如坯染皆由大喜傷心喜則氣散血隨氣行兼服妙香散金銀器麥子麥門冬煎湯下病名紅汗王氏準繩云小建中湯治痢不分赤白久新但腹中大痛者神效其脈弦急或澀浮大按之空虛或舉按皆無力者是也示兒仙方建脾散治脾痞脅痛即小建中湯加縮砂徐氏醫法指南小建中湯治失血虛者本方阿膠代膠飴虛勞腰痛少腹拘急小便不利者八味腎氣丸主之方見婦人雜病中程腰者腎之外候腎虛則腰痛腎與膀胱為表裡不得三焦之陽氣以決瀆則小便不利而少腹拘急州都之官亦失其氣化之職此水中真陽已虧腎間動氣已損與是方以益腎間之氣氣強則便溺行而小腹拘急亦愈矣案抱朴子云今醫家通明腎氣之丸內補五絡之散骨填枸杞之煎黃耆建中之湯將服之者皆致肥腎氣丸黃耆建中湯出於晉以前可以知矣肘後云乾地黃四兩茯苓薯蕷桂牡丹山茱萸各二兩附子澤瀉一兩搗蜜丸如梧子服七丸日三加至十丸此是張仲景八味腎氣丸方療虛勞不足大傷飲水腰痛小腹急小便不利又云長服即去附子加五味子治大風冷千金補腎門同用乾地黃八兩山茱萸薯蕷各四兩澤瀉牡丹皮茯苓各三兩桂心附子各二兩注仲景云常服去附子加五味子姚公云加五味子二兩蓯蓉四兩張文仲云五味子蓯蓉各四兩和劑局方八味丸治腎氣虛乏下元冷憊臍腹疼痛夜多漩溺腳膝緩弱肢體倦怠面色黧黑不思飲食又治腳氣上衝少腹不仁及虛勞不足渴欲飲水腰重疼痛少腹拘急小便不利或男子消渴小便反多婦人轉胞小便不通即本方用茯苓牡丹皮澤瀉各三兩熟乾地黃八兩山茱萸山藥各四兩附子肉桂各二兩方後云久服壯元陽益精髓活血駐顏強志輕身薛氏醫案云八味丸治命門火衰不能生土以致脾胃虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化或臍腹疼痛夜多漩溺經云益火之源以消陰翳即此方也又治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛形體憔悴寢汗等證加五味子四兩吳氏方考云今人入房盛而陽事愈舉者陰虛火動也陽事先痿者命門火衰也是方於六味中加桂附以益命門之火使作強之官得其職矣王氏小青囊云又治下元冷憊心火炎上腎水不能攝養多唾痰涎又治腎虛齒痛又治腎虛淋瀝王氏藥性纂要云治一少年哮喘者其性善怒病發寒天每用桂附八味地黃湯及黑錫丹而平一次用之未效加生鐵落於八味湯中一劑而愈千金腎氣丸治虛勞腎氣不足腰痛陰寒少便數囊冷濕尿有餘瀝精自出陰痿不起忽忽悲喜於本方去牡丹皮加玄參芍藥千金翼有牡丹皮名十味腎氣丸千金又方治腎氣不足羸瘦日劇吸吸少氣體重耳聾眼暗百病於本方去附子山茱萸加半夏千金腎氣丸凡五方今録其二嚴氏加味腎氣丸治腎虛腰重腳腫小便不利於本方中加車前子川牛膝薛氏云治脾腎虛腰重腳腫小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱症其效如神又十補丸治腎臟虛弱面色黧黑足冷足腫耳鳴耳聾肢體羸瘦足膝軟弱小便不利腰脊疼痛但是腎虛之證於本方中加鹿茸五味子醫壘元戎都氣丸補左右二腎水火兼益於本方中加五味子錢氏小兒方訣地黃丸治腎虛解顱或行遲語遲等症於本方中去桂枝附子薛氏云治腎經虛熱作渴小便淋祕痰氣上壅或肝經血虛燥熱風客淫氣而患瘰癧結核或四肢發搐眼目瞤動或肺經虛火咳嗽吐血頭目眩暈或咽喉燥痛口舌瘡裂或心經血虛有火自汗盜汗便血諸血或脾虛濕熱下刑于腎腰膝不利或疥癬瘡毒等症並用此為主而佐以各臟之藥此藥為天一生水之劑若稟賦不足肢體瘦弱解顱失音或畏明下竄五遲五軟腎疳肝疳或早近女色精氣虧耗五臟齊損凡諸虛不足之症皆用此以滋化源其功不能盡述案此增味頗多今省之虛勞諸不足風氣百疾薯蕷丸主之薯蕷丸方薯蕷三十分當歸桂枝曲千金作神麯局方三因等並同乾地黃豆黃卷各十分千金作大豆黃卷甘草二十八分芎藭麥門冬芍藥白朮杏仁各六分人參七分柴胡桔梗茯苓各五分阿膠七分乾薑三分白蘞二分防風六分大棗百枚為膏上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑魏蓋人之元氣在肺元陽在腎既剝削則難於遽復矣全賴後天之穀氣資益其生是榮衛非脾胃不能通宣而氣血非飲食無由平復也仲景故為虛勞諸不足而帶風氣百疾立此方以薯蕷為主專理脾胃上損下損至此可以撐持以人參白朮茯苓乾薑豆黃卷大棗神麯甘草助之除濕益氣而中土之令得行矣以當歸芎藭芍藥地黃麥冬阿膠養血滋陰以柴胡桂枝防風升邪散熱以杏仁桔梗白蘞下氣開鬱惟恐虛而有熱之人資補之藥上拒不受故為散其邪熱開其逆郁而氣血平順補益得納勿以其迂緩而舍之案風氣蓋是兩疾唐書張文仲曰風狀百二十四氣狀八十治不以時則死及之是也此方千金載風眩門有黃芩云治頭目眩冒心中煩郁驚悸狂癲外臺引古今録驗大薯蕷丸療男子五勞七傷晨夜氣喘急內冷身重骨節煩疼腰背強痛引腹內羸瘦不得飲食婦人絶孕疝瘕諸病服此藥令人肥白補虛益氣凡二十四味云張仲景方有大豆黃卷曲柴胡白蘞芎藭無附子黃芩石膏黃耆前胡為二十一味外臺更有大黃五味子澤瀉乾漆合草四味和劑局方大山蕷丸與本書同虛勞虛煩不得眠酸棗湯主之尤人寤則魂寓於目寐則魂藏於肝虛勞之人肝氣不榮則魂不得藏魂不藏故不得眠酸棗仁補肝斂氣宜以為君而魂既不歸容必有濁痰燥火乘間而襲其舍者煩之所由作也故以知母甘草清熱滋燥茯苓川芎行氣除痰皆所以求肝之治而宅其魂也三因云外熱曰燥內熱曰煩虛煩之證內煩身不覺熱頭目昏疼口乾咽燥不渴清清不寐皆虛煩也葉氏統旨云虛煩者心中擾亂鬱郁而不寧也良由津液去多五內枯燥或榮血不足陽勝陰微張氏醫通云虛煩者肝虛而火氣乘之也故特取棗仁以安肝膽為主略加芎藭調血以養肝茯苓甘草培土以榮木知母降火以除煩此平調土木之劑也案虛煩空煩也無熱而煩之謂千金惡阻半夏茯苓湯主療空煩吐逆婦人良方作虛煩可證酸棗湯方酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭二兩原注深師有生薑二兩深師名小酸棗湯療虛勞不得眠煩不寧者出於外臺煮法後云一方加桂二兩上五味以水八升煮酸棗仁得六升納諸藥煮取三升分溫三服千金翼大酸棗湯主虛勞煩悸奔氣在胸中不得眠方於本方去知母加人參生薑桂心千金去芎藭用知母更加石膏名酸棗湯主療同又酸棗湯主傷寒及吐下後心煩乏氣不得眠方於本方加麥門冬乾薑五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃䗪蟲丸主之程此條單指內有乾血而言夫人或因七情或因飲食或因房勞皆令正氣內傷血脈凝積致有乾血積於中而尫羸見於外也血積則不能以濡肌膚故肌膚甲錯不能以營於目則兩目黯黑與大黃䗪蟲丸以下乾血乾血去則邪除正旺是以謂之緩中補虛非大黃䗪蟲丸能緩中補虛也案金鑑云緩中補虛四字當在不能飲食之下必是傳寫之訛然內有乾血故腹滿若虛勞證而無腹滿則大黃䗪蟲丸不中與也巢源云五勞志勞思勞憂勞瘦勞方言郭注極疲也喻氏法律云甲錯者皮間枯澀如鱗甲錯出也樓氏綱目云索澤即仲景所謂皮膚甲錯山海經羬羊可以己臘郭璞注臘體皴甲錯謂皮皴如鱗甲也張氏醫通云舉世皆以參耆歸地等為補虛仲景獨以大黃䗪蟲等補虛苟非神聖不能行是法也夫五勞七傷多緣勞動不節氣血凝滯鬱積生熱致傷其陰世俗所稱乾血勞是也所以仲景乘其元氣未漓先用大黃䗪蟲水蛭虻蟲蠐螬等蠕動啖血之物佐以乾漆生地桃杏仁行去其血略兼甘草芍藥以緩中補虛黃芩以開通熱瘀酒服以行藥勢待乾血行盡然後純行緩中補虛收功其授陳大夫百勞丸一方亦以大黃䗪蟲水蛭虻蟲為主於中除去幹漆蠐螬桃杏仁而加當歸乳香沒藥以散血結即用人參以緩中補虛兼助藥力以攻乾血梔子以開通熱鬱服用勞水者取其行而不滯也仲景按證用藥不慮其峻授人方術已略為降等猶恐誤施故方下注云治一切勞瘵積滯疾不經藥壞者宜服可見慎重之至也此係於抄節喻氏法律之文百勞丸非仲景之方出於醫學綱目而吳氏方考亦云百勞丸齊大夫傳張仲景方也未見所據大黃䗪蟲丸大黃十分蒸黃芩一兩甘草三兩桃仁一升杏仁一升芍藥四兩乾地黃十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲半升上十二味末之煉蜜和丸小豆大酒飲服五丸日三服倪氏本草匯言云仲景方治五勞虛極羸瘦腹滿不能飲食內有乾血肌膚甲錯者用乾漆一兩炒煙盡䗪蟲十個去足焙燥共為細末大黃一兩酒煮半日搗膏為丸如黍米大每服十丸白湯送下案此蓋後人以意減味者李氏綱目䗪蟲條所收大黃䗪蟲丸乃本書婦人産後病篇下瘀血湯也雖是似誤然二方並單捷亦不可廢焉附方千金翼炙甘草湯原注一云復脈湯案翼方標以復脈湯注仲景名炙甘草湯治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死翼悸上有心字十二作二十二甘草四兩炙桂枝生薑各三兩麥門冬半升麻仁半升人參阿膠各二兩大棗三十枚生地黃一斤上九味以酒七升水八升先煮八味取三升去滓納膠消盡溫服一升日三服翼云越公楊素患失脈七日服五劑而復尤脈結是榮氣不行悸則血虧而心無所養榮滯血虧而更出汗豈不立槁乎故雖行動如常斷云不出百日知其陰亡而陽絶也人參桂枝甘草生薑行身之陽膠麥麻地行身之陰蓋欲使陽得復行陰中而脈自復也後人只喜用膠地等而畏薑桂豈知陰凝燥氣非陽不能化耶案本草甘草別録云通經脈利血氣大明云通九竅利百脈寇宗奭云生則微涼炙則溫蓋四逆湯之治逆冷復脈湯之復失脈功專在乎甘草傷寒類要傷寒心悸脈結代者甘草二兩水三升煮一半服七合日一服此單甘草湯其義可知耳肘後獺肝散治冷勞又主鬼疰一門相染獺肝一具炙乾末之水服方寸匕日三服炙肘後作陰案本草獺肝甘溫有毒別録治鬼疰而肘後無治冷勞之文云尸疰鬼疰者即是五尸之中尸疰又挾諸鬼邪為害也其病變動乃有三十六種至九十九種大略令人寒熱沉沉默默不的知其所苦而無處不惡纍年積月漸沉頓滯以至於死後復注易傍人乃至滅門覺如此候者宜急療之千金外臺引崔氏並同巢源鬼注候云注之言住也言其連滯停住也人有先無他病忽被鬼排擊當時或心腹刺痛或悶絶倒地如中惡之類其得瘥之後餘氣不歇停住積久有時發動連滯停住乃至於死死後注易傍人故謂之鬼注劉熙釋名云注注也相灌注也疰即注之從疒者肺痿肺癰咳嗽上氣病脈證治第七脈經合下飲病咳嗽為一篇論三首脈證四條方十五首問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰脈經曰上有問字分為二條快藥作駃藥咳唾膿血脈經千金分為另條程本金鑑接上肺癰為是尤此設為問答以辨肺痿肺癰之異熱在上焦二句見五臟風寒積聚篇蓋師有是語而因之以為問也汗出嘔吐消渴二便下多皆足以亡津液而生燥熱肺虛且熱則為痿矣口中反有濁唾涎沫者肺中津液為熱所迫而上行也或云肺既痿而不用則飲食遊溢之精氣不能分布諸經而但上溢口亦通案此徐注口中辟辟燥者魏氏以為肺癰之痰涎膿血俱蘊蓄結聚於肺臟之內故口中反乾燥而但辟辟作空響燥咳而已然按下肺癰條亦云其人咳咽燥不渴多唾濁沫則肺痿肺癰二證多同惟胸中痛脈滑數唾膿血則肺癰所獨也比而論之痿者萎也案巢源作肺萎如草木之萎而不榮為津爍而肺焦也癰者壅也如土之壅而不通為熱聚而肺㿉也案急就篇顏注癰之言壅也氣壅痞結重腫而潰也是故其脈有虛實不同而其數則一也徐實者即上滑字義自見案肺痿非此別一病即是後世所謂勞嗽耳外臺蘇遊傳尸論云其初得半臥半起號為殗殜氣急咳者名曰肺痿許仁則論云肺氣嗽者不限老少宿多上熱後因飲食將息傷熱則常嗽不斷積年纍歲肺氣衰便成氣嗽此嗽不早療遂成肺痿若此將成多不救矣又云肺氣嗽經久將成肺痿其狀不限四時冷熱晝夜嗽常不斷唾白如雪細沫稠黏喘息氣上乍寒乍熱發作有時唇口喉舌乾焦亦有時唾血者漸覺瘦悴小便赤顏色青白毛聳此亦成蒸又云肺氣嗽經久有成肺癰者其狀與前肺痿不多異但唾悉成膿出陳氏婦人良方劫勞散證治云勞嗽寒熱盜汗唾中有紅線名曰肺痿注傢俱為別病而詮釋之者何快與駃同梁書姚僧垣曰大黃快藥是也魏云辟辟唾聲恐非蓋辟辟乾燥貌張氏醫通云言咳者口中不幹燥也若咳而口中辟辟燥則是肺已結癰火熱之毒出見於口此說近是程氏醫徑句測云氣虛不能化血故血乾不流只隨火勢沸上火亢乘金不生氣血而生痰可知無血無液而枯金被火肺葉安得不焦故欲退彼之火須是補我之金金得補而生液則水從液滋火從液化也蓋肺處臟之最高葉間布有細竅此竅名泉眼凡五臟之蒸溽從肺管吸入之只是氣從泉眼呼出之便成液息息不窮以灌溉周身者皆從此出此即人身之星宿海也一受火炎呼處成吸有血即從此眼滲入礙去竅道便令人咳咳則見血愈咳愈滲愈滲愈嗽久則泉眼俱閉吸時徒引火升喉間或癢或嗆呼時並無液出六葉遂枯遂焦此肺痿之由也問曰病咳逆脈之何以知此為肺癰當有膿血吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風則中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死多唾濁沫之多字趙本作時脈經無血為之凝滯之之字尤此原肺癰之由為風熱蓄結不解也凡言風脈多浮或緩此云微者風入營而增熱故脈不浮而反微且與數俱見也微則汗出者氣傷於熱也數則惡寒者陰反在外也呼氣不入者氣得風而浮利出而艱入也吸而不出者血得熱而壅氣亦為之不伸也肺熱而壅故口乾而喘滿熱在血中故咽燥而不渴且肺被熱迫而反從熱化為多唾濁沫熱盛於裡而外反無氣為時時振寒由是熱蓄不解血凝不通而癰膿成矣吐如米粥未必便是死證至浸淫不已肺葉腐敗則不可治矣故曰始萌可救膿成則死案金鑑云肺癰之上當有肺痿二字不然本文論肺痿之義則無著落必是脫簡蓋多唾濁沫肺痿肺癰俱有之而金鑑以為獨肺痿有之而肺癰所無因為脫文誤甚又云脈微之三微字當是三浮字微字文氣不屬必是傳寫之訛雖未知原文果然否此可以備一說也危氏得效方云始萌易治膿成難治診其脈數而實已成微而澀漸愈面色白嘔膿而止者自愈有膿而嘔食面色赤吐膿如糯米粥者不治男子以氣為主得之十救二三婦女以血為主得之十全七八歷試屢驗李氏入門云肺癰脈數而虛口燥咽乾胸脅隱痛二便赤澀咳唾膿血腥臭置之水中則沉潘氏續焰云試肺癰法凡人覺胸中隱隱痛咳嗽有臭痰吐在水內沉者是癰膿浮者是痰案今驗果如其言又以雙箸斷之其斷為兩段者是膿其黏著不斷者是痰亦一試法也蘭臺軌範云肺癰之疾膿成亦有愈者全在用藥變化漢時治法或未全耳上氣面浮腫肩息其脈浮大不治又加利尤甚魏面浮腫陽衰於中而氣散於上也肩息者至人之息息以踵今息以肩氣元已鏟其根而浮游之氣呼吸於胸膈之上也診之脈浮大必浮大而沉微且欲絶也俱為上盛下絶加以下利陰又下泄陽必上越其死尤速也此上氣之陽虛氣脫之重者案上氣諸家不釋考周禮天官疾醫職云嗽上氣鄭玄注上氣逆喘也此一節即是肺脹不治之證上氣喘而躁者屬肺脹欲作風水發汗則愈沈此見肺癰當有肺脹之辨也邪傷於衛後入於營而為肺癰此風傷於衛內挾痰涎壅逆肺氣上逆奔迫故喘而躁是為肺脹然有肺氣壅逆不得通調水道水即泛濫皮膚故曰欲作風水治宜發汗驅風從表而出水即下滲即下條小青龍之證也案肺脹一證諸家未有云後世某證者考下文云肺脹咳而上氣又云咳而上氣此為肺脹由此觀之即後世所謂呷嗽哮嗽之屬巢源云痰氣相擊隨嗽動息呼呷有聲謂之呷嗽本事續方云哮嗽如拽鋸是也肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴若以下九字脈經無千金作若渴者屬消渴法六字為細注魏肺痿為虛熱之證矣然又有肺痿而屬之虛寒者則不可不辨也乃吐涎沫而不咳其人既不渴又遺尿小便數者以上虛不能制水故也肺氣既虛而無收攝之力但趨脫泄之勢膀胱之陽氣下脫而肺金益清冷乾燥以成痿也肺葉如草木之花葉有熱之痿如日炙之則枯有冷之痿如霜殺之則干矣此肺冷之所以成痿也尤頭眩多涎唾者經云上虛則眩又云上焦有寒其口多涎也甘草乾姜甘辛合用為溫肺復氣之劑服後病不去而加渴者則屬消渴蓋小便數而渴者為消不渴者非下虛即肺冷也甘草乾薑湯方甘草四兩炙乾薑二兩炮上㕮咀以水三升煮取一升五合去滓分溫再服千金注云集驗肘後有大棗十二枚案此即用傷寒得之便厥者以復其陽之甘草乾薑湯取理中之半而回其陽者此證雖云肺中冷其源未曾不由胃陽虛乏故主以此方蓋與大病瘥後喜唾者主以理中湯意略同咳而上氣喉中水雞聲射干麻黃湯主之外臺引小品水上有如字云此本仲景傷寒論方鑑咳逆上氣謂咳則氣上衝逆也水雞聲者謂水與氣相觸之聲在喉中連連不絶也徐凡咳之上氣者皆為有邪也其喉中水雞聲乃痰為火所吸不能下然火乃風所生水從風戰而作聲耳故以麻黃細辛驅其外邪為主以射干開結熱氣行水濕毒尤善清肺氣者為臣而余皆降逆消痰宣散藥唯五味一品以收其既耗之氣令正氣自斂邪氣自去恐肺氣久虛不堪劫散也巢源云肺病令人上氣兼胸膈痰滿氣行壅滯喘息不調致咽喉有聲如水雞之鳴也案水雞二種本草蘇頌云蛙即今水雞是也又司馬相如傳顏注庸渠一名水雞即本草所謂䳾也此雲水雞蓋指蛙而言取其鳴聲連連不絶耳射干麻黃湯方射干十三枚一法三兩麻黃四兩生薑四兩細辛紫菀款冬花各三兩五味子半升大棗七枚半夏大者洗八枚一法半升上九味以水一斗二升先煮麻黃兩沸去上沫納諸藥煮取三升分溫三服千金用射干三兩半夏半升外臺水上有東流二字案此治肺脹之方凡本篇諸條肺痿肺癰之外悉屬肺脹讀者宜自知耳千金麻黃湯治上氣脈浮咳逆喉中水雞聲喘急不通呼吸欲死外臺引深師同於本方內去生薑細辛紫菀款冬花五味半夏聖惠射干散治小兒咳嗽心胸痰壅攻咽喉作呀呷聲於本方去大棗細辛款冬五味加桂心臨用入蜜咳逆上氣時時唾濁但坐不得眠皂莢丸主之唾趙本作吐徐此比水雞聲乃咳而上氣中之逆甚者也尤濁濁痰也時時吐濁者肺中之痰隨上氣而時出也然痰雖出而滿不減則其本有固而不拔之勢不迅而掃之不去也皂莢味辛入肺除痰之力最猛飲以棗膏安其正也魏皂莢驅風理痹正為其有除瘀滌垢之能也如今用皂莢澡浴以除垢膩即此理也沈皂莢能開諸竅而驅風痰最疾服三丸者是取峻藥緩散之意也皂莢丸方皂莢八兩刮去皮用酥炙外臺引深師作長大皂莢一挺去皮子炙不用酥炙上一味末之蜜丸梧子大以棗膏和湯服三丸日三夜服外臺三丸作一丸云千金經心録延年同此本仲景傷寒論方一名棗膏丸案酥本草除胸中客熱蘭臺軌範云稠痰黏肺不能清滌非此不可外臺必效療病喘息氣急喉中如水雞聲者無問年月遠近方肥皂莢兩挺好酥一兩上二味於火上炙去火高一尺許以酥細細塗之數翻覆令得所酥盡止以刀輕刮去黑皮然後破之去子皮筋脈搗篩蜜和為丸每日食後服一丸如熟豆日一服訖取一行微利如不利時細細量加以微利為度日止一服咳而脈浮者厚朴麻黃湯主之脈沉者澤漆湯主之脈沉上尤補咳而二字原本脈沉以下別列於厚朴麻黃湯方後今依徐程諸家注本移於此尤此不詳見證而但以脈之浮沉為辨而異其治按厚朴麻黃湯與小青龍加石膏湯大同則散邪蠲飲之力居多而厚朴辛溫亦能助表小麥甘平則同五味斂安正氣者也澤漆湯以澤漆為主而以白前黃芩半夏佐之則下趨之力較猛雖生薑桂枝之辛亦只為下氣降逆之用而已不能發表也仲景之意蓋以咳皆肺邪而脈浮者氣多居表故驅之使從外出為易脈沉者氣多居里故驅之使從下出為易亦因勢利導之法也鑑李彣曰咳者水寒射肺也脈浮者停水而又挾風以鼓之也麻黃去風散肺逆與半夏細辛乾薑五味子石膏同用即前小青龍加石膏為解表行水之劑也然土能制水而地道壅塞則水亦不行故用厚朴疏敦阜之土使脾氣健運而水自下泄矣杏仁下氣去逆小麥入心經能通火氣以火能生脾助脾而去成決水之功也又云脈沉為水澤漆為君者因其功專於消痰行水也水性陰寒桂枝行陽氣以導之然所以停水者以脾土衰不能制水肺氣逆不能通調水道故用人參紫參白前甘草補脾順肺同為制水利水之方也黃芩苦以泄之半夏生薑辛以散之也厚朴麻黃湯方厚朴五兩麻黃四兩杏仁半升石膏如雞子大千金作三兩半夏半升乾薑二兩細辛二兩小麥一升五味子半升上九味以水一斗二升先煮小麥熟去滓納諸藥煮取三升溫服一升日三服千金厚朴麻黃湯治咳而大逆上氣胸滿喉中不利如水雞聲其脈浮者方與本篇同案本篇唯云咳而脈浮恐是脫遺千金所載卻是舊文外臺深師投柸湯療久逆上氣胸滿喉中如水雞鳴於本方去半夏乾薑細辛小麥五味子方後云咳嗽甚者加五味子半夏洗各半升乾薑三纍經用甚良千金名麻黃石膏湯主療加味並同澤漆湯方半夏半升生薑五兩白前五兩紫參五兩一作紫菀案千金作紫菀甘草黃芩人參桂枝各三兩澤漆三斤以東流水五斗煮取一斗五升上九味㕮咀納澤漆汁中煮取五升溫服五合至夜盡案千金澤漆湯治上氣其脈沉者本篇亦似脫上氣二字且考本草紫參不載治嗽之能其作紫菀者似是白前本草別録云甘微溫無毒治胸脅逆氣咳嗽上氣呼吸欲絶大逆上氣咽喉不利止逆下氣者麥門冬湯主之徐以下諸注大逆改作火逆唯程仍原文案大作火原見於樓氏綱目程大逆上氣則為喘為咳咽喉為之不利麥門冬半夏以下氣粳米大棗以補脾甘草人參以補肺脾肺相生則氣得歸原而大逆上氣自止沈余竊擬為肺痿之主方也巢源上氣鳴息候云肺主於氣邪乘於肺則肺脹脹則肺管不利不利則氣道澀故氣上喘逆鳴息不通麥門冬湯方麥門冬七升千金外臺三升半夏一升人參二兩甘草二兩粳米三合大棗十二枚外臺半夏下有洗字甘草下有炙字上六味以水一斗二升煮取六升溫服一升日三夜一服案外臺引千金方同云此本仲景傷寒論方玉函經傷寒瘥後病篇云病後勞復發熱者麥門冬湯主之方同肘後方麥門冬湯治肺痿咳唾涎沫不止喉燥而渴方同聖濟總録麥門冬湯治肺胃氣壅風客傳咽喉妨悶方同喻氏法律云此胃中津液乾枯虛火上炎之證治本之良法也於麥門人參甘草粳米大棗大補中氣大生津液隊中增入半夏之辛溫一味其利咽下氣非半夏之功實善用半夏之功擅古今未有之奇矣張氏醫通云此胃中津液乾枯虛火上炎之證凡肺病有胃氣則生無胃氣則死胃氣者肺氣之母氣也故於竹葉石膏湯中偏除方名二味而用麥冬數倍為君兼參草粳米以滋肺母使水穀之清微皆得上注於肺自然沃澤無虞當知火逆上氣皆是胃中痰氣不清上溢肺隧占據津液流行之道而然是以倍用半夏更加大棗通津滌飲為先奧義全在乎此若濁飲不除津液不致雖日用潤肺生津之劑烏能建止逆下氣之績哉俗以半夏性燥不用殊失仲景立方之旨外臺麥門冬湯治傷寒下後除熱止渴於本方去半夏大棗粳米加石膏五味子活人麥門冬湯治勞氣欲絶於本方無半夏人參加竹葉肺癰喘不得臥葶藶大棗瀉肺湯主之尤肺癰喘不得臥肺氣被迫亦已甚矣故須峻藥頓服以逐其邪葶藶苦寒入肺泄氣閉加大棗甘溫以和藥力亦猶皂莢丸之飲以棗膏也鑑趙良曰此治肺癰吃緊之方也肺中生癰不瀉何待恐日久癰膿已成瀉之無益日久肺氣已索瀉之轉傷乘其血結而膿未成當急以瀉之之法奪之況喘不得臥不亦甚乎葶藶大棗瀉肺湯方千金作瀉肺湯葶藶熬令黃色搗丸如彈子大案本綱附方搗下有末密二字義始通大棗十二枚上先以水三升煮棗取二升去棗納葶藶煮取一升頓服千金云葶藶三兩為末大棗二十枚上二味先以水三升煮棗取二升去棗納藥一棗大煎取七合頓服令盡三日服一劑可至三四劑外臺引千金云葶藶三兩熬令色紫上一味搗令可丸以水三升煮擘大棗二十枚得汁二升納藥如彈丸一枚煎取一升頓服古今録驗刪繁仲景傷寒論範汪同樓氏綱目云孫兆視雷道矩病吐痰頃間已及一升喘咳不已面色郁黯精神不快兆與服仲景葶藶大棗湯一服訖已覺胸中快利略無痰唾矣咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之千金作粳米粥外臺引集驗同鑑咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者此為肺癰證也肺癰尚未成膿實邪也故以葶藶之劑瀉之今已潰後虛邪也故以桔梗之苦甘草之甘解肺毒排癰膿也此治已成肺癰輕而不死者之法也魏或其癰雖成而膿未大成肺葉完全尚未腐敗亦可回生也桔梗湯方原注亦治血痹案千金外臺並無此四字程尤金鑑亦刪之為是桔梗一兩千金作三兩注云集驗用二兩古今録驗用一兩外臺引集驗用二兩甘草二兩外臺引集驗有炙字上二味以水三升煮取一升分溫再服則吐膿血也則千金作必千金翼作不字外臺作朝暮吐膿血則瘥云張文仲千金備急古今録驗範汪同此本仲景傷寒論方千金云一方有款冬花一兩半和劑名如聖湯元戎名甘桔二生湯詳見傷寒輯義醫壘元戎如聖丸治風熱毒氣上攻咽喉痛痹腫塞妨悶及肺癰喘嗽唾膿血胸滿振寒咽乾不渴時出濁沫氣臭腥久久咯膿狀如米粥龍腦另研牛黃另研桔梗甘草生用各一錢上為細末煉蜜丸每兩作二十丸每用一丸噙化咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之外臺引仲景傷寒論作肺脹者病人喘目如脫狀脈浮大也肺脹而咳者此方主之尤外邪內飲填塞肺中為脹為喘為咳而上氣越婢湯散邪之力多而蠲飲之力少故以半夏輔其未逮不用小青龍者以脈浮且大病屬陽熱故利辛寒不利辛熱也目如脫狀者目睛脹突如欲脫落之狀壅氣使然也巢源云肺虛感微寒而成咳咳而氣還聚於肺肺則脹是為咳逆也邪氣與正氣相搏正氣不得宣通但逆上喉咽之間邪狀則氣靜邪動則氣奔上煩悶欲絶故謂之咳逆上氣也越婢加半夏湯麻黃六兩外臺有去節二字石膏半斤生薑三兩大棗十五枚甘草二兩外臺有炙字半夏半升外臺有枚字上六味以水六升先煮麻黃去上沫納諸藥煮取三升分溫三服肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之原注千金證治同外更加脅下痛引缺盆案今千金缺盆下更有若有實者必躁其人常倚伏十一字外臺引仲景傷寒論與本文同尤此亦外邪內飲相搏之證而兼煩躁則挾有熱邪麻桂藥中必用石膏如大青龍之例也又此條見證與上條頗同而心下寒飲則非溫藥不能開而去之故不用越婢加半夏而用小青龍加石膏溫寒並進水熱俱捐於法尤為密矣小青龍加石膏湯麻黃芍藥桂枝細辛甘草乾薑各三兩五味子半夏各半升石膏二兩上九味以水一斗先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之日三服小兒服四合外臺引仲景傷寒論云強人一升瘦人及老小以意減之日三夜一千金與本文同千金麻黃湯治肺脹咳嗽上氣咽燥脈浮心下有水氣於本方內去甘草乾姜用生薑外臺古今録驗沃雪湯療上氣不得息臥喉中如水雞聲氣欲絶方於小青龍方內去芍藥甘草投柸則臥一名投柸麻黃湯附方外臺炙甘草湯治肺痿涎唾多心中溫溫液液者原注方見虛勞中案外臺引仲景傷寒論列於甘草乾薑湯之後云並出第八卷中沈溫溫液液即泛泛噁心之意也徐肺痿證概屬津枯熱燥此方乃桂枝湯去芍藥加參地阿膠麻仁麥冬也不急於去熱而以生津潤燥為主蓋虛回而津生津生而熱自化也至桂枝乃熱劑而不嫌峻者桂枝得甘草正所以行其熱也千金甘草湯案此本出於肘後而千金主療與外臺炙甘草湯同但唾多下有出血二字千金翼名溫液湯甘草案肘後千金用二兩外臺同千金翼用三兩上一味以水三升煮減半分溫三服徐肺痿之熱由於虛則不可直攻故以生甘草之甘寒頻頻呷之熱自漸化也余妾曾病此初時涎沫成碗服過半月痰少而愈但最難吃三四日內猝無捷效耳外臺引集驗療肺痿時時寒熱兩頰赤氣方童子小便每日晚取之去初末少許小便可有五合取上好甘草量病人中指節男左女右長短截之炙令熟破作四片納小便中置於閒淨處露一宿器上橫一小刀明日平旦去甘草頓服之每日一劑其童子勿令吃五辛千金生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴外臺一云不渴生薑五兩人參三兩甘草四兩大棗十五枚上四味以水七升煮取三升分溫三服外臺引集驗云仲景傷寒論備急範汪千金經心録同沈即炙甘草湯之變方也甘草人參大棗扶脾胃而生津液以生薑辛潤宣行滯氣俾胃中津液溉灌於肺則澤槁回枯不致肺熱葉焦為治肺痿之良法也徐亦非一二劑可以期效千金桂枝去芍藥加皂莢湯治肺痿吐涎沫桂枝生薑各三兩甘草二兩大棗十枚千金十五枚皂莢乙枚去皮子炙焦千金作二兩外臺引千金作一挺去皮子炙上五味以水七升微微火煮取三升分溫三服千金無微微火三字沈用桂枝湯嫌芍藥酸收故去之加皂莢利涎通竅不令涎沫壅遏肺氣而致喘痿桂枝和調營衛俾營衛宣行則肺氣振而涎沫止矣徐此治肺痿中之有壅閉者故加皂莢以行桂甘薑棗之勢此方必略兼上氣不得眠者宜之外臺桔梗白散治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰外臺引仲景傷寒論作粳米粥云出第十八卷中桔梗貝母各三分巴豆一分去皮熬研如脂上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一杯則定徐此即前桔梗湯證也然此以貝母巴豆易去甘草則迅利極矣蓋此等證危在呼吸以悠忽遺禍不可勝數故確見人強或證危正當以此急救之不得嫌其峻坐以待斃也沈以桔梗開提肺氣貝母清熱而化痰涎巴霜峻猛熱劑急破其膿驅膿下出尤似亦以毒攻毒之意然非病盛氣實非峻藥不能為功者不可僥幸一試也是在審其形之肥瘠與病之緩急而善其用焉千金葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰千金作胸心甲錯千金無方名外臺引古今録驗名葦莖湯用葦莖一升云仲景傷寒論云葦莖切二升千金範汪同葦莖二升薏苡仁半升桃仁五十枚瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿千金作服一升當有所見吐膿血魏肺癰欲成未成之際圖治當早者也葦小蘆大一物也葦莖與蘆根同性清熱利水解渴除煩佐以薏苡仁下氣寬中桃仁潤肺滑腸瓜瓣亦潤燥清熱之品再服當吐如膿可見為癰雖結而膿未成所以可治也較之葶藶大棗湯皂莢丸皆得預治之治仲景所謂始萌可救者尤此方具下熱散結通瘀之力而重不傷峻緩不傷懈可以補桔梗湯桔梗白散二方之偏亦良法也案樓氏綱目云葦莖即汀洲間蘆荻之粗種也葦即蘆詳見於沈括補筆談魏注為是聖惠方作青葦三因用葦葉恐非是瓜瓣聖惠方作甜瓜子太平御覽引吳普本草瓜瓣瓜子也張氏本經逢原云甜瓜子即甜瓜瓣為腸胃內癰要藥千金治肺癰有葦莖湯腸癰有大黃牡丹湯豫嘗用之然必黃熟味甜者方不傷胃是也而本草馬志云諸方惟用冬瓜子不見用甘瓜子者潘氏續焰改用絲瓜瓣並不可憑也外臺蘇遊療骨蒸肺痿煩躁不能食蘆根飲子方蘆根切訖稱麥門冬地骨白皮各十兩生薑十兩合皮切橘皮茯苓各五兩上六味切以水二斗煮取八升絞去滓分溫五服服別相去八九里晝三服夜二服覆取汗忌酢物未好瘥更作若兼服其人或胸中寒或直惡寒及虛脹並痛者加吳茱萸八兩案此亦用蘆根而治肺痿可見癰痿雖虛實不同然至熱鬱津枯則一也故附此以備考肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之原注方見上三日一劑可至三四劑此先服小青龍湯一劑乃進小青龍方見咳嗽門中千金胸下有脅字無酸辛二字外臺與本文同唯胸下有脅字千金外臺此條接於前瀉肺湯條案方見上三字衍自三日一劑至乃進二十字千金之文而外臺引千金無此二十字方後云仲景傷寒論範汪同脈經亦載此條明是仲景舊文今列於附方之後者必後人編次之誤也程氏金鑑揭為原文刪注三十二字為是沈魏尤諸家以為附方蓋不考耳程癰在肺則胸脹滿肺朝百脈而主皮毛肺病則一身面目浮腫也肺開竅於鼻肺氣壅滯則蓄門不開但清涕滲出而濁膿猶塞於鼻肺之間故不聞香臭酸辛也以其氣逆於上焦則有喘鳴迫塞之證與葶藶大棗湯以瀉肺鑑是邪外塞皮毛內壅肺氣比之喘不得臥殆尤甚焉亦以葶藶大棗瀉肺湯者因其膿未成故也奔豚氣病脈證治第八論二首方三首師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之程篇目止有奔豚一證而吐膿驚怕火邪皆簡脫必有缺文經曰太陽傷寒者加溫針必驚也若針處被寒核起而赤者必作奔豚發汗後臍下悸者欲作奔豚故奔豚病從驚發而得尤吐膿有咳與嘔之別其從驚得之旨未詳驚怖即驚恐蓋病從驚得而驚氣即為病氣也火邪見後驚悸部及傷寒太陽篇云太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪然未嘗云從驚發也驚悸篇云火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之此亦是因火邪而發驚非因驚而發火邪也即後奔豚證治三條亦不必定從驚恐而得蓋是證有雜病傷寒之異從驚恐得者雜病也從發汗及燒針被寒者傷寒也其吐膿火邪二病仲景必別有謂姑闕之以俟知者前云驚發後兼言恐者腎傷於恐而奔豚為腎病也㹠水畜也腎水臟也腎氣內動上衝咽喉如豕之突故名奔豚亦有從肝病得者以腎肝同處下焦而其氣並善上逆也鑑張從政曰驚者為自不知故也恐者為自知也巢源云夫奔豚氣者腎之積氣起於驚恐憂思所生若驚恐則傷神心藏神也憂思則傷志腎藏志也神志傷動氣積於腎而氣下上游走如豚之奔故曰奔豚其氣乘心若心中踴踴如車所驚如入所恐五臟不定食飲輒嘔氣滿胸中狂癡不定妄言妄見此驚恐奔豚之狀若氣滿支心心下悶亂不欲聞人聲休作有時乍瘥乍極吸吸短氣手足厥逆內煩結痛溫溫欲嘔此憂思奔豚之狀診其脈來觸祝觸祝者外臺無兩觸字病賁豚也案靈邪氣臟腑病形篇云沉厥奔豚足不收不得前後蓋本篇所論即是也而難經名腎積為奔豚然與此自別故楊玄操注難經云又有奔豚之氣非此積病也名同而病異可以見耳後世有奔豚疝氣之稱見於和劑指南直指方等即內經所謂沖疝出於骨空論疝病而為奔豚氣者張氏醫說云以腎氣奔沖為奔豚謂豚能奔逸而不能遠也此解得之沈注云狀如江豚此說本于丹溪心法決不可從奔豚氣上衝胸腹痛往來寒熱奔豚湯主之徐此乃奔豚之氣與在表之外邪相當者也故狀如奔豚而氣上衝胸雖未至咽喉亦如驚發之奔豚矣但兼腹痛是客邪有在腹也且往來寒熱是客邪有在半表裡也沈是以芎歸姜芍疏養厥陰少陽氣血之正而驅邪外出以生葛李根專解表裡風熱而清奔豚逆上之邪黃芩能清風化之熱半夏以和脾胃而化客痰尤桂苓為奔豚主藥而不用者病由腎發也奔豚湯方外臺引集驗主療藥味並同甘草芎藭當歸各二兩半夏四兩黃芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升上九味以水二斗煮取五升溫服一升日三夜一服案本草別録云李根皮大寒無毒治消渴止心煩逆奔豚氣知是李根皮乃本方之主藥外臺小品奔豚湯療虛勞五臟氣乏損遊氣歸上上走時若群豚相逐憧憧時氣來便自如坐驚夢精光竭不澤陰痿上引少腹急痛面乍熱赤色喜怒無常耳聾目視無精光於本方內去芎藭黃芩加桂心人參又廣濟奔豚氣在心吸吸短氣不欲聞人語聲心下煩亂不安發作有時四肢煩疼手足逆冷於本方內去芎藭當歸黃芩生葛芍藥生薑加乾薑茯苓人參附子桂心案本方奔豚湯證而屬虛寒者宜用此方又集驗奔豚茯苓湯療短氣五臟不足寒氣厥逆腹脹滿氣奔走沖胸膈發作氣欲絶不識人氣力羸瘦少腹起騰踴如豚子走上走下馳往馳來寒熱拘引陰器手足逆冷或煩熱者於本方內去黃芩芍藥加茯苓人參又療奔豚氣從下上者湯方於本方內去甘草芎藭當歸加人參桂心又小品奔豚湯療手足逆冷胸滿氣促從臍左右起鬱冒者於本方內去當歸芍藥半夏生薑加桂心栝蔞人參又牡蠣奔豚湯療奔豚氣從少腹起憧胸手足逆冷牡蠣三兩熬桂心八兩李根白皮一斤切甘草三兩炙上四味切以水一斗煮取李根皮得七升去滓內余藥煮取三升分服五合日三夜再活人李根湯治氣上衝正在心端於本方內去芎藭生葛加茯苓桂枝發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上至心灸其核上各一壯與桂枝加桂湯主之太陽中篇無發汗後三字心下有者字鑑燒針即溫針也燒針取汗亦汗法也針處宜當避寒若不知謹外被寒襲火鬱脈中血不流行所以有結核腫赤之患也夫溫針取汗其法亦為迅烈矣既針而營不奉行作解必其人素寒陰盛也故雖有溫針之火但發核赤又被寒侵故不但不解反召陰邪而加針之時心既驚虛所以腎水陰邪得上凌心陽而發奔豚也奔豚者腎水陰邪之氣從少腹上衝於心若豚之奔也先灸核上各一壯者外祛其寒邪繼與桂枝加桂湯者內伐其腎邪也魏灸後與桂枝加桂湯主之意取升陽散邪固衛補中所以為汗後感寒陽衰陰乘之奔豚立法也與前條心動氣馳氣結熱聚之奔豚源流大別也桂枝加桂湯方桂枝五兩芍藥三兩甘草二兩炙生薑三兩大棗十二枚上五味以水七升微火煮取三升去滓溫服一升柯氏方論云更加桂者益火之陽而陰自平也桂枝更加桂治陰邪上攻只在一味中加分兩不於本方外求他味不即不離之妙如此茯苓桂枝甘草大棗湯證已在裡而奔豚未發此證尚在表而奔豚已發故有不同發汗後臍下悸者欲作奔豚茯苓甘草大棗湯主之太陽中篇後下有其人二字鑑周揚俊曰汗本心之液發汗而臍下病悸者心氣虛而腎氣動也程汗後臍下悸者陽氣虛而腎邪上逆也臍下為腎氣發源之地茯苓泄水以伐腎邪桂枝行陽以散逆氣甘草大棗甘溫助脾土以制腎水煎用甘瀾水者揚之無力全無水性取其不助腎邪也鑑欲作奔豚者有似奔豚之狀而將作未作也茯苓桂枝甘草大棗湯方茯苓半斤甘草二兩炙大棗十二枚桂枝四兩上四味以甘爛水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服甘爛水法取水二斗置大盆內以杓揚之水上有珠子五六千顆相逐取用之甘爛水法原文為細注今據傷寒論大書爛徐沈金鑑作瀾蓋本於玉函甘爛之義詳見於傷寒論輯義徐仲景論證每合數條以盡其變言奔豚由於驚又言其從少腹衝至咽喉又言其兼腹痛而往來寒熱又言其兼核起而無他病又言汗後臍下悸欲作奔豚而未成者其淺深瞭然用和解用伐腎用桂不用桂酌治微妙奔豚一證病因證治無復剩義苟不會仲景立方之意則峻藥畏用平劑寡效豈古方不宜於今哉肘後治卒厥逆上氣氣支兩脅心下痛滿淹淹欲絶此謂奔豚病從卒驚怖憂迫得之氣從下上上衝心胸臍間築築發動有時不療殺人方甘草二兩炙人參二兩吳茱萸一升生薑一斤半夏一升桂心三兩上六味切以水一斗煮取三升分三服千金名奔氣湯治大氣上奔胸膈中諸病發時迫滿短氣不得臥劇者便悁欲死腹中冷濕氣腸鳴相逐成結氣用桂五兩甘草三兩外臺廣濟療奔豚氣在胸心迫滿支脅方用半夏四兩吳茱萸一兩聖惠方治奔豚氣上下衝走悶亂面青宜服此方甘李根皮三兩生薑二兩炒乾吳茱萸一兩上搗細羅為散每服一錢水一中盞煎至六分去滓熱服案以上二方蓋奔豚之要藥品味亦單捷驗之頗效故附之備考又方檳榔三枚搗羅為末生薑汁半合上以童子小便一大盞微過入前藥二味攪令勻分為三服如人行五六里進一服須臾下利為效案此外臺廣濟療腳氣衝心悶欲死方今移以治奔豚氣正見運用之妙故亦附之胸痹心痛短氣病脈證治第九論一首證一首方十首師曰失脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也過不間脈經有與字鑑脈太過則病不及亦病故脈當取太過不及而候病也陽微寸口脈微也陽得陰脈為陽不及上焦陽虛也陰弦尺中脈弦也陰得陰脈為陰太過下焦陰實也凡陰實之邪皆得以上乘陽虛之胸所以病胸痹心痛胸痹之病輕者即今之胸滿重者即今之胸痛也李彣曰內經云胃脈平者不可見太過不及則病見矣寸脈為陽以候上焦正應胸中部分若陽脈不及而微則為陽虛主病上焦故受病胸痹尺脈太過而弦則為陰盛知在下焦故上逆而為痛也尤陽主開陰主閉陽虛而陰乾之即胸痹而痛痹者閉也案靈本藏篇云肺大則多飲善病胸痹喉痹逆氣巢源云胸痹之候胸中愊愊如滿噎塞不利習習如癢喉里澀唾燥甚者心裡強否急痛肌肉苦痹絞急如刺不得俯仰胸前皮皆痛手不能犯胸滿短氣咳唾引痛煩悶白汗出或徹背膂其脈浮而微者是也不治數日殺人三因作胸痞平人無寒熱短氣不足以息者實也平趙本作凡尤平人素無疾之人也無寒熱無新邪也而仍短氣不足以息當是裡氣暴實或痰或食或飲礙其升降之氣而然蓋短氣有從素虛宿疾而來者有從新邪暴遏而得者二端並否其為裡實無疑此審因察病之法也鑑平人無病之人也無寒熱無表邪也平人無故而有短氣不足以息之證不可責其虛也此必邪在胸中痹而不通阻礙呼吸當責其實也李彣曰上節云責其極虛此又云實何也經云邪之所湊其氣必虛留而不去其病為實是也明理論云短氣者呼吸雖數而不能相續似喘不搖肩似呻吟而無痛者是也胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之程內經曰肺痹者煩滿喘而嘔心痹者脈不通煩則心下鼓暴上氣而喘胸中者心肺之分故作喘息咳唾也諸陽受氣於胸而轉行於背氣痹不行則胸背為痛而氣為短也寸脈沉遲關脈小緊皆寒客上焦之脈數字誤案沈云遲字下當有一若字蓋此論當以寸口脈沉而遲為虛寒之證關上小緊數栝蔞薤白白酒湯為寒實之證另作一節解否則豈有遲數二脈同見之理哉此說似有理然不如程之為誤文之義長矣張氏醫通云寸口脈沉遲者陽氣衰微也關上小緊者胃以上有陰寒結聚所以胸中喘息咳唾胸背痛而短氣栝蔞性潤專以滌垢膩之痰薤白臭穢用以通穢濁之氣同氣相求也白酒熟谷之液色白上通於胸中使佐藥力上行極而下耳案張不注及數脈其意蓋與程同栝蔞薤白白酒湯方栝蔞實一枚搗薤白半斤白酒七升上三味同煮取二升分溫再服案薤白本草辛苦溫別録云溫中散結氣杜甫薤詩云衰年關膈冷味暖並無憂可見其以辛溫而散胸膈中之結氣也白酒注家無解似指為酒之白者然靈經筋篇以白酒和桂云云且飲美酒由此觀之白酒非常酒千金方用白酨漿一斗外臺亦引仲景傷寒論載本條云栝蔞薤白白酒湯主之而方中則用白酨酒程敬通云酨音再酢漿也知白酒即是酢漿今用米醋極驗千金栝蔞湯主療與本文同栝蔞實一枚半夏半升薤白一斤枳實二兩生薑四兩上五味㕮咀以白酨漿一斗煮取四升服一升日二仲景肘後不用生薑枳實半夏外臺引千金同胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之外臺引仲景傷寒論半夏下有白酨漿三字尤胸痹不得臥是肺氣上而不下也心痛徹背是心氣塞而不和也其痹為尤甚矣所以然者有痰飲以為之援也故於胸痹藥中加半夏以逐痰飲張氏醫通云心痛徹背者胸中痰垢積滿循脈而溢於背背者胸之府故於前藥但加半夏以祛痰積之痹逆也栝蔞薤白半夏湯方栝蔞實一枚搗薤白三兩半夏半升白酒一斗外臺作白酨漿云古今録驗範汪同上四味同煮取四升溫服一升日三服聖惠方治胸痹不得臥心痛徹背方栝蔞一枚桂心三分半夏一兩湯洗七遍去滑上件藥搗篩為散每服三錢以漿水一中盞入薤白七莖生薑半分煎至六分去滓稍熱頻服胸痹心中痞氣氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之趙本作心中痞留氣結在胸徐沈同外臺作心中痞堅留氣結於胸逆下有氣字魏胸痹自是陽微陰盛矣心中痞氣氣結在胸正胸痹之病狀也再連脅下之氣俱逆而搶心則痰飲水氣俱乘陰寒之邪動而上逆胸胃之陽氣全難支拒矣故用枳實薤白桂枝湯行陽開鬱溫中降氣猶必先後煮治以融和其氣味俾緩緩蕩除其結聚之邪也再或虛寒已甚無敢恣為開破者故人參湯亦主之以溫補其陽使正氣旺而邪氣自消又治胸痹從本治之一法也張氏醫通云二湯一以治胸中實痰外溢用薤白桂枝以解散之一以治胸中虛痰內結即用人參理中以清理之一病二治因人素稟而施兩不移易之法也案千金治中湯胸痹方別標為一條外臺亦引仲景傷寒論療胸痹理中湯即並人參湯方後注云張仲景曰胸痹心中痞堅留氣結於胸胸滿脅下逆氣搶心理中湯亦主之而引範汪出枳實薤白桂枝湯方名枳實湯方後云此本仲景傷寒論方枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半斤桂枝一兩栝蔞實一枚搗上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服千金用厚朴三兩薤白一斤人參湯方人參甘草乾薑白朮各三兩上四味以水八升煮取三升溫服一升日三服程此即理中湯也中氣強則痞氣能散胸滿能消脅氣能下人參白朮所以益脾甘草乾姜所以溫胃脾胃得其和則上焦之氣開發而胸痹亦愈胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之千金外臺無橘枳薑湯亦主之七字鑑胸痹胸中急痛胸痹之重者也胸中氣塞胸痹之輕者也程膻中為氣之海痹在胸中則氣塞短氣也神農經曰茯苓主胸脅逆氣杏仁主下氣甘草主寒熱邪氣為治胸痹之輕劑茯苓杏仁甘草湯方千金名茯苓湯外臺引千金方後云仲景傷寒論同茯苓三兩杏仁五十枚甘草一兩上三味以水一斗煮取五升溫服一升日三服不瘥更服外臺古今録驗療氣忽發滿胸急方於本方中去甘草加橘皮橘皮枳實生薑湯方千金無方名外臺作橘皮枳實湯橘皮一斤外臺作半斤枳實三兩外臺作四枚生薑半斤上三味以水五斤煮取二斤分溫再服原注肘後千金云治胸痹胸中愊愊如滿噎塞習習如癢喉中澀燥唾沫外臺引仲景傷寒論主療與肘後千金同方後云肘後小品文仲深師範汪古今録驗經心録千金同程氣塞氣短非辛溫之藥不足以行之橘皮枳實生薑辛溫同為下氣藥也內經曰病有緩急方有大小此胸痹之緩者故用君一臣二之小方也胸痹緩急者薏苡仁附子散主之外臺引古今録驗痹下有偏字程寒邪客於上焦則痛急痛急則神歸之神歸之則氣聚氣聚則寒邪散寒邪散則痛緩此胸痹之所以有緩急者亦心痛去來之義也薏苡仁以除痹下氣大附子以溫中散寒鑑李彣曰緩急者或緩而痛暫止或急而痛復作也薏苡仁入肺利氣附子溫中行陽為散服則其效更速矣案緩急之緩或謂絞字之訛此說似是而卻非外臺載胸痹心下堅痞緩急方四首聖惠亦同故知程李之解是也薏苡仁附子散方薏苡仁十五兩大附子十枚炮上二味杵為散服方寸匕日三服案外臺引古今録驗載薏苡仁散二方初一方用薏苡仁五百枚甘草三兩後一方與本方同唯用薏苡仁一千五百枚云此方出僧深範汪同仲景方用薏苡仁十五兩聖惠方薏苡仁散治胸痹心下堅痞緩急薏苡仁二兩附子二兩炮甘草一兩炙上搗篩為散每服三錢以水一中盞入生薑半分煎至六分去滓稍熱頻服之心中痞諸逆心懸痛桂枝生薑枳實湯主之肘後痛下有心下牽急懊痛六字程心中痞即胸痹也諸逆如脅下逆搶心之類邪氣獨留於上則心懸痛枳實以泄痞桂枝以下逆生薑以散氣尤諸逆該痰飲客氣而言心懸痛謂如懸物動搖而痛逆氣使然也鑑心懸而空痛如空中懸物動搖而痛也用桂枝生薑枳實湯通陽氣破逆氣痛止痞開矣潘氏續焰云懸者懸閣之義不在胃而懸留於腹脅間也桂枝生薑枳實湯方外臺載仲景傷寒論心下懸痛諸逆大虛者桂心生薑枳實湯方同桂枝生薑各三兩枳實五枚徐沈尤枚作兩外臺有炙字上三味以水六升煮取三升分溫三服千金桂心三物湯治心下痞諸逆懸痛桂心二兩膠飴半斤生薑二兩上藥切以水四升煮二味取三升去滓內飴分三服心痛徹背背痛徹心烏頭赤石脂丸主之鑑心痛徹背尚有休止之時故以栝蔞薤白白酒加半夏湯平劑治之此條心痛徹背背痛徹心是連連痛而不休則為陰寒邪甚浸浸乎陽光欲熄非薤白白酒之所能治也故以烏頭赤石脂丸主之方中烏附椒姜一派大辛大熱別無他顧峻逐陰邪而已李彣曰心痛在內而徹背則內而達於外矣背痛在外而徹心則外而入於內矣故既有附子之溫而復用烏頭之迅佐乾薑行陽大散其寒佐蜀椒下氣大開其鬱恐過於大散大開故復佐赤石脂入心以固澀而收陽氣也赤石脂丸方外臺引仲景傷寒論云千金必效文仲範汪經心録等同蜀椒一兩一法二分外臺作二分烏頭一分炮附子半兩炮一法一分外臺作一分乾薑一兩一法一分外臺作二分赤石脂一兩一法二分外臺作二分上五味末之蜜丸如梧子大先食服一丸日三服不知稍加服千金名烏頭丸用烏頭六銖附子蜀椒各半兩注云範汪不用附子崔氏用桂半兩為六味外臺云此方丹陽有隱士出山云得華他法若久心痛每旦服三丸稍加至十丸盡一劑遂終身不發九痛丸治九種心痛外臺引千金名附子丸徐本標附方二字沈同程云非仲景方並是附子三兩千金用二兩生狼牙一兩炙香千金用生狼毒四兩外臺同人參乾薑巴豆一兩去皮心熬研如脂吳茱萸各一兩千金用乾薑二兩上六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者二丸兼治卒中惡腹脹痛口不能言又治連年積冷流注心胸痛並冷衝上氣落馬墜車血疾等皆主之忌口如常法沖趙本作腫非程九痛者一蟲心痛二注心痛三風心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛案以上見千金本方主療雖分九種不外積聚痰飲結血蟲注寒冷而成附子巴豆散寒冷而破堅積狼牙茱萸殺蟲注而除痰飲乾薑人參理中氣而和胃脘相將治九種之心痛巴豆除邪殺鬼故治中惡腹脹痛口不能言連年積冷流注心胸痛冷氣上衝皆宜於辛熱辛熱能行血破血落馬墜車血凝血積者故並宜之腹滿寒疝宿食病脈證治第十論一首脈證十六條方十三首趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之脈經必下有下部閉塞大五字千金同千金作此虛寒氣從下向上趙脫當字尤趺陽胃脈也微弦陰象也以陰加陽脾胃受之則為腹滿設不滿則陰邪必旁攻胠脅而下閉穀道為便難為兩胠疼痛然其寒不從外入而從下上則病自內生所謂腎虛則寒動於中也故不當散而當溫程若寒實則用後條溫藥下之也病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去玉函病者作傷寒去下有宜大承氣湯五字沈此以手按辨腹滿虛實也按之不痛內無痰食燥屎壅滯即知虛寒而滿當以溫藥若按之痛乃以外手而就內結食痰燥屎則知內實是可下之而又以舌黃驗定虛實若舌有黃苔即是濕熱內蒸為未經下過必須下之則黃自去而脹滿自除舌無黃苔是近虛寒又非下法矣魏無形之虛氣作痞塞則按之無物何痛之有倘挾有形之實物為患如宿食在胃疝氣在少腹等是也按之有物阻礙於臟腑之側焉有不痛者乎是於按之痛否以決其虛實之法也張氏傷寒集注云中胃按之而痛世醫便謂有食夫胃為水穀之海又為倉廩之官胃果有食按必不痛試將飽食之人按之痛否惟邪氣內結正氣不能從膈出入按之則痛又胃無穀神臟氣虛而外浮按之亦痛若不審邪正虛實概謂有食傷人必多又按者輕虛平按若不得法加以手力未有不痛者腹滿時減復如故此為寒當與溫藥脈經減下更有減字徐腹滿有增減則非臟真黏著之病所以得陽即減得陰加滿故曰此為寒當溫藥程腹滿不減故用承氣下之此腹滿時減則寒氣或聚或散當與溫藥以散其寒案金鑑云此篇無治虛寒腹滿之方當與溫藥之下當有宜厚朴生薑甘草半夏人參湯主之十四字必是脫簡閲傷寒論太陰篇自知此說覺未允焉病者痿黃躁而不渴胸中寒實而利不止者死徐沈尤金鑑躁作燥今從之徐痿者黃之黯淡者也尤痿黃脾虛而色敗也氣不至故燥中無陽故不渴氣竭陽衰中上已敗而復寒結於上臟脫於下何恃而可以通之止之乎故死案程魏以躁為陰躁不可從本條不言腹滿而徐注以為虛寒腹滿未詳然否脈經以此條列於嘔吐下利篇似是寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也尤寸口脈弦亦陰邪加陽之象故脅下拘急而痛而寒從外得與趺陽脈弦之兩胠疼痛有別故彼兼便難而此有惡寒也夫中寒家善缺其人清涕出發熱色和者善嚏程云寒則面慘而不和今發熱色和則寒鬱於肺經而為熱也鑑中寒家謂素有中寒病之人也尤陽欲上而陰引之則缺陰欲入而陽拒之則嚏中寒者陽氣被抑故喜缺清涕出發熱色和則邪不能留故善嚏魏此諸證俱為外感寒邪者言也外感寒邪於脹滿病何與以脹滿病其中亦有內外合邪者故必明辨乎外中寒之證所以為內中寒之應也案千金此次一條云凡覘病者未脈望之口燥清涕出喜嚏缺此人中寒乃接下條連此條而為一條知此條為下條欲嚏不能者發耳中寒其人下利以裡虛也欲嚏不能此人肚中寒原注一云痛千金作腹中痛尤中寒而下利者裡氣素虛無為捍蔽邪得直侵中臟也欲嚏不能者正為邪逼既不能卻又不甘受於是陽欲動而復止邪欲去而仍留也沈陽和則嚏而欲嚏不能乃陰寒凝滯於裡所以肚中痛也夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖不沖者心下則痞程瘦人虛弱人也若繞臍作痛必有風冷有穀氣著而不行瘦人未可劇下而反下之則風冷之氣必上衝如不上衝必乘虛而結於心下為痞也尤此有似裡實而實為虛冷是宜溫藥以助脾之行者也乃反下之谷出而風冷不與俱出正乃益虛邪乃無制勢必上衝若不沖者心下則痞病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之脈經千金以此條為厚朴三物湯主療而本方主療云治腹滿氣脹恐是互誤徐此有表復有里但里挾燥邪故小承氣為主而合桂甘薑棗以和其表蓋腹之滿初雖因微寒乃胃素強故表寒不入而飲食如故但腹滿發熱且脈浮數相持十日此表裡兩病故兩解之耳此即大柴胡之法也但脈浮數邪尚在太陽故用桂枝去芍藥合小承氣耳厚朴七物湯方外臺引千金名厚朴七味湯主腹滿氣脹方厚朴半斤甘草大黃各三兩大棗十枚枳實五枚桂枝二兩生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤外臺不用生薑用乾薑云此本仲景傷寒論方張氏醫通云較之桂枝加大黃湯多枳朴而少芍藥以枳朴專泄壅滯之氣故用之芍藥專收耗散之陰此腹但滿而不痛與陰血無預故去之三因七物厚朴湯治腹滿發熱以陽並陰則陽實而陰虛陽盛生外熱陰虛生內熱脈必浮數浮則為虛數則為熱陰虛不能宣導飲食如故致脹滿者為熱脹即本方腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之千金作腹中塞氣脹滿腸鳴切痛外臺引範汪作腹中寒氣脹雷鳴程靈樞經曰邪在脾胃陽氣不足陰氣有餘則寒中腸鳴腹痛蓋脾胃喜溫而惡寒寒氣客於中奔迫於腸胃之間故作雷鳴切痛胸脅逆滿嘔吐也附子粳米湯散寒止逆張氏醫通云腹中寒氣奔迫上攻胸脅以及於胃而增嘔逆頃之胃氣空虛邪無所砥輒入陽位則殆矣是以除患之機所重全在胃氣乘其邪初犯胃尚自能食而用附子粳米之法溫飽其胃胃氣溫飽則土厚而邪難上越胸脅逆滿之濁陰得溫無敢留戀必還從下竅而出矣附子粳米湯方附子一枚炮半夏半升甘草一兩大棗十枚粳米半升上五味以水八升煮米熟湯成去滓溫服一升日三服外臺作以水八升煮米取熟去米內藥煮取三升去滓適寒溫飲之與仲景傷寒論同集驗加乾薑二兩案本條煮法必有脫文程療寒以熱藥腹中寒氣非附子辛熱不足以溫之雷鳴切痛非甘草大棗粳米之甘不足以和之逆滿嘔吐非半夏之辛不足以散之五物相需而為佐使外臺仲景論霍亂四逆吐少嘔多者附子粳米湯主之方與本條同千金同又刪繁附子湯療肺虛勞損腹中寒鳴切痛胸脅逆滿氣喘於本方內加宿姜白朮粳米作倉米又小品解急蜀椒湯主寒疝氣心痛如刺繞臍腹中盡痛白汗出欲絶又療心腹痛困急欲死解結逐寒上下痛良於本方內加蜀椒乾薑三因脹滿門附子粳米湯治憂怒相乘神志不守思慮兼併擾亂臟氣不主傳導使諸陽不舒反順為逆中寒氣脹腸鳴切痛胸脅逆滿嘔吐不食即於本方加乾薑百一選方附子粳米湯補虛生胃氣逐冷痰和五臟快胸膈止瀉利於本方內加人參黃耆白朮川薑木香去大棗用陳倉米活人事證方名附子倉廩湯證治要訣翻胃門若胃寒甚服藥而翻者宜附子粳米湯加丁香十粒砂仁半錢大便祕者更加枳殼半錢又厄逆門若胃中寒甚厄逆不已或復嘔吐輕劑不能取效宜附子粳米湯加炒川椒丁香每服各三十五粒痛而閉者厚朴三物湯主之痛而閉脈經作腹滿痛魏閉者即胃脹便難之證也尤痛而閉六腑之氣不行矣厚朴三物湯與小承氣同但承氣意在蕩實故君大黃三物意在行氣故君厚朴厚朴三物湯方厚朴八兩大黃四兩枳實五枚上三味以水一斗二升先煮二味取五升內大黃煮取三升溫服一升以利為度三升下千金有去滓二字千金云腹中轉動者勿服不動者更服按之心下滿痛者此為實也當下之宜大柴胡湯脈經無宜大柴胡湯五字接前七物湯三物湯為一條傷寒論可下篇作病腹中滿痛者宜下有大承氣三字尤按之而滿痛者為有形之實邪實則可下而心下滿痛則結處尚高與腹中滿痛不同故不宜大承氣而宜大柴胡魏此為邪實而且挾熱者言也仲景已敘之傷寒論中太陽篇矣云傷寒十餘日熱結在裡者與大柴胡湯主之宜下之而不用大承氣乃出大柴胡者正與傷寒論篇中所言相符也張氏醫通云邪從胸脅而入於陽位合用大柴胡兩解之與臍腹硬痛承氣證不同案數說如是而金鑑謂滿痛之下當有有潮熱之三字若無此三字則不當與大柴胡湯此尤有理然今據脈經而味經旨此亦厚朴三物湯之證宜大柴胡湯五字恐是衍文其方亦錯出大柴胡湯方柴胡半斤黃芩二兩芍藥三兩半夏半升枳實四枚炙大黃二兩大棗十二枚生薑五兩上八味以水一斗二升煮取六升去滓再煎溫服一升日三服腹滿不減減不足言當須下之宜大承氣湯不足言千金作不驚人鑑腹滿時減時滿虛滿也腹滿常常而滿實滿也腹滿不減雖減不過稍減不足言減也虛滿當溫實滿當下故宜大承氣湯下之尤減不足言謂雖減而不足云減所以形其滿之至也故宜大下以上三方雖緩急不同而攻泄則一所謂中滿者瀉之於內也大承氣湯方見前痓病中心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯主之千金作心脅中大寒大痛嘔不能飲食飲食下咽自知偏從一面下流有聲決決然若腹中寒氣上衝皮起出見有頭足上下而痛其頭不可觸近程本金鑑無痛而之而鑑心胸中大寒痛謂腹中上連心胸大痛也而名大寒痛者以有厥逆脈伏等大寒證之意也嘔逆不能飲食者是寒甚拒格於中也上衝皮起出見頭足者是寒甚聚堅於外也上下痛不可觸近是內而臟腑外而經絡痛之甚亦由寒之甚也主之以大建中湯蜀椒乾薑大散寒邪人參膠飴大建中虛服後溫覆令有微汗則寒去而痛止此治心胸中寒之法也程寒氣搏於腸胃之外衝突出見於皮膚膜原之分如有頭足其痛則近於外故不可以手觸近也大建中湯方蜀椒二合去汗乾薑四兩人參二兩上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃如飲粥二升後更服當一日食糜溫覆之一炊頃千金作炊三升米張氏千金衍義云虛寒積聚之治此方最力其方中人參輔椒姜溫散之法人皆得之至於膠飴為助滿之首列而反用以治痛嘔不能食是專用助滿之味引領椒姜人參為泄滿之通使也千金大建中湯治虛勞寒澼飲在脅下決決有聲飲已如從一邊下決決然也有頭並沖皮起引兩乳內痛裡急善夢失精氣短目䀮䀮惚惚多忘蜀椒二合半夏一升生薑一斤甘草二兩人參三兩飴糖八兩上六味㕮咀以水一斗煮取三升去滓內糖溫服七合裡急拘引加芍藥桂心各三兩手足厥腰背冷加附子一枚勞者加黃耆一兩脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯脈經無發熱二字尤脅下偏痛而脈緊弦陰寒成聚偏著一處雖有發熱亦是陽氣被郁所致是以非溫不能已其寒非下不能去其結故曰宜以溫藥下之程氏曰大黃苦寒走而不守得附子細辛之大熱則寒性散而走泄之性存是也魏此發熱或有形之物積於腸胃而皮膚熱作故在可下之例未必為假熱症徐附子細辛與大黃今用並行而不倍此即傷寒論大黃附子瀉心湯之法也千金衍義云少陰病始得之反發熱脈沉用麻黃附子細辛湯以治太陽少陰之兩感此治脅下偏痛發熱脈緊變表法為下法立大黃附子湯以治寒從下上之瘕積賴附子把守真陽不隨汗下亡脫設無發熱外證豈不可變大黃附子甘草之治乎況治食已則吐之大黃甘草湯具有成法始知權變之方不在規矩之外也張氏醫通云色疸者身黃額上微黃小便利大便黑此因房事過傷血蓄小腹而發黃故小腹連腰下痛大黃附子湯去細辛加肉桂案篇首第一條云不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之大黃附子湯蓋其方也金鑑改偏痛作滿痛不可從大黃附子湯方大黃三兩附子三枚炮細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服外臺引小品云仲景同寒氣厥逆赤丸主之此條脈經無鑑此條之文之方必有簡脫難以為後世法不釋程溫經散寒無非辛熱之劑四逆湯輩可選用之不必拘泥赤丸方千金載痼冷積熱門主療同茯苓四兩半夏四兩洗一方用桂案千金用桂枝不用半夏烏頭二兩炮細辛一兩千金作人參案今考千金用細辛不用人參更有附子二兩射罔一兩凡六味上四味末之內真朱為色煉蜜丸如麻子大先食酒飲下三丸日再夜一服不知稍增之以知為度四味原本作六味今依趙本改之徐真朱即硃砂也案千金傷寒神丹丸治傷寒敕澀惡寒發熱體疼者即本方用人參不用細辛更有附子並硃砂凡六味徐釋本條云此即傷寒論直中之類也蓋據於千金與腹痛脈弦而緊弦則衛氣不行即惡寒緊不欲食邪正相搏即為寒疝寒疝繞臍痛若發則白汗出手足厥逆其脈沉緊者大烏頭煎主之腹痛脈經千金作寸口至即為寒疝為別條外臺不載腹痛以下二十八字即為寒疝下脈經有跗陽脈浮而遲浮則為風虛遲則為寒疝十六字明是寒疝繞臍以下為別作矣原本若發作苦發白汗作白津今依程本及千金外臺改定其脈沉緊趙本脈經千金外臺程徐諸本作其脈沉弦尤弦緊脈皆陰也而弦之陰從內生緊之陰從外得弦則衛氣不行而惡寒者陰出而痹其外之陽也緊則不欲食者陰入而痹其胃之陽也衛陽與胃陽並衰而外寒與內寒交盛由是陰反無畏而上衝陽反不治而下伏所謂邪正相搏即為寒疝者也鑑疝病犯寒即發故謂之寒疝也魏平素陽虛陰盛積寒在裡以召外寒夾雜於表裡而為患者也表裡之寒邪既盛而正陽與之相搏寒邪從下起結聚於至陰之分而寒疝成矣寒疝既成伏於少腹繞臍痛發止有時發則白津出此汗本下部虛寒陰邪逼迫外越故也及陰寒積久而發四肢厥冷脈得沉緊何非寒厥之氣為害也耶案素長刺節論云病在少腹腹痛不得大小便病名曰疝得之寒王氏注大奇論云疝者寒氣結聚之所為也急就篇顏師古注云疝腹中氣疾上下引也樓氏綱目云疝名雖七寒疝即疝之總名也巢源云疝者痛也此由陰氣積於內寒氣結搏而不散腑臟虛弱風冷邪氣相擊則腹痛裡急故云寒疝腹痛也案陰陽別論白汗王氏釋為流汗淮南修務訓云奉一爵酒不知於色挈一石之尊則白汗交流此云白汗出者蓋不堪痛苦之甚而汗出也程云冷汗也徐沈尤魏仍原文作白津而解之趙本作自汗並非烏頭煎方千金注云仲景名二物烏頭煎三因名大烏頭湯烏頭大者五枚熬去皮不㕮咀千金作十五枚外臺引仲景傷寒論亦作十五枚千金熬下有黑字三因云大烏頭五個洗淨細沙炒令黑不㕮咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不瘥明日更服不可一日再服二升千金外臺作二斤程烏頭大熱大毒破積聚寒熱治臍間痛不可俯仰故用之以治繞臍寒疝痛苦治下焦之藥味不宜多多則氣不專此沉寒痼冷故以一味單行則其力大而厚甘能解藥毒故內蜜以制烏頭之大熱大毒王冰至真要注云夫大寒內結稸聚疝瘕以熱攻除寒格熱反縱反縱之則痛發尤甚攻之則熱不得前方以蜜煎烏頭佐之以熱蜜多其藥服已便消是則張公從此而以熱因寒用也寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之外臺仲景傷寒論作腹中痛引脅痛及腹裡急尤此治寒多而血虛者之法血虛則脈不榮寒多則脈絀急故腹脅痛而裡急也當歸生薑溫血散寒羊肉補虛益血也鑑李彣云疝屬肝病肝藏血其經布脅肋腹脅並痛者血氣寒而凝泣也當歸通經活血生薑溫中散寒裡急者內虛也用羊肉補之內經云形不足者溫之以氣精不足者補之以味是也當歸生薑羊肉湯方千金婦人門名當歸湯注云胡洽名小羊肉湯當歸三兩生薑五兩羊肉一斤外臺云去脂上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之千金用芍藥二兩注云子母祕録有甘草王氏古方選注云寒疝為沉寒在下由陰虛得之陰虛則不得用辛烈熱燥之藥重劫其陰故仲景另立一法以當歸羊肉辛甘重濁溫暖下元而不傷陰佐以生薑五兩加至一斤隨血肉有情之品引入下焦溫散沍寒若痛多而嘔加陳皮白水奠安中氣以禦寒逆本方三味非但治疝氣逆沖移治産後下焦虛寒亦稱神劑張氏千金衍義云凡少腹㽲痛用桂心等藥不應者用之輒效寇氏本草衍義云張仲景治寒疝用生薑羊肉湯服之無不應驗有一婦人産當寒月寒氣入産門腹臍以下脹滿手不敢犯此寒疝也師將治之以抵當湯謂有瘀血非其治也可服張仲景羊肉湯二服遂愈外臺小品寒疝氣腹中虛痛及諸脅痛裡急當歸生薑等四味主之於本方內加芍藥聖濟總録四味當歸湯治卒疝腹痛裡急即本方寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之千金程本無抵當二字徐起於寒疝腹痛而至逆冷手足不仁則陽氣大痹加以身疼痛榮衛俱不和更灸刺諸藥不能治是或攻其內或攻其外邪氣牽制不服故以烏頭攻寒為主而合桂枝全湯以和榮衛所謂七分治里三分治表也如醉狀則榮衛得溫而氣勝故曰知得吐則陰邪不為陽所客故上出而為中病程寒淫於內則腹中痛寒勝於外則手足逆冷甚則至於不仁而身疼痛此內外有寒也鑑抵當二字衍文也烏頭桂枝湯方烏頭案千金云秋干烏頭實中者五枚除去角外臺作實中大者十枚知本文脫枚數上一味以蜜二斤煎減半去滓以桂枝湯五合解之令得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病二斤千金作一斤外臺引仲景傷寒論作二斤云一方一斤用桂心四兩云上三味先以蜜微火煎烏頭減半去烏頭別一處以水二升半煮桂取一升去滓以桂汁和前蜜合煎之得一升許初服二合不知更服至三合云云範汪同而又出五味桂枝湯方云仲景傷寒論千金同其既用單味桂心而合煎又出五味桂枝湯恐誤沈云解之恐是煎之非也金鑑刪後字程烏頭煎熱藥也能散腹中寒痛桂枝湯表藥也能解外證身腹二方相合則能達臟腑而利榮衛和血氣而播陰陽其藥勢翕翕行於肌肉之間恍如醉狀如此則外之凝寒已行得吐則內之冷結將去故為中病徐解之恐是合煎鑑以桂枝湯五合解之者溶化也令得一升謂以烏頭所煎之蜜五合加桂枝湯五合溶化令得一升也不知不效也其知者已效也如醉狀外寒方散得吐者內寒已伸故為中病也案如醉狀也得吐也乃烏頭之瞑眩使然程注是桂枝湯方程尤金鑑並不載桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩大棗十二枚上五味銼以水七升微火煮取三升去滓三因大烏頭桂枝湯治風寒疝腹中痛逆冷手足不仁身體疼痛灸刺諸藥不能療及賊風入腹攻刺五臟拘急不得轉側發作叫呼陰縮悉主之即本方一法用附子一個不使烏頭為蜜附湯易簡云疝氣發作當於附子建中湯煎時加蜜一箸頭許名蜜附子湯其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰可下之其脈數脈經作其脈浮案可下篇緊大作雙弦可下之下有宜大承氣湯五字不載其脈數以下二十三字知是別為一條尤脈數為陽緊弦為陰陰陽參見是寒熱交至也然就寒疝言則數反從弦故其數為陰疑於陽之數非陽氣生熱之數矣如就風瘧言則弦反從數故其弦為風從熱發之弦而非陰氣生寒之弦者與此適相發明也故曰脈數弦者當下其寒緊而遲大而緊亦然大雖陽脈不得為熱正以形其陰之實也故曰陽中有陰可下之案辨脈法云脈浮而緊者名曰弦也弦者狀如弓弦按之不移也是與脈經合則此條數作浮為是金鑑自其脈數至脈弦數者十九字為衍文以當下其寒之四字移必心下堅之下未知是否附方外臺烏頭湯治寒疝腹中絞痛賊風入攻五臟拘急不得轉惻發作有時使人陰縮手足厥逆方見上案此本出於千金賊風門轉側下有叫呼二字外臺引千金即烏頭桂枝湯也徐沈魏尤以為大烏頭煎何不檢之於外臺誤甚外臺柴胡桂枝湯方治心腹卒中痛者外臺引仲景傷寒論無卒字柴胡四兩黃芩人參芍藥桂枝生薑各一兩半甘草一兩半夏二合半大棗六枚上九味以水六升煮取三升溫服一升日三服魏有表邪而挾內寒者烏頭桂枝湯證也有表邪而挾內熱者柴胡桂枝湯證也以柴胡桂枝生薑升陽透表人參半夏甘草大棗補中開鬱黃芩芍藥治寒中有熱雜合此表裡兩解寒熱兼除之法也沈豫以此方每於四時加減治胃脘心腹疼痛功效如神仁齊直指云柴胡桂枝湯治腎氣冷熱不調證案腎氣即疝也外臺走馬湯治中惡心痛腹脹大便不通巴豆二枚去皮心熬杏仁二枚上二味以綿纏捶令碎熱湯二合捻取白汁飲之當下老小量之通治飛尸鬼擊病沈中惡之證俗謂絞腸烏痧即臭穢惡毒之氣直從口鼻入於心胸腸胃臟腑壅塞正氣不行故心痛腹脹大便不通是為實證非似六淫侵入而有表裡虛實清濁之分故用巴豆極熱大毒峻猛之劑急攻其邪佐杏仁以利肺與大腸之氣使邪從後陰一掃盡除則病得愈若緩須臾正氣不通營衛陰陽機息則死是取通則不痛之義也肘後飛尸走馬湯通治諸飛尸鬼擊即本方外臺文仲療卒得諸疝少腹及陰中相引絞痛白汗出欲死此名寒疝亦名陰疝張仲景飛尸走馬湯方同案此為治寒疝附於本篇之末者而主療與外臺異者何問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故有宿食大承氣湯主之尤寸口脈浮大者穀氣多也谷多不能益脾而反傷脾按之脈反澀者脾傷而滯血氣為之不利也尺中亦微而澀者中氣阻滯而水穀之精氣不能逮下也是因宿食為病則宜大承氣下其宿食案金鑑云按尺中亦微而澀之微字當按傷寒論作大字是今考傷寒論可下篇亦作微字而金鑑又云微字當是大字若是微字斷無當下之理彼注如此今引以為證誤也巢源宿食不消候云宿谷未消新谷又入脾氣既弱故不能磨之則經宿而不消也令人腹脹氣急噫氣醋臭時復憎寒壯熱是也程知云滑為有食結滯經宿則脈澀矣尺以候內沉以候里故宿食之脈按之反澀尺中亦大而澀也脈數而滑者實也此有宿食下之愈宜大承氣湯鑑腹滿而痛脈數而滑者實也此有宿食故當下之李彣曰滑者水穀之氣勝也若滑而兼數則實熱已入胃腑矣故云有宿食可下之魏滑與澀相反何以俱為實宜下滑者澀之淺而實邪欲成未成者澀者滑之深而實邪已成者故不論為滑為澀兼大而見則有物積聚宜施攻治無二理也陽明篇云脈滑而數者有宿食也當下之宜大承氣湯下利不欲食者有宿食也當下之宜大承氣湯尤谷多則傷脾而水穀不分谷停則傷胃而惡聞食臭故下利不欲食者知其有宿食當下也夫脾胃者所以化水穀而行津氣不可或止者也谷止則化絶氣止則機息化絶機息人事不其頓乎故必大承氣速去其停谷谷去則氣行氣行則化續而生以全矣若徒事消克將宿食未去而生氣已消豈徒無益而已哉沈驟傷宿食停滯胃中壅遏升降之機不轉腸中水穀不分而下奔則利宿食在胃故不欲食必當攻去宿食程應旄云傷食惡食故不欲食與不能食者自別下利有此更無別樣虛證知非三陰之下利而為宿食之下利也故當下之大承氣湯方見前痓病中宿食在上脘當吐之宜瓜蒂散鑑胃有三脘宿食在上脘者膈間痛而吐可吐不可下也在中脘者心中痛而吐或痛不吐可吐可下也在下脘者臍上痛而不吐不可吐可下也今食在上脘故當以瓜蒂散吐之也千金云凡病宿食在上脘當吐之脈數而滑者實也有宿食不消下之愈胃中有澼食冷物即痛不能食有熱物即欲食大腹有宿食寒栗發熱如瘧宿食在小腹者當暮發熱明旦復止瓜蒂散方瓜蒂一分熬黃赤小豆一分煮案煮字據傷寒論當刪上二味杵為散以香豉七合煮取汁和散一錢匕溫服之不吐者少加之以快吐為度而止亡血及虛者不可與之亡血以下九字原本作細注今據傷寒論大書傷寒論作杵為散取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之此當改補東垣試效方云若有宿食而煩者仲景以梔子大黃湯主之氣口三盛則食傷太陰填塞悶亂極則心胃大疼兀兀欲吐得吐則已俗呼食迷風是也經云上部有脈下部無脈其人當吐不吐者死宜瓜蒂散之類吐之經云高者因而越之此之謂也案宿食在上脘心腹㽱痛頓悶欲絶倉猝之際藥不及辦以極鹹鹽湯一盞頓服立吐此千金療乾霍亂之法也脈緊如轉索無常者有宿食也脈經索下有左右二字尤脈緊如轉索無常者緊中兼有滑象不似風寒外感之緊為緊而帶弦也故寒氣所束者緊而不移食氣所發者乍緊乍滑如以指轉索之狀故曰無常魏轉索宿食中阻氣道艱於順行曲屈傍行之象案據脈經有左右二字魏注極是徐沈以轉索無常為緊脈之象此襲辨脈法之謬不可證也脈緊頭痛風寒腹中有宿食不化也原注一云寸口脈緊脈經作寸口脈緊頭上有即字腹上有或字鑑脈緊頭痛是外傷風寒病也脈緊腹痛是內傷宿食病也李彣曰按此脈與證似傷寒而非傷寒者以身不疼腰脊不強故也然脈緊亦有辨浮而緊者為傷寒沉而緊者為傷食案頭痛雖有宿食不化鬱滯之氣上為頭痛者此則屬外傷於風寒與腹中有宿食自是兩截脈經腹上有或字義尤明顯
