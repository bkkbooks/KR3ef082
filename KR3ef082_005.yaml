body:
  text: 卷五婦人妊娠病脈證並治第二十證三條方九首師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之原注方見利中於法六十日當有此證設有醫治逆者卻一月加吐下者則絶之妊娠脈經作軀此證作娠絶之下有方在傷寒中五字尤平脈脈無病也即內經身有病而無邪脈之意陰脈小弱者初時胎氣未盛而陰方受蝕故陰脈比陽脈小弱至三四月經血久蓄陰脈始強內經所謂手少陰脈動者妊子千金所謂三月尺脈數是也其人渴妊子者內多熱也一作嘔亦通今妊婦二三月往往惡阻不能食是已無寒熱者無邪氣也夫脈無故而身有病而又非寒熱邪氣則無可施治惟宜桂枝湯和調陰陽而已徐氏云桂枝湯外證得之為解肌和營衛內證得之為化氣調陰陽也六十日當有此證者謂妊娠兩月正當惡阻之時設不知而妄治則病氣反增正氣反損而嘔瀉有加矣絶之謂禁絶其醫藥也婁全善云嘗治一二婦惡阻病吐前醫愈治愈吐因思仲景絶之之旨以炒糯米湯代茶止藥月餘漸安程此證有缺文鑑脈平無寒熱用桂枝湯與妊娠渴不能食者不合且文義斷續不純其中必有脫簡案樓氏綱目云絶之者謂絶止醫治候其自安也豫常治一二婦阻病吐愈治愈逆因思此仲景絶之旨遂停藥月餘自安真大哉聖賢之言也樓所載如此以炒糯米代茶湯見於魏注必有所據桂枝湯可疑程注金鑑似是婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者為症痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其症不去故也當下其症桂枝茯苓丸主之脈經無宿有症病四字有妊娠二字趙本害下有一圈衃作不血二字非三因方作婦人宿有症病妊娠經斷未及三月即動此症也經斷三月而得漏下不止胎動在臍上者為症痼害當去其症案是以意改者不必有所本也諸注害下為句魏以害妊娠為一句似是魏婦人宿有症病舊血積聚之邪也忽而經斷未及三月即上條六十日以下見渴不能食證之候也又忽爾經血至且得漏下不止之證以為胎墮乎胎固在腹中但動而不安有欲墮之機矣是症之為病而纍及於胎者如症在臍下邪居於下可以隨血漏而症散止漏安胎病去胎全矣如症在臍上邪居於上雖血漏不止而症自沉痼名為症痼勢必令胎中之氣血先隨血漏而墮所以可決其害將及於妊娠也此就宿血積聚居於胎之上下以卜血漏不止有無干礙妊娠之義也再或妊娠六月矣胎忽動者此亦宿血痼症所致又當明辨其孰為正胎孰為症邪而治之前三月之間經水順利得其正道無胎應行則行有胎應止即止此胎之正也至三月以後邪症為患忽而漏血不止此血非關胎血乃斷經之後三月之血閉而未行於邪症之所在必加添積聚成為血衃所以漏下不止而自與胎不相涉也惟久久不止方害及於胎耳血不止而痼症不去必纍害於胎當下其症症自下而胎自存所謂有物無殞者亦此義也胎與衃之辨當於血未斷之前三月求之前三月經水順利則經斷必是胎前三月有冒經下血者則經斷必成衃此說較前注之說明暢易曉附載於此以質高明鑑此示人妊娠有病當攻病之義也此條文義不純其中必有缺文姑存其理可也方氏曰胎動胎漏皆下血而胎動有腹痛胎漏無腹痛故胎動宜行氣胎漏宜清熱樓氏綱目云凡胎動多在當臍今動在臍上故知是症也桂枝茯苓丸方桂枝茯苓牡丹去心桃仁去皮尖熬芍藥各等分上五味末之煉蜜和丸如兔屎大每日食前服一丸不知加至三丸程牡丹桃仁以攻症痼桂枝以和衛芍藥以和榮茯苓以和中五物相需為治妊娠有症痼之小劑徐此方去症之力不獨桃仁症者陰氣也遇陽則消故以桂枝扶陽而桃仁愈有力矣其餘皆養血之藥也案桂枝取之於通血脈消瘀血猶桃核承氣中所用張氏醫通改作桂心非也千金惡阻篇茯苓丸注肘後云妊娠忌桂故熬龐安時云桂炒過則不損胎也此等之說不必執拘陳氏傷寒五法云桂枝不傷胎蓋桂枝輕而薄但能解發邪氣而不傷血故不墮胎案炮炙論序曰大豆許取重十兩鯉目比之如兔屎十二兩鯉目梧桐子十四兩鯉目如兔屎小於梧桐子婦人良方奪命丸專治婦人小産下血至多子死腹中其人憎寒手指唇口爪甲青白面色黃黑或胎上搶心則悶絶欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止胎尚未損服之可安已死服之可下此方的系異人傳授至妙準繩云此即仲景桂枝茯苓丸即本方以蜜丸如彈子大每服一丸細嚼淡醋湯送下速進兩丸至胎腐爛腹中危甚者立可取出濟陰綱目催生湯候産母腹痛腰痛見胞漿下方服即本方水煎熱服婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟開故也當以附子湯溫其臟原注方未見愈脹脈經作逾腹扇下有之狀二字尤脈弦發熱有似表邪而乃身不痛而腹反痛背不惡寒而腹反惡寒甚至少腹陳陳作冷若或扇之者然所以然者子臟開不能合而風冷之氣乘也夫臟開風入其陰內勝則其脈弦為陰氣而發熱且為格陽矣胎脹者內熱則消寒則脹也徐子臟者子宮也開者不斂也宜以附子湯溫其臟原方失注想不過傷寒論中附子合參苓朮芍之附子湯耳案金鑑云方缺文亦不純必有殘缺然尤注義通今從之張氏醫通云妊娠脈弦為虛寒虛陽散外故發熱陰寒內逆故胎脹腹痛惡寒者其內無陽子臟不能司閉藏之令故陰中覺寒氣習習如扇也用附子湯以溫其臟則胎自安世人皆以附子為墮胎百藥長仲景獨用以為安胎聖藥非神而明之莫敢輕試也師曰婦人有漏下者有半産後因續下血都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之阻脈經作漏半産脈經作中生鑑五六月墮胎者謂之半産婦人有漏下下血之疾至五六月墮胎而下血不絶者此症痼之害也若無症痼下血惟腹中痛者為胞阻胞阻者胞中氣血不和而阻其化育也故用芎歸膠艾湯溫和其血血和而胎育也程漏下者妊娠經來脈經以陽不足謂之激經也半産者以四五月墮胎墮胎必傷其血海血因續下不絶也若妊娠下血腹中痛為胞阻則用膠艾湯以治巢源云漏胞者謂妊娠數月而經水時下此由衝脈任脈虛不能約制太陽少陰之經血故也衝任之脈為經脈之海皆起於胞內手太陽小腸脈也手少陰心脈也是二經為表裡上為乳汁下為月水有娠之人經水所以斷者壅之以養胎而蓄之為乳汁沖在氣虛則胞內泄漏不能制其經血故月水時下亦名胞阻漏血盡則人斃也芎歸膠艾湯方原注一方加乾薑一兩胡洽治婦人胞動無干姜芎藭阿膠甘草各二兩艾葉當歸各三兩芍藥四兩乾地黃案原本缺兩數唯徐沈尤用六兩千金乾地黃四兩艾葉三兩餘各二兩外臺引集驗同上七味以水五升清酒三升合煮取三升去滓內膠令消盡溫服一升日三服不瘥更作程膠艾主乎安胎四物主乎養血和以甘草行以酒勢血能循經養胎則無漏下之患魏用芎藭行血中之凝阿膠甘草當歸地黃芍藥五味全補胞血之虛艾葉溫子臟之血寒證見加乾薑熱證見者乾薑燒灰存性溫經散寒開凝通阻而血反止矣乾薑之加乃注中所增實不易之藥余治婦人經血屢試屢效者也故竟僭而添入方中高明鑑焉千金膠艾湯治妊娠二三月上至七八月其人頓僕失據胎動不安傷損腰腹痛欲死若有所見及胎奔上搶心短氣方外臺引集驗同即本方又損傷門大膠艾湯治男子傷絶或從高墮下傷五臟微者唾血及金瘡傷經方即本方加乾薑煮法後云此湯治婦人産後崩傷下血過多虛喘欲死腹中激痛下血不止者神良又治妊娠二三月上至八九月胎動不安腰痛已有所見方即本方去芍藥地黃不用清酒又治産後下赤白腹中絞痛方即本方無芎藭和劑局方膠艾湯治勞傷血氣衝任虛損月水過多淋瀝漏下連日不斷臍腹疼痛及妊娠將攝失宜胎動不安腹痛下墮或勞傷胞絡胞阻漏血腰痛悶亂或因損動胎上搶心奔沖短氣及因産乳衝任氣虛不能約制經血淋瀝不斷延引日月漸成羸瘦即本方婦人良方陳氏六物湯治血痢不止腹痛難忍即本方去甘草又四物湯治婦人經病或先或後或多或少疼痛不一腰足腹中痛或崩中漏下或半産惡露多或停留不出妊娠腹痛下血胎不安産後塊不散或亡血過多或惡露下服之如神即本方去阿膠艾葉甘草此藥不知起於何代或云始自魏華他今産寶方乃朱梁時節度巡官咱殷所撰其中有四物散國朝太平興國中修入聖惠方者數方自後醫者易散為湯自皇朝以來名醫於此四物中增損品味隨意虛實寒熱無不得其效者然非止婦人之疾可用而已施氏醫方祖劑云仲景芎歸膠艾湯乃四物湯之祖劑也中間已具四物後人裁而用之婦人懷娠腹中㽲痛當歸芍藥散主之娠趙本作妊徐沈尤同尤按說文㽲音絞腹中急也乃血不足而水反侵之也血不足而水侵則胎失其所養而反得其所害矣腹中能無㽲痛乎芎歸芍藥益血之虛苓朮澤瀉除水之氣趙氏曰此因脾土為木邪所客穀氣不舉濕氣下流搏於陰血而痛故用芍藥多他藥數倍以瀉肝木亦通當歸芍藥散方當歸三兩芍藥一斤茯苓四兩白朮四兩澤瀉半斤芎藭半斤乙作三兩上六味杵為散取方寸匕酒和日三服程腹中無因而作痛或邪熱所幹或胎氣壅盛用茯苓之淡以滲之澤瀉之咸以泄之白朮之甘以補之和以酒服者藉其勢以行藥力日三服則藥力相續而腹痛自止案金鑑云妊娠腹中急痛用此方未詳其義必是脫簡不釋此說卻可疑三因方本方煎法後云元和紀用經曰本六氣經緯丸能祛風補勞養真陽退邪熱緩中安和神志潤澤容色散邪寒溫瘴時疫安期先生賜李少君久餌之藥後仲景增減為婦人懷妊腹痛方本方用芍藥四兩澤瀉茯苓川芎各一兩當歸白朮各二兩亦可以蜜丸服案此說涉荒誕不可信據和劑局方當歸芍藥散治妊娠腹中絞痛心下急滿及産後血暈內虛氣乏崩中久痢常服通暢血脈不生癰瘍消痰養胃明目益津即本方婦人良方同妊娠嘔吐不止乾薑人參半夏丸主之魏妊娠嘔吐不止者下實上必虛上虛胸胃必痰飲凝滯而作嘔吐且下實氣必逆而上衝亦能動痰飲而為嘔吐方用乾薑溫益脾胃半夏開降逆氣人參補中益氣為丸緩以收補益之功用治虛寒之妊娠家至善之法也張氏醫通云此即所謂惡阻病也先因脾胃虛弱津液留停蓄為痰飲至妊二月之後濁陰上衝中焦不勝其逆痰飲遂湧中寒乃起故用乾薑止寒人參補虛半夏生薑治痰散逆也乾薑人參半夏丸方乾薑人參各一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服程寒在胃脘則令嘔吐不止故用乾薑散寒半夏生薑止嘔人參和胃半夏乾薑能下胎婁全善曰余治妊阻病纍用半夏未嘗動胎亦有故無殞之義臨病之工何必拘泥尤此益虛溫胃之法為妊娠中虛而有寒飲者設也夫陽明之脈順而下行者也有寒則逆有熱亦逆逆則飲必從之而妊娠之體精凝血聚每多蘊而成熱者矣按外臺方青竹茹橘皮半夏各五兩生薑茯苓各四兩麥冬人參各三兩為治胃熱氣逆嘔吐之法可補仲景之未備也聖惠半夏丸治妊娠惡阻病醋心胸中冷腹痛不能飲食輒吐青黃汁方即本方三味等分搗羅為末以地黃汁浸蒸餅和丸如梧桐子大每服不計時候以粥飲下十丸妊娠小便難飲食如故當歸貝母苦參丸主之尤小便難而飲食如故則病不由中焦出而又無腹滿身重等證則更非水氣不行知其血虛熱鬱而津液澀少也本草當歸補女子諸不足苦參入陰利竅除伏熱貝母能療鬱結兼清水液之源也當歸貝母苦參丸方原注男子加滑石半兩諸注本刪此七字唯魏本有當歸貝母苦參各四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸張氏醫通云此小便難者膀胱熱鬱氣結成燥病在下焦所以飲食如故用當歸以和血潤燥貝母以清肺開鬱苦參以利竅逐水併入膀胱以除熱結也案貝母本經甄權並云治産難而外臺子癇門小品葛根湯方後云貝母令人易産若未臨月者升麻代之此說雖不可信然足見其亦有利竅之功本方所用蓋取之於利竅耳金鑑云方證不合必有脫簡不釋殆不考藥性也時氏産經苦參丸主療與原文同當歸貝母苦參各三兩滑石半兩上為末蜜丸如小豆大以米飲下二十丸妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之沈此胎壓衛氣不利致水也鑑妊娠外有水氣則浮腫灑淅惡寒水盛貯於肌膚故身重內有水氣則小便不利水盛阻遏陽氣上升故起即頭眩也用葵子茯苓者是專以通竅利水為主也婦人良方云産寶論曰夫妊娠腫滿由臟氣本弱因産重虛土不剋水血散入四肢遂致腹脹手足面目皆浮腫小便祕澀陳無擇云凡婦人宿有風寒冷濕妊娠喜腳腫俗為皺腳亦有通身腫滿心腹急脹名曰胎水巢源名子滿體腫葵子茯苓散方葵子一斤茯苓三兩上二味杵為散飲服方寸匕日三服小便利則愈張氏醫通云膀胱者主藏津液氣化出溺外利經脈上行至頭為諸陽之表今膀胱氣不化水溺不得出外不利經脈所以身重灑灑惡寒起即頭眩但利小便則水去而經氣行表病自愈用葵子直入膀胱以利癃閉佐茯苓以滲水道也千金治妊娠小便不利方即本方外臺引千金翼主療亦同千金注引本經文同婦人良方葵子散治妊娠小便不利身重惡寒起則眩暈及水腫者王子亨云妊娠小便不通特避寒藥又名茯苓湯葵子五兩茯苓三兩上二味為末每服二錢米飲調下小便利則愈時氏産經云如不通恐是轉胞加發灰少許調服極妙葵子用黃葵子聖惠方葵子散治妊娠身體浮腫小便不利灑淅惡寒即本方加漢防己凡三味各二兩婦人妊娠宜常服當歸散主之脈經此下有即易産無疾苦六字尤妊娠之後最慮濕熱傷動胎氣故於芎歸芍藥養血之中用白朮除濕黃芩除熱丹溪稱黃芩白朮為安胎之聖藥夫芩術非能安胎者去其濕熱而胎自安耳鑑妊娠無病不須服藥若其人瘦而有熱恐耗血傷胎宜常服此以安之當歸散方當歸黃芩芍藥芎藭各一斤白朮半斤上五味杵為散酒飲服方寸匕日再服妊娠常服即易産胎無苦疾産後百病悉主之汪氏醫學原理有人參方氏丹溪心法附余云此方養血清熱之劑也瘦人血少有熱胎動不安素曾半産者皆宜服之以清其源而無患也王氏明醫雜著云調理妊娠在於清熱養血條實黃芩為安胎聖藥清熱故也暑月宜加之養胎全在脾胃譬猶懸鐘於梁梁軟則鐘下墜折則墮矣故白朮補脾為安胎君藥外臺古今録驗術湯療妊娠卒得心痛欲死千金治妊娠腹中滿痛叉心不得飲食即本方去芎藭當歸上三味切以水六升煮取二升半分三服半日全盡微下水令易生易簡方治經三四月不行或一月再至即本方加山茱萸妊娠養胎白朮散主之尤妊娠傷胎有因濕熱者亦有因濕寒者隨人臟氣之陰陽而各異也當歸散正治濕熱之劑白朮散白朮牡蠣燥濕川芎溫血蜀椒去寒則正治濕寒之劑也仲景並列於此其所以詔示後人者深矣白朮散方原注見外臺外臺引古今録驗云裴伏張仲景方白朮芎藭蜀椒三分去汗牡蠣外臺白朮芎藭各四分牡蠣二分上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之復不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置苦痛徐云脫一腹字沈本作苦腹痛吐痛外臺作吐唾為是程白朮主安胎為君芎藭主養胎為臣蜀椒主溫胎為佐牡蠣主固胎為使按瘦而多火者宜用當歸散肥而有寒者宜用白朮散不可混施也芍藥能緩中故苦痛者加之芎藭能溫中故毒痛者倍之痰飲在心膈故令心煩吐痛不能食飲加細辛破痰下水半夏消痰去水更服漿水以調中若嘔者復用漿水服藥以止嘔嘔不止再易小麥汁以和胃嘔止而胃無津液作渴者食大麥粥以生津液病愈服之勿置者以大麥粥能調中補脾故可常服非指上藥可常服也徐云豫治迪可弟婦未孕即痰嗽見血既孕而不減人瘦豫以此方治之因其腹痛加芍藥兩大劑而痰少嗽止人爽胎安和劑局方白朮散調補衝任扶養胎氣治妊娠宿有風冷胎痿不長或失於將理動傷胎氣多致損墮懷孕常服壯氣益血保護胎藏即本方三因同婦人良方白朮丸主療同前局方白朮散即本方加阿膠地黃當歸上為末蜜為丸如梧子米飲吞三四十丸酒醋湯亦可婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈原注見玉函玉函傷胎作傷寒關元作小腸之募無微利之微字程七月手太陰肺經養胎金為火乘則肺金受傷而胎失所養又不能通調水道故有腹滿不得小便從腰以下有如水氣狀也勞宮穴在手心厥陰心主穴也瀉之則火不乘金矣關元穴在臍下為小腸之募瀉之則小便通利矣此穴不可妄用刺之能落胎案金鑑云文義未詳此穴刺之落胎必是錯簡不釋此說固是然依玉函傷胎作傷寒乃義稍通徐子才逐月養胎方云妊娠七月手太陰脈養不可針灸其經婦人産後病脈證治第二十一論一首證六條方八首問曰新産婦人有三病一者病痓二者病鬱冒三者大便難何謂也師曰新産血虛多汗出喜中風故令病痓亡血復汗寒多故令鬱冒亡津液胃燥故大便難案痓沈尤金鑑作痙為是詳痙病中尤痙筋病也血虛汗出筋脈失養風入而益其徑也鬱冒神病也亡陰血虛陽氣遂厥而寒復郁之則頭眩而目瞀也大便難者液病也胃藏津液而滲灌諸陽亡津液胃燥則大腸失其潤而便難也三者不同其為亡血傷津則一故皆為産後所有之病程産後血暈者為鬱冒又名血厥産婦鬱冒其脈微弱嘔不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以産婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之原注方見嘔吐中尤鬱冒雖有客邪而其本則為裡虛故其脈微弱也嘔不能食大便反堅但頭汗出津氣上行而不下逮之象所以然者亡陰血虛孤陽上厥而津氣從之也厥者必冒冒家欲解必大汗出者陰陽乍離故厥而冒及陰陽復通汗乃大出而解也産婦新虛不宜多汗而此反善汗出者血去陰虛陽受邪氣而獨盛汗出則邪去陽弱而後與陰相和所謂損陽而就陰是也小柴胡主之者以邪氣不可不散而正虛不可不顧惟此法為能解散客邪而和利陰陽耳鑑大便堅嘔不能食用小柴胡湯必其人舌有苔身無汗形氣不衰者始可故病得解自能食也若有汗當減柴胡無熱當減黃芩嘔則當倍姜半虛則當倍人參又在臨證之變通也案巢源云運悶之狀心煩氣欲絶是也亦有去血過多亦有下血極少皆令運悶若去血過多血虛氣極如此而運悶者但煩悶而已若下血過少而氣逆者則血隨氣上掩於心亦令運悶則煩悶而心滿急二者為異亦當候其産婦血下多少則知其産後應運與不運也然煩悶不止則斃人巢氏所論如此知産後血暈自有兩端其去血過多而暈者屬氣脫其證眼閉口開手撒手冷六脈微細或浮是也下血極少而暈者屬血逆其證胸腹脹痛氣粗兩手握拳牙關緊閉是也此二者證治霄壤服藥一差生死立判宜審辨焉而本條所論別是一證活人書妊娠傷寒門載此條於三物黃芩湯之後則知是專治婦人草蓐傷風嘔而不能食者若以小柴胡湯為産後鬱冒之的方則誤人殆多矣病解能食七八日更發熱者此為胃實大承氣湯主之見痓病中脈經作此為胃熱氣實程金鑑脈經並接前條為一條沈此即大便堅嘔不能食用小柴胡湯而病解能食也病解者謂鬱冒已解能食者乃餘邪隱伏胃中風熱熾盛而消穀但食入於胃助起餘邪復盛所以七八日而更發熱故為胃實是當蕩滌胃邪為主故用大承氣峻攻胃中堅壘俾無形邪相隨有形之滯一掃盡出則病如失仲景本意發明産後氣血雖虛然有實證即當治實不可顧慮其虛反致病劇也産後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足方見寒疝中程産後血虛有寒則腹中急痛內經曰味厚者為陰當歸羊肉味厚者也用以補産後之陰佐生薑以散腹中之寒則㽲痛自止夫辛能散寒補能去弱三味辛溫補劑也故並主虛勞寒疝魏妊娠之㽲痛胞阻於血寒也産後腹中㽲痛者裡虛而血寒也一阻一虛而治法異矣尤當歸生薑溫血散寒孫思邈云羊肉止痛利産婦千金當歸湯治婦人寒疝虛勞不足若産後腹中絞痛即本方加芍藥注云子母祕録有甘草丹溪心要云當産寒月臍下脹滿手不可犯寒入産門故也服仲景羊肉湯二服愈嚴氏濟生當歸羊肉湯治産後發熱自汗肢體痛名曰蓐勞即本方加人參黃耆産後腹痛煩滿不得臥枳實芍藥散主之鑑産後腹痛不煩不滿裡虛也今腹痛煩滿不得臥裡實也氣結血凝而痛故用枳實破氣結芍藥調腹痛枳實炒令黑者蓋因産婦氣不實也並主癰膿亦因血為氣凝久而腐化者也佐以麥粥恐傷産婦之胃也尤産後腹痛而至煩滿不得臥知血鬱而成熱且下病而礙上也與虛寒㽲痛不同矣枳實燒令黑能入血行滯同芍藥為和血止痛之劑也魏大麥粥取其滑潤宜血且有益胃氣也枳實芍藥散方枳實燒令黑勿太過芍藥等分上二味杵為散服方寸匕日三服並主癰腫以麥粥下之案朱震亨云芍藥産後禁用程氏辨其誤極是今不繁引又案此前排膿散中去桔梗不用雞子黃用麥粥立方之意稍近故並治癰腫乎師曰産婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利鑑産婦腹痛屬氣結血凝者枳實芍藥散以調之假令服後不愈此為熱灼血乾著於臍下而痛非枳實芍藥之所能治也宜下瘀血主之下瘀血湯攻熱下瘀血也並主經水不通亦因熱灼血乾故也下瘀血湯方大黃三兩趙本作二兩桃仁二十枚䗪蟲二十枚熬去足上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝程䗪蟲主下血閉咸能軟堅也大黃主下瘀血苦能泄滯也桃仁亦下瘀血滑以去著也三味相合以攻臍下乾血魏此類於抵當湯丸之用亦主經水不利無非通幽開積之治也和酒為丸者緩從下治也徐既曰新血又曰如豚肝驟結之血也案徐氏蘭臺軌範云新字當作瘀字此說頗有理産後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裡結在膀胱也見痓病中脈經煩躁發熱四字作四五日趺陽脈六字食則譫語至夜即愈八字作譫語利之則愈六字程太陽傷寒熱結膀胱則蓄血小腹堅痛今産後非太陽證而小腹亦堅痛者此惡血未盡熱在裡結在膀胱也宜下瘀血湯輩若不大便煩躁發熱則熱不在膀胱而熱在胃切其脈亦微實也日晡時陽明向王時也當向王時是以再倍發熱煩躁則胃中實矣胃實則不能食故食則譫語轉增其實也宜大承氣湯下之此條前後簡錯熱在裡八字當在惡露不盡之下未有大承氣湯而下膀胱血結也至夜即愈四字衍文脈經無金鑑同但以至夜即愈不為衍文以再倍二字為衍鑑李彣曰此一節具兩證在內一是太陽蓄血證一是陽明裡實證因古人文法錯綜故難辨也無太陽證謂無表證也少腹堅痛者以肝藏血少腹為肝經部分故血必結於此則堅痛亦在此此惡露不盡是為熱在裡結在膀胱此太陽蓄血證也宜下去瘀血若不大便煩躁脈實譫語者陽明裡實也再倍發熱者熱在裡蒸蒸發於外也陽明旺於申酉戌日晡是陽明向旺時故煩躁不能食病在陽而不在陰故至夜則愈此陽明腑病也宜大承氣湯以下胃實案尤云蓋謂不獨血結於下而亦熱聚於中也若但治其血而遺其胃則血雖去而熱不除即血亦未必能去而大承氣湯中大黃枳實均為血藥仲景取之者蓋將一舉而兩得之歟此解不可從李注似允當産後風續之數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可與陽旦湯原注即桂枝湯方見下利中脈經作婦人産得風心下悶作心下堅徐沈作産後中風續續徐此段言産後中風遷延不愈而表裡雜見者仍當去其風也謂中風之輕者數十日不解似乎不可責表然頭疼惡寒汗出時有熱皆表證也心下悶乾嘔太陽之邪欲內入而內不受也今陽旦證仍在陽旦湯何不可與而因循以致誤也案陽旦湯徐沈尤金鑑為桂枝湯加黃芩而魏則據傷寒論證象陽旦條為桂枝加附子並誤唯程依原注為是張氏醫通云舉此與上文承氣湯為表裡之例産後中風發熱面正赤喘而頭痛竹葉湯主之喘而千金作喘氣頭痛聖濟作頭目昏痛尤此産後表有邪而里適虛之證若攻其表則氣浮易脫若補其里則表多不服竹葉湯用竹葉葛根桂枝防風桔梗解外之風熱人參附子固里之脫甘草薑棗以調陰陽之氣而使其平乃表裡兼濟之法凡風熱外淫而裡氣不固者宜於此取則焉沈産後最易變為柔痙故發熱頭痛雖屬太陽表證恐隱痙病之機所以方後云頸項強加大附子一枚案金鑑云産後中風之下當有病痙者之三字始與方合若無此三字則人參附子施之於中風發熱可乎而又以竹葉命名者何所謂也且方內有頸項強用大附子之文本篇有證無方則可知必有脫簡此注恐非是方蓋防發痙之漸若至直髮痙則難奏效也竹葉湯方竹葉一把千金作一握葛根三兩防風案千金用二兩桔梗桂枝人參甘草各一兩大棗十五枚生薑五兩附子一枚炮活人書不用上十味以水一斗煮取二升半分溫三服溫覆使汗出頸項強用大附子一枚破之如豆大前藥揚去沫嘔者加半夏半升洗千金分上有去滓二字無一枚以下十二字前趙本作煎徐注豆大下云該是入字案據徐則豆下句程産後血虛多汗出喜中風故令病痙今證中未至背反張而發熱面赤頭痛亦風痙之漸故用竹葉主風痙防風治內痙葛根治剛痓桂枝治柔痙生薑散風邪桔梗除風痹辛以散之之劑也邪之所湊其氣必虛佐人參以固衛附子以溫經甘草以和諸藥大棗以助十二經同諸風劑則發中有補為産後中風之大劑也頸項強急痙病也加附子以散寒嘔者風擁氣逆也加半夏以散逆張氏醫通云此桂枝湯去芍藥加竹葉葛防桔梗人參因方後所加附子向來混入方內案醫通載本方去附子蓋本於活人書又云附子恐是方後所加治頸項強者以邪在太陽禁固其筋脈不得屈伸故用附子溫經散寒揚去沫者不使辛熱上浮之氣助其虛陽上逆也若邪在胸而嘔加半夏治之上言破之如豆入前藥舊本作如豆大今如徐忠可駁正婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之乳脈經作産程胃者水穀氣血之海産後則血氣虛而胃氣逆故煩亂嘔逆尤婦人乳中虛煩亂嘔逆者乳子之時氣虛火勝內亂而上逆也案乳中蓋在草蓐之謂故脈經作産中而沈云乳者乳子之婦也魏云乳即血也初産血虛沈云乳下當有閉字謂乳閉而不通也金鑑云此條文義證藥未詳張璐云乳中虛言乳哺而乳汁去多並誤竹皮大丸方活人云治虛煩載之於丈夫諸方中生竹茹二分石膏二分桂枝一分甘草七分白薇一分上五味末之棗肉和丸彈子大以飲服一丸日三夜二服有熱者倍白薇煩喘者加柏實一分活人書柏實作枳實程竹茹甘寒以除嘔啘石膏辛寒以除煩逆白薇鹹寒以治狂惑邪氣夫寒則泥膈佐桂枝以宣導寒則傷胃佐甘草以和中有熱倍白薇白薇鹹寒能除熱也煩喘加柏實柏實辛平能治喘也用棗肉為丸者統和諸藥以安中益氣也武氏濟陰綱目云中虛不可用石膏煩亂不可用桂枝此方以甘草七分配衆藥六分又以棗肉為丸仍以一丸飲下可想其立方之微用藥之難審虛實之不易也仍飲服者尤慮夫虛虛之禍耳用是方者亦當深省産後下利虛極白頭翁加甘草阿膠湯主之脈經作熱痢重下新産虛極千金利虛間有兼字尤傷寒熱利下重者白頭翁湯主之寒以勝熱苦以燥濕也此亦熱利下重而當産後虛極則加阿膠救陰甘草補中生湯且以緩連柏之苦也案金鑑云此條文義證藥不合不釋蓋以其虛極而用苦寒之品也白頭翁加甘草阿膠湯方千金名白頭翁湯白頭翁甘草阿膠各二兩秦皮黃連案千金各二兩柏皮各三兩上六味以水七升煮取二升半內膠令消盡分溫三服張氏醫通云傷寒厥陰證熱利下重者用白頭翁湯苦寒治熱以堅腸胃此産後氣血兩虛故加阿膠甘草然下利血滯也古人云血行則利自止此方豈獨治産後哉附方千金三物黃芩湯治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之千金煩者作煩熱黃芩一兩苦參二兩乾地黃四兩千金二兩上有各字上三味以水六升煮取二升溫服一升多吐下蟲千金六升下有去滓二字徐在草蓐是未離産所也自發露得風是揭蓋衣被稍有不慎而暫感也産後陰虛四肢在亡血之後陽氣獨盛又得微風則苦煩熱然表多則上入而頭痛當以上焦為重故主小柴胡和解若從下受之而濕熱結於下則必生蟲頭不痛故以黃芩消熱為君苦參去風殺蟲為臣而以地黃補其元陰為佐曰多吐下蟲謂蟲得苦參必不安其上出下出故未可知也案別録云苦參除伏熱本方所用蓋不在殺蟲當考千金傷寒雜治門千金內補當歸建中湯治婦人産後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急摩痛引腰背不能食飲産後一月日得服四五劑為善令人強壯宜千金刺作㽲中急作拘急無摩字宜作方當歸四兩桂枝三兩芍藥六兩千金作五兩生薑三兩千金作六兩甘草五兩大棗十二枚千金作十八枚上六味以水一斗煮取三升分溫三服一日令盡若大虛加飴糖六兩湯成內之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠若無當歸以芎藭代之若無生薑以乾薑代之案內衄千金作內竭非也千金翼與本條同巢源云吐血有三種一日內衄出血如鼻衄但不從鼻孔出或去數升乃至斛是也若無生薑以下千金無沈産後體雖無病血海必虛若中氣充實氣血雖虛易能恢復或後天不能生血充於血海則見虛羸不足但血海虛而經絡之虛是不待言因氣血不利而瘀則腹中刺痛不止衝任督帶內虛則少腹中急摩痛引腰背脾冒氣虛則吸吸少氣不能食飲故用桂枝湯調和營衛加當歸欲補血之功居多若大虛加膠飴峻補脾胃而生氣血若去血過多崩傷內衄乃血海真陰大虧故加地黃阿膠以培之方後云無生薑以乾薑代之乃溫補之中兼引血藥入血分生血其義更妙張氏醫通云按此即黃耆建中之變法彼用黃耆以助外衛之陽此用當歸以調內營之血兩不移易之定法也千金芍藥湯治産後苦腹少痛方即小建中湯用膠飴八兩婦人雜病脈證並治第二十二論一首脈證合十四條方十四首婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之方見嘔吐中來傷寒論太陽下篇作得斷下有者字程婦人傷寒中風六經傳變治例與男子同法唯經水適來適斷熱入血室與夫胎前産後崩漏帶下則治有殊也婦人經行之際當血弱氣盡之時邪氣因入血室與正氣相搏則經為之斷血為之結也血結則邪正分爭往來寒熱休作有時與小柴胡解表裡而散血室之邪熱尤仲景單用小柴胡湯不雜血藥一味意謂熱邪解而乍結之血自行耳詳傷寒論輯義太陽中篇以下二條同許氏本事方小柴胡加地黃湯治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語如見鬼狀亦治産後惡露方來忽爾斷絶即於小柴胡湯加生乾地黃辛亥中寓居毗陵學官王仲禮其妹病傷寒發寒熱遇夜則如有鬼物所憑六七日忽昏塞涎響如引鋸牙關緊急瞑目不知人疾勢極危召豫視豫曰得病之初曾值月經來否其家云月經方來病作而經遂止得一二日發寒熱晝雖靜夜則有鬼祟從昨日來涎生不省人事豫曰此熱入血室證也仲景云婦人中風發熱惡寒經水適來晝則明瞭暮則譫語如見鬼狀發作有時此名熱入血室醫者不曉以剛劑與之遂致胸膈不利涎潮上脘喘急息高昏冒不知人當先化其涎後除其熱豫急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡加地黃湯三服而熱除不汗而自解矣一呷散大天南星一味選臘辰日製詳見於本書婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈脈經注二焦字疑程傷寒發熱又值經水適來之時則寒邪乘虛而入搏於血室夫邪去陽入陰則晝日明瞭陰被其邪故暮則譫語如見鬼狀也無者禁止之辭犯胃氣以禁下言也上二焦以禁汗吐言也今邪在血室中則非汗吐下所宜矣上章以往來寒熱如瘧故用小柴胡以解其邪下章以胸脅下滿如結胸狀故刺期門以瀉其實此章則無上下二證似待其經行血去邪熱得以隨血出而解也婦人中風發熱惡寒經水適來得七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之太陽下篇得下有之字程發熱惡寒則風邪在表未入於裡值經水適來至七八日則邪熱乘虛而內入入則表證罷故脈遲身涼和也胸脅者肝之部分靈樞經曰厥陰根於大敦結於玉英絡於膻中其正經則布脅肋以肝藏血邪入血室故令胸脅滿如結胸狀也肝藏魂熱搏於陰故令譫語也期門者肝之募刺之以瀉其實許氏本事方云一婦人患熱入血室證醫者不識用補血調氣藥涵養數日遂成血結胸或勸用前藥豫曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣豫不能針請善針者治之如言而愈或者問曰熱入血室何為而成結胸也豫曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室血為邪迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸也何以言之婦人平居水當養於木血當養於肝也方未受孕則下行以為月水既妊娠則中蓄之以養胎及已産則上壅之以為乳皆血也今邪逐血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也活人書海蛤散治血結胸海蛤滑石甘草各一兩芒硝半兩上為末每服二錢雞子清調下陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈詳傷寒論輯義陽明篇者太陽中篇作則尤陽明之熱從氣而之血襲入胞宮即下血而譫語蓋衝任之脈並陽明之經不必乘經水之來而後熱得入之故彼為血去而熱入此為熱入而血下也但頭汗出者陽通而閉在陰也此雖陽明之熱而傳入血室則仍屬肝家故亦當刺期門以瀉其實刺已周身濈然汗出則陰之閉者亦通故愈婦人咽中如有炙臠半夏厚朴湯主之臠脈經作腐尤此凝痰結氣阻塞咽嗌之間千金所謂咽中帖帖如有炙肉吞不下吐不出者是鑑咽中如有炙臠謂咽中有痰涎如同炙肉咯之不出咽之不下者即今之梅核氣病也此病得於七情鬱氣凝涎而生故用半夏厚朴生薑辛以散結苦以降逆茯苓佐半夏以利飲行涎紫蘇芳香以宣通鬱氣俾氣舒涎去病自愈矣此證男子亦有不獨婦人也巢源云咽中如炙肉臠者此是胸膈痰結與氣相搏逆上咽喉之間結聚狀如炙肉之臠也半夏厚朴湯方原注千金作胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下案今本肉下有臠字半夏一升厚朴三兩茯苓四兩趙作二兩生薑五兩干蘇葉二兩千金云一方無干蘇葉生薑上五味以水七升煮取四升分溫四服日三夜一服聖惠方半夏散治咽喉中如有炙腐於本方中加枳殼訶黎勒皮王氏易簡四七湯治喜怒悲恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七氣之所為也或中脘痞滿氣不舒快或痰涎壅盛上氣喘急或因痰飲中節嘔吐噁心並宜服之即本方又云婦人情性執著不能寬解多被七氣所傷遂致氣填胸臆或如梅核上塞咽喉甚者滿悶欲絶産婦尤多此證服此劑間以香附子藥久服取效婦人惡阻尤宜服之間以紅丸子尤效一名厚朴半夏湯一名大七氣湯瑞竹堂經驗方四七湯治婦人女子小便不順甚者陰戶疼痛於本方加香附子甘草煎成加琥珀末調服仁齊直指桂枝四七湯治風冷寒邪搏心腹作痛於本方合桂枝湯加枳殼人參又四七湯治驚憂氣遏上喘即本方又加減七氣湯治氣鬱嘔吐於本方合千金七氣湯桂枝半夏人參甘草大棗生薑去紫蘇又加味四七湯治心氣鬱滯豁痰散驚於本方加茯神遠志甘草石菖大棗三因七氣湯治喜怒憂思悲恐驚七氣郁發致五臟互相刑剋陰陽反戾揮霍變亂吐利交作寒熱眩暈痞滿咽塞於本方加桂枝芍藥陳皮人參大棗孫氏三吳醫案云張溪亭乃眷喉中梗梗有肉如炙臠吞之不下吐之不出鼻塞頭運耳常啾啾不安汗出如雨心驚膽怯不敢出門稍見風即遍身疼小腹時疼小水淋瀝而疼脈兩寸皆短兩關滑大右關尤搏指此梅核氣症也以半夏四錢厚朴一錢紫蘇葉一錢五分茯苓一錢三分姜三分水煎食後服每用此湯調理多效婦人臟躁喜悲傷欲哭象如神靈所作數缺伸甘麥大棗湯主之鑑臟心臟也心靜則神藏若為七情所傷則心不得靜而神躁擾不寧也故喜悲傷欲哭是神不能主情也象如神靈所憑是心不能神明也即今之失志癲狂病也數缺伸喝缺也喝缺煩悶肝之病也母能令子實故證及也案沈尤以臟為子宮甚誤甘草小麥大棗湯方三因名小麥湯袖珍名甘草湯甘草三兩小麥一升大棗十枚上三味以水六升煮取三升溫分三服亦補脾氣案溫分徐沈尤作分溫是程內經曰悲則心系急甘草大棗者甘以緩諸急也小麥者谷之苦者也靈樞經曰心病者宜食麥是谷先入心矣案素問以小麥為心之谷千金云小麥養心氣本方所主正在於此而金鑑云方義未詳必是僞錯此說大誤驗之於病者始知立方之妙也許氏本事方云鄉里有一婦人數缺無故悲泣不止或謂之有祟祈禳請禱備至終不應豫忽憶有一證云婦人臟躁云云急令治藥盡劑而愈古人識病制方種種妙絶如此試而後知陳氏婦人良方云鄉先生程虎卿內人妊娠四五個月遇晝則慘戚悲傷淚下數缺如有所憑醫與巫兼治皆無益僕年十四正在齊中習業見說此證而程省元皇皇無計僕遂告之管先生伯同說記憶先人曾說此一證名曰臟躁悲傷非大棗湯不愈虎卿借方看之甚喜對證笑而治藥一投而愈矣婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之婦人下千金有霍亂嘔逆二字瀉心湯上千金有甘草二字尤吐涎沫上焦有寒也不與溫散而反下之則寒內入而成痞如傷寒下早例也然雖痞而猶吐涎沫則上寒未已不可治痞當先治其上寒而後治其中痞亦如傷寒例表解乃可攻痞也魏瀉心湯在傷寒論中為方不一亦當合傷寒論中痞證諸條參觀之而求其治法小青龍湯方見肺癰中瀉心湯方見驚悸中案驚悸所載即三黃瀉心湯此恐不然據千金當是甘草瀉心湯婦人之病因虛積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下未多經候未勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然徐云未多之未字疑誤程尤作來多程云謂崩帶之屬金鑑亦作來多云來字當是未字本條皆經水斷絶之病若系來多則與上文不合是傳寫之訛案撰金鑑者何不考之正脈等本可疑沈魏並仍原文令陰趙本作冷陰非鑑此條為婦人諸病綱領其病之所以異於男子者以其有月經也其月經致病之根源則多因虛損積冷結氣也三者一有所感皆能使經水斷絶至有歷年寒積胞門以致血凝氣結而不行者先哲云女子以經調為無病若經不調則變病百出矣以下皆言三者阻經之變病其變病之不同各因其人之臟腑經絡寒熱虛實之異也如寒外傷經絡其人上焦素寒則凝堅在上故上焦胸肺受病也形寒傷肺則氣滯阻飲故嘔吐涎唾也若其人上焦素熱寒同其化久則成熱熱傷其肺故成肺癰而形體損瘦也若其人中焦素寒則在中盤結故繞臍疝痛也或兩脅疼痛是中焦之部連及肝臟故也或其人中焦素熱則不病寒疝而病結熱於中矣中熱故不能為寒疝而繞臍之痛仍在關元也其人脈數當生瘡若無瘡則熱必灼陰皮膚失潤故肌粗若魚鱗也然此嘔吐涎唾寒疝疼痛肌若魚鱗等病亦時著男子非止女子病也在下未多謂經候不勻而血不多下也邪侵胞中乃下焦之部故病陰中掣痛少腹惡寒也或痛引腰脊下根氣街急痛腰膝疼煩皆胞中衝任為病所以必然也或痛極奄忽眩冒狀如厥癲亦痛甚之常狀也若其人或有憂慘悲傷多嗔之遇而見此眩冒厥癲之證實非有鬼神也凡此胞中衝任血病皆能病帶故諺曰十女九帶也然帶下病久津液必傷形必羸瘦診其脈虛審其多寒豈止病此三十六病而千變萬端矣雖千變萬端然審脈陰陽虛實緊弦與病參究行其針藥治危得安也其有病雖同而脈不同者則當詳加審辨故曰子當辨記勿謂不然也尤甚則奄忽眩冒狀如厥癲所謂陰病者下行極而上也或有憂慘悲嗔狀如鬼神者病在陰則多怒及悲愁不樂也而總之曰此皆帶下帶下者帶脈之下古人列經脈為病凡三十六種皆謂之帶下病非今人所謂赤白帶下也三十六病者十二症九痛七害五傷三痼也案史記扁鵲傳云過邯鄲聞貴婦人即為帶下醫知古所稱帶下乃腰帶以下經血諸疾之謂也金鑑云此皆帶下一句當在非有鬼神之下文義相屬是傳寫之訛此說非也本條隔句押韻如依金鑑而改之則失上下押韻之法不可從也巢源云諸方說三十六疾者十二症九痛七害五傷三痼不通是也又云張仲景所說三十六疾皆由子臟冷熱勞損而挾帶下起於陰內條目混漫與諸方不同據巢氏此言則本條所謂三十六疾今無所考歟問曰婦人年五十所病下利數十日不止暮即發熱少腹裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之案沈尤所字下句所許同即日晡所之所諸家或接下句義不通程下利當是下血鑑所病下利之利字當是血字文義相屬必是傳寫之訛李彣曰婦人年五十則已過七七之期任脈虛大沖脈衰天癸竭地道不通時也所病下利據本文帶下觀之當是崩淋下血之病蓋血屬陰陰虛故發熱暮亦屬陰也任主胞胎沖為血海二脈皆起於胞宮而出於會陰正當少腹部分衝脈挾臍上行故衝任脈虛則少腹裡急有乾血亦令腹滿內經云任脈為病女子帶下瘕聚是也手背為陽掌心為陰乃手三陰過脈之處陰虛故掌中煩熱也陽明脈挾口環唇與衝脈會於氣街皆屬於帶脈難經云血主濡之以衝脈血阻不行則陽明津液衰少不能濡潤故唇口乾燥斷以病屬帶下以曾經半産少腹瘀血不去則津液不布新血不生此則唇口乾燥之所由生也溫經湯方吳茱萸三兩當歸芎藭芍藥各二兩人參桂枝阿膠牡丹皮去心生薑甘草各二兩半夏半升麥門冬一升去心上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水來過多及至期不來取徐沈尤並作治是程婦人有瘀血當用前證下瘀血湯今婦人年五十當天癸竭之時又非下藥所宜故以溫藥治之以血得溫即行也經寒者溫以茱萸薑桂血虛者益以芍藥歸芎氣虛者補以人參甘草血枯者潤以阿膠麥冬半夏用以止帶下牡丹用以逐堅癥十二味為養血溫經之劑則瘀血自行而新血自生矣故亦主不孕崩中而調月水千金治崩中下血出血一斛服之即斷或月經來過多及過期不來服之亦佳方即本方外臺引千金名溫經湯斛作鬥和劑局方溫經湯治衝任虛損月候不調或來多不斷或過期不來或崩中去血過多不止又治曾經損娠瘀血停留少腹急痛發熱下利手掌煩熱唇乾口燥及治少腹有寒久不受胎即本方醫學入門名大溫經湯王氏易簡云若經血不調血臟冷痛者當用小溫經湯即本方別本以當歸附子二味等分白水煎服不載本方案已名小溫經湯恐非本方百一選方正經湯於本方去芎藭甘草加熟地黃帶下經水不利少腹滿痛經一月再見者土瓜根散主之案本草綱目土瓜條經下補或字義尤明金鑑改再作不字非尤婦人經脈流暢應期而至血滿則下血盡復生如月盈則虧月晦復朏也惟其不利則蓄泄失常似通非通欲止不止經一月而再見矣少腹滿痛不利之驗也土瓜根主內痹瘀血月閉䗪蟲蠕動逐血桂枝芍藥行榮氣而正經脈也土瓜根散方原注陰㿗腫亦主之土瓜根芍藥桂枝䗪蟲各三分上四味杵為散酒服方寸匕日三服程土瓜根破瘀血而兼治帶下故以為君䗪蟲下血閉以為臣芍藥通順血脈以為佐桂枝通行瘀血以為使㿗疝亦凝血所成故此方亦治㿗腫寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革婦人則半産漏下旋覆花湯主之尤本文已見虛勞篇中此去男子亡血失精句而益之曰旋覆花湯主之蓋專為婦人立法也詳本草旋覆花治結氣去五臟間寒熱通血脈蔥主寒熱除肝邪絳帛入肝理血殊與虛寒之旨不合然而肝以陰臟而含少陽之氣以生化為事以流行為用是以虛不可補解其鬱聚即所以補寒不可溫行其血氣即所以溫固不可專補其血以傷其氣亦非必先散結聚而後溫補如趙氏魏氏之說也鑑此條詳在傷寒論辨脈法篇錯簡在此旋覆花湯主之一句亦必是錯簡半産漏下則氣已下陷焉有再用旋覆花下氣之理旋覆花湯方旋覆花三兩蔥十四莖新絳少許上三味以水三升煮取一升頓服之婦人陷經漏下黑不解膠薑湯主原注臣億等校諸本無膠薑湯方想是妊娠中膠艾湯樓氏綱目云即芎歸膠艾湯一云加乾薑一兩鑑李彣曰陷經漏下謂經脈下陷而血漏下不止乃氣不攝血也黑不解者瘀血不去則新血不生榮氣腐敗也然氣血喜溫惡寒用膠薑湯養氣血則氣盛血充推陳致新而經自調矣按此條文義必有缺誤膠薑湯方亦缺姑採此注以見大意尤陷經下而不止之謂黑則因寒而色瘀也膠薑湯方未見然補虛溫里止漏阿膠乾薑二物已足林億云恐是膠艾湯按千金膠艾湯有乾薑似可取用巢源載五色漏下其五曰腎臟之色黑漏下黑者是腎臟之虛損故漏下而挾黑色也婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之如敦狀脈經作敦敦狀更四字注要略云滿而熱案徐沈生改經誤尤敦音對按周禮注盤以盛血敦以盛食蓋古器也少腹滿如敦狀者言少腹有形高起如敦之狀與內經脅下大如覆杯之文略同小便難病不獨在血矣不渴知非上焦氣熱不化生後即産後産後得此乃是水血並結而病屬下焦也故以大黃下血甘遂逐水加阿膠者所以去瘀濁而兼安養也案周禮天官玉府若合諸侯則共珠盤玉敦鄭注敦盤類古者以盤盛血以敦盛食尤注本於此又廣雅釋器𥂦盂也爾雅釋丘郭注敦盂也知本條如敦狀謂如盤盂之形也脈經如敦敦狀而千金云陰交石門主水脹水氣行皮中小腹皮敦敦然小便黃則脈經似是然如字竟無著落沈云人敦而不能起言其下重之情也金鑑云敦大也皆於文義不相葉今從尤注大黃甘遂湯方大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下婦人經水不利下抵當湯主之原注亦治男子膀胱滿急有瘀血者尤經水不利下者經脈閉塞而不下比前條下而不利者有別矣故彼兼和利而此專攻逐也然必審其脈證並實而後用之不然婦人經閉多有血枯脈絶者矣雖養衝任猶恐不至而可強責之哉鑑婦人經水不利下言經行不通利快暢下也乃婦人恆有之病不過活瘀導氣調和衝任足以愈之今曰抵當湯主之夫抵當重劑文內無少腹結痛大便黑小便利發狂善忘寒熱等證恐藥重病輕必有殘缺錯簡讀者審之抵當湯方水蛭三十個熬虻蟲三十枚熬去翅足桃仁二十個去皮尖大黃三兩酒浸上四味為末以水五升煮取三升去滓溫服一升千金桃仁煎治帶下月經閉不通本方去蛭加朴硝五兩千金翼抵當湯治婦人月水不利腹中滿時自減並男子膀胱滿急方本方去虻蟲加虎杖二兩一云虎掌又杏仁湯治月水不調或一月再來或兩月三月不來或月前或月後閉塞不通於本方加杏仁三十枚千金同李氏必讀代抵當湯行瘀血如血老而甚者去歸地加蓬朮生地黃當歸尾穿山甲各三錢降香一錢五分肉桂去皮一錢桃仁去皮尖炒二錢大黃去皮三錢芒硝八分水二鍾煎一鍾血在上食後服血在下食前服張氏醫通云水蛭如無以陵鯉甲生漆塗炙代之又代抵當丸治虛人蓄血宜此緩攻於前方去降香加蓬朮為末蜜丸蓄血而上部者丸如芥子黃昏去枕仰臥以津咽之令停喉以搜逐瘀積在中部食遠下部空心俱丸如梧子百勞水煎湯下之汪氏醫方集解同但去降香莪朮芒硝用玄明粉婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之沈臟即子宮也堅癖不止止當作散字堅癖不散子宮有乾血也白物者世謂之白帶也魏藏堅之臟指子宮也臟中之臟指陰中也尤臟堅癖不止者子臟乾血堅凝成癖而不去也乾血不去則新血不榮而經閉不利矣由是蓄泄不時胞宮生濕濕復生熱所積之血轉為濕熱所腐而成白物時時自下是宜先去其臟之濕熱礬石卻水除熱合杏仁破結潤乾血也礬石丸方礬石三分燒杏仁一分上二味末之煉蜜和丸棗核大內臟中劇者再內之程礬石酸澀燒則質枯枯澀之品故神農經以能止白沃亦澀以固脫之意也杏仁者非以止帶以礬石質枯佐杏仁一分以潤之使其同蜜易以為丸滑潤易以內陰中也此方專治下白物而設未能攻堅癖下乾血也婦人六十二種風及腹中血氣刺痛紅藍花酒主之尤婦人經盡産後風邪最易襲入腹中與血氣相搏而作刺痛刺痛痛如刺也六十二種未詳紅藍花苦辛溫活血止痛得酒尤良不更用風藥者血行而風自去耳紅藍花酒方原注疑非仲景方紅藍花一兩上一味以酒一大升煎減半頓服一半未止再服外臺近效療血暈絶不識人煩悶方紅藍花三兩新者佳以無灰清酒半升童子小便半大升煮取一大盞去滓候稍冷服之婦人良方紅藍花酒療血暈絶不識人煩悶言語錯亂惡血不盡腹中絞痛胎死腹中紅藍花一兩上為末分二服每服酒二盞童子小便二盞煮取盞半候冷分為二服留滓再並煎一方無童便本出肘後徐氏胎産方治産後血暈昏迷心氣絶婦人腹中諸疾痛當歸芍藥散主之徐此言婦人之病大概由血故言諸疾痛皆以術苓澤歸芍芎主之謂即有因寒者亦不過稍為加減非真以此方概腹中諸痛也鑑諸疾腹痛謂婦人腹中諸種疾痛也既曰諸疾痛則寒熱虛實氣食等邪皆令腹痛豈能以此一方概治諸疾痛耶當歸芍藥散主之必是錯簡當歸芍藥散方見前妊娠中婦人腹中痛小建中湯主之徐此言婦人之病既已由血則虛者多從何補起唯有建中之法為妙謂後天以脾胃為本胃和而飲食如常則自能生血而痛止也小建中即桂枝湯加飴糖也言外見當扶脾之統血不當令借四物之類耳前産後附千金內補當歸建中湯正此意也小建中湯方見前虛勞中朱氏集驗方加味建中湯治女人虛敗腹痛本方中加當歸琥珀木香施丸端效方大加減建中湯治婦人胎前産後一切産損月事不調臍腹㽲痛往來寒熱自汗口乾煩渴於黃耆建中湯去膠飴加當歸川芎白朮問曰婦人病飲食如故煩熱不能臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈宜腎氣丸主之以胞以下脈經作此人故肌盛頭舉身滿今反羸瘦頭舉中空感胞系了戾故致此病但利小便則愈宜服腎氣丸以中有茯苓故也方在虛勞中尤飲食如故病不由中焦也了戾與繚戾同胞系繚戾而不順則胞為之轉胞轉則不得溺也由是下氣上逆而倚息上氣不能下通而煩熱不得臥治以腎氣者下焦之氣腎主之腎氣得理庶繚者順戾者平而閉乃通耳巢源云胞轉之病由胞為熱所迫或忍小便俱令水氣還迫於胞屈闢不得充張外水應入不得入內溲應出不得出內外壅脹不通故為胞轉其狀小腹急痛不得小便甚者至死張仲景云婦人本肥盛且舉自滿全羸瘦且舉空減胞系了戾亦致胞轉朱氏格致論引婦人本肥盛云云而曰其義未詳案了繚並音聊繚纏也繞也千金有四肢痿躄繚戾等文舒氏女科要訣云了戾者絞紐也腎氣丸方乾地黃八兩薯蕷四兩山茱萸四兩澤瀉三兩茯苓三兩牡丹皮三兩桂枝附子炮各一兩千金翼用桂附各二兩上八味末之煉蜜和丸梧子大酒下十五丸加至二十五丸日再服詳於虛勞及消渴中當參考鑑趙良曰此方在虛勞中治腰痛小便不利小腹拘急此亦用之何也蓋因腎虛用之也用此補腎則氣化氣化則水行而愈矣然轉胞之病豈盡由下焦腎虛氣不化出致耶或中焦脾虛不能散精歸於胞及上焦肺虛不能下輸布於胞或胎重壓其胞或忍溺入房皆足成此病必求其所因以治之也李彣曰方名腎氣丸者氣屬陽補腎中真陽之氣也內具六味丸壯腎水以滋小便之源附桂益命門火以化膀胱之氣則熏蒸津液水道以通而小便自利此所以不用五苓散而用腎氣丸也蛇床子散方溫陰中坐藥脈經作婦人陰寒溫陰中作藥蛇床子散主之徐程魏尤金鑑並同蛇床子仁上一味末之以白粉少許和合相得如棗大綿裹內之自然溫合趙作令是徐坐謂內入陰中如生産謂坐草之坐也程白粉即米粉借之以和合也尤陰寒陰中寒也寒則生濕蛇床子溫以去寒合白粉燥以除濕也此病在陰中而不關臟腑故但內藥陰中自愈案千金注云坐藥即下著坐導藥少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之尤脈滑者濕也脈數者熱也濕熱相合而系在少陰故陰中即生瘡甚則蝕爛不已狼牙味酸苦除邪熱氣疥瘡惡瘡去白蟲故取治是病案龔氏外科百效云如因婦人子宮有敗精帶濁或月水未淨與之交合後又未洗男子腎虛邪穢滯氣遂令陰莖連睪丸腫瘡小便如淋名陰蝕瘡然婦人亦有之據此則陰蝕乃黴瘡之屬已狼牙湯方外臺引千金云療人陰蟲瘡方案千金云治陰中癢入骨困方與外臺所引異狼牙三兩千金作兩把上一味以水四升煮取半升以綿纏箸如繭浸湯瀝陰中日四遍外臺古今録驗婦人陰蝕苦中爛傷狼牙湯狼牙三兩㕮咀以水四升煮取半升去滓內苦酒如雞子中黃一杯煎沸適寒溫以綿濡湯以瀝瘡中日四五度即愈胃氣下泄陰吹而正喧此穀氣之實也膏發煎導之尤陰吹陰中出聲如大便失氣之狀連續不絶故曰正喧穀氣實者大便結而不通是以陽明下行之氣不得從其故道而乃別走旁竅也豬膏發煎潤導大便便通氣自歸矣案金鑑云膏發煎導之五字當是衍文此穀氣之實也之下當有長服訶黎勒丸之六字後陰下氣謂之氣利用訶黎勒散前陰下氣謂之陰吹用訶黎勒丸文義始屬藥病相對蓋訶黎勒丸以訶黎勒固下氣之虛以厚朴陳皮平谷氣之實亦相允合方錯簡在雜療篇內此說未知是否姑附之蕭氏女科經論云按婦人陰吹證仲景以為穀氣實胃氣下泄所致此之病機有不可解云來注云胃實腸虛氣走胞門亦是隨仲景之文而詮之也夫人穀氣胃中何嘗一日不實而見陰吹之證者未之嘗聞千百年之書其缺疑可也豫甲寅歲遊峽右有友吳禹仲來詢云此鎮有一富室女陰戶中時簌簌有聲如後陰之轉失氣狀遍訪醫者不曉此何病也豫曰陰吹證也仲景之書有之禹仲因嘆豫之讀書之博案陰吹非罕見之病簡前年療一諸侯夫人患此證尋為瘵藥罔效而沒膏發煎方見黃疸中小兒疳蟲蝕齒方原注疑非仲景方雄黃葶藶上二味末之取臘日豬脂熔以槐枝綿裹頭四五枚點藥烙之案本草綱目二味等分日作月程小兒胃中有疳熱則蟲生而牙斷蝕爛雄黃味辛葶藶味苦辛苦能殺蟲故也按張仲景有口齒論一卷案見宋藝文志今未之見豈被處簡脫於此耶而婦人方後不應有小兒方也案玉函經第八卷末亦載治小兒藥三方蓋另有幼科書而亡佚者此類豈其遣方耶
